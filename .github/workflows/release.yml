name: Release

on:
  push:
    branches: [main]
    paths: [ms_core.lua]

jobs:
  stamp:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Compute hash and sign MANIFEST
        env:
          MS_SIGNING_KEY: ${{ secrets.MS_SIGNING_KEY }}
        run: |
          SHA256=$(sha256sum ms_core.lua | awk '{print $1}')
          VERSION=$(jq -r '.version // "1.0.0"' MANIFEST.json)
          URL="https://raw.githubusercontent.com/mudbourn/ms-utils/main/ms_core.lua"

          # Build base MANIFEST with jq — no Python, no heredoc, no quoting issues.
          jq -n \
            --arg version "$VERSION" \
            --arg sha256  "$SHA256"  \
            --arg url     "$URL"     \
            '{"version":$version,"sha256":$sha256,"url":$url}' > MANIFEST.json

          # Sign when the private key secret is available.
          # Without the secret the workflow still succeeds — signature is just omitted
          # until MS_SIGNING_KEY is added to GitHub Secrets and the workflow re-runs.
          if [ -n "$MS_SIGNING_KEY" ]; then
            printf '%s\n' "$MS_SIGNING_KEY" > /tmp/private.pem
            printf '%s'   "$SHA256"         > /tmp/msg.bin
            openssl dgst -sha256 -sign /tmp/private.pem -out /tmp/sig.bin /tmp/msg.bin
            SIG=$(base64 -w0 /tmp/sig.bin)
            rm -f /tmp/private.pem /tmp/sig.bin /tmp/msg.bin
            jq --arg sig "$SIG" '. + {"signature":$sig}' MANIFEST.json > /tmp/manifest.json
            mv /tmp/manifest.json MANIFEST.json
            echo "Signed."
          else
            echo "Warning: MS_SIGNING_KEY not set — hash stamped, no signature."
          fi

      - name: Commit MANIFEST.json
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add MANIFEST.json
          git diff --staged --quiet || git commit -m "chore: auto-stamp MANIFEST [skip ci]"
          git push
