name: Release

on:
  push:
    branches: [main]
    paths: [ms_core.lua, ms_core.ahk]
  workflow_dispatch:
    inputs:
      version:
        description: "Version override (leave empty to read from MANIFEST.json)"
        required: false
        type: string

permissions:
  contents: write

jobs:
  # ────────────────────────────────────────────────────────────────────────────
  # Stamp — compute hash, sign MANIFEST.json, commit back
  # ────────────────────────────────────────────────────────────────────────────
  stamp:
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.version.outputs.value }}

    steps:
      - uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Hash and sign Windows runtime
        id: version
        env:
          MS_SIGNING_KEY: ${{ secrets.MS_SIGNING_KEY }}
        run: |
          WIN_SHA=$(sha256sum ms_core.ahk | awk '{print $1}')

          # Use manual version override if provided, otherwise read from manifest
          if [ -n "${{ inputs.version }}" ]; then
            VERSION="${{ inputs.version }}"
          else
            VERSION=$(jq -r '.windows_version // "1.0.0"' MANIFEST.json)
          fi
          echo "value=$VERSION" >> "$GITHUB_OUTPUT"

          WIN_URL="https://raw.githubusercontent.com/mudbourn/ms-utils/main/ms_core.ahk"

          # Preserve existing macOS fields
          MAC_VER=$(jq -r '.version // ""' MANIFEST.json)
          MAC_SHA=$(jq -r '.sha256 // ""' MANIFEST.json)
          MAC_URL=$(jq -r '.url // ""' MANIFEST.json)
          MAC_SIG=$(jq -r '.signature // ""' MANIFEST.json)

          jq -n \
            --arg version  "$MAC_VER"  \
            --arg sha256   "$MAC_SHA"  \
            --arg url      "$MAC_URL"  \
            --arg sig      "$MAC_SIG"  \
            --arg wversion "$VERSION"  \
            --arg wurl     "$WIN_URL"  \
            --arg wsha     "$WIN_SHA"  \
            '{"version":$version,"sha256":$sha256,"url":$url,"signature":$sig,"windows_version":$wversion,"windows_url":$wurl,"windows_sha256":$wsha}' > MANIFEST.json

          if [ -n "$MS_SIGNING_KEY" ]; then
            printf '%s\n' "$MS_SIGNING_KEY" > /tmp/private.pem
            printf '%s'   "$WIN_SHA"       > /tmp/msg.bin
            openssl dgst -sha256 -sign /tmp/private.pem -out /tmp/sig.bin /tmp/msg.bin
            WIN_SIG=$(base64 -w0 /tmp/sig.bin)
            rm -f /tmp/private.pem /tmp/sig.bin /tmp/msg.bin
            jq --arg wsig "$WIN_SIG" '. + {"windows_signature":$wsig}' MANIFEST.json > /tmp/manifest.json
            mv /tmp/manifest.json MANIFEST.json
            echo "Signed Windows runtime."
          else
            echo "Warning: MS_SIGNING_KEY not set — hash stamped, no signature."
          fi

      - name: Commit MANIFEST.json
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add MANIFEST.json
          git diff --staged --quiet || {
            git commit -m "chore: auto-stamp MANIFEST [skip ci]"
            git pull --rebase origin main 2>/dev/null || true
            git push
          }

  # ────────────────────────────────────────────────────────────────────────────
  # Build — package release archives for both platforms
  # ────────────────────────────────────────────────────────────────────────────
  build:
    needs: stamp
    runs-on: ${{ matrix.runner }}
    strategy:
      matrix:
        include:
          - runner: windows-latest
            platform: windows
            ext: zip
          - runner: macos-latest
            platform: macos
            ext: tar.gz

    steps:
      - uses: actions/checkout@v4
        with:
          ref: main
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Download lib dependencies (Windows only)
        if: matrix.platform == 'windows'
        shell: pwsh
        run: |
          mkdir lib -Force
          $wv2 = Invoke-RestMethod "https://raw.githubusercontent.com/thqby/ahk2_lib/master/WebView2/WebView2.ahk"
          $wv2 = $wv2 -replace '#Include \.\.\\ComVar\.ahk', '#Include lib\ComVar.ahk'
          $wv2 = $wv2 -replace '#Include \.\.\\Promise\.ahk', '#Include lib\Promise.ahk'
          [System.IO.File]::WriteAllText("$pwd\lib\WebView2.ahk", $wv2, [System.Text.UTF8Encoding]::new($false))
          mkdir lib\WebView2 -Force
          $github = "https://api.github.com/repos/thqby/ahk2_lib/contents/WebView2"
          $items = Invoke-RestMethod $github
          foreach ($item in $items) {
            if ($item.type -eq 'file') {
              $out = "lib\WebView2\$($item.name)"
              Invoke-WebRequest -Uri $item.download_url -OutFile $out -UseBasicParsing
            }
          }
          Invoke-WebRequest -Uri "https://raw.githubusercontent.com/thqby/ahk2_lib/master/ComVar.ahk" -OutFile "lib\ComVar.ahk" -UseBasicParsing
          Invoke-WebRequest -Uri "https://raw.githubusercontent.com/thqby/ahk2_lib/master/Promise.ahk" -OutFile "lib\Promise.ahk" -UseBasicParsing
          Invoke-WebRequest -Uri "https://raw.githubusercontent.com/thqby/ahk2_lib/master/WebView2/WebView2.ahk" -OutFile "lib\WebView2.ahk" -UseBasicParsing
          Write-Output "Dependencies downloaded."

      - name: Build Windows package
        if: matrix.platform == 'windows'
        shell: pwsh
        run: |
          $version = "${{ needs.stamp.outputs.version }}"
          $dist = "mudscript-$version"
          mkdir $dist
          & .\bin\generate_icon.ps1
          Copy-Item "install.bat","init.ahk","ms_core.ahk","ms_macros.ahk","MANIFEST.json","writing_style.txt","README.md" "$dist\"
          Copy-Item -Recurse "ui","lib","bin","data" "$dist\"
          Copy-Item -Recurse "sounds" "$dist\" -ErrorAction SilentlyContinue
          Copy-Item -Recurse "profiles" "$dist\" -ErrorAction SilentlyContinue
          Remove-Item -Recurse "$dist\bin\*.sh","$dist\bin\*.plist","$dist\bin\*.swift","$dist\bin\hidinject","$dist\Spoons" -ErrorAction SilentlyContinue
          Remove-Item -Recurse "$dist\*.lua","$dist\install.sh","$dist\.gitignore" -ErrorAction SilentlyContinue
          $archive = "mudscript-windows-${version}.zip"
          Compress-Archive -Path "$dist\*" -DestinationPath $archive -Force
          Add-Content -Path $env:GITHUB_OUTPUT -Value "archive=$archive"
          Write-Output "Package: $archive"

      - name: Build macOS package
        if: matrix.platform == 'macos'
        run: |
          VERSION="${{ needs.stamp.outputs.version }}"
          DIST="mudscript-${VERSION}"
          mkdir -p "$DIST"
          cp install.sh init.lua ms_core.lua ms_macros.lua MANIFEST.json writing_style.txt README.md "$DIST/"
          cp -R Spoons ui bin "$DIST/"
          mkdir -p "$DIST/data" "$DIST/sounds" "$DIST/profiles"
          rm -f "$DIST"/*.ahk "$DIST"/install.bat "$DIST/bin"/*.bat "$DIST/bin"/*.ps1 "$DIST/.gitignore"
          ARCHIVE="mudscript-macos-${VERSION}.tar.gz"
          tar czf "$ARCHIVE" "$DIST"
          echo "archive=$ARCHIVE" >> "$GITHUB_OUTPUT"
          echo "Package: $ARCHIVE"

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.platform }}-${{ needs.stamp.outputs.version }}
          path: mudscript-*-${{ needs.stamp.outputs.version }}.${{ matrix.ext }}

  # ────────────────────────────────────────────────────────────────────────────
  # Release — create GitHub Release and attach assets
  # ────────────────────────────────────────────────────────────────────────────
  release:
    needs: [stamp, build]
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4
        with:
          ref: main

      - name: Download all artifacts
        uses: actions/download-artifact@v4

      - name: Find artifacts
        run: |
          echo "Looking for release artifacts..."
          find . -name "mudscript-*.*" -type f 2>/dev/null

      - name: Generate release notes
        id: notes
        run: |
          VERSION="${{ needs.stamp.outputs.version }}"

          cat > release-notes.md <<EOF
          ## mudscript v${VERSION}

          ### Changes
          $(git log --oneline $(git rev-list --tags --max-count=1 2>/dev/null || HEAD~1)..HEAD 2>/dev/null || echo "Initial release.")

          ### Downloads
          - [mudscript-windows-${VERSION}.zip](https://github.com/${{ github.repository }}/releases/download/v${VERSION}/mudscript-windows-${VERSION}.zip)
          - [mudscript-macos-${VERSION}.tar.gz](https://github.com/${{ github.repository }}/releases/download/v${VERSION}/mudscript-macos-${VERSION}.tar.gz)

          ### Install
          **Windows:** Install [AutoHotkey v2](https://www.autohotkey.com/) (signed), extract the zip, run \`init.ahk\`
          **macOS:** Extract the tar.gz, run \`bash install.sh\`
          EOF

          echo "file=release-notes.md" >> "$GITHUB_OUTPUT"

      - name: Create release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          VERSION="${{ needs.stamp.outputs.version }}"
          TAG="v${VERSION}"

          echo "Version: $VERSION"
          echo "Tag:     $TAG"

          ASSETS=$(find . -name "mudscript-*-${VERSION}.*" -type f 2>/dev/null | tr '\n' ' ' || true)
          echo "Found assets:"
          echo "$ASSETS"

          if gh release view "$TAG" --json name &>/dev/null; then
            echo "Release $TAG already exists — deleting..."
            gh release delete "$TAG" --yes 2>/dev/null || true
            git tag -d "$TAG" 2>/dev/null || true
            git push origin ":refs/tags/$TAG" 2>/dev/null || true
          fi

          echo "Creating tag $TAG..."
          git tag "$TAG"
          git push origin "$TAG"

          if [ -n "$ASSETS" ]; then
            echo "Creating release with assets..."
            # shellcheck disable=SC2086
            gh release create "$TAG" \
              --title "mudscript v${VERSION}" \
              --notes-file release-notes.md \
              $ASSETS
          else
            echo "Creating release without assets..."
            gh release create "$TAG" \
              --title "mudscript v${VERSION}" \
              --notes-file release-notes.md
          fi

          echo "Release URL: https://github.com/${{ github.repository }}/releases/tag/$TAG"
