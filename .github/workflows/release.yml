name: Release

on:
  push:
    branches: [main]
    paths: [ms_core.lua, ms_core.ahk]
  workflow_dispatch:
    inputs:
      version:
        description: "Version override (leave empty to read from MANIFEST.json)"
        required: false
        type: string

permissions:
  contents: write

jobs:
  # ────────────────────────────────────────────────────────────────────────────
  # Stamp — compute hashes, sign MANIFEST.json, commit back
  # ────────────────────────────────────────────────────────────────────────────
  stamp:
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.version.outputs.value }}

    steps:
      - uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Compute hash and sign macOS MANIFEST
        id: version
        env:
          MS_SIGNING_KEY: ${{ secrets.MS_SIGNING_KEY }}
        run: |
          SHA256=$(sha256sum ms_core.lua | awk '{print $1}')
          # Use manual version override if provided, otherwise read from manifest
          if [ -n "${{ inputs.version }}" ]; then
            VERSION="${{ inputs.version }}"
          else
            VERSION=$(jq -r '.version // "1.0.0"' MANIFEST.json)
          fi
          echo "value=$VERSION" >> "$GITHUB_OUTPUT"
          URL="https://raw.githubusercontent.com/mudbourn/ms-utils/main/ms_core.lua"

          WIN_URL=$(jq -r '.windows_url // ""' MANIFEST.json)
          WIN_SHA=$(jq -r '.windows_sha256 // ""' MANIFEST.json)
          WIN_SIG=$(jq -r '.windows_signature // ""' MANIFEST.json)

          jq -n \
            --arg version  "$VERSION"  \
            --arg sha256   "$SHA256"   \
            --arg url      "$URL"      \
            --arg wurl     "$WIN_URL"  \
            --arg wsha     "$WIN_SHA"  \
            --arg wsig     "$WIN_SIG"  \
            '{"version":$version,"sha256":$sha256,"url":$url,"windows_url":$wurl,"windows_sha256":$wsha,"windows_signature":$wsig}' > MANIFEST.json

          if [ -n "$MS_SIGNING_KEY" ]; then
            printf '%s\n' "$MS_SIGNING_KEY" > /tmp/private.pem
            printf '%s'   "$SHA256"         > /tmp/msg.bin
            openssl dgst -sha256 -sign /tmp/private.pem -out /tmp/sig.bin /tmp/msg.bin
            SIG=$(base64 -w0 /tmp/sig.bin)
            rm -f /tmp/private.pem /tmp/sig.bin /tmp/msg.bin
            jq --arg sig "$SIG" '. + {"signature":$sig}' MANIFEST.json > /tmp/manifest.json
            mv /tmp/manifest.json MANIFEST.json
            echo "Signed macOS runtime."
          else
            echo "Warning: MS_SIGNING_KEY not set — hash stamped, no signature."
          fi

      - name: Sign Windows runtime
        env:
          MS_SIGNING_KEY: ${{ secrets.MS_SIGNING_KEY }}
        run: |
          WIN_SHA=$(sha256sum ms_core.ahk | awk '{print $1}')
          WIN_URL="https://raw.githubusercontent.com/mudbourn/ms-utils/main/ms_core.ahk"

          VERSION=$(jq -r '.version // "1.0.0"' MANIFEST.json)
          MAC_SHA=$(jq -r '.sha256 // ""' MANIFEST.json)
          MAC_URL=$(jq -r '.url // ""' MANIFEST.json)
          MAC_SIG=$(jq -r '.signature // ""' MANIFEST.json)

          jq -n \
            --arg version "$VERSION"  \
            --arg sha256  "$MAC_SHA"  \
            --arg url     "$MAC_URL"  \
            --arg sig     "$MAC_SIG"  \
            --arg wurl    "$WIN_URL"  \
            --arg wsha    "$WIN_SHA"  \
            '{"version":$version,"sha256":$sha256,"url":$url,"signature":$sig,"windows_url":$wurl,"windows_sha256":$wsha}' > MANIFEST.json

          if [ -n "$MS_SIGNING_KEY" ]; then
            printf '%s\n' "$MS_SIGNING_KEY" > /tmp/private.pem
            printf '%s'   "$WIN_SHA"         > /tmp/msg.bin
            openssl dgst -sha256 -sign /tmp/private.pem -out /tmp/sig.bin /tmp/msg.bin
            WIN_SIG=$(base64 -w0 /tmp/sig.bin)
            rm -f /tmp/private.pem /tmp/sig.bin /tmp/msg.bin
            jq --arg wsig "$WIN_SIG" '. + {"windows_signature":$wsig}' MANIFEST.json > /tmp/manifest.json
            mv /tmp/manifest.json MANIFEST.json
            echo "Signed Windows runtime."
          else
            echo "Warning: MS_SIGNING_KEY not set — hash stamped, no Windows signature."
          fi

      - name: Commit MANIFEST.json
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add MANIFEST.json
          git diff --staged --quiet || git commit -m "chore: auto-stamp MANIFEST [skip ci]"
          git push

  # ────────────────────────────────────────────────────────────────────────────
  # Build — compile Windows EXE, package macOS archive
  # ────────────────────────────────────────────────────────────────────────────
  build:
    needs: stamp
    runs-on: ${{ matrix.runner }}
    strategy:
      matrix:
        include:
          - runner: windows-latest
            platform: windows
            ext: zip
          - runner: ubuntu-latest # packaging only — no Ubuntu runtime
            platform: macos
            ext: tar.gz

    steps:
      - uses: actions/checkout@v4
        with:
          ref: main
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Build Windows package
        id: win_build
        if: matrix.platform == 'windows'
        shell: pwsh
        run: |
          $version = "${{ needs.stamp.outputs.version }}"
          $dist = "mudscript-$version"

          mkdir $dist

          # Generate tray icon from .tiff sources
          Write-Output "Generating tray icon..."
          & .\bin\generate_icon.ps1

          # Copy files
          Copy-Item "install.bat"                   "$dist\"
          Copy-Item "init.ahk"                      "$dist\"
          Copy-Item "ms_core.ahk"                   "$dist\"
          Copy-Item "ms_macros.ahk"                 "$dist\"
          Copy-Item "MANIFEST.json"                 "$dist\"
          Copy-Item "writing_style.txt"             "$dist\"
          Copy-Item -Recurse "ui"                   "$dist\ui\"
          Copy-Item -Recurse "bin"                  "$dist\bin\"
          Copy-Item -Recurse "data"                 "$dist\data\"
          Copy-Item -Recurse "sounds"               "$dist\sounds\" -ErrorAction SilentlyContinue
          Copy-Item -Recurse "profiles"             "$dist\profiles\" -ErrorAction SilentlyContinue

          # Remove macOS-specific files from Windows package
          Remove-Item -Recurse "$dist\bin\*.sh"      -ErrorAction SilentlyContinue
          Remove-Item -Recurse "$dist\bin\*.plist"   -ErrorAction SilentlyContinue
          Remove-Item -Recurse "$dist\bin\*.swift"   -ErrorAction SilentlyContinue
          Remove-Item -Recurse "$dist\bin\hidinject" -ErrorAction SilentlyContinue
          Remove-Item -Recurse "$dist\Spoons"        -ErrorAction SilentlyContinue
          Remove-Item -Recurse "$dist\*.lua"         -ErrorAction SilentlyContinue
          Remove-Item "$dist\install.sh"             -ErrorAction SilentlyContinue
          Remove-Item "$dist\.gitignore"             -ErrorAction SilentlyContinue

          # NOTE: We ship .ahk source files intentionally. The compiled EXE from
          # Ahk2Exe would be unsigned and trigger SmartScreen warnings. Users run
          # .ahk files through the signed AutoHotkey interpreter instead.

          # Create zip
          $archive = "mudscript-windows-${version}.zip"
          Compress-Archive -Path "$dist\*" -DestinationPath $archive -Force
          Write-Output "Package: $archive"
          Add-Content -Path $env:GITHUB_OUTPUT -Value "archive=$archive"

      - name: Upload Windows artifact
        if: matrix.platform == 'windows'
        uses: actions/upload-artifact@v4
        with:
          name: windows-${{ needs.stamp.outputs.version }}
          path: mudscript-windows-*.zip

      - name: Build macOS package
        id: macos_build
        if: matrix.platform == 'macos'
        run: |
          set -euo pipefail
          VERSION="${{ needs.stamp.outputs.version }}"
          DIST="mudscript-${VERSION}"

          mkdir -p "$DIST"

          cp install.sh      "$DIST/"
          cp init.lua        "$DIST/"
          cp ms_core.lua     "$DIST/"
          cp ms_macros.lua   "$DIST/"
          cp MANIFEST.json   "$DIST/"
          cp writing_style.txt "$DIST/"
          cp -R Spoons       "$DIST/Spoons"
          cp -R ui           "$DIST/ui"
          cp -R bin          "$DIST/bin"
          mkdir -p "$DIST/data" "$DIST/sounds" "$DIST/profiles"

          # Remove Windows files from macOS package
          rm -f "$DIST"/*.ahk
          rm -f "$DIST"/install.bat
          rm -f "$DIST/bin"/*.bat
          rm -f "$DIST/bin"/*.ps1

          ARCHIVE="mudscript-macos-${VERSION}.tar.gz"
          tar czf "$ARCHIVE" "$DIST"
          echo "archive=$ARCHIVE" >> "$GITHUB_OUTPUT"
          echo "Package: $ARCHIVE"

      - name: Upload macOS artifact
        if: matrix.platform == 'macos'
        uses: actions/upload-artifact@v4
        with:
          name: macos-${{ needs.stamp.outputs.version }}
          path: mudscript-macos-*.tar.gz

  # ────────────────────────────────────────────────────────────────────────────
  # Release — create GitHub Release and attach assets
  # ────────────────────────────────────────────────────────────────────────────
  release:
    needs: [stamp, build]
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4
        with:
          ref: main

      - name: Download all artifacts
        uses: actions/download-artifact@v4

      - name: Layout release assets
        run: |
          VERSION="${{ needs.stamp.outputs.version }}"
          mkdir -p assets
          find . -name "mudscript-*-${VERSION}.*" -exec cp {} assets/ \;
          ls -la assets/

      - name: Generate release notes
        id: notes
        run: |
          VERSION="${{ needs.stamp.outputs.version }}"

          cat > release-notes.md <<EOF
          ## mudscript v${VERSION}

          ### Changes
          $(git log --oneline $(git rev-list --tags --max-count=1 2>/dev/null || HEAD~1)..HEAD 2>/dev/null || echo "Initial release.")

          ### Downloads
          | Platform | Package |
          |---|---|
          | macOS | \`mudscript-macos-${VERSION}.tar.gz\` |
          | Windows | \`mudscript-windows-${VERSION}.zip\` |

          ### Install
          **macOS:** Extract and run \`bash install.sh\` or follow the README.
          **Windows:** Extract and run \`install.bat\` (as Administrator) or follow the README.
          EOF

          echo "file=release-notes.md" >> "$GITHUB_OUTPUT"

      - name: Create release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          VERSION="${{ needs.stamp.outputs.version }}"
          TAG="v${VERSION}"

          echo "Version: $VERSION"
          echo "Tag:     $TAG"

          # Show what assets we have
          echo "Assets in assets/:"
          ls -la assets/ 2>/dev/null || echo "  (empty)"

          # Gather asset paths
          ASSETS=$(ls assets/mudscript-*-${VERSION}.* 2>/dev/null || true)
          echo "Found assets:"
          echo "$ASSETS"

          # Tag and release
          echo "Creating tag $TAG..."
          git tag "$TAG" 2>/dev/null || echo "  tag already exists"
          git push origin "$TAG" 2>/dev/null || echo "  tag push skipped (may already exist)"

          # Check if release already exists
          if gh release view "$TAG" --json name &>/dev/null; then
            echo "Release $TAG already exists — deleting..."
            gh release delete "$TAG" --yes 2>/dev/null || true
            git tag -d "$TAG" 2>/dev/null || true
            git push origin ":refs/tags/$TAG" 2>/dev/null || true
            git tag "$TAG"
            git push origin "$TAG"
          fi

          if [ -n "$ASSETS" ]; then
            echo "Creating release with assets..."
            # shellcheck disable=SC2086
            gh release create "$TAG" \
              --title "mudscript v${VERSION}" \
              --notes-file release-notes.md \
              $ASSETS
          else
            echo "Creating release without assets..."
            gh release create "$TAG" \
              --title "mudscript v${VERSION}" \
              --notes-file release-notes.md
          fi

          echo "Release URL: https://github.com/${{ github.repository }}/releases/tag/$TAG"
