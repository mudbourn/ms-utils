name: Release

on:
  push:
    branches: [main]
    paths: [ms_core.lua, ms_core.ahk]

jobs:
  stamp:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Compute hash and sign macOS MANIFEST
        env:
          MS_SIGNING_KEY: ${{ secrets.MS_SIGNING_KEY }}
        run: |
          SHA256=$(sha256sum ms_core.lua | awk '{print $1}')
          VERSION=$(jq -r '.version // "1.0.0"' MANIFEST.json)
          URL="https://raw.githubusercontent.com/mudbourn/ms-utils/main/ms_core.lua"

          # Preserve existing Windows fields while updating macOS fields.
          WIN_URL=$(jq -r '.windows_url // ""' MANIFEST.json)
          WIN_SHA=$(jq -r '.windows_sha256 // ""' MANIFEST.json)
          WIN_SIG=$(jq -r '.windows_signature // ""' MANIFEST.json)

          jq -n \
            --arg version  "$VERSION"  \
            --arg sha256   "$SHA256"   \
            --arg url      "$URL"      \
            --arg wurl     "$WIN_URL"  \
            --arg wsha     "$WIN_SHA"  \
            --arg wsig     "$WIN_SIG"  \
            '{"version":$version,"sha256":$sha256,"url":$url,"windows_url":$wurl,"windows_sha256":$wsha,"windows_signature":$wsig}' > MANIFEST.json

          if [ -n "$MS_SIGNING_KEY" ]; then
            printf '%s\n' "$MS_SIGNING_KEY" > /tmp/private.pem
            printf '%s'   "$SHA256"         > /tmp/msg.bin
            openssl dgst -sha256 -sign /tmp/private.pem -out /tmp/sig.bin /tmp/msg.bin
            SIG=$(base64 -w0 /tmp/sig.bin)
            rm -f /tmp/private.pem /tmp/sig.bin /tmp/msg.bin
            jq --arg sig "$SIG" '. + {"signature":$sig}' MANIFEST.json > /tmp/manifest.json
            mv /tmp/manifest.json MANIFEST.json
            echo "Signed macOS runtime."
          else
            echo "Warning: MS_SIGNING_KEY not set — hash stamped, no signature."
          fi

      - name: Sign Windows runtime
        env:
          MS_SIGNING_KEY: ${{ secrets.MS_SIGNING_KEY }}
        run: |
          WIN_SHA=$(sha256sum ms_core.ahk | awk '{print $1}')
          WIN_URL="https://raw.githubusercontent.com/mudbourn/ms-utils/main/ms_core.ahk"

          # Preserve existing macOS fields while updating Windows fields.
          VERSION=$(jq -r '.version // "1.0.0"' MANIFEST.json)
          MAC_SHA=$(jq -r '.sha256 // ""' MANIFEST.json)
          MAC_URL=$(jq -r '.url // ""' MANIFEST.json)
          MAC_SIG=$(jq -r '.signature // ""' MANIFEST.json)

          jq -n \
            --arg version "$VERSION"  \
            --arg sha256  "$MAC_SHA"  \
            --arg url     "$MAC_URL"  \
            --arg sig     "$MAC_SIG"  \
            --arg wurl    "$WIN_URL"  \
            --arg wsha    "$WIN_SHA"  \
            '{"version":$version,"sha256":$sha256,"url":$url,"signature":$sig,"windows_url":$wurl,"windows_sha256":$wsha}' > MANIFEST.json

          if [ -n "$MS_SIGNING_KEY" ]; then
            printf '%s\n' "$MS_SIGNING_KEY" > /tmp/private.pem
            printf '%s'   "$WIN_SHA"         > /tmp/msg.bin
            openssl dgst -sha256 -sign /tmp/private.pem -out /tmp/sig.bin /tmp/msg.bin
            WIN_SIG=$(base64 -w0 /tmp/sig.bin)
            rm -f /tmp/private.pem /tmp/sig.bin /tmp/msg.bin
            jq --arg wsig "$WIN_SIG" '. + {"windows_signature":$wsig}' MANIFEST.json > /tmp/manifest.json
            mv /tmp/manifest.json MANIFEST.json
            echo "Signed Windows runtime."
          else
            echo "Warning: MS_SIGNING_KEY not set — hash stamped, no Windows signature."
          fi

      - name: Commit MANIFEST.json
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add MANIFEST.json
          git diff --staged --quiet || git commit -m "chore: auto-stamp MANIFEST [skip ci]"
          git push
