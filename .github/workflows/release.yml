name: Release

on:
  workflow_dispatch:
    inputs:
      version:
        description: "Release version (e.g. 1.3.0) — stamped into MANIFEST.json"
        required: true
        type: string

permissions:
  contents: write

jobs:
  # ────────────────────────────────────────────────────────────────────────────
  # Build & Stamp — package macOS archive, hash, sign, commit MANIFEST.json
  # ────────────────────────────────────────────────────────────────────────────
  build:
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.version.outputs.value }}

    steps:
      - uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Validate version
        id: version
        run: |
          VERSION="${{ inputs.version }}"
          if [[ ! "$VERSION" =~ ^[0-9]+\.[0-9]+ ]]; then
            echo "ERROR: Invalid version '$VERSION'. Expected format: X.Y.Z"
            exit 1
          fi
          echo "value=$VERSION" >> "$GITHUB_OUTPUT"

      - name: Build macOS package
        id: build
        run: |
          VERSION="${{ inputs.version }}"
          DIST="mudscript-${VERSION}"
          mkdir -p "$DIST"
          for f in mac/install.sh mac/init.lua mac/ms_core.lua mac/ms_macros.lua README.md; do
            [ -f "$f" ] && cp "$f" "$DIST/"
          done
          for d in mac/Spoons mac/templates ui mac/bin; do
            [ -d "$d" ] && cp -R "$d" "$DIST/"
          done
          mkdir -p "$DIST/data" "$DIST/sounds"
          # Include default settings so fresh installs have sound assignments and QR options.
          for f in data/ms_settings.json data/ms_settings_default.json; do
            [ -f "$f" ] && cp "$f" "$DIST/data/"
          done
          # Include default sounds so fresh installs have audio feedback.
          if [ -d "sounds" ]; then
            cp sounds/*.wav "$DIST/sounds/" 2>/dev/null || true
          fi
          # Include the default profile and bundled .mspkg packs.
          if [ -d "profiles/Default" ]; then
            mkdir -p "$DIST/profiles"
            cp -R profiles/Default "$DIST/profiles/"
          fi
          for pkg in *.mspkg; do
            [ -f "$pkg" ] && cp "$pkg" "$DIST/"
          done
          rm -f "$DIST"/*.ahk "$DIST"/install.bat "$DIST/bin"/*.bat "$DIST/bin"/*.ps1 "$DIST/.gitignore" 2>/dev/null; true

          # Legacy hash: ms_core.lua only (computed before MANIFEST exists in archive)
          LEGACY_SHA=$(sha256sum mac/ms_core.lua | awk '{print $1}')

          echo "archive=mudscript-macos-${VERSION}.tar.gz" >> "$GITHUB_OUTPUT"
          echo "legacy_sha=$LEGACY_SHA" >> "$GITHUB_OUTPUT"
          echo "dist=$DIST" >> "$GITHUB_OUTPUT"

          echo "Legacy SHA (ms_core.lua): $LEGACY_SHA"

      - name: Stamp MANIFEST.json
        id: stamp
        env:
          MS_SIGNING_KEY: ${{ secrets.MS_SIGNING_KEY }}
        run: |
          VERSION="${{ inputs.version }}"
          LEGACY_SHA="${{ steps.build.outputs.legacy_sha }}"
          DIST="${{ steps.build.outputs.dist }}"
          LEGACY_URL="https://raw.githubusercontent.com/mudbourn/ms-utils/main/mac/ms_core.lua"
          BUNDLE_URL="https://github.com/${{ github.repository }}/releases/download/v${VERSION}/mudscript-macos-${VERSION}.tar.gz"

          # Write a placeholder MANIFEST (no bundle hash yet) to compute the archive hash.
          jq -n \
            --arg version "$VERSION" \
            --arg sha256  "$LEGACY_SHA" \
            --arg url     "$LEGACY_URL" \
            --arg bundle_url  "$BUNDLE_URL" \
            '{
              "version": $version,
              "sha256": $sha256,
              "url": $url,
              "bundle": {"url": $bundle_url, "sha256": ""},
              "signature": ""
            }' \
            > MANIFEST.json

          # Include MANIFEST in the archive so auto-seed works on first load.
          cp MANIFEST.json "$DIST/"

          # Build archive, compute bundle hash, then re-stamp with real values.
          ARCHIVE="mudscript-macos-${VERSION}.tar.gz"
          tar czf "$ARCHIVE" "$DIST"
          BUNDLE_SHA=$(sha256sum "$ARCHIVE" | awk '{print $1}')

          jq -n \
            --arg version "$VERSION" \
            --arg sha256  "$LEGACY_SHA" \
            --arg url     "$LEGACY_URL" \
            --arg bundle_url  "$BUNDLE_URL" \
            --arg bundle_sha  "$BUNDLE_SHA" \
            '{
              "version": $version,
              "sha256": $sha256,
              "url": $url,
              "bundle": {"url": $bundle_url, "sha256": $bundle_sha},
              "signature": ""
            }' \
            > MANIFEST.json

          if [ -n "$MS_SIGNING_KEY" ]; then
            printf '%s\n' "$MS_SIGNING_KEY" > /tmp/private.pem
            printf '%s'   "$BUNDLE_SHA"   > /tmp/msg.bin
            openssl dgst -sha256 -sign /tmp/private.pem -out /tmp/sig.bin /tmp/msg.bin
            BUNDLE_SIG=$(base64 -w0 /tmp/sig.bin)
            rm -f /tmp/private.pem /tmp/sig.bin /tmp/msg.bin

            jq --arg sig "$BUNDLE_SIG" '.signature = $sig' MANIFEST.json > /tmp/manifest.json
            mv /tmp/manifest.json MANIFEST.json
            echo "Signed bundle sha256."
          else
            echo "Warning: MS_SIGNING_KEY not set — hash stamped, no signature."
          fi

          echo "bundle_sha=$BUNDLE_SHA" >> "$GITHUB_OUTPUT"

          echo "MANIFEST.json stamped for v$VERSION"
          echo "Archive: $ARCHIVE"
          echo "Legacy SHA (ms_core.lua): $LEGACY_SHA"
          echo "Bundle SHA (tar.gz):      $BUNDLE_SHA"

      - name: Generate per-file manifest
        env:
          MS_SIGNING_KEY: ${{ secrets.MS_SIGNING_KEY }}
        run: |
          set -euo pipefail
          VERSION="${{ inputs.version }}"
          DIST="${{ steps.build.outputs.dist }}"
          ARCHIVE="mudscript-macos-${VERSION}.tar.gz"
          PATTERNS_FILE="mac/guardian_patterns.json"
          MANIFEST_OUT="$DIST/data/.ms_file_manifest.json"

          mkdir -p "$DIST/data"

          # Read include/exclude patterns and strip mac/ prefix for dist-relative paths
          mapfile -t RAW_INCLUDES < <(jq -r '.include[]' "$PATTERNS_FILE")
          mapfile -t RAW_EXCLUDES < <(jq -r '.exclude[]' "$PATTERNS_FILE")

          declare -a INCLUDES=() EXCLUDES=()
          for p in "${RAW_INCLUDES[@]}"; do INCLUDES+=("${p#mac/}"); done
          for p in "${RAW_EXCLUDES[@]}"; do EXCLUDES+=("${p#mac/}"); done

          # Enable globstar for ** pattern support
          shopt -s globstar nullglob

          # Walk include globs inside DIST, skip excludes, hash each file
          declare -A SEEN=()
          HASH_FILE=$(mktemp)

          for pattern in "${INCLUDES[@]}"; do
            for filepath in "$DIST"/$pattern; do
              [ -f "$filepath" ] || continue
              # Relative path from DIST root (strips DIST prefix + slash)
              relpath="${filepath:${#DIST}+1}"

              # Deduplicate
              [[ -n "${SEEN[$relpath]+_}" ]] && continue

              # Check exclusions (prefix match)
              skip=false
              for excl in "${EXCLUDES[@]}"; do
                if [[ "$relpath" == "$excl"* ]]; then
                  skip=true
                  break
                fi
              done
              [[ "$skip" == true ]] && continue

              SEEN["$relpath"]=1
              hash=$(sha256sum "$filepath" | awk '{print $1}')
              printf '%s\t%s\n' "$relpath" "$hash" >> "$HASH_FILE"
            done
          done

          # Build the files JSON object from tab-separated pairs
          FILES_JSON=$(jq -Rn '[inputs | split("\t") | {(.[0]): .[1]}] | add // {}' "$HASH_FILE")
          rm -f "$HASH_FILE"
          FILE_COUNT=$(echo "$FILES_JSON" | jq 'length')

          # Write unsigned per-file manifest
          GENERATED=$(date -u +"%Y-%m-%dT%H:%M:%SZ")
          jq -n \
            --arg version "$VERSION" \
            --arg generated "$GENERATED" \
            --argjson files "$FILES_JSON" \
            '{version: $version, generated: $generated, files: $files, signature: ""}' \
            > "$MANIFEST_OUT"

          # Sign: hash minified {version, generated, files}, sign with MS_SIGNING_KEY
          if [ -n "$MS_SIGNING_KEY" ]; then
            UNSIGNED_JSON=$(jq -c -S '{version, generated, files}' "$MANIFEST_OUT")
            printf '%s\n' "$MS_SIGNING_KEY" > /tmp/fm_key.pem
            printf '%s'   "$UNSIGNED_JSON"  > /tmp/fm_msg.bin
            openssl dgst -sha256 -sign /tmp/fm_key.pem -out /tmp/fm_sig.bin /tmp/fm_msg.bin
            FM_SIG=$(base64 -w0 /tmp/fm_sig.bin)
            rm -f /tmp/fm_key.pem /tmp/fm_sig.bin /tmp/fm_msg.bin

            jq --arg sig "$FM_SIG" '.signature = $sig' "$MANIFEST_OUT" > /tmp/fm_out.json
            mv /tmp/fm_out.json "$MANIFEST_OUT"
            echo "Signed per-file manifest ($FILE_COUNT files)."
          else
            echo "Warning: MS_SIGNING_KEY not set — per-file manifest unsigned."
          fi

          # Wire fileManifest into MANIFEST.json, copy final assets into DIST, rebuild
          jq '. + {"fileManifest": "data/.ms_file_manifest.json"}' MANIFEST.json > /tmp/manifest_final.json
          mv /tmp/manifest_final.json MANIFEST.json
          cp MANIFEST.json "$DIST/"
          tar czf "$ARCHIVE" "$DIST"

          echo "Per-file manifest: $MANIFEST_OUT ($FILE_COUNT files)"

      - name: Commit MANIFEST.json
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add MANIFEST.json
          git commit -m "release: v${{ inputs.version }}" || echo "Nothing to commit."
          git push

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: macos-${{ inputs.version }}
          path: mudscript-macos-${{ inputs.version }}.tar.gz

  # ────────────────────────────────────────────────────────────────────────────
  # Release — create GitHub Release and attach assets
  # ────────────────────────────────────────────────────────────────────────────
  release:
    needs: build
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4
        with:
          ref: main

      - name: Download all artifacts
        uses: actions/download-artifact@v4

      - name: Generate release notes
        id: notes
        run: |
          VERSION="${{ needs.build.outputs.version }}"

          PREV_TAG=$(git tag -l 'v*' --sort=-v:refname | head -2 | tail -1 2>/dev/null || echo "")

          if [ -n "$PREV_TAG" ]; then
            CHANGES=$(git log --oneline "${PREV_TAG}..HEAD" 2>/dev/null || echo "No diff available.")
          else
            CHANGES=$(git log --oneline -20 2>/dev/null || echo "Initial release.")
          fi

          cat > release-notes.md <<EOF
          ## mudscript v${VERSION} (macOS)

          ### Changes
          $CHANGES

          ### Downloads
          - [mudscript-macos-${VERSION}.tar.gz](https://github.com/${{ github.repository }}/releases/download/v${VERSION}/mudscript-macos-${VERSION}.tar.gz)

          ### Install
          Extract the tar.gz, run \`bash install.sh\`

          > **Windows users:** The Windows build is in early testing.
          > Switch mudscript's update channel to **Testing** or grab a pre-release from the [Releases](https://github.com/${{ github.repository }}/releases) page.
          EOF

          echo "file=release-notes.md" >> "$GITHUB_OUTPUT"

      - name: Create release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          VERSION="${{ needs.build.outputs.version }}"
          TAG="v${VERSION}"

          ASSETS=$(find . -name "mudscript-*-${VERSION}.*" -type f 2>/dev/null | tr '\n' ' ' || true)
          echo "Assets: $ASSETS"

          # Update existing release or create new one — never delete first
          if gh release view "$TAG" --json name &>/dev/null; then
            echo "Release $TAG already exists — updating assets..."
            gh release edit "$TAG" \
              --title "mudscript v${VERSION}" \
              --notes-file release-notes.md \
              --prerelease="${VERSION%%-*}" != "$VERSION" && echo "pre" || echo "" \
              2>/dev/null || true
            # Upload new assets (gh release upload is idempotent for same filenames)
            for asset in $ASSETS; do
              gh release upload "$TAG" "$asset" --clobber 2>/dev/null || true
            done
          else
            PRERELEASE_FLAG=""
            if [[ "$VERSION" == *-* ]]; then
              PRERELEASE_FLAG="--prerelease"
              echo "Pre-release detected: $VERSION"
            fi

            git tag "$TAG" 2>/dev/null || true
            git push origin "$TAG" 2>/dev/null || true

            # shellcheck disable=SC2086
            gh release create "$TAG" \
              --title "mudscript v${VERSION}" \
              --notes-file release-notes.md \
              --target main \
              $PRERELEASE_FLAG \
              $ASSETS
          fi

          echo "Release: https://github.com/${{ github.repository }}/releases/tag/$TAG"
