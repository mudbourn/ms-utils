name: Release

on:
  workflow_dispatch:
    inputs:
      version:
        description: "Release version (e.g. 1.3.0) — stamped into MANIFEST.json"
        required: true
        type: string

permissions:
  contents: write

jobs:
  # ────────────────────────────────────────────────────────────────────────────
  # Stamp — compute hash, sign MANIFEST.json, commit back
  # ────────────────────────────────────────────────────────────────────────────
  stamp:
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.version.outputs.value }}

    steps:
      - uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Stamp MANIFEST.json
        id: version
        env:
          MS_SIGNING_KEY: ${{ secrets.MS_SIGNING_KEY }}
        run: |
          VERSION="${{ inputs.version }}"

          if [[ ! "$VERSION" =~ ^[0-9]+\.[0-9]+ ]]; then
            echo "ERROR: Invalid version '$VERSION'. Expected format: X.Y.Z"
            exit 1
          fi

          echo "value=$VERSION" >> "$GITHUB_OUTPUT"

          MAC_SHA=$(sha256sum mac/ms_core.lua | awk '{print $1}')
          MAC_URL="https://raw.githubusercontent.com/mudbourn/ms-utils/main/mac/ms_core.lua"

          echo "MAC_SHA=$MAC_SHA"

          jq -n \
            --arg version "$VERSION" \
            --arg sha256  "$MAC_SHA" \
            --arg url     "$MAC_URL" \
            '{"version":$version,"sha256":$sha256,"url":$url,"signature":""}' \
            > MANIFEST.json

          if [ -n "$MS_SIGNING_KEY" ]; then
            printf '%s\n' "$MS_SIGNING_KEY" > /tmp/private.pem
            printf '%s'   "$MAC_SHA"       > /tmp/msg.bin
            openssl dgst -sha256 -sign /tmp/private.pem -out /tmp/sig.bin /tmp/msg.bin
            MAC_SIG=$(base64 -w0 /tmp/sig.bin)
            rm -f /tmp/private.pem /tmp/sig.bin /tmp/msg.bin

            jq --arg sig "$MAC_SIG" '.signature = $sig' MANIFEST.json > /tmp/manifest.json
            mv /tmp/manifest.json MANIFEST.json
            echo "Signed macOS runtime."
          else
            echo "Warning: MS_SIGNING_KEY not set — hash stamped, no signature."
          fi

          echo "MANIFEST.json stamped for v$VERSION"

      - name: Commit MANIFEST.json
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add MANIFEST.json
          git commit -m "release: v${{ inputs.version }}" || echo "Nothing to commit."
          git push

  # ────────────────────────────────────────────────────────────────────────────
  # Build — package macOS release archive
  # ────────────────────────────────────────────────────────────────────────────
  build:
    needs: stamp
    runs-on: macos-latest

    steps:
      - uses: actions/checkout@v4
        with:
          ref: main
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Build macOS package
        run: |
          VERSION="${{ needs.stamp.outputs.version }}"
          DIST="mudscript-${VERSION}"
          mkdir -p "$DIST"
          for f in mac/install.sh mac/init.lua mac/ms_core.lua mac/ms_macros.lua MANIFEST.json README.md; do
            [ -f "$f" ] && cp "$f" "$DIST/"
          done
          for d in mac/Spoons ui mac/bin; do
            [ -d "$d" ] && cp -R "$d" "$DIST/"
          done
          mkdir -p "$DIST/data" "$DIST/sounds" "$DIST/profiles"
          rm -f "$DIST"/*.ahk "$DIST"/install.bat "$DIST/bin"/*.bat "$DIST/bin"/*.ps1 "$DIST/.gitignore" 2>/dev/null; true
          ARCHIVE="mudscript-macos-${VERSION}.tar.gz"
          tar czf "$ARCHIVE" "$DIST"
          echo "archive=$ARCHIVE" >> "$GITHUB_OUTPUT"
          echo "Package: $ARCHIVE"

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: macos-${{ needs.stamp.outputs.version }}
          path: mudscript-macos-${{ needs.stamp.outputs.version }}.tar.gz

  # ────────────────────────────────────────────────────────────────────────────
  # Release — create GitHub Release and attach assets
  # ────────────────────────────────────────────────────────────────────────────
  release:
    needs: [stamp, build]
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4
        with:
          ref: main

      - name: Download all artifacts
        uses: actions/download-artifact@v4

      - name: Generate release notes
        id: notes
        run: |
          VERSION="${{ needs.stamp.outputs.version }}"

          PREV_TAG=$(git tag -l 'v*' --sort=-v:refname | head -2 | tail -1 2>/dev/null || echo "")

          if [ -n "$PREV_TAG" ]; then
            CHANGES=$(git log --oneline "${PREV_TAG}..HEAD" 2>/dev/null || echo "No diff available.")
          else
            CHANGES=$(git log --oneline -20 2>/dev/null || echo "Initial release.")
          fi

          cat > release-notes.md <<EOF
          ## mudscript v${VERSION} (macOS)

          ### Changes
          $CHANGES

          ### Downloads
          - [mudscript-macos-${VERSION}.tar.gz](https://github.com/${{ github.repository }}/releases/download/v${VERSION}/mudscript-macos-${VERSION}.tar.gz)

          ### Install
          Extract the tar.gz, run \`bash install.sh\`

          > **Windows users:** The Windows build is in early testing.
          > Switch mudscript's update channel to **Testing** or grab a pre-release from the [Releases](https://github.com/${{ github.repository }}/releases) page.
          EOF

          echo "file=release-notes.md" >> "$GITHUB_OUTPUT"

      - name: Create release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          VERSION="${{ needs.stamp.outputs.version }}"
          TAG="v${VERSION}"

          ASSETS=$(find . -name "mudscript-*-${VERSION}.*" -type f 2>/dev/null | tr '\n' ' ' || true)
          echo "Assets: $ASSETS"

          gh release view "$TAG" --json name &>/dev/null && gh release delete "$TAG" --yes 2>/dev/null || true
          git tag -d "$TAG" 2>/dev/null || true
          git push origin ":refs/tags/$TAG" 2>/dev/null || true

          git tag "$TAG"
          git push origin "$TAG"

          # shellcheck disable=SC2086
          gh release create "$TAG" \
            --title "mudscript v${VERSION}" \
            --notes-file release-notes.md \
            --target main \
            $ASSETS

          echo "Release: https://github.com/${{ github.repository }}/releases/tag/$TAG"
