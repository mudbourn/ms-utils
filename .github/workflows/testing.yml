name: Testing

on:
  push:
    branches: [main]
    paths:
      - mac/ms_core.lua
      - mac/init.lua
      - mac/Spoons/**/init.lua
      - ui/*.html
      - win/ms_core_v2.ahk
  workflow_dispatch:

permissions:
  contents: write

jobs:
  # ────────────────────────────────────────────────────────────────────────────
  # Detect which platform(s) changed
  # ────────────────────────────────────────────────────────────────────────────
  check:
    runs-on: ubuntu-latest
    outputs:
      mac: ${{ steps.filter.outputs.mac }}
      win: ${{ steps.filter.outputs.win }}
    steps:
      - uses: actions/checkout@v4
        with:
          ref: main
          fetch-depth: 2

      - id: filter
        run: |
          CHANGED=$(git diff --name-only HEAD~1 HEAD 2>/dev/null || echo "")
          echo "Changed files:"
          echo "$CHANGED"

          MAC=false
          WIN=false

          # mac/ or shared ui/ changes → build macOS
          if echo "$CHANGED" | grep -qE "^(mac/|ui/)"; then MAC=true; fi
          # win/ or shared ui/ changes → build Windows
          if echo "$CHANGED" | grep -qE "^(win/|ui/)"; then WIN=true; fi

          # workflow_dispatch always builds both
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            MAC=true
            WIN=true
          fi

          echo "mac=$MAC" >> $GITHUB_OUTPUT
          echo "win=$WIN" >> $GITHUB_OUTPUT
          echo "mac=$MAC  win=$WIN"

  # ────────────────────────────────────────────────────────────────────────────
  # Build macOS
  # ────────────────────────────────────────────────────────────────────────────
  build-macos:
    needs: check
    if: needs.check.outputs.mac == 'true'
    runs-on: macos-latest

    steps:
      - uses: actions/checkout@v4
        with:
          ref: main
          token: ${{ secrets.GITHUB_TOKEN }}
          fetch-depth: 0

      - name: Check if build can be skipped
        id: skip-check
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          # Find the latest pre-release tag
          PREV_TAG=$(git tag -l 'pre-*' --sort=-v:refname | head -1)
          echo "Previous tag: ${PREV_TAG:-<none>}"

          if [ -z "$PREV_TAG" ]; then
            echo "skip=false" >> $GITHUB_OUTPUT
            echo "No previous pre-release — building"
            exit 0
          fi

          # Check if any macOS source files changed since that tag
          MAC_DIFF=$(git diff --name-only "$PREV_TAG" HEAD -- \
            mac/ ui/ profiles/Default/ MANIFEST.json README.md 2>/dev/null || echo "")

          if [ -z "$MAC_DIFF" ]; then
            echo "skip=true" >> $GITHUB_OUTPUT
            echo "✓ macOS sources unchanged since $PREV_TAG — skipping build"
          else
            echo "skip=false" >> $GITHUB_OUTPUT
            echo "✗ macOS sources changed — rebuilding"
            echo "$MAC_DIFF"
          fi

      - name: Build macOS package
        if: steps.skip-check.outputs.skip != 'true'
        run: |
          BUILD_NUM="${{ github.run_number }}"
          DIST="mudscript-pre-${BUILD_NUM}"
          mkdir -p "$DIST"
          for f in mac/install.sh mac/init.lua mac/ms_core.lua mac/ms_macros.lua MANIFEST.json README.md; do
            [ -f "$f" ] && cp "$f" "$DIST/"
          done
          for d in mac/Spoons ui mac/bin; do
            [ -d "$d" ] && cp -R "$d" "$DIST/"
          done
          [ -d mac/templates ] && cp -R mac/templates "$DIST/"
          [ -d profiles/Default ] && cp -R profiles/Default "$DIST/profiles/"
          mkdir -p "$DIST/data" "$DIST/sounds" "$DIST/profiles"
          rm -f "$DIST"/*.ahk "$DIST"/install.bat "$DIST/bin"/*.bat "$DIST/bin"/*.ps1 "$DIST/.gitignore" 2>/dev/null; true

          # Stamp MANIFEST.json with pre-release version (bump patch: 1.2.7 → 1.2.8-pre.N)
          # N = number of commits since the last stable release tag
          if [ -f "$DIST/MANIFEST.json" ]; then
            BASE_VER=$(jq -r '.version // "0.0.0"' "$DIST/MANIFEST.json")
            # Strip any existing pre-release suffix (e.g. 1.2.8-pre.31 → 1.2.8)
            BASE_VER=$(echo "$BASE_VER" | sed 's/-pre[.-][0-9]*$//')
            # Bump patch version (1.2.7 → 1.2.8)
            BUMPED=$(echo "$BASE_VER" | awk -F. '{$NF=$NF+1; print}' OFS=.)
            # Count commits since last stable tag
            LAST_STABLE=$(git tag -l 'v*' --sort=-v:refname | head -1)
            if [ -n "$LAST_STABLE" ]; then
              BUILD_REL=$(git rev-list --count "${LAST_STABLE}..HEAD")
            else
              BUILD_REL=$BUILD_NUM
            fi
            # Ensure at least 1
            BUILD_REL=$((BUILD_REL > 0 ? BUILD_REL : 1))
            PRE_VER="${BUMPED}-pre.${BUILD_REL}"
            jq --arg v "$PRE_VER" '.version = $v' "$DIST/MANIFEST.json" > "$DIST/MANIFEST.json.tmp"
            mv "$DIST/MANIFEST.json.tmp" "$DIST/MANIFEST.json"
            echo "Stamped MANIFEST.json: $BASE_VER → $PRE_VER"
          fi

          ARCHIVE="mudscript-macos-pre-${BUILD_NUM}.tar.gz"
          tar czf "$ARCHIVE" "$DIST"
          echo "archive=$ARCHIVE" >> "$GITHUB_OUTPUT"
          echo "Package: $ARCHIVE"

      - name: Download previous artifact
        if: steps.skip-check.outputs.skip == 'true'
        id: download-prev
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          PREV_TAG=$(git tag -l 'pre-*' --sort=-v:refname | head -1)
          PREV_NUM=$(echo "$PREV_TAG" | sed 's/pre-//')
          ARCHIVE="mudscript-macos-pre-${PREV_NUM}.tar.gz"
          if gh release download \
            --repo "${{ github.repository }}" \
            --pattern "$ARCHIVE" \
            --dir /tmp/prev-artifact 2>/dev/null; then
            cp "/tmp/prev-artifact/$ARCHIVE" "mudscript-macos-pre-${{ github.run_number }}.tar.gz"
            echo "Reusing: $ARCHIVE"
          else
            echo "Asset not found in $PREV_TAG — will build fresh"
            echo "download_failed=true" >> $GITHUB_OUTPUT
          fi

      - name: Build macOS package (fallback)
        if: steps.skip-check.outputs.skip == 'true' && steps.download-prev.outputs.download_failed == 'true'
        run: |
          BUILD_NUM="${{ github.run_number }}"
          DIST="mudscript-pre-${BUILD_NUM}"
          mkdir -p "$DIST"
          for f in mac/install.sh mac/init.lua mac/ms_core.lua mac/ms_macros.lua MANIFEST.json README.md; do
            [ -f "$f" ] && cp "$f" "$DIST/"
          done
          for d in mac/Spoons ui mac/bin; do
            [ -d "$d" ] && cp -R "$d" "$DIST/"
          done
          [ -d mac/templates ] && cp -R mac/templates "$DIST/"
          [ -d profiles/Default ] && cp -R profiles/Default "$DIST/profiles/"
          mkdir -p "$DIST/data" "$DIST/sounds" "$DIST/profiles"
          rm -f "$DIST"/*.ahk "$DIST"/install.bat "$DIST/bin"/*.bat "$DIST/bin"/*.ps1 "$DIST/.gitignore" 2>/dev/null; true

          if [ -f "$DIST/MANIFEST.json" ]; then
            BASE_VER=$(jq -r '.version // "0.0.0"' "$DIST/MANIFEST.json")
            BASE_VER=$(echo "$BASE_VER" | sed 's/-pre[.-][0-9]*$//')
            BUMPED=$(echo "$BASE_VER" | awk -F. '{$NF=$NF+1; print}' OFS=.)
            LAST_STABLE=$(git tag -l 'v*' --sort=-v:refname | head -1)
            if [ -n "$LAST_STABLE" ]; then
              BUILD_REL=$(git rev-list --count "${LAST_STABLE}..HEAD")
            else
              BUILD_REL=$BUILD_NUM
            fi
            BUILD_REL=$((BUILD_REL > 0 ? BUILD_REL : 1))
            PRE_VER="${BUMPED}-pre.${BUILD_REL}"
            jq --arg v "$PRE_VER" '.version = $v' "$DIST/MANIFEST.json" > "$DIST/MANIFEST.json.tmp"
            mv "$DIST/MANIFEST.json.tmp" "$DIST/MANIFEST.json"
          fi

          tar czf "mudscript-macos-pre-${BUILD_NUM}.tar.gz" "$DIST"

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: macos-pre-${{ github.run_number }}
          path: mudscript-macos-pre-${{ github.run_number }}.tar.gz
          if-no-files-found: warn

  # ────────────────────────────────────────────────────────────────────────────
  # Build Windows
  # ────────────────────────────────────────────────────────────────────────────
  build-windows:
    needs: check
    if: needs.check.outputs.win == 'true'
    runs-on: windows-latest

    steps:
      - uses: actions/checkout@v4
        with:
          ref: main
          token: ${{ secrets.GITHUB_TOKEN }}
          fetch-depth: 0

      - name: Check if build can be skipped
        id: skip-check
        shell: pwsh
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          # Find the latest pre-release tag
          $prevTag = git tag -l 'pre-*' --sort=-v:refname | Select-Object -First 1
          Write-Output "Previous tag: $(if ($prevTag) { $prevTag } else { '<none>' })"

          if (-not $prevTag) {
            "skip=false" | Out-File -FilePath $env:GITHUB_OUTPUT -Append -Encoding utf8NoBOM
            Write-Output "No previous pre-release — building"
            exit 0
          }

          # Check if any Windows source files changed since that tag
          $winDiff = git diff --name-only $prevTag HEAD -- win/ ui/ profiles/Default/ MANIFEST.json README.md 2>$null
          if ($winDiff) { $winDiff = $winDiff | Where-Object { $_ -ne "" } }

          if (-not $winDiff -or $winDiff.Count -eq 0) {
            "skip=true" | Out-File -FilePath $env:GITHUB_OUTPUT -Append -Encoding utf8NoBOM
            Write-Output "✓ Windows sources unchanged since $prevTag — skipping build"
          } else {
            "skip=false" | Out-File -FilePath $env:GITHUB_OUTPUT -Append -Encoding utf8NoBOM
            Write-Output "✗ Windows sources changed — rebuilding"
            $winDiff | ForEach-Object { Write-Output "  $_" }
          }
          exit 0

      - name: Download lib dependencies
        if: steps.skip-check.outputs.skip != 'true'
        shell: pwsh
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          $headers = @{ Authorization = "Bearer $env:GH_TOKEN"; Accept = "application/vnd.github.v3+json" }
          mkdir lib -Force
          $wv2 = Invoke-RestMethod "https://raw.githubusercontent.com/thqby/ahk2_lib/master/WebView2/WebView2.ahk" -Headers $headers
          $wv2 = $wv2.Replace('..\ComVar.ahk', 'ComVar.ahk').Replace('..\Promise.ahk', 'Promise.ahk')
          [System.IO.File]::WriteAllText("$pwd\lib\WebView2.ahk", $wv2, [System.Text.UTF8Encoding]::new($false))
          mkdir lib\WebView2 -Force
          $github = "https://api.github.com/repos/thqby/ahk2_lib/contents/WebView2"
          $items = Invoke-RestMethod $github -Headers $headers
          foreach ($item in $items) {
            if ($item.type -eq 'file') {
              $out = "lib\WebView2\$($item.name)"
              Invoke-WebRequest -Uri $item.download_url -OutFile $out -UseBasicParsing -Headers $headers
            }
          }
          Invoke-WebRequest -Uri "https://raw.githubusercontent.com/thqby/ahk2_lib/master/ComVar.ahk" -OutFile "lib\ComVar.ahk" -UseBasicParsing -Headers $headers
          Invoke-WebRequest -Uri "https://raw.githubusercontent.com/thqby/ahk2_lib/master/Promise.ahk" -OutFile "lib\Promise.ahk" -UseBasicParsing -Headers $headers
          Write-Output "Dependencies downloaded."

      - name: Build Windows package
        if: steps.skip-check.outputs.skip != 'true'
        shell: pwsh
        run: |
          $buildNum = "${{ github.run_number }}"
          $dist = "mudscript-pre-$buildNum"
          mkdir $dist
          & .\win\bin\generate_icon.ps1
          Copy-Item "win\install.bat","win\init.ahk","win\_ms_main.ahk","win\ms_core_v2.ahk","win\ms_macros.ahk","MANIFEST.json","README.md" "$dist\"
          Copy-Item -Recurse "ui","win\lib","win\bin","data" "$dist\"
          Copy-Item -Recurse "sounds" "$dist\" -ErrorAction SilentlyContinue
          Copy-Item -Recurse "profiles" "$dist\" -ErrorAction SilentlyContinue
          Remove-Item -Recurse "$dist\bin\*.sh","$dist\bin\*.plist","$dist\bin\*.swift","$dist\bin\hidinject","$dist\Spoons" -ErrorAction SilentlyContinue
          Remove-Item -Recurse "$dist\*.lua","$dist\install.sh","$dist\.gitignore" -ErrorAction SilentlyContinue

          # Stamp MANIFEST.json with pre-release version
          $manifestPath = Join-Path $dist "MANIFEST.json"
          if (Test-Path $manifestPath) {
            $manifest = Get-Content $manifestPath -Raw | ConvertFrom-Json
            $baseVer = if ($manifest.version) { $manifest.version } else { "0.0.0" }
            # Strip any existing pre-release suffix (e.g. 1.2.8-pre.31 → 1.2.8)
            $baseVer = $baseVer -replace '-pre[\.\-]\d+$',''
            # Bump patch version (1.2.7 → 1.2.8)
            $parts = $baseVer -split '\.'
            $parts[-1] = [int]$parts[-1] + 1
            $bumped = $parts -join '.'
            # Count commits since last stable tag
            $lastStable = git tag -l 'v*' --sort=-v:refname | Select-Object -First 1
            if ($lastStable) {
              $buildRel = [int](git rev-list --count "$lastStable..HEAD")
            } else {
              $buildRel = [int]$buildNum
            }
            if ($buildRel -lt 1) { $buildRel = 1 }
            $preVer = "$bumped-pre.$buildRel"
            $manifest.version = $preVer
            $manifest | ConvertTo-Json -Depth 10 | Set-Content $manifestPath -NoNewline
            Write-Output "Stamped MANIFEST.json: $baseVer -> $preVer"
          }

          $archive = "mudscript-windows-pre-$buildNum.zip"
          Compress-Archive -Path "$dist\*" -DestinationPath $archive -Force
          "archive=$archive" | Out-File -FilePath $env:GITHUB_OUTPUT -Append -Encoding utf8NoBOM
          Write-Output "Package: $archive"

      - name: Download previous artifact
        if: steps.skip-check.outputs.skip == 'true'
        id: download-prev
        shell: pwsh
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          $prevTag = git tag -l 'pre-*' --sort=-v:refname | Select-Object -First 1
          $prevNum = $prevTag -replace 'pre-',''
          $archive = "mudscript-windows-pre-$prevNum.zip"
          $ErrorActionPreference = 'SilentlyContinue'
          gh release download --repo "${{ github.repository }}" --pattern $archive --dir "$env:TEMP\prev-artifact" 2>$null
          if ($? -and (Test-Path "$env:TEMP\prev-artifact\$archive")) {
            Copy-Item "$env:TEMP\prev-artifact\$archive" "mudscript-windows-pre-${{ github.run_number }}.zip"
            Write-Output "Reusing: $archive"
          } else {
            Write-Output "Asset not found in $prevTag — will build fresh"
            "download_failed=true" | Out-File -FilePath $env:GITHUB_OUTPUT -Append -Encoding utf8NoBOM
          }
          exit 0

      - name: Build Windows package (fallback)
        if: steps.skip-check.outputs.skip == 'true' && steps.download-prev.outputs.download_failed == 'true'
        shell: pwsh
        run: |
          $buildNum = "${{ github.run_number }}"
          $dist = "mudscript-pre-$buildNum"
          mkdir $dist
          & .\win\bin\generate_icon.ps1
          Copy-Item "win\install.bat","win\init.ahk","win\_ms_main.ahk","win\ms_core_v2.ahk","win\ms_macros.ahk","MANIFEST.json","README.md" "$dist\"
          Copy-Item -Recurse "ui","win\lib","win\bin","data" "$dist\"
          Copy-Item -Recurse "sounds" "$dist\" -ErrorAction SilentlyContinue
          Copy-Item -Recurse "profiles" "$dist\" -ErrorAction SilentlyContinue
          Remove-Item -Recurse "$dist\bin\*.sh","$dist\bin\*.plist","$dist\bin\*.swift","$dist\bin\hidinject","$dist\Spoons" -ErrorAction SilentlyContinue
          Remove-Item -Recurse "$dist\*.lua","$dist\install.sh","$dist\.gitignore" -ErrorAction SilentlyContinue

          $manifestPath = Join-Path $dist "MANIFEST.json"
          if (Test-Path $manifestPath) {
            $manifest = Get-Content $manifestPath -Raw | ConvertFrom-Json
            $baseVer = if ($manifest.version) { $manifest.version } else { "0.0.0" }
            $baseVer = $baseVer -replace '-pre[\.\-]\d+$',''
            $parts = $baseVer -split '\.'
            $parts[-1] = [int]$parts[-1] + 1
            $bumped = $parts -join '.'
            $lastStable = git tag -l 'v*' --sort=-v:refname | Select-Object -First 1
            if ($lastStable) {
              $buildRel = [int](git rev-list --count "$lastStable..HEAD")
            } else {
              $buildRel = [int]$buildNum
            }
            if ($buildRel -lt 1) { $buildRel = 1 }
            $preVer = "$bumped-pre.$buildRel"
            $manifest.version = $preVer
            $manifest | ConvertTo-Json -Depth 10 | Set-Content $manifestPath -NoNewline
          }

          Compress-Archive -Path "$dist\*" -DestinationPath "mudscript-windows-pre-$buildNum.zip" -Force

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: windows-pre-${{ github.run_number }}
          path: mudscript-windows-pre-${{ github.run_number }}.zip
          if-no-files-found: warn

  # ────────────────────────────────────────────────────────────────────────────
  # Pre-release — create a tagged pre-release with whatever was built
  # ────────────────────────────────────────────────────────────────────────────
  prerelease:
    needs: [build-macos, build-windows]
    if: always() && (needs.build-macos.result == 'success' || needs.build-windows.result == 'success')
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4
        with:
          ref: main

      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          pattern: "*-pre-*"

      - name: Create pre-release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          TAG="pre-${{ github.run_number }}"

          # Delete existing pre-release tag if present
          gh release view "$TAG" --json name &>/dev/null && gh release delete "$TAG" --yes 2>/dev/null || true
          git tag -d "$TAG" 2>/dev/null || true
          git push origin ":refs/tags/$TAG" 2>/dev/null || true

          # Re-tag current HEAD
          git tag "$TAG"
          git push origin "$TAG"

          ASSETS=$(find . -name "mudscript-*-pre-${{ github.run_number }}.*" -type f 2>/dev/null | tr '\n' ' ' || true)
          echo "Assets: $ASSETS"

          # Determine which platforms were built
          BUILT=""
          echo "$ASSETS" | grep -q "macos" && BUILT="${BUILT}macOS "
          echo "$ASSETS" | grep -q "windows" && BUILT="${BUILT}Windows"
          BUILT=$(echo "$BUILT" | xargs)  # trim

          CHANGES=$(git log --oneline $(git rev-list --tags --max-count=1 2>/dev/null || echo HEAD~5)..HEAD 2>/dev/null | head -20 || echo "No changes.")

          cat > notes.md <<EOF
          ## Pre-release build ${{ github.run_number }}

          > ⚠️ **Testing build** — not an official release.
          > Switch mudscript's update channel to **Testing** to install automatically.

          > Platforms: **${BUILT}**

          ### Changes
          $CHANGES

          ### Commit
          \`${{ github.sha }}\`
          EOF

          # shellcheck disable=SC2086
          gh release create "$TAG" \
            --title "Build ${{ github.run_number }}" \
            --notes-file notes.md \
            --prerelease \
            --target main \
            $ASSETS

          echo "Pre-release: https://github.com/${{ github.repository }}/releases/tag/$TAG"
