<!doctype html>
<html lang="en">
    <head>
        <meta charset="UTF-8" />
        <meta name="viewport" content="width=device-width, initial-scale=1.0" />
        <title>mudscript — Documentation</title>

        <!-- Markdown renderer -->
        <script src="https://cdn.jsdelivr.net/npm/marked@9/marked.min.js"></script>
        <!-- Syntax highlighting (Lua + plain text) -->
        <link
            rel="stylesheet"
            href="https://cdn.jsdelivr.net/gh/highlightjs/cdn-release@11.9.0/build/styles/atom-one-dark.min.css"
        />
        <script src="https://cdn.jsdelivr.net/gh/highlightjs/cdn-release@11.9.0/build/highlight.min.js"></script>
        <script src="https://cdn.jsdelivr.net/gh/highlightjs/cdn-release@11.9.0/build/languages/lua.min.js"></script>

        <style>
            /* ── Variables ─────────────────────────────────────────────────────────── */
            :root {
                --bg: #0d0f09; /* night forest floor */
                --surface: #141810; /* dark undergrowth */
                --surface2: #1c2116; /* moss in shadow */
                --border: #2d3523; /* deep olive */
                --text: #d4cfb6; /* warm parchment / dry grass */
                --muted: #7c7a56; /* dried sage */
                --accent: #6b8c3a; /* forest green */
                --accent-hi: #8db84e; /* bright leaf green */
                --accent-glow: rgba(107, 140, 58, 0.14);
                --sidebar-w: 268px;
                --header-h: 52px;
                --content-max: 800px;
            }

            /* ── Reset ─────────────────────────────────────────────────────────────── */
            *,
            *::before,
            *::after {
                box-sizing: border-box;
                margin: 0;
                padding: 0;
            }

            html {
                scroll-behavior: smooth;
            }

            body {
                font-family:
                    -apple-system, BlinkMacSystemFont, "Segoe UI", system-ui,
                    sans-serif;
                background: var(--bg);
                color: var(--text);
                line-height: 1.75;
                font-size: 15px;
            }

            /* ── Header ────────────────────────────────────────────────────────────── */
            #header {
                position: fixed;
                inset: 0 0 auto 0;
                height: var(--header-h);
                background: var(--surface);
                border-bottom: 1px solid var(--border);
                display: flex;
                align-items: center;
                padding: 0 20px;
                gap: 12px;
                z-index: 200;
            }

            #header .brand {
                display: flex;
                align-items: center;
                gap: 8px;
                text-decoration: none;
            }

            #header .brand-name {
                font-size: 15px;
                font-weight: 700;
                color: var(--accent);
                letter-spacing: -0.3px;
            }

            #header .brand-sub {
                font-size: 13px;
                color: var(--muted);
            }

            #header .spacer {
                flex: 1;
            }

            /* Platform switcher */
            .switcher {
                display: flex;
                gap: 2px;
                background: var(--bg);
                border: 1px solid var(--border);
                border-radius: 7px;
                padding: 3px;
            }

            .switcher button {
                padding: 4px 14px;
                border: none;
                border-radius: 5px;
                background: transparent;
                color: var(--muted);
                font-size: 13px;
                font-weight: 500;
                cursor: pointer;
                transition:
                    background 0.15s,
                    color 0.15s;
            }

            .switcher button:hover {
                color: var(--text);
            }

            .switcher button.active {
                background: var(--accent);
                color: #fff;
            }

            /* ── Layout ────────────────────────────────────────────────────────────── */
            #layout {
                display: flex;
                margin-top: var(--header-h);
                min-height: calc(100vh - var(--header-h));
            }

            /* ── Sidebar ───────────────────────────────────────────────────────────── */
            #sidebar {
                width: var(--sidebar-w);
                flex-shrink: 0;
                position: sticky;
                top: var(--header-h);
                height: calc(100vh - var(--header-h));
                overflow-y: auto;
                overflow-x: hidden;
                border-right: 1px solid var(--border);
                background: var(--surface);
                padding: 20px 0 40px;
            }

            #toc-label {
                padding: 0 18px 10px;
                font-size: 11px;
                font-weight: 600;
                text-transform: uppercase;
                letter-spacing: 0.08em;
                color: var(--muted);
            }

            #toc a {
                display: block;
                padding: 5px 18px;
                color: var(--muted);
                text-decoration: none;
                font-size: 13px;
                line-height: 1.45;
                border-left: 2px solid transparent;
                transition:
                    color 0.12s,
                    background 0.12s,
                    border-color 0.12s;
                word-break: break-word;
            }

            #toc a:hover {
                color: var(--text);
                background: var(--accent-glow);
            }

            #toc a.active {
                color: var(--accent-hi);
                border-left-color: var(--accent);
                background: var(--accent-glow);
            }

            #toc a.lvl-h2 {
                font-weight: 500;
                color: var(--text);
                margin-top: 2px;
            }

            #toc a.lvl-h3 {
                padding-left: 32px;
                font-size: 12px;
            }

            /* ── Content ───────────────────────────────────────────────────────────── */
            #content-wrap {
                flex: 1;
                min-width: 0;
                display: flex;
                justify-content: flex-start;
            }

            #content {
                width: 100%;
                max-width: var(--content-max);
                padding: 44px 52px 100px;
                min-width: 0;
            }

            /* Status / loading */
            .status {
                color: var(--muted);
                font-size: 14px;
                padding: 48px 0;
            }

            .status.loading::after {
                content: "";
                display: inline-block;
                width: 6px;
                height: 6px;
                margin-left: 6px;
                background: var(--accent);
                border-radius: 50%;
                animation: blink 1s infinite;
                vertical-align: middle;
            }

            @keyframes blink {
                0%,
                100% {
                    opacity: 0.2;
                }
                50% {
                    opacity: 1;
                }
            }

            /* ── Markdown typography ────────────────────────────────────────────────── */
            #content h1 {
                font-size: 30px;
                font-weight: 800;
                letter-spacing: -0.5px;
                color: var(--text);
                margin-bottom: 6px;
                line-height: 1.25;
            }

            /* Subtitle paragraph that immediately follows h1 */
            #content h1 + p {
                color: var(--muted);
                font-size: 15px;
                margin-bottom: 36px;
                line-height: 1.6;
            }

            #content h2 {
                font-size: 21px;
                font-weight: 700;
                color: var(--text);
                margin: 52px 0 16px;
                padding-bottom: 10px;
                border-bottom: 1px solid var(--border);
                letter-spacing: -0.2px;
            }

            #content h3 {
                font-size: 16px;
                font-weight: 600;
                color: var(--text);
                margin: 28px 0 10px;
            }

            #content h4 {
                font-size: 12px;
                font-weight: 600;
                color: var(--muted);
                text-transform: uppercase;
                letter-spacing: 0.07em;
                margin: 20px 0 8px;
            }

            #content p {
                margin-bottom: 14px;
            }

            #content ul,
            #content ol {
                margin: 0 0 14px 22px;
            }

            #content li {
                margin-bottom: 5px;
            }

            #content li > p {
                margin-bottom: 4px;
            }

            #content a {
                color: var(--accent-hi);
                text-decoration: none;
            }

            #content a:hover {
                text-decoration: underline;
                text-underline-offset: 3px;
            }

            /* Inline code */
            #content :not(pre) > code {
                font-family:
                    "JetBrains Mono", "Cascadia Code", "Fira Code",
                    ui-monospace, monospace;
                font-size: 12.5px;
                background: var(--surface2);
                color: #c4a030; /* amber / honey */
                padding: 2px 6px;
                border-radius: 4px;
                border: 1px solid var(--border);
            }

            /* Code blocks */
            #content pre {
                background: var(--surface2);
                border: 1px solid var(--border);
                border-radius: 8px;
                padding: 16px 18px;
                overflow-x: auto;
                margin: 4px 0 20px;
                line-height: 1.6;
            }

            #content pre code {
                background: transparent;
                border: none;
                padding: 0;
                font-family:
                    "JetBrains Mono", "Cascadia Code", "Fira Code",
                    ui-monospace, monospace;
                font-size: 13px;
                color: inherit;
            }

            /* Tables */
            #content table {
                width: 100%;
                border-collapse: collapse;
                font-size: 14px;
                margin-bottom: 22px;
                display: block;
                overflow-x: auto;
            }

            #content th {
                text-align: left;
                padding: 8px 14px;
                background: var(--surface2);
                border: 1px solid var(--border);
                font-weight: 600;
                font-size: 12px;
                color: var(--muted);
                text-transform: uppercase;
                letter-spacing: 0.04em;
                white-space: nowrap;
            }

            #content td {
                padding: 8px 14px;
                border: 1px solid var(--border);
                vertical-align: top;
                line-height: 1.55;
            }

            #content tbody tr:hover td {
                background: rgba(255, 255, 255, 0.025);
            }

            /* Blockquotes */
            #content blockquote {
                border-left: 3px solid var(--accent);
                margin: 0 0 16px;
                padding: 4px 0 4px 18px;
                color: var(--muted);
                font-style: italic;
            }

            #content blockquote p {
                margin-bottom: 0;
            }

            /* Horizontal rule */
            #content hr {
                border: none;
                border-top: 1px solid var(--border);
                margin: 44px 0;
            }

            /* Strong / em */
            #content strong {
                color: var(--text);
                font-weight: 600;
            }

            /* Highlight.js override */
            .hljs {
                background: transparent !important;
            }

            /* ── Scrollbar ─────────────────────────────────────────────────────────── */
            ::-webkit-scrollbar {
                width: 6px;
                height: 6px;
            }
            ::-webkit-scrollbar-track {
                background: transparent;
            }
            ::-webkit-scrollbar-thumb {
                background: var(--border);
                border-radius: 3px;
            }
            ::-webkit-scrollbar-thumb:hover {
                background: var(--muted);
            }

            /* ── Search ────────────────────────────────────────────────────────────── */
            #search-wrap {
                position: relative;
                max-width: 280px;
                width: 100%;
            }

            #search-input {
                width: 100%;
                background: var(--bg);
                border: 1px solid var(--border);
                border-radius: 7px;
                padding: 6px 12px 6px 30px;
                font-size: 13px;
                color: var(--text);
                outline: none;
                transition: border-color 0.15s;
                font-family: inherit;
            }

            #search-input::placeholder {
                color: var(--muted);
            }

            #search-input:focus {
                border-color: var(--accent);
            }

            #search-icon {
                position: absolute;
                left: 9px;
                top: 50%;
                transform: translateY(-50%);
                color: var(--muted);
                pointer-events: none;
                font-size: 14px;
                line-height: 1;
            }

            #search-results {
                display: none;
                position: absolute;
                top: calc(100% + 6px);
                left: 0;
                right: 0;
                background: var(--surface);
                border: 1px solid var(--border);
                border-radius: 8px;
                z-index: 300;
                box-shadow: 0 8px 32px rgba(0, 0, 0, 0.5);
                max-height: 380px;
                overflow-y: auto;
            }

            #search-results.open {
                display: block;
            }

            .sr {
                padding: 9px 13px;
                cursor: pointer;
                border-bottom: 1px solid var(--border);
                transition: background 0.1s;
            }

            .sr:last-child {
                border-bottom: none;
            }

            .sr:hover,
            .sr.focused {
                background: var(--accent-glow);
            }

            .sr-title {
                font-size: 13px;
                font-weight: 500;
                color: var(--text);
                margin-bottom: 2px;
                white-space: nowrap;
                overflow: hidden;
                text-overflow: ellipsis;
            }

            .sr-title mark {
                background: transparent;
                color: var(--accent-hi);
                font-weight: 700;
            }

            .sr-context {
                font-size: 12px;
                color: var(--muted);
                white-space: nowrap;
                overflow: hidden;
                text-overflow: ellipsis;
            }

            .sr-context mark {
                background: transparent;
                color: var(--accent-hi);
            }

            .sr-empty {
                padding: 14px;
                font-size: 13px;
                color: var(--muted);
                text-align: center;
            }

            /* ── Mobile ────────────────────────────────────────────────────────────── */
            @media (max-width: 800px) {
                #sidebar {
                    display: none;
                }
                #search-wrap {
                    max-width: 160px;
                }
                #content {
                    padding: 28px 20px 80px;
                }
                #content h1 {
                    font-size: 24px;
                }
                #content h2 {
                    font-size: 18px;
                }
            }
        </style>
    </head>

    <body>
        <!-- ── Header ──────────────────────────────────────────────────────────────── -->
        <div id="header">
            <a class="brand" href="#">
                <span class="brand-name">mudscript</span>
                <span class="brand-sub">Documentation</span>
            </a>
            <span class="spacer"></span>
            <div id="search-wrap">
                <span id="search-icon">&#x2315;</span>
                <input
                    id="search-input"
                    type="search"
                    placeholder="Search… ( / )"
                    autocomplete="off"
                    spellcheck="false"
                />
                <div id="search-results"></div>
            </div>
            <div class="switcher">
                <button id="btn-mac" onclick="setPlatform('mac')">macOS</button>
                <button id="btn-windows" onclick="setPlatform('windows')">
                    Windows
                </button>
            </div>
        </div>

        <!-- ── Body ────────────────────────────────────────────────────────────────── -->
        <div id="layout">
            <nav id="sidebar">
                <div id="toc-label">Contents</div>
                <div id="toc"></div>
            </nav>

            <div id="content-wrap">
                <article id="content">
                    <p class="status loading">Loading documentation</p>
                </article>
            </div>
        </div>

        <script>
            // ── Configuration ─────────────────────────────────────────────────────────────
            //
            // Raw GitHub URLs for the markdown files. These are fetched on every page load
            // so updating docs = push a new .md file to the repo. No Docker rebuild needed.
            // GitHub raw serves with CORS headers, so client-side fetch works fine.
            //
            // Change the repo path below if you rename the repo or move the files.
            //
            const DOCS_BASE =
                "https://raw.githubusercontent.com/mudbourn/ms-docs/main";
            const DOCS_URLS = {
                mac: `${DOCS_BASE}/DOCS_MAC.md`,
                windows: `${DOCS_BASE}/DOCS_WINDOWS.md`,
            };
            // ─────────────────────────────────────────────────────────────────────────────

            let currentPlatform = null;
            let scrollSpy = null;

            // ── Routing ───────────────────────────────────────────────────────────────────

            function getPlatformFromURL() {
                return (
                    new URLSearchParams(location.search).get("platform") ||
                    "mac"
                );
            }

            function setPlatform(p) {
                if (p === currentPlatform) return;
                currentPlatform = p;

                const u = new URL(location.href);
                u.searchParams.set("platform", p);
                history.replaceState(null, "", u);

                document
                    .getElementById("btn-mac")
                    .classList.toggle("active", p === "mac");
                document
                    .getElementById("btn-windows")
                    .classList.toggle("active", p === "windows");

                loadDocs(p);
            }

            // ── Fetching + rendering ──────────────────────────────────────────────────────

            function loadDocs(p) {
                const content = document.getElementById("content");
                content.innerHTML =
                    '<p class="status loading">Loading documentation</p>';
                document.getElementById("toc").innerHTML = "";
                if (scrollSpy) {
                    scrollSpy.disconnect();
                    scrollSpy = null;
                }

                const src = DOCS_URLS[p];

                if (!src || src.startsWith("REPLACE")) {
                    content.innerHTML = `
      <h1>Documentation</h1>
      <p>No URL configured for the <strong>${p}</strong> platform.</p>
      <p>Edit the <code>DOCS_URLS</code> object at the top of
      <code>index.html</code> and point it at your hosted markdown file.</p>`;
                    return;
                }

                fetch(src)
                    .then((r) => {
                        if (!r.ok)
                            throw new Error(`HTTP ${r.status} — ${r.url}`);
                        return r.text();
                    })
                    .then((md) => {
                        content.innerHTML = marked.parse(md);
                        content
                            .querySelectorAll("pre code")
                            .forEach((el) => hljs.highlightElement(el));
                        buildTOC();
                        buildSearchIndex();
                        initScrollSpy();
                        // Scroll to anchor if one is in the URL
                        const hash = location.hash;
                        if (hash) {
                            const el = document.getElementById(hash.slice(1));
                            if (el)
                                setTimeout(
                                    () =>
                                        el.scrollIntoView({
                                            behavior: "smooth",
                                            block: "start",
                                        }),
                                    80,
                                );
                        }
                    })
                    .catch((err) => {
                        content.innerHTML = `
        <h1>Failed to load</h1>
        <p>${err.message}</p>
        <p>Make sure the URL is publicly accessible and CORS is enabled on your storage bucket.</p>`;
                    });
            }

            // ── Table of contents ─────────────────────────────────────────────────────────

            function buildTOC() {
                const toc = document.getElementById("toc");
                const content = document.getElementById("content");
                const headings = [...content.querySelectorAll("h2, h3")];

                toc.innerHTML = "";

                headings.forEach((h, i) => {
                    // Assign a stable id if the markdown renderer didn't
                    if (!h.id) {
                        h.id =
                            "s" +
                            i +
                            "-" +
                            h.textContent
                                .toLowerCase()
                                .replace(/[^a-z0-9]+/g, "-")
                                .replace(/^-|-$/g, "");
                    }

                    const a = document.createElement("a");
                    a.href = "#" + h.id;
                    a.className = "lvl-" + h.tagName.toLowerCase();
                    a.textContent = h.textContent.replace(/^[\d]+\.\s/, ""); // strip leading numbers for h2

                    a.addEventListener("click", (e) => {
                        e.preventDefault();
                        h.scrollIntoView({
                            behavior: "smooth",
                            block: "start",
                        });
                        history.replaceState(null, "", "#" + h.id);
                    });

                    toc.appendChild(a);
                });
            }

            // ── Scroll spy ────────────────────────────────────────────────────────────────

            function initScrollSpy() {
                const links = document.querySelectorAll("#toc a");
                const headings = document.querySelectorAll(
                    "#content h2, #content h3",
                );
                if (!links.length) return;

                scrollSpy = new IntersectionObserver(
                    (entries) => {
                        entries.forEach((entry) => {
                            if (!entry.isIntersecting) return;
                            links.forEach((l) => l.classList.remove("active"));
                            const active = document.querySelector(
                                `#toc a[href="#${entry.target.id}"]`,
                            );
                            if (active) {
                                active.classList.add("active");
                                // Keep active item visible in the sidebar
                                active.scrollIntoView({
                                    block: "nearest",
                                    behavior: "smooth",
                                });
                            }
                        });
                    },
                    {
                        rootMargin: "-8% 0px -82% 0px",
                        threshold: 0,
                    },
                );

                headings.forEach((h) => scrollSpy.observe(h));
            }

            // ── Search ────────────────────────────────────────────────────────────────────

            let searchIndex = [];
            let searchFocusIdx = -1;

            function buildSearchIndex() {
                searchIndex = [];
                const content = document.getElementById("content");
                let curHeading = null;
                let curId = null;

                // Walk every relevant element in document order
                content.querySelectorAll("h2, h3, h4, p, li").forEach((el) => {
                    const tag = el.tagName.toLowerCase();
                    const text = el.textContent.trim();
                    if (!text) return;

                    if (tag === "h2" || tag === "h3") {
                        curHeading = text;
                        curId = el.id;
                        searchIndex.push({
                            type: "heading",
                            title: text,
                            context: "",
                            id: el.id,
                            lc: text.toLowerCase(),
                        });
                    } else if (tag === "h4") {
                        searchIndex.push({
                            type: "heading",
                            title: text,
                            context: curHeading || "",
                            id: curId,
                            lc: text.toLowerCase(),
                        });
                    } else if (curId) {
                        // Paragraph / list item — index for content search
                        const snippet = text.slice(0, 90);
                        searchIndex.push({
                            type: "content",
                            title: curHeading || "",
                            context: snippet,
                            id: curId,
                            lc: text.toLowerCase(),
                        });
                    }
                });

                // Also index inline code spans (function/method names)
                content.querySelectorAll(":not(pre) > code").forEach((el) => {
                    const text = el.textContent.trim();
                    if (!text || !curId) return;
                    const heading = el.closest("h2, h3, h4");
                    searchIndex.push({
                        type: "code",
                        title: text,
                        context: curHeading || "",
                        id: heading ? heading.id : curId,
                        lc: text.toLowerCase(),
                    });
                });
            }

            function runSearch(query) {
                if (!query || query.length < 2) return [];
                const q = query.toLowerCase();
                const seen = new Set();
                const results = [];

                searchIndex.forEach((entry) => {
                    if (!entry.lc.includes(q)) return;
                    const key = entry.id + "|" + entry.title;
                    if (seen.has(key)) return;
                    seen.add(key);
                    results.push(entry);
                });

                // Headings and exact code matches first
                results.sort((a, b) => {
                    const aExact = a.lc === query.toLowerCase();
                    const bExact = b.lc === query.toLowerCase();
                    if (aExact !== bExact) return aExact ? -1 : 1;
                    const rank = { heading: 0, code: 1, content: 2 };
                    return (rank[a.type] || 2) - (rank[b.type] || 2);
                });

                return results.slice(0, 9);
            }

            function hl(text, query) {
                const idx = text.toLowerCase().indexOf(query.toLowerCase());
                if (idx === -1) return text;
                return (
                    text.slice(0, idx) +
                    "<mark>" +
                    text.slice(idx, idx + query.length) +
                    "</mark>" +
                    text.slice(idx + query.length)
                );
            }

            function renderResults(results, query) {
                const box = document.getElementById("search-results");
                searchFocusIdx = -1;

                if (!results.length) {
                    box.innerHTML = '<div class="sr-empty">No results</div>';
                    box.classList.add("open");
                    return;
                }

                box.innerHTML = results
                    .map(
                        (r, i) => `
                    <div class="sr" data-id="${r.id}" data-i="${i}">
                        <div class="sr-title">${hl(r.title, query)}</div>
                        ${r.context ? `<div class="sr-context">${hl(r.context, query)}</div>` : ""}
                    </div>`,
                    )
                    .join("");

                box.querySelectorAll(".sr").forEach((el) => {
                    el.addEventListener("mousedown", (e) => {
                        e.preventDefault();
                        goToResult(el.dataset.id);
                    });
                });

                box.classList.add("open");
            }

            function goToResult(id) {
                const target = document.getElementById(id);
                if (target) {
                    target.scrollIntoView({
                        behavior: "smooth",
                        block: "start",
                    });
                    history.replaceState(null, "", "#" + id);
                }
                closeSearch();
            }

            function closeSearch() {
                document
                    .getElementById("search-results")
                    .classList.remove("open");
                searchFocusIdx = -1;
            }

            function initSearch() {
                const input = document.getElementById("search-input");
                const box = document.getElementById("search-results");

                input.addEventListener("input", () => {
                    const q = input.value.trim();
                    if (!q || q.length < 2) {
                        closeSearch();
                        return;
                    }
                    renderResults(runSearch(q), q);
                });

                input.addEventListener("keydown", (e) => {
                    const items = [...box.querySelectorAll(".sr")];
                    if (e.key === "ArrowDown") {
                        e.preventDefault();
                        searchFocusIdx = Math.min(
                            searchFocusIdx + 1,
                            items.length - 1,
                        );
                    } else if (e.key === "ArrowUp") {
                        e.preventDefault();
                        searchFocusIdx = Math.max(searchFocusIdx - 1, 0);
                    } else if (e.key === "Enter") {
                        const f = items[searchFocusIdx];
                        if (f) goToResult(f.dataset.id);
                        return;
                    } else if (e.key === "Escape") {
                        closeSearch();
                        input.blur();
                        return;
                    } else {
                        return;
                    }
                    items.forEach((el, i) =>
                        el.classList.toggle("focused", i === searchFocusIdx),
                    );
                    items[searchFocusIdx]?.scrollIntoView({ block: "nearest" });
                });

                input.addEventListener("blur", () =>
                    setTimeout(closeSearch, 160),
                );

                // Press / anywhere to focus the search box
                document.addEventListener("keydown", (e) => {
                    if (
                        e.key === "/" &&
                        document.activeElement !== input &&
                        document.activeElement.tagName !== "INPUT"
                    ) {
                        e.preventDefault();
                        input.focus();
                        input.select();
                    }
                });
            }

            // ── Init ──────────────────────────────────────────────────────────────────────

            marked.setOptions({ gfm: true, breaks: false });

            initSearch();
            setPlatform(getPlatformFromURL());
        </script>
    </body>
</html>
