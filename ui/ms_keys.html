<!doctype html>
<html lang="en">
    <head>
        <meta charset="UTF-8" />
        <style>
            /* ── Fonts ──────────────────────────────────────────────────────── */
            @font-face {
                font-family: "Almendra";
                src: url("./fonts/Almendra-Regular.ttf") format("truetype");
                font-weight: 400;
                font-style: normal;
            }
            @font-face {
                font-family: "Almendra";
                src: url("./fonts/Almendra-Bold.ttf") format("truetype");
                font-weight: 700;
                font-style: normal;
            }
            @font-face {
                font-family: "Almendra";
                src: url("./fonts/Almendra-Italic.ttf") format("truetype");
                font-weight: 400;
                font-style: italic;
            }
            @font-face {
                font-family: "Almendra";
                src: url("./fonts/Almendra-BoldItalic.ttf") format("truetype");
                font-weight: 700;
                font-style: italic;
            }

            /* ── Tokens ─────────────────────────────────────────────────────── */
            :root {
                --bg: #060402;
                --surface: #100806;
                --surface2: #1c100c;
                --hover: #301610;
                --accent: #c41a1a;
                --accent-hi: #e52424;
                --success: #4a7820;
                --danger: #d42020;
                --warning: #c47820;
                --text: #f0ddb0;
                --text2: rgba(210, 165, 100, 0.85);
                --text3: rgba(160, 105, 60, 0.55);
                --border: rgba(130, 50, 22, 0.55);
                --radius: 3px;
                --radius-s: 2px;
                /* panel extras */
                --mouse: #c47820;
                --scroll: #4a9078;
            }

            /* ── Reset ──────────────────────────────────────────────────────── */
            *,
            *::before,
            *::after {
                box-sizing: border-box;
                margin: 0;
                padding: 0;
                user-select: none;
                -webkit-user-select: none;
            }
            html,
            body {
                height: 100%;
                overflow: hidden;
                background: var(--bg);
            }
            body {
                font-family: "Almendra", Palatino, Georgia, serif;
                font-size: 13px;
                color: var(--text);
                -webkit-font-smoothing: antialiased;
                display: flex;
                flex-direction: column;
            }
            button {
                cursor: pointer;
                border: none;
                background: none;
                color: inherit;
                font: inherit;
            }
            select {
                font: inherit;
                color: inherit;
            }

            /* ── Header ─────────────────────────────────────────────────────── */
            #header {
                display: flex;
                align-items: center;
                gap: 8px;
                padding: 10px 12px 8px;
                background: var(--surface);
                border-bottom: 1px solid var(--border);
                box-shadow: 0 1px 12px
                    color-mix(in srgb, var(--accent) 12%, transparent);
                flex-shrink: 0;
                -webkit-app-region: drag;
            }
            #panel-title {
                flex: 1;
                font-weight: 600;
                font-size: 13px;
            }
            .header-btns {
                display: flex;
                gap: 4px;
                -webkit-app-region: no-drag;
            }
            .btn-ghost {
                padding: 3px 10px;
                border-radius: 20px;
                font-size: 11px;
                font-weight: 600;
                background: var(--surface2);
                color: var(--text2);
                transition: opacity 0.15s;
            }
            .btn-ghost:hover {
                opacity: 0.8;
            }
            .btn-close {
                width: 22px;
                height: 22px;
                border-radius: 50%;
                background: var(--surface2);
                color: var(--text2);
                font-size: 12px;
                display: flex;
                align-items: center;
                justify-content: center;
                transition: background 0.15s;
            }
            .btn-close:hover {
                background: var(--hover);
                color: var(--text);
            }

            /* ── Flag row ───────────────────────────────────────────────────── */
            #flag-row {
                display: flex;
                align-items: center;
                padding: 7px 12px;
                gap: 8px;
                background: var(--surface);
                border-bottom: 1px solid var(--border);
                flex-shrink: 0;
            }
            .flag-pill {
                display: flex;
                align-items: center;
                gap: 5px;
                padding: 3px 8px;
                border-radius: 20px;
                background: var(--surface2);
                border: 1px solid var(--border);
                font-size: 11px;
                color: var(--text2);
                transition:
                    border-color 0.2s,
                    color 0.2s;
                flex: 1;
            }
            .flag-pill.flag-recent {
                border-color: var(--accent);
                color: var(--text);
            }
            .flag-label {
                font-size: 10px;
                font-weight: 700;
                color: var(--text3);
                text-transform: uppercase;
                letter-spacing: 0.05em;
            }
            #flag-key-name,
            #flag-mouse-name {
                font:
                    12px "SF Mono",
                    Menlo,
                    monospace;
            }
            .flag-sep {
                color: var(--border);
                font-size: 16px;
                flex-shrink: 0;
            }

            /* ── Tabs ───────────────────────────────────────────────────────── */
            #tabs {
                display: flex;
                background: var(--surface);
                border-bottom: 1px solid var(--border);
                flex-shrink: 0;
            }
            .tab {
                flex: 1;
                padding: 7px 12px;
                font-size: 12px;
                font-weight: 600;
                color: var(--text2);
                text-align: center;
                cursor: pointer;
                border-bottom: 2px solid transparent;
                border-top: none;
                border-left: none;
                border-right: none;
                background: none;
                transition:
                    color 0.15s,
                    border-color 0.15s;
                -webkit-app-region: no-drag;
            }
            .tab:hover {
                color: var(--text);
            }
            .tab.active {
                color: var(--accent);
                border-bottom-color: var(--accent);
            }

            /* ── Tab sections ───────────────────────────────────────────────── */
            .tab-section {
                display: none;
                flex-direction: column;
                flex: 1;
                overflow: hidden;
            }
            .tab-section.active {
                display: flex;
            }

            /* ── State section ──────────────────────────────────────────────── */
            .state-section {
                padding: 8px 12px;
                background: var(--surface);
                border-bottom: 1px solid var(--border);
                flex-shrink: 0;
            }
            .section-label {
                font:
                    700 9px "SF Mono",
                    Menlo,
                    monospace;
                letter-spacing: 0.1em;
                color: var(--text3);
                text-transform: uppercase;
                margin-bottom: 5px;
            }
            #keys-pills,
            #mouse-pills {
                display: flex;
                flex-wrap: wrap;
                gap: 4px;
                min-height: 22px;
            }
            .pill {
                display: inline-flex;
                align-items: center;
                padding: 2px 8px;
                border-radius: 3px;
                font-size: 12px;
                font-family: inherit;
                white-space: nowrap;
            }
            .pill-key {
                background: var(--surface2);
                border: 1px solid var(--border);
                color: var(--text2);
            }
            .pill-mouse {
                background: color-mix(in srgb, var(--warning) 15%, transparent);
                border: 1px solid var(--warning);
                color: var(--warning);
            }
            .pill-empty {
                background: var(--surface2);
                border: 1px solid var(--border);
                color: var(--text2);
                opacity: 0.4;
            }

            /* ── Coord row ──────────────────────────────────────────────────── */
            #coord-row {
                display: flex;
                align-items: center;
                gap: 8px;
                margin-bottom: 6px;
            }
            #pos-display {
                font:
                    12px "SF Mono",
                    Menlo,
                    monospace;
                color: var(--text2);
                flex: 1;
            }
            #coord-select {
                background: var(--surface2);
                border: 1px solid var(--border);
                color: var(--text2);
                border-radius: var(--radius-s);
                padding: 2px 6px;
                font-size: 11px;
                outline: none;
                cursor: pointer;
                -webkit-appearance: none;
                flex-shrink: 0;
            }
            #coord-select:hover {
                border-color: var(--accent);
                color: var(--text);
            }
            #coord-select option {
                background: var(--surface2);
                color: var(--text);
            }

            /* ── Section divider ────────────────────────────────────────────── */
            .section-divider {
                height: 1px;
                background: var(--border);
                flex-shrink: 0;
            }

            /* ── Event log ──────────────────────────────────────────────────── */
            .log {
                flex: 1;
                overflow-y: auto;
                padding: 4px 0;
                min-height: 0;
            }
            .log::-webkit-scrollbar {
                width: 4px;
            }
            .log::-webkit-scrollbar-track {
                background: transparent;
            }
            .log::-webkit-scrollbar-thumb {
                background: var(--border);
                border-radius: 3px;
            }

            /* ── Entry rows ─────────────────────────────────────────────────── */
            .entry {
                display: flex;
                align-items: baseline;
                gap: 6px;
                padding: 2px 14px;
                font-size: 13px;
                line-height: 1.6;
            }
            .entry:hover {
                background: var(--surface);
            }
            .entry.move-entry {
                opacity: 0.5;
            }
            .ts {
                color: var(--text3);
                font:
                    10px "SF Mono",
                    Menlo,
                    monospace;
                flex-shrink: 0;
                padding-top: 1px;
                min-width: 52px;
            }

            /* ── Badges ─────────────────────────────────────────────────────── */
            .badge {
                font:
                    700 10px "SF Mono",
                    Menlo,
                    monospace;
                letter-spacing: 0.05em;
                text-transform: uppercase;
                padding: 1px 5px;
                border-radius: var(--radius-s);
                flex-shrink: 0;
            }
            .badge-key {
                background: color-mix(in srgb, var(--accent) 20%, transparent);
                color: var(--accent);
            }
            .badge-mouse {
                background: color-mix(in srgb, var(--mouse) 20%, transparent);
                color: var(--mouse);
            }
            .badge-scroll {
                background: color-mix(in srgb, var(--scroll) 20%, transparent);
                color: var(--scroll);
            }

            /* ── Arrows ─────────────────────────────────────────────────────── */
            .arrow {
                flex-shrink: 0;
            }
            .arrow-down {
                color: var(--accent);
            }
            .arrow-up {
                color: var(--text2);
            }
            .arrow-mouse {
                color: var(--mouse);
            }
            .arrow-scroll {
                color: var(--scroll);
            }
            .arrow-move {
                color: var(--text3);
            }

            /* ── Name spans ─────────────────────────────────────────────────── */
            .key-name {
                color: var(--text);
                word-break: break-word;
            }
            .mouse-name {
                color: var(--mouse);
                word-break: break-word;
            }
            .scroll-name {
                color: var(--scroll);
                word-break: break-word;
            }
            .move-name {
                color: var(--text3);
                font-variant-numeric: tabular-nums;
                font-family: "SF Mono", Menlo, monospace;
            }
            .dim {
                color: var(--text3);
                font:
                    10px "SF Mono",
                    Menlo,
                    monospace;
            }
        </style>
    </head>
    <body>
        <div id="header">
            <span id="panel-title">mudscript — input monitor</span>
            <div class="header-btns">
                <button
                    class="btn-ghost"
                    onmouseenter="playSlot('hover')"
                    onclick="
                        playSlot('interact');
                        clearLog();
                    "
                >
                    Clear
                </button>
                <button
                    class="btn-close"
                    onmouseenter="playSlot('hover')"
                    onclick="
                        playSlot('interact');
                        closePanel();
                    "
                >
                    ✕
                </button>
            </div>
        </div>

        <!-- Flag row: most-recent key / mouse-button indicator -->
        <div id="flag-row">
            <div class="flag-pill" id="flag-key-pill">
                <span class="flag-label">Key</span>
                <span id="flag-key-name">—</span>
            </div>
            <span class="flag-sep">│</span>
            <div class="flag-pill" id="flag-mouse-pill">
                <span id="flag-mouse-name">—</span>
                <span class="flag-label">Mouse</span>
            </div>
        </div>

        <!-- Tab bar -->
        <div id="tabs">
            <button
                id="tab-keys"
                class="tab active"
                onmouseenter="playSlot('hover')"
                onclick="switchTab('keys')"
            >
                Keyboard
            </button>
            <button
                id="tab-mouse"
                class="tab"
                onmouseenter="playSlot('hover')"
                onclick="switchTab('mouse')"
            >
                Mouse
            </button>
        </div>

        <!-- ── Keyboard tab ──────────────────────────────────────────────── -->
        <div id="keys-section" class="tab-section active">
            <div class="state-section">
                <div class="section-label">Active</div>
                <div id="keys-pills"></div>
            </div>
            <div class="section-divider"></div>
            <div id="keys-log" class="log"></div>
        </div>

        <!-- ── Mouse tab ─────────────────────────────────────────────────── -->
        <div id="mouse-section" class="tab-section">
            <div class="state-section">
                <div class="section-label">Position</div>
                <div id="coord-row">
                    <div id="pos-display">
                        x:&nbsp;<span id="mx-display">—</span
                        >&nbsp;&nbsp;y:&nbsp;<span id="my-display">—</span>
                    </div>
                    <select
                        id="coord-select"
                        onchange="onCoordModeChange(this.value)"
                    >
                        <option value="screen">Screen</option>
                        <option value="window">Window TL</option>
                        <option value="windowTR">Window TR</option>
                        <option value="windowBL">Window BL</option>
                        <option value="windowBR">Window BR</option>
                        <option value="windowCenter">Window Center</option>
                        <option value="ref">REF 1680×1044</option>
                        <option value="screenCenter">Screen center</option>
                    </select>
                </div>
                <div id="mouse-pills"></div>
            </div>
            <div class="section-divider"></div>
            <div id="mouse-log" class="log"></div>
        </div>

        <script>
            "use strict";

            document.addEventListener("contextmenu", (e) => e.preventDefault());

            // ── Host communication ─────────────────────────────────────────────
            function sendToHost(msg) {
                const s = typeof msg === "string" ? msg : JSON.stringify(msg);
                try {
                    window.webkit.messageHandlers.msKeys.postMessage(s);
                } catch (e) {}
            }
            function playSlot(slot) {
                sendToHost({ action: "playSlot", slot });
            }

            // ── Header drag ────────────────────────────────────────────────────
            (function () {
                let _drag = null;
                document
                    .getElementById("header")
                    .addEventListener("mousedown", (e) => {
                        if (e.target.closest(".header-btns")) return;
                        _drag = { ox: e.screenX, oy: e.screenY };
                        const onMove = (ev) => {
                            if (!_drag) return;
                            sendToHost({
                                action: "move",
                                dx: ev.screenX - _drag.ox,
                                dy: ev.screenY - _drag.oy,
                            });
                            _drag.ox = ev.screenX;
                            _drag.oy = ev.screenY;
                        };
                        const onUp = () => {
                            _drag = null;
                            window.removeEventListener("mousemove", onMove);
                            window.removeEventListener("mouseup", onUp);
                        };
                        window.addEventListener("mousemove", onMove);
                        window.addEventListener("mouseup", onUp);
                    });
            })();

            // ── Tab switching ──────────────────────────────────────────────────
            function switchTab(tab) {
                document
                    .querySelectorAll(".tab")
                    .forEach((t) =>
                        t.classList.toggle("active", t.id === "tab-" + tab),
                    );
                document
                    .querySelectorAll(".tab-section")
                    .forEach((s) =>
                        s.classList.toggle("active", s.id === tab + "-section"),
                    );
                // Scroll the newly-visible log to the bottom
                const log = document.getElementById(tab + "-log");
                if (log) log.scrollTop = log.scrollHeight;
            }

            // ── Flag row ───────────────────────────────────────────────────────
            let _lastKeyTime = 0,
                _lastMouseTime = 0;

            function flagKey(name) {
                _lastKeyTime = Date.now();
                document.getElementById("flag-key-name").textContent =
                    name || "—";
                _updateFlagStyles();
            }

            function flagMouse(name) {
                _lastMouseTime = Date.now();
                document.getElementById("flag-mouse-name").textContent =
                    name || "—";
                _updateFlagStyles();
            }

            function _updateFlagStyles() {
                const kRecent = _lastKeyTime >= _lastMouseTime;
                document
                    .getElementById("flag-key-pill")
                    .classList.toggle(
                        "flag-recent",
                        kRecent && _lastKeyTime > 0,
                    );
                document
                    .getElementById("flag-mouse-pill")
                    .classList.toggle(
                        "flag-recent",
                        !kRecent && _lastMouseTime > 0,
                    );
            }

            // ── Constants ─────────────────────────────────────────────────────
            const MAX_ENTRIES = 300;
            const SCROLL_THRESH = 48;
            const BTN_NAMES = {
                0: "Left",
                1: "Right",
                2: "Middle",
                3: "Btn4",
                4: "Btn5",
            };

            function btnName(n) {
                return BTN_NAMES[n] ?? "M" + n;
            }
            function isNearBottom(el) {
                return (
                    el.scrollHeight - el.scrollTop - el.clientHeight <=
                    SCROLL_THRESH
                );
            }
            function pad2(n) {
                return String(n).padStart(2, "0");
            }
            function nowTs() {
                const d = new Date();
                return (
                    pad2(d.getHours()) +
                    ":" +
                    pad2(d.getMinutes()) +
                    ":" +
                    pad2(d.getSeconds())
                );
            }

            // ── Entry builder ──────────────────────────────────────────────────
            function mkSpan(cls, text) {
                const s = document.createElement("span");
                s.className = cls;
                s.textContent = text;
                return s;
            }

            function buildRow(entry) {
                const row = document.createElement("div");
                const t = entry.type;

                if (t === "mousemove") {
                    row.className = "entry move-entry";
                    row.append(
                        mkSpan("ts", "[" + (entry.ts || "") + "]"),
                        mkSpan("arrow arrow-move", "→"),
                        mkSpan("move-name", entry.x + ", " + entry.y),
                    );
                    return row;
                }

                row.className = "entry";
                row.appendChild(mkSpan("ts", "[" + (entry.ts || "") + "]"));

                if (t === "key") {
                    row.append(
                        mkSpan("badge badge-key", "key"),
                        mkSpan(
                            "arrow " + (entry.down ? "arrow-down" : "arrow-up"),
                            entry.down ? "↓" : "↑",
                        ),
                        mkSpan("key-name", entry.key || ""),
                        mkSpan("dim", " (" + (entry.keyCode ?? "?") + ")"),
                    );
                } else if (t === "mouse") {
                    row.append(
                        mkSpan("badge badge-mouse", "mouse"),
                        mkSpan(
                            "arrow " +
                                (entry.down ? "arrow-mouse" : "arrow-up"),
                            entry.down ? "↓" : "↑",
                        ),
                        mkSpan("mouse-name", btnName(entry.button)),
                        mkSpan("dim", " (" + entry.button + ")"),
                        mkSpan("dim", "  " + entry.x + ", " + entry.y),
                    );
                } else if (t === "scroll") {
                    row.append(
                        mkSpan("badge badge-scroll", "scroll"),
                        mkSpan(
                            "arrow arrow-scroll",
                            entry.direction === "up" ? "↑" : "↓",
                        ),
                        mkSpan(
                            "scroll-name",
                            entry.direction +
                                (entry.amount > 1 ? " ×" + entry.amount : ""),
                        ),
                    );
                }

                return row;
            }

            // ── Route entries to the correct log ──────────────────────────────
            function appendEntry(entry) {
                if (entry.type === "key" && entry.down)
                    flagKey(entry.key || "?");
                if (entry.type === "mouse" && entry.down)
                    flagMouse(btnName(entry.button) + " (" + entry.button + ")");

                const t = entry.type;
                const isMouseSide =
                    t === "mouse" || t === "scroll" || t === "mousemove";
                const log = document.getElementById(
                    isMouseSide ? "mouse-log" : "keys-log",
                );
                const atBottom = isNearBottom(log);
                log.appendChild(buildRow(entry));
                while (log.childElementCount > MAX_ENTRIES) {
                    log.removeChild(log.firstElementChild);
                }
                if (atBottom) log.scrollTop = log.scrollHeight;
            }

            function loadHistory(entries) {
                const kl = document.getElementById("keys-log");
                const ml = document.getElementById("mouse-log");
                kl.innerHTML = ml.innerHTML = "";
                const capped =
                    entries && entries.length > MAX_ENTRIES
                        ? entries.slice(-MAX_ENTRIES)
                        : entries || [];
                const kf = document.createDocumentFragment();
                const mf = document.createDocumentFragment();
                capped.forEach((e) => {
                    const isMouseSide =
                        e.type === "mouse" ||
                        e.type === "scroll" ||
                        e.type === "mousemove";
                    (isMouseSide ? mf : kf).appendChild(buildRow(e));
                });
                kl.appendChild(kf);
                ml.appendChild(mf);
                kl.scrollTop = kl.scrollHeight;
                ml.scrollTop = ml.scrollHeight;
            }

            // ── Active keys pills ──────────────────────────────────────────────
            // Accepts array of { name, code } objects (or plain strings for backwards compat).
            function updateActiveKeys(keys) {
                const row = document.getElementById("keys-pills");
                row.innerHTML = "";
                if (!keys || keys.length === 0) {
                    const p = document.createElement("span");
                    p.className = "pill pill-empty";
                    p.textContent = "—";
                    row.appendChild(p);
                    return;
                }
                keys.forEach((entry) => {
                    const p = document.createElement("span");
                    p.className = "pill pill-key";
                    if (typeof entry === "object" && entry !== null) {
                        p.textContent = entry.name + " (" + entry.code + ")";
                    } else {
                        p.textContent = entry;
                    }
                    row.appendChild(p);
                });
            }

            // ── Mouse state (position + active buttons) ───────────────────────
            function updateMouseState(state) {
                if (state.x != null)
                    document.getElementById("mx-display").textContent = state.x;
                if (state.y != null)
                    document.getElementById("my-display").textContent = state.y;
                const row = document.getElementById("mouse-pills");
                row.innerHTML = "";
                const btns = Array.isArray(state.buttons)
                    ? state.buttons
                    : Object.values(state.buttons || {});
                if (
                    !btns ||
                    (Array.isArray(btns)
                        ? btns.length === 0
                        : Object.keys(btns).length === 0)
                ) {
                    const emp = document.createElement("span");
                    emp.className = "pill pill-key pill-empty";
                    emp.textContent = "\u2014";
                    row.appendChild(emp);
                    return;
                }
                btns.forEach((b) => {
                    const p = document.createElement("span");
                    p.className = "pill pill-mouse";
                    p.textContent = btnName(b) + " (" + b + ")";
                    row.appendChild(p);
                });
            }

            function updateMousePos(pos) {
                if (pos.x != null)
                    document.getElementById("mx-display").textContent = pos.x;
                if (pos.y != null)
                    document.getElementById("my-display").textContent = pos.y;
            }

            // ── Button actions ─────────────────────────────────────────────────
            function clearLog() {
                document.getElementById("keys-log").innerHTML = "";
                document.getElementById("mouse-log").innerHTML = "";
                sendToHost({ action: "clear" });
            }

            function closePanel() {
                sendToHost({ action: "close" });
            }

            function onCoordModeChange(mode) {
                sendToHost({ action: "setCoordMode", mode: mode });
            }

            // ── Theme ──────────────────────────────────────────────────────────
            function applyTheme(t) {
                if (!t) return;
                const r = document.documentElement.style;
                if (t.bg) r.setProperty("--bg", t.bg);
                if (t.surface) r.setProperty("--surface", t.surface);
                if (t.surface2) r.setProperty("--surface2", t.surface2);
                if (t.hover) r.setProperty("--hover", t.hover);
                if (t.accent) r.setProperty("--accent", t.accent);
                if (t.accentHi) r.setProperty("--accent-hi", t.accentHi);
                if (t.success) r.setProperty("--success", t.success);
                if (t.danger) r.setProperty("--danger", t.danger);
                if (t.warning) r.setProperty("--warning", t.warning);
                if (t.text) r.setProperty("--text", t.text);
                if (t.radius !== undefined) {
                    r.setProperty("--radius", t.radius + "px");
                    r.setProperty(
                        "--radius-s",
                        Math.max(0, t.radius - 1) + "px",
                    );
                }
                if (t.font) {
                    if (t.fontURL) {
                        let el = document.getElementById("_ms-custom-font");
                        if (!el) {
                            el = document.createElement("style");
                            el.id = "_ms-custom-font";
                            document.head.appendChild(el);
                        }
                        el.textContent = `@font-face { font-family: "${t.font}"; src: url("${t.fontURL}"); }`;
                    }
                    document.body.style.fontFamily = `"${t.font}", Almendra, Palatino, Georgia, serif`;
                }
            }

            // ── Init ───────────────────────────────────────────────────────────
            document.addEventListener("DOMContentLoaded", () => {
                sendToHost({ action: "ready" });
            });
        </script>
    </body>
</html>
