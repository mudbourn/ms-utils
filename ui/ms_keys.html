<!doctype html>
<html lang="en">
    <head>
        <meta charset="UTF-8" />
        <style>
            :root {
                --bg: #060402;
                --surface: #100806;
                --surface2: #1c100c;
                --border: rgba(130, 50, 22, 0.55);
                --accent: #c41a1a;
                --text: #f0ddb0;
                --text2: rgba(210, 165, 100, 0.75);
                --mouse: #c47820;
                --scroll: #4a9078;
                --move: rgba(210, 165, 100, 0.38);
                --radius: 3px;
            }

            *,
            *::before,
            *::after {
                box-sizing: border-box;
                margin: 0;
                padding: 0;
                user-select: none;
                -webkit-user-select: none;
            }

            html,
            body {
                width: 100%;
                height: 100%;
                background: var(--bg);
                color: var(--text);
                font-family: "Almendra", Palatino, Georgia, serif;
                font-size: 13px;
                height: 32px;
                -webkit-app-region: drag;
                display: flex;
                align-items: center;
                padding: 0 10px 0 14px;
                border-bottom: 1px solid var(--border);
                flex-shrink: 0;
                gap: 6px;
            }

            #titlebar-text {
                flex: 1;
                font-size: 11px;
                font-weight: 700;
                letter-spacing: 1.5px;
                text-transform: uppercase;
                color: var(--text2);
            }

            .tb-btn {
                -webkit-app-region: no-drag;
                height: 20px;
                padding: 0 8px;
                background: transparent;
                border: 1px solid var(--border);
                border-radius: var(--radius);
                color: var(--text2);
                font-family: inherit;
                font-size: 11px;
                cursor: pointer;
                transition:
                    background 0.12s,
                    border-color 0.12s,
                    color 0.12s;
            }

            .tb-btn:hover {
                background: var(--surface2);
                border-color: var(--accent);
                color: var(--text);
            }

            /* ── Two-column main area ─────────────────────────────────────────── */
            #main {
                flex: 1;
                display: flex;
                min-height: 0;
            }

            .col {
                flex: 1;
                display: flex;
                flex-direction: column;
                min-width: 0;
                min-height: 0;
            }

            /* 1px vertical divider between columns */
            #col-sep {
                width: 1px;
                background: var(--border);
                flex-shrink: 0;
            }

            /* ── State section (top of each column) ──────────────────────────── */
            .state-section {
                flex-shrink: 0;
                padding: 8px 14px 10px;
                display: flex;
                flex-direction: column;
                gap: 5px;
                min-height: 80px;
            }

            .section-label {
                font-size: 10px;
                font-variant: small-caps;
                letter-spacing: 1px;
                color: var(--text2);
            }

            /* ── Pills row (shared by keys and mouse buttons) ─────────────────── */
            .pills-row {
                display: flex;
                flex-wrap: wrap;
                gap: 4px;
                align-content: flex-start;
            }

            .pill {
                background: var(--surface2);
                border: 1px solid var(--border);
                color: var(--text);
                font-size: 11px;
                font-family: inherit;
                padding: 2px 7px;
                border-radius: 3px;
                white-space: nowrap;
            }

            .pill-mouse {
                border-color: rgba(196, 120, 32, 0.5);
                color: var(--mouse);
            }

            /* ── Mouse position display ───────────────────────────────────────── */
            #mouse-pos {
                font-size: 11px;
                color: var(--text2);
                font-variant-numeric: tabular-nums;
                letter-spacing: 0.3px;
            }

            #mouse-pos span {
                color: var(--text);
            }

            /* ── Horizontal divider between state and log ─────────────────────── */
            .col-divider {
                height: 1px;
                background: var(--border);
                flex-shrink: 0;
            }

            /* ── Scrollable event log ─────────────────────────────────────────── */
            .event-log {
                flex: 1;
                overflow-y: auto;
                padding: 4px 0;
                min-height: 0;
            }

            .event-log::-webkit-scrollbar {
                width: 4px;
            }
            .event-log::-webkit-scrollbar-track {
                background: transparent;
            }
            .event-log::-webkit-scrollbar-thumb {
                background: var(--border);
                border-radius: 3px;
            }

            /* ── Entry rows ───────────────────────────────────────────────────── */
            .entry {
                display: flex;
                align-items: baseline;
                gap: 5px;
                padding: 2px 14px;
                font-size: 13px;
                line-height: 1.6;
            }

            .entry:hover {
                background: var(--surface);
            }

            .entry.move-entry {
                opacity: 0.5;
            }

            .ts {
                color: var(--text2);
                font-size: 11px;
                white-space: nowrap;
                flex-shrink: 0;
            }

            .arrow {
                flex-shrink: 0;
            }
            .arrow-down {
                color: var(--text);
            }
            .arrow-up {
                color: var(--text2);
            }
            .arrow-mouse {
                color: var(--mouse);
            }
            .arrow-scroll {
                color: var(--scroll);
            }
            .arrow-move {
                color: var(--move);
            }

            .key-name {
                color: var(--text);
                word-break: break-word;
            }
            .mouse-name {
                color: var(--mouse);
                word-break: break-word;
            }
            .scroll-name {
                color: var(--scroll);
                word-break: break-word;
            }
            .move-name {
                color: var(--move);
                font-variant-numeric: tabular-nums;
                word-break: break-word;
            }
            .pos-dim {
                color: var(--text2);
                font-size: 10px;
            }
        </style>
    </head>
    <body>
        <div id="titlebar">
            <span id="titlebar-text">mudscript — input monitor</span>
            <button class="tb-btn" onclick="clearLog()">[clear]</button>
            <button class="tb-btn" onclick="closePanel()">[×]</button>
        </div>

        <div id="main">
            <!-- ── Keys column ─────────────────────────────────────────────── -->
            <div class="col" id="keys-col">
                <div class="state-section">
                    <span class="section-label">Keys</span>
                    <div class="pills-row" id="keys-pills"></div>
                </div>
                <div class="col-divider"></div>
                <div class="event-log" id="keys-log"></div>
            </div>

            <div id="col-sep"></div>

            <!-- ── Mouse column ────────────────────────────────────────────── -->
            <div class="col" id="mouse-col">
                <div class="state-section">
                    <span class="section-label">Mouse</span>
                    <div id="mouse-pos">
                        x: <span id="mx">—</span>&nbsp;&nbsp;y:
                        <span id="my">—</span>
                    </div>
                    <div class="pills-row" id="mouse-pills"></div>
                </div>
                <div class="col-divider"></div>
                <div class="event-log" id="mouse-log"></div>
            </div>
        </div>

        <script>
            "use strict";

            document.addEventListener("contextmenu", (e) => e.preventDefault());

            function sendToHost(msg) {
                const s = typeof msg === "string" ? msg : JSON.stringify(msg);
                if (window.chrome?.webview) {
                    window.chrome.webview.postMessage(s);
                } else {
                    window.webkit.messageHandlers.msKeys.postMessage(s);
                }
            }

            // ── Drag ──────────────────────────────────────────────────────────
            (function () {
                let _drag = null;
                document
                    .getElementById("titlebar")
                    .addEventListener("mousedown", (e) => {
                        if (e.target.closest(".tb-btn")) return;
                        _drag = { ox: e.screenX, oy: e.screenY };
                        const onMove = (ev) => {
                            if (!_drag) return;
                            sendToHost({
                                action: "move",
                                dx: ev.screenX - _drag.ox,
                                dy: ev.screenY - _drag.oy,
                            });
                            _drag.ox = ev.screenX;
                            _drag.oy = ev.screenY;
                        };
                        const onUp = () => {
                            _drag = null;
                            window.removeEventListener("mousemove", onMove);
                            window.removeEventListener("mouseup", onUp);
                        };
                        window.addEventListener("mousemove", onMove);
                        window.addEventListener("mouseup", onUp);
                    });
            })();

            // ── Constants ─────────────────────────────────────────────────────
            const MAX_ENTRIES = 300;
            const NEAR_BOTTOM = 48;
            const BTN_NAMES = {
                0: "Left",
                1: "Right",
                2: "Middle",
                3: "Btn4",
                4: "Btn5",
            };

            function btnName(n) {
                return BTN_NAMES[n] ?? "M" + n;
            }
            function isNearBottom(el) {
                return (
                    el.scrollHeight - el.scrollTop - el.clientHeight <=
                    NEAR_BOTTOM
                );
            }

            // ── Entry builder ─────────────────────────────────────────────────
            function buildRow(entry) {
                const row = document.createElement("div");
                const t = entry.type;

                if (t === "mousemove") {
                    row.className = "entry move-entry";
                    const ts = mkSpan("ts", "[" + (entry.ts || "") + "]");
                    const arr = mkSpan("arrow arrow-move", "→");
                    const name = mkSpan("move-name", entry.x + ", " + entry.y);
                    row.append(ts, arr, name);
                    return row;
                }

                row.className = "entry";
                const ts = mkSpan("ts", "[" + (entry.ts || "") + "]");
                row.appendChild(ts);

                if (t === "key") {
                    const arr = mkSpan(
                        "arrow " + (entry.down ? "arrow-down" : "arrow-up"),
                        entry.down ? "↓" : "↑",
                    );
                    const name = mkSpan("key-name", entry.key || "");
                    row.append(arr, name);
                } else if (t === "mouse") {
                    const arr = mkSpan(
                        "arrow " + (entry.down ? "arrow-mouse" : "arrow-up"),
                        entry.down ? "↓" : "↑",
                    );
                    const name = mkSpan("mouse-name", btnName(entry.button));
                    const pos = mkSpan(
                        "pos-dim",
                        "  " + entry.x + ", " + entry.y,
                    );
                    row.append(arr, name, pos);
                } else if (t === "scroll") {
                    const arr = mkSpan(
                        "arrow arrow-scroll",
                        entry.direction === "up" ? "↑" : "↓",
                    );
                    const name = mkSpan(
                        "scroll-name",
                        "scroll " +
                            entry.direction +
                            (entry.amount > 1 ? " ×" + entry.amount : ""),
                    );
                    row.append(arr, name);
                }

                return row;
            }

            function mkSpan(cls, text) {
                const s = document.createElement("span");
                s.className = cls;
                s.textContent = text;
                return s;
            }

            // ── Route entry to the correct log column ─────────────────────────
            function appendEntry(entry) {
                const t = entry.type;
                const isMouseSide =
                    t === "mouse" || t === "scroll" || t === "mousemove";
                const log = document.getElementById(
                    isMouseSide ? "mouse-log" : "keys-log",
                );
                const atBottom = isNearBottom(log);
                log.appendChild(buildRow(entry));
                while (log.childElementCount > MAX_ENTRIES)
                    log.removeChild(log.firstElementChild);
                if (atBottom) log.scrollTop = log.scrollHeight;
            }

            function loadHistory(entries) {
                const keysLog = document.getElementById("keys-log");
                const mouseLog = document.getElementById("mouse-log");
                keysLog.innerHTML = "";
                mouseLog.innerHTML = "";
                const kf = document.createDocumentFragment();
                const mf = document.createDocumentFragment();
                (entries || []).forEach((e) => {
                    const isMouseSide =
                        e.type === "mouse" ||
                        e.type === "scroll" ||
                        e.type === "mousemove";
                    (isMouseSide ? mf : kf).appendChild(buildRow(e));
                });
                keysLog.appendChild(kf);
                mouseLog.appendChild(mf);
                keysLog.scrollTop = keysLog.scrollHeight;
                mouseLog.scrollTop = mouseLog.scrollHeight;
            }

            // ── Active keys pills ─────────────────────────────────────────────
            function updateActiveKeys(names) {
                const row = document.getElementById("keys-pills");
                row.innerHTML = "";
                (names || []).forEach((name) => {
                    const pill = document.createElement("span");
                    pill.className = "pill";
                    pill.textContent = name;
                    row.appendChild(pill);
                });
            }

            // ── Mouse state (position + active buttons) ───────────────────────
            function updateMouseState(state) {
                // Position
                if (state.x != null)
                    document.getElementById("mx").textContent = state.x;
                if (state.y != null)
                    document.getElementById("my").textContent = state.y;
                // Active button pills
                const row = document.getElementById("mouse-pills");
                row.innerHTML = "";
                (state.buttons || []).forEach((b) => {
                    const pill = document.createElement("span");
                    pill.className = "pill pill-mouse";
                    pill.textContent = btnName(b);
                    row.appendChild(pill);
                });
            }

            // ── Position-only fast update (bypasses full state rebuild) ───────
            function updateMousePos(pos) {
                if (pos.x != null)
                    document.getElementById("mx").textContent = pos.x;
                if (pos.y != null)
                    document.getElementById("my").textContent = pos.y;
            }

            // ── Button actions ────────────────────────────────────────────────
            function clearLog() {
                document.getElementById("keys-log").innerHTML = "";
                document.getElementById("mouse-log").innerHTML = "";
                sendToHost({ action: "clear" });
            }

            function closePanel() {
                sendToHost({ action: "close" });
            }
        </script>
    </body>
</html>
