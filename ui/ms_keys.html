<!doctype html>
<html lang="en">
    <head>
        <meta charset="UTF-8" />
        <style>
            :root {
                --bg: #060402;
                --surface: #100806;
                --surface2: #1c100c;
                --border: rgba(130, 50, 22, 0.55);
                --accent: #c41a1a;
                --text: #f0ddb0;
                --text2: rgba(210, 165, 100, 0.75);
                --mouse: #c47820;
                --scroll: #4a9078;
                --move: rgba(210, 165, 100, 0.38);
                --radius: 3px;
            }

            *,
            *::before,
            *::after {
                box-sizing: border-box;
                margin: 0;
                padding: 0;
                user-select: none;
                -webkit-user-select: none;
            }

            html,
            body {
                width: 100%;
                height: 100%;
                background: var(--bg);
                color: var(--text);
                font-family: "Almendra", Palatino, Georgia, serif;
                font-size: 13px;
                line-height: 1.5;
                overflow: hidden;
            }

            body {
                display: flex;
                flex-direction: column;
            }

            /* ── Titlebar ─────────────────────────────────────────────────── */
            #titlebar {
                height: 32px;
                -webkit-app-region: drag;
                display: flex;
                align-items: center;
                padding: 0 10px 0 14px;
                border-bottom: 1px solid var(--border);
                flex-shrink: 0;
                gap: 6px;
            }

            #titlebar-text {
                flex: 1;
                font-size: 11px;
                font-weight: 700;
                letter-spacing: 1.5px;
                text-transform: uppercase;
                color: var(--text2);
            }

            .tb-btn {
                -webkit-app-region: no-drag;
                height: 20px;
                padding: 0 8px;
                background: transparent;
                border: 1px solid var(--border);
                border-radius: var(--radius);
                color: var(--text2);
                font-family: inherit;
                font-size: 11px;
                cursor: pointer;
                transition:
                    background 0.12s,
                    border-color 0.12s,
                    color 0.12s;
            }

            .tb-btn:hover {
                background: var(--surface2);
                border-color: var(--accent);
                color: var(--text);
            }

            /* ── Tab bar ─────────────────────────────────────────────────── */
            #tabs {
                display: flex;
                flex-shrink: 0;
                background: var(--surface);
                border-bottom: 1px solid var(--border);
            }

            .tab {
                flex: 1;
                height: 30px;
                background: transparent;
                border: none;
                border-bottom: 2px solid transparent;
                margin-bottom: -1px;
                color: var(--text2);
                font-family: inherit;
                font-size: 11px;
                font-weight: 600;
                letter-spacing: 0.8px;
                text-transform: uppercase;
                cursor: pointer;
                transition:
                    color 0.12s,
                    border-color 0.12s;
            }

            .tab:hover {
                color: var(--text);
            }

            .tab.active {
                color: var(--text);
                border-bottom-color: var(--accent);
            }

            /* ── Tab sections ─────────────────────────────────────────────── */
            .tab-section {
                display: none;
                flex: 1;
                flex-direction: column;
                min-height: 0;
            }

            .tab-section.active {
                display: flex;
            }

            /* ── State section ───────────────────────────────────────────── */
            .state-section {
                flex-shrink: 0;
                padding: 8px 14px 10px;
                display: flex;
                flex-direction: column;
                gap: 5px;
                min-height: 80px;
            }

            .section-label {
                font-size: 10px;
                font-variant: small-caps;
                letter-spacing: 1px;
                color: var(--text2);
            }

            .pills-row {
                display: flex;
                flex-wrap: wrap;
                gap: 4px;
                align-content: flex-start;
            }

            .pill {
                background: var(--surface2);
                border: 1px solid var(--border);
                color: var(--text);
                font-size: 12px;
                font-family: inherit;
                padding: 2px 8px;
                border-radius: 3px;
                white-space: nowrap;
            }

            .pill-mouse {
                border-color: rgba(196, 120, 32, 0.5);
                color: var(--mouse);
            }

            #mouse-pos {
                font-size: 12px;
                color: var(--text2);
                font-variant-numeric: tabular-nums;
                letter-spacing: 0.3px;
            }

            #mouse-pos span {
                color: var(--text);
            }

            /* ── Horizontal divider ──────────────────────────────────────── */
            .divider {
                height: 1px;
                background: var(--border);
                flex-shrink: 0;
            }

            /* ── Event log ───────────────────────────────────────────────── */
            .event-log {
                flex: 1;
                overflow-y: auto;
                padding: 4px 0;
                min-height: 0;
            }

            .event-log::-webkit-scrollbar {
                width: 4px;
            }
            .event-log::-webkit-scrollbar-track {
                background: transparent;
            }
            .event-log::-webkit-scrollbar-thumb {
                background: var(--border);
                border-radius: 3px;
            }

            /* ── Entry rows ──────────────────────────────────────────────── */
            .entry {
                display: flex;
                align-items: baseline;
                gap: 6px;
                padding: 2px 14px;
                font-size: 13px;
                line-height: 1.6;
            }

            .entry:hover {
                background: var(--surface);
            }
            .entry.move-entry {
                opacity: 0.5;
            }

            .ts {
                color: var(--text2);
                font-size: 11px;
                white-space: nowrap;
                flex-shrink: 0;
            }
            .arrow {
                flex-shrink: 0;
            }
            .arrow-down {
                color: var(--text);
            }
            .arrow-up {
                color: var(--text2);
            }
            .arrow-mouse {
                color: var(--mouse);
            }
            .arrow-scroll {
                color: var(--scroll);
            }
            .arrow-move {
                color: var(--move);
            }

            .key-name {
                color: var(--text);
                word-break: break-word;
            }
            .mouse-name {
                color: var(--mouse);
                word-break: break-word;
            }
            .scroll-name {
                color: var(--scroll);
                word-break: break-word;
            }
            .move-name {
                color: var(--move);
                font-variant-numeric: tabular-nums;
                word-break: break-word;
            }
            .pos-dim {
                color: var(--text2);
                font-size: 11px;
            }
        </style>
    </head>
    <body>
        <div id="titlebar">
            <span id="titlebar-text">mudscript — input monitor</span>
            <button class="tb-btn" onclick="clearLog()">[clear]</button>
            <button class="tb-btn" onclick="closePanel()">[×]</button>
        </div>

        <div id="tabs">
            <button
                id="tab-keys"
                class="tab active"
                onclick="switchTab('keys')"
            >
                Keyboard
            </button>
            <button id="tab-mouse" class="tab" onclick="switchTab('mouse')">
                Mouse
            </button>
        </div>

        <!-- ── Keyboard tab ───────────────────────────────────────────────── -->
        <div id="keys-section" class="tab-section active">
            <div class="state-section">
                <span class="section-label">Active</span>
                <div id="keys-pills" class="pills-row"></div>
            </div>
            <div class="divider"></div>
            <div id="keys-log" class="event-log"></div>
        </div>

        <!-- ── Mouse tab ──────────────────────────────────────────────────── -->
        <div id="mouse-section" class="tab-section">
            <div class="state-section">
                <span class="section-label">Position</span>
                <div id="mouse-pos">
                    x: <span id="mx">—</span>&nbsp;&nbsp;y:
                    <span id="my">—</span>
                </div>
                <div id="mouse-pills" class="pills-row"></div>
            </div>
            <div class="divider"></div>
            <div id="mouse-log" class="event-log"></div>
        </div>

        <script>
            "use strict";

            document.addEventListener("contextmenu", (e) => e.preventDefault());

            function sendToHost(msg) {
                const s = typeof msg === "string" ? msg : JSON.stringify(msg);
                if (window.chrome?.webview) {
                    window.chrome.webview.postMessage(s);
                } else {
                    window.webkit.messageHandlers.msKeys.postMessage(s);
                }
            }

            // ── Drag ──────────────────────────────────────────────────────
            (function () {
                let _drag = null;
                document
                    .getElementById("titlebar")
                    .addEventListener("mousedown", (e) => {
                        if (e.target.closest(".tb-btn")) return;
                        _drag = { ox: e.screenX, oy: e.screenY };
                        const onMove = (ev) => {
                            if (!_drag) return;
                            sendToHost({
                                action: "move",
                                dx: ev.screenX - _drag.ox,
                                dy: ev.screenY - _drag.oy,
                            });
                            _drag.ox = ev.screenX;
                            _drag.oy = ev.screenY;
                        };
                        const onUp = () => {
                            _drag = null;
                            window.removeEventListener("mousemove", onMove);
                            window.removeEventListener("mouseup", onUp);
                        };
                        window.addEventListener("mousemove", onMove);
                        window.addEventListener("mouseup", onUp);
                    });
            })();

            // ── Tab switching ──────────────────────────────────────────────
            function switchTab(tab) {
                document
                    .querySelectorAll(".tab")
                    .forEach((t) =>
                        t.classList.toggle("active", t.id === "tab-" + tab),
                    );
                document
                    .querySelectorAll(".tab-section")
                    .forEach((s) =>
                        s.classList.toggle("active", s.id === tab + "-section"),
                    );
                // Scroll the newly-visible log to the bottom.
                const log = document.getElementById(tab + "-log");
                if (log) log.scrollTop = log.scrollHeight;
            }

            // ── Constants ─────────────────────────────────────────────────
            const MAX_ENTRIES = 300;
            const NEAR_BOTTOM = 48;
            const BTN_NAMES = {
                0: "Left",
                1: "Right",
                2: "Middle",
                3: "Btn4",
                4: "Btn5",
            };

            function btnName(n) {
                return BTN_NAMES[n] ?? "M" + n;
            }

            function isNearBottom(el) {
                return (
                    el.scrollHeight - el.scrollTop - el.clientHeight <=
                    NEAR_BOTTOM
                );
            }

            // ── Entry builder ─────────────────────────────────────────────
            function buildRow(entry) {
                const row = document.createElement("div");
                const t = entry.type;

                if (t === "mousemove") {
                    row.className = "entry move-entry";
                    row.append(
                        mkSpan("ts", "[" + (entry.ts || "") + "]"),
                        mkSpan("arrow arrow-move", "→"),
                        mkSpan("move-name", entry.x + ", " + entry.y),
                    );
                    return row;
                }

                row.className = "entry";
                row.appendChild(mkSpan("ts", "[" + (entry.ts || "") + "]"));

                if (t === "key") {
                    row.append(
                        mkSpan(
                            "arrow " + (entry.down ? "arrow-down" : "arrow-up"),
                            entry.down ? "↓" : "↑",
                        ),
                        mkSpan("key-name", entry.key || ""),
                    );
                } else if (t === "mouse") {
                    row.append(
                        mkSpan(
                            "arrow " +
                                (entry.down ? "arrow-mouse" : "arrow-up"),
                            entry.down ? "↓" : "↑",
                        ),
                        mkSpan("mouse-name", btnName(entry.button)),
                        mkSpan("pos-dim", "  " + entry.x + ", " + entry.y),
                    );
                } else if (t === "scroll") {
                    row.append(
                        mkSpan(
                            "arrow arrow-scroll",
                            entry.direction === "up" ? "↑" : "↓",
                        ),
                        mkSpan(
                            "scroll-name",
                            "scroll " +
                                entry.direction +
                                (entry.amount > 1 ? " ×" + entry.amount : ""),
                        ),
                    );
                }

                return row;
            }

            function mkSpan(cls, text) {
                const s = document.createElement("span");
                s.className = cls;
                s.textContent = text;
                return s;
            }

            // ── Route entry to the correct log ────────────────────────────
            function appendEntry(entry) {
                const t = entry.type;
                const isMouseSide =
                    t === "mouse" || t === "scroll" || t === "mousemove";
                const log = document.getElementById(
                    isMouseSide ? "mouse-log" : "keys-log",
                );
                const atBottom = isNearBottom(log);
                log.appendChild(buildRow(entry));
                while (log.childElementCount > MAX_ENTRIES)
                    log.removeChild(log.firstElementChild);
                if (atBottom) log.scrollTop = log.scrollHeight;
            }

            function loadHistory(entries) {
                const kl = document.getElementById("keys-log");
                const ml = document.getElementById("mouse-log");
                kl.innerHTML = ml.innerHTML = "";
                const kf = document.createDocumentFragment();
                const mf = document.createDocumentFragment();
                (entries || []).forEach((e) => {
                    const isMouseSide =
                        e.type === "mouse" ||
                        e.type === "scroll" ||
                        e.type === "mousemove";
                    (isMouseSide ? mf : kf).appendChild(buildRow(e));
                });
                kl.appendChild(kf);
                ml.appendChild(mf);
                kl.scrollTop = kl.scrollHeight;
                ml.scrollTop = ml.scrollHeight;
            }

            // ── Active keys pills ─────────────────────────────────────────
            function updateActiveKeys(names) {
                const row = document.getElementById("keys-pills");
                row.innerHTML = "";
                (names || []).forEach((name) => {
                    const p = document.createElement("span");
                    p.className = "pill";
                    p.textContent = name;
                    row.appendChild(p);
                });
            }

            // ── Mouse state (position + active buttons) ───────────────────
            function updateMouseState(state) {
                if (state.x != null)
                    document.getElementById("mx").textContent = state.x;
                if (state.y != null)
                    document.getElementById("my").textContent = state.y;
                const row = document.getElementById("mouse-pills");
                row.innerHTML = "";
                const btns = Array.isArray(state.buttons)
                    ? state.buttons
                    : Object.values(state.buttons || {});
                btns.forEach((b) => {
                    const p = document.createElement("span");
                    p.className = "pill pill-mouse";
                    p.textContent = btnName(b);
                    row.appendChild(p);
                });
            }

            function updateMousePos(pos) {
                if (pos.x != null)
                    document.getElementById("mx").textContent = pos.x;
                if (pos.y != null)
                    document.getElementById("my").textContent = pos.y;
            }

            // ── Button actions ────────────────────────────────────────────
            function clearLog() {
                document.getElementById("keys-log").innerHTML = "";
                document.getElementById("mouse-log").innerHTML = "";
                sendToHost({ action: "clear" });
            }

            function closePanel() {
                sendToHost({ action: "close" });
            }
        </script>
    </body>
</html>
