422|        <script>
423|            "use strict";
424|
425|            document.addEventListener("contextmenu", (e) => e.preventDefault());

427|            // ── Constants ─────────────────────────────────────────────────────────
428|            const MAX_ENTRIES = 500;
429|            const SCROLL_THRESH = 60;
430|
431|            // ── Host bridge ───────────────────────────────────────────────────────
432|            function sendToHost(msg) {
433|                const s = typeof msg === "string" ? msg : JSON.stringify(msg);
434|                try {
435|                    window.webkit.messageHandlers.msConsole.postMessage(s);
436|                } catch (e) {}
437|            }

439|            function playSlot(slot) {
440|                sendToHost({ action: "playSlot", slot });
441|            }

443|            // ── Time helpers ──────────────────────────────────────────────────────
444|            function pad2(n) {
445|                return String(n).padStart(2, "0");
446|            }
447|
448|            function nowTs() {
449|                const d = new Date();
450|                return (
451|                    pad2(d.getHours()) +
452|                    ":" +
453|                    pad2(d.getMinutes()) +
454|                    ":" +
455|                    pad2(d.getSeconds())
456|                );
457|            }
458|
459|            // ── Scroll helper ─────────────────────────────────────────────────────
460|            function isNearBottom() {
461|                const log = document.getElementById("log");
462|                return (
463|                    log.scrollHeight - log.scrollTop - log.clientHeight <
464|                    SCROLL_THRESH
465|                );
466|            }
467|
468|            // ── Badge labels ──────────────────────────────────────────────────────
469|            const LABELS = {
470|                print: "print",
471|                result: "result",
472|                error: "error",
473|                macro: "macro",
474|                input: "input",
475|                key: "key",
476|                mouse: "mouse",
477|            };
478|
479|            // ── appendEntry ───────────────────────────────────────────────────────
480|            // entry = { ts?, type, msg?, label?, parentLabel?, trigger? }
481|            // types: "print" | "result" | "error" | "macro" | "input" | "key" | "mouse"
482|            function appendEntry(entry) {
483|                const log = document.getElementById("log");
484|                const near = isNearBottom();
485|
486|                const type = entry.type || "print";
487|                const ts = entry.ts || nowTs();
488|
489|                // Build row
490|                const row = document.createElement("div");
491|                row.className = "entry entry-" + type;
492|
493|                // Timestamp
494|                const tsEl = document.createElement("span");
495|                tsEl.className = "ts";
496|                tsEl.textContent = ts;
497|                row.appendChild(tsEl);
498|
499|                // Badge
500|                const badge = document.createElement("span");
501|                badge.className = "badge badge-" + type;
502|                badge.textContent = LABELS[type] ?? type;
503|                row.appendChild(badge);
504|
505|                // Message
506|                const msgEl = document.createElement("span");
507|                msgEl.className = "msg";
508|
509|                if (type === "key" || type === "mouse") {
510|                    msgEl.textContent = "";
511|                } else if (type === "macro") {
512|                    msgEl.textContent = entry.parentLabel
513|                        ? entry.parentLabel + " \u203a " + (entry.label || "")
514|                        : entry.label || entry.id || "";
515|                } else if (type === "input") {
516|                    msgEl.textContent = "> " + String(entry.msg ?? "");
517|                } else {
518|                    msgEl.textContent = String(entry.msg ?? "");
519|                }
520|
521|                row.appendChild(msgEl);
522|
523|                // Trigger pill (macro type only)
524|                if (type === "macro" && entry.trigger) {
525|                    const pill = document.createElement("span");
526|                    pill.className = "pill";
527|                    pill.textContent = entry.trigger;
528|                    row.appendChild(pill);
529|                }
530|
531|                log.appendChild(row);
532|
533|                // Trim oldest entries beyond the cap
534|                while (log.children.length > MAX_ENTRIES) {
535|                    log.removeChild(log.firstChild);
536|                }
537|
538|                if (near) log.scrollTop = log.scrollHeight;
539|            }
540|
541|            // ── loadHistory ───────────────────────────────────────────────────────
542|            // Clears log, appends last MAX_ENTRIES entries, scrolls to bottom
543|            function loadHistory(entries) {
544|                const log = document.getElementById("log");
545|                log.innerHTML = "";
546|                if (Array.isArray(entries)) {
547|                    for (const e of entries.slice(-MAX_ENTRIES)) {
548|                        appendEntry(e);
549|                    }
550|                }
551|                log.scrollTop = log.scrollHeight;
552|            }
553|
554|            // ── Actions ───────────────────────────────────────────────────────────
555|            function doRun() {
556|                const input = document.getElementById("code-input");
557|                const code = input.value.trim();
558|                if (!code) return;
559|                appendEntry({ ts: nowTs(), type: "input", msg: code });
560|                sendToHost({ action: "execute", code });
561|                input.value = "";
562|            }

564|            function doClear() {
565|                document.getElementById("log").innerHTML = "";
566|                sendToHost({ action: "clear" });
567|            }

571|            }

574|            document
575|                .getElementById("code-input")
576|                .addEventListener("keydown", (e) => {
577|                    if (e.key === "Enter") {

579|                        doRun();
580|                    }
581|                });

583|            // ── Drag to move ──────────────────────────────────────────────────────
584|            (function () {
585|                let _drag = null;
586|                document
587|                    .getElementById("header")
588|                    .addEventListener("mousedown", (e) => {
589|                        if (e.button !== 0) return;
590|                        if (e.target.closest(".header-btns")) return;
591|                        _drag = { ox: e.screenX, oy: e.screenY };
592|                        const onMove = (ev) => {
593|                            if (!_drag) return;
594|                            sendToHost({
595|                                action: "move",
596|                                dx: ev.screenX - _drag.ox,
597|                                dy: ev.screenY - _drag.oy,
598|                            });
599|                            _drag.ox = ev.screenX;
600|                            _drag.oy = ev.screenY;
601|                        };
602|                        const onUp = () => {
603|                            _drag = null;
604|                            window.removeEventListener("mousemove", onMove);
605|                            window.removeEventListener("mouseup", onUp);
606|                        };
607|                        window.addEventListener("mousemove", onMove);
608|                        window.addEventListener("mouseup", onUp);
609|                    });
610|            })();

612|            // ── Theme injection ───────────────────────────────────────────────────
            // Parse #rrggbb or #rgb -> { r, g, b }
            function hexToRgb(hex) {
                hex = hex.replace(/^#/, "");
                if (hex.length === 3) hex = hex[0]+hex[0]+hex[1]+hex[1]+hex[2]+hex[2];
                const n = parseInt(hex, 16);
                return { r: (n >> 16) & 255, g: (n >> 8) & 255, b: n & 255 };
            }

            function applyTheme(t) {
                if (!t) return;
                const r = document.documentElement.style;
                if (t.bg) r.setProperty("--bg", t.bg);
                if (t.surface) r.setProperty("--surface", t.surface);
                if (t.surface2) r.setProperty("--surface2", t.surface2);
                if (t.hover) r.setProperty("--hover", t.hover);
                if (t.accent) r.setProperty("--accent", t.accent);
                if (t.accentHi) r.setProperty("--accent-hi", t.accentHi);
                if (t.success) r.setProperty("--success", t.success);
                if (t.dangerBg) r.setProperty("--danger-bg", t.dangerBg);
                if (t.danger) r.setProperty("--danger", t.danger);
                if (t.warning) r.setProperty("--warning", t.warning);
                if (t.text) r.setProperty("--text", t.text);
                // Derived: text2/text3 from text
                if (t.text && !t.text2) {
                    const c = hexToRgb(t.text);
                    if (c) r.setProperty("--text2", `rgba(${c.r},${c.g},${c.b},0.85)`);
                }
                if (t.text && !t.text3) {
                    const c = hexToRgb(t.text);
                    if (c) r.setProperty("--text3", `rgba(${c.r},${c.g},${c.b},0.55)`);
                }
                // Derived: border from accent + hover mix
                if (t.accent && t.hover && !t.border) {
                    const a = hexToRgb(t.accent);
                    const h = hexToRgb(t.hover);
                    if (a && h) {
                        const mr = Math.round(a.r * 0.5 + h.r * 0.5);
                        const mg = Math.round(a.g * 0.5 + h.g * 0.5);
                        const mb = Math.round(a.b * 0.5 + h.b * 0.5);
                        r.setProperty("--border", `rgba(${mr},${mg},${mb},0.55)`);
                        r.setProperty("--border-dim", `rgba(${mr},${mg},${mb},0.18)`);
                    }
                }
                // Derived: accent glow
                if (t.accent && !t.accentGlow) {
                    const a = hexToRgb(t.accent);
                    if (a) r.setProperty("--accent-glow", `rgba(${a.r},${a.g},${a.b},0.4)`);
                }
                if (t.accent && !t.accentGlowFaint) {
                    const a = hexToRgb(t.accent);
                    if (a) r.setProperty("--accent-glow-faint", `rgba(${a.r},${a.g},${a.b},0.12)`);
                }
                // Derived: danger glow/border
                if (t.danger && !t.dangerGlow) {
                    const d = hexToRgb(t.danger);
                    if (d) r.setProperty("--danger-glow", `rgba(${d.r},${d.g},${d.b},0.6)`);
                }
                if (t.danger && !t.dangerBorder) {
                    const d = hexToRgb(t.danger);
                    if (d) r.setProperty("--danger-border", `rgba(${d.r},${d.g},${d.b},0.3)`);
                }
                // Explicit overrides
                if (t.text2) r.setProperty("--text2", t.text2);
                if (t.text3) r.setProperty("--text3", t.text3);
                if (t.border) r.setProperty("--border", t.border);
                if (t.borderDim) r.setProperty("--border-dim", t.borderDim);
                if (t.accentGlow) r.setProperty("--accent-glow", t.accentGlow);

                if (t.dangerGlow) r.setProperty("--danger-glow", t.dangerGlow);
