<!doctype html>
<html lang="en">
    <head>
        <meta charset="UTF-8" />
        <style>
            :root {
                --bg: #060402;
                --surface: #100806;
                --surface2: #1c100c;
                --border: rgba(130, 50, 22, 0.55);
                --accent: #c41a1a;
                --text: #f0ddb0;
                --text2: rgba(210, 165, 100, 0.75);
                --mouse: #c47820;
                --radius: 3px;
                --col-result: #4a7820;
                --col-error: #d42020;
            }

            *,
            *::before,
            *::after {
                box-sizing: border-box;
                margin: 0;
                padding: 0;
                user-select: none;
                -webkit-user-select: none;
            }

            html,
            body {
                width: 100%;
                height: 100%;
                background: var(--bg);
                color: var(--text);
                font-family: "Almendra", Palatino, Georgia, serif;
                font-size: 13px;
                line-height: 1.6;
                overflow: hidden;
            }

            /* ── Titlebar ───────────────────────────────────────────────── */
            #titlebar {
                height: 32px;
                -webkit-app-region: drag;
                display: flex;
                align-items: center;
                padding: 0 10px 0 16px;
                border-bottom: 1px solid var(--border);
                flex-shrink: 0;
                background: var(--surface);
            }

            #titlebar-title {
                font-size: 11px;
                font-weight: 700;
                letter-spacing: 1.5px;
                text-transform: uppercase;
                color: var(--text2);
                flex: 1;
            }

            #titlebar-btns {
                display: flex;
                align-items: center;
                gap: 5px;
                -webkit-app-region: no-drag;
            }

            /* ── Buttons (shared) ───────────────────────────────────────── */
            button {
                height: 20px;
                padding: 0 9px;
                border-radius: var(--radius);
                border: 1px solid var(--border);
                background: var(--surface2);
                color: var(--text2);
                font-family: inherit;
                font-size: 11px;
                font-weight: 500;
                cursor: pointer;
                transition:
                    background 0.15s,
                    border-color 0.15s,
                    color 0.15s;
                -webkit-app-region: no-drag;
            }

            button:hover {
                background: var(--surface);
                border-color: var(--accent);
                color: var(--text);
            }

            button.btn-close {
                color: var(--col-error);
                border-color: rgba(212, 32, 32, 0.45);
            }

            button.btn-close:hover {
                background: rgba(212, 32, 32, 0.15);
                border-color: var(--col-error);
                color: var(--col-error);
            }

            /* ── Shell (everything below titlebar) ──────────────────────── */
            #shell {
                display: flex;
                flex-direction: column;
                height: calc(100% - 32px);
            }

            /* ── Log area ───────────────────────────────────────────────── */
            #log {
                flex: 1;
                overflow-y: auto;
                overflow-x: hidden;
                padding: 6px 12px 4px;
                min-height: 0;
                scrollbar-width: thin;
                scrollbar-color: var(--border) transparent;
            }

            #log::-webkit-scrollbar {
                width: 5px;
            }

            #log::-webkit-scrollbar-track {
                background: transparent;
            }

            #log::-webkit-scrollbar-thumb {
                background: var(--border);
                border-radius: var(--radius);
            }

            /* ── Log entry ──────────────────────────────────────────────── */
            .entry {
                display: flex;
                align-items: baseline;
                gap: 7px;
                padding: 2px 0;
                line-height: 1.5;
                flex-wrap: wrap;
            }

            .entry + .entry {
                border-top: 1px solid rgba(130, 50, 22, 0.15);
            }

            .ts {
                font-size: 11px;
                color: var(--text2);
                flex-shrink: 0;
                font-family: "SF Mono", Menlo, monospace;
                letter-spacing: 0.2px;
            }

            .badge {
                font-size: 10px;
                font-weight: 700;
                letter-spacing: 0.4px;
                text-transform: uppercase;
                padding: 0 5px;
                border-radius: var(--radius);
                border: 1px solid;
                flex-shrink: 0;
                line-height: 1.55;
            }

            .badge-print {
                color: var(--text2);
                border-color: rgba(210, 165, 100, 0.28);
                background: rgba(210, 165, 100, 0.06);
            }

            .badge-result {
                color: var(--col-result);
                border-color: rgba(74, 120, 32, 0.5);
                background: rgba(74, 120, 32, 0.1);
            }

            .badge-error {
                color: var(--col-error);
                border-color: rgba(212, 32, 32, 0.5);
                background: rgba(212, 32, 32, 0.1);
            }

            .badge-macro {
                color: var(--accent);
                border-color: rgba(196, 26, 26, 0.5);
                background: rgba(196, 26, 26, 0.1);
            }

            .badge-key {
                color: var(--text2);
                border-color: rgba(210, 165, 100, 0.28);
                background: rgba(210, 165, 100, 0.06);
            }

            .badge-mouse {
                color: var(--mouse);
                border-color: rgba(196, 120, 32, 0.4);
                background: rgba(196, 120, 32, 0.08);
            }

            .badge-input {
                color: var(--text2);
                border-color: rgba(210, 165, 100, 0.18);
                background: transparent;
                opacity: 0.65;
            }

            .msg {
                color: var(--text);
                flex: 1;
                min-width: 0;
                word-break: break-all;
            }

            /* monospace for result / error / input */
            .entry-result .msg,
            .entry-error .msg,
            .entry-input .msg {
                font-family: "SF Mono", Menlo, monospace;
                font-size: 12px;
            }

            .entry-error .msg {
                color: var(--col-error);
            }

            .entry-input .msg {
                color: var(--text2);
                font-style: italic;
            }

            /* ── Input bar ──────────────────────────────────────────────── */
            #inputbar {
                height: 40px;
                display: flex;
                align-items: center;
                gap: 8px;
                padding: 0 10px 0 12px;
                border-top: 1px solid var(--border);
                background: var(--surface);
                flex-shrink: 0;
            }

            #code-input {
                flex: 1;
                height: 26px;
                background: var(--surface2);
                border: 1px solid var(--border);
                border-radius: var(--radius);
                color: var(--text);
                font-family: "SF Mono", Menlo, monospace;
                font-size: 12px;
                padding: 0 10px;
                outline: none;
                user-select: text;
                -webkit-user-select: text;
                transition: border-color 0.15s;
            }

            #code-input::placeholder {
                color: var(--text2);
                opacity: 0.55;
            }

            #code-input:focus {
                border-color: var(--accent);
            }

            #run-btn {
                height: 26px;
                padding: 0 12px;
                font-size: 11px;
                background: rgba(196, 26, 26, 0.14);
                border-color: var(--accent);
                color: var(--accent);
            }

            #run-btn:hover {
                background: rgba(196, 26, 26, 0.28);
                border-color: var(--accent);
                color: var(--text);
            }
        </style>
    </head>
    <body>
        <!-- Titlebar -->
        <div id="titlebar">
            <span id="titlebar-title">mudscript — console</span>
            <div id="titlebar-btns">
                <button
                    onmouseenter="playSlot('hover')"
                    onclick="
                        playSlot('interact');
                        doClear();
                    "
                >
                    [clear]
                </button>
                <button
                    class="btn-close"
                    onmouseenter="playSlot('hover')"
                    onclick="
                        playSlot('interact');
                        send({ action: 'close' });
                    "
                >
                    [&times;]
                </button>
            </div>
        </div>

        <!-- Shell -->
        <div id="shell">
            <div id="log"></div>
            <div id="inputbar">
                <input
                    id="code-input"
                    type="text"
                    placeholder="> enter lua…"
                    autocomplete="off"
                    spellcheck="false"
                />
                <button id="run-btn" onclick="doRun()">[run]</button>
            </div>
        </div>

        <script>
            "use strict";

            const MAX_ENTRIES = 500;
            const SCROLL_THRESH = 60;
            let _dragging = false;
            let _dragX = 0;
            let _dragY = 0;

            // ── Utilities ─────────────────────────────────────────────────
            function sendToHost(msg) {
                const s = typeof msg === "string" ? msg : JSON.stringify(msg);
                if (window.chrome?.webview) {
                    window.chrome.webview.postMessage(s);
                } else {
                    window.webkit.messageHandlers.msConsole.postMessage(s);
                }
            }

            function playSlot(slot) {
                sendToHost({ action: "playSlot", slot });
            }

            function send(obj) {
                sendToHost(obj);
            }

            function pad2(n) {
                return String(n).padStart(2, "0");
            }

            function nowTs() {
                const d = new Date();
                return (
                    pad2(d.getHours()) +
                    ":" +
                    pad2(d.getMinutes()) +
                    ":" +
                    pad2(d.getSeconds())
                );
            }

            function isNearBottom() {
                const log = document.getElementById("log");
                return (
                    log.scrollHeight - log.scrollTop - log.clientHeight <=
                    SCROLL_THRESH
                );
            }

            // ── appendEntry ───────────────────────────────────────────────
            // entry = { ts?: string, type?: string, msg: string }
            function appendEntry(entry) {
                const log = document.getElementById("log");
                const near = isNearBottom();

                const type = entry.type || "print";
                const ts = entry.ts || nowTs();

                const BTN = {
                    0: "Left",
                    1: "Right",
                    2: "Middle",
                    3: "Btn4",
                    4: "Btn5",
                };

                const LABELS = {
                    print: "print",
                    result: "result",
                    error: "error",
                    macro: "macro",
                    input: "input",
                    key: "key",
                    mouse: "mouse",
                };

                // KEY and MOUSE are badge-only; details live in the Input Monitor.
                // MACRO keeps its label. PRINT/ERROR show their full text.
                let msg;
                if (type === "key" || type === "mouse") {
                    msg = "";
                } else if (type === "macro") {
                    const label = entry.parentLabel
                        ? entry.parentLabel + " \u203a " + (entry.label || "")
                        : entry.label || entry.id || "";
                    msg = entry.trigger ? label + "  " + entry.trigger : label;
                } else {
                    msg =
                        type === "input"
                            ? "> " + String(entry.msg ?? "")
                            : String(entry.msg ?? "");
                }

                const row = document.createElement("div");
                row.className = "entry entry-" + type;

                const tsEl = document.createElement("span");
                tsEl.className = "ts";
                tsEl.textContent = "[" + ts + "]";

                const badge = document.createElement("span");
                badge.className = "badge badge-" + type;
                badge.textContent = LABELS[type] ?? type;

                const msgEl = document.createElement("span");
                msgEl.className = "msg";
                msgEl.textContent = msg;

                row.appendChild(tsEl);
                row.appendChild(badge);
                row.appendChild(msgEl);
                log.appendChild(row);

                // Trim oldest entries beyond the cap
                while (log.children.length > MAX_ENTRIES) {
                    log.removeChild(log.firstChild);
                }

                if (near) {
                    log.scrollTop = log.scrollHeight;
                }
            }

            // ── loadHistory ───────────────────────────────────────────────
            // entries = array of entry objects — bulk-loads on panel open
            function loadHistory(entries) {
                const log = document.getElementById("log");
                log.innerHTML = "";
                if (Array.isArray(entries)) {
                    const slice = entries.slice(-MAX_ENTRIES);
                    for (const e of slice) {
                        appendEntry(e);
                    }
                }
                log.scrollTop = log.scrollHeight;
            }

            // ── Actions ───────────────────────────────────────────────────
            function doRun() {
                const input = document.getElementById("code-input");
                const code = input.value.trim();
                if (!code) return;
                appendEntry({ ts: nowTs(), type: "input", msg: code });
                send({ action: "execute", code });
                input.value = "";
            }

            function doClear() {
                document.getElementById("log").innerHTML = "";
                send({ action: "clear" });
            }

            // ── Input bar key handling ─────────────────────────────────────
            document
                .getElementById("code-input")
                .addEventListener("keydown", (e) => {
                    if (e.key === "Enter") {
                        e.preventDefault();
                        doRun();
                    }
                });

            // ── Drag to move window ───────────────────────────────────────
            document
                .getElementById("titlebar")
                .addEventListener("mousedown", (e) => {
                    if (e.button !== 0) return;
                    if (e.target.closest("#titlebar-btns")) return;
                    _dragging = true;
                    _dragX = e.screenX;
                    _dragY = e.screenY;
                });

            document.addEventListener("mousemove", (e) => {
                if (!_dragging) return;
                const dx = e.screenX - _dragX;
                const dy = e.screenY - _dragY;
                _dragX = e.screenX;
                _dragY = e.screenY;
                if (dx !== 0 || dy !== 0) {
                    send({ action: "move", dx, dy });
                }
            });

            document.addEventListener("mouseup", () => {
                _dragging = false;
            });
            document.addEventListener("mouseleave", () => {
                _dragging = false;
            });

            // ── Suppress native context menu ──────────────────────────────
            document.addEventListener("contextmenu", (e) => e.preventDefault());
        </script>
    </body>
</html>
