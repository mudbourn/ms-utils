<!doctype html>
<html lang="en">
    <head>
        <meta charset="UTF-8" />
        <style>
            /* ── Fonts ─────────────────────────────────────────────────────────── */
            @font-face {
                font-family: "Almendra";
                src: url("./fonts/Almendra-Regular.ttf") format("truetype");
                font-weight: 400;
                font-style: normal;
            }
            @font-face {
                font-family: "Almendra";
                src: url("./fonts/Almendra-Bold.ttf") format("truetype");
                font-weight: 700;
                font-style: normal;
            }
            @font-face {
                font-family: "Almendra";
                src: url("./fonts/Almendra-Italic.ttf") format("truetype");
                font-weight: 400;
                font-style: italic;
            }
            @font-face {
                font-family: "Almendra";
                src: url("./fonts/Almendra-BoldItalic.ttf") format("truetype");
                font-weight: 700;
                font-style: italic;
            }

            /* ── Tokens ─────────────────────────────────────────────────────────── */
            :root {
                --bg: #0e0e0e;
                --surface: #1a1a1a;
                --surface2: #252525;
                --hover: #333333;
                --accent: #cccccc;
                --accent-hi: #e8e8e8;
                --success: #888888;
                --danger-bg: #1a1616;
                --danger: #d8d8d8;
                --warning: #aaaaaa;
                --text: #d8d8d8;
                --text2: rgba(200, 200, 200, 0.85);
                --text3: rgba(160, 160, 160, 0.55);
                --border: rgba(100, 100, 100, 0.55);
                --border-dim: rgba(100, 100, 100, 0.18);
                --radius: 2px;
                --radius-s: 1px;
            }

            /* ── Reset ──────────────────────────────────────────────────────────── */
            *,
            *::before,
            *::after {
                box-sizing: border-box;
                margin: 0;
                padding: 0;
                user-select: none;
                -webkit-user-select: none;
            }

            html,
            body {
                width: 100%;
                height: 100%;
                overflow: hidden;
                background: var(--bg);
                color: var(--text);
                font-family: "Almendra", Palatino, Georgia, serif;
                font-size: 13px;
                line-height: 1.5;
                -webkit-font-smoothing: antialiased;
            }

            body {
                display: flex;
                flex-direction: column;
            }

            button {
                cursor: pointer;
                border: none;
                background: none;
                color: inherit;
                font: inherit;
            }

            input {
                font: inherit;
                color: inherit;
                background: none;
                border: none;
                outline: none;
            }

            /* ── Header ─────────────────────────────────────────────────────────── */
            #header {
                display: flex;
                align-items: center;
                gap: 8px;
                padding: 10px 12px 8px;
                background: var(--surface);
                border-bottom: 1px solid var(--border);
                box-shadow: 0 1px 12px
                    color-mix(in srgb, var(--accent) 12%, transparent);
                flex-shrink: 0;
                -webkit-app-region: drag;
            }

            #panel-title {
                flex: 1;
                font-weight: 600;
                font-size: 13px;
            }

            .header-btns {
                display: flex;
                gap: 4px;
                -webkit-app-region: no-drag;
            }

            /* ── Ghost button ────────────────────────────────────────────────────── */
            .btn-ghost {
                flex: 1;
                padding: 5px 8px;
                border-radius: var(--radius-s);
                background: var(--surface2);
                color: var(--text2);
                font-size: 11px;
                font-weight: 500;
                transition: opacity 0.15s;
            }
            .btn-ghost:hover {
                opacity: 0.8;
            }

            /* In the header bar, ghost buttons should not stretch */
            .header-btns .btn-ghost {
                flex: 0 0 auto;
            }

            /* ── Close button ────────────────────────────────────────────────────── */
            .btn-close {
                width: 22px;
                height: 22px;
                border-radius: 50%;
                background: var(--surface2);
                color: var(--text2);
                font-size: 12px;
                display: flex;
                align-items: center;
                justify-content: center;
                transition: background 0.15s;
            }
            .btn-close:hover {
                background: var(--hover);
                color: var(--text);
            }

            /* ── Log area ────────────────────────────────────────────────────────── */
            #log {
                flex: 1;
                overflow-y: auto;
                overflow-x: hidden;
                padding: 4px 0;
                min-height: 0;
                scrollbar-width: thin;
                scrollbar-color: var(--border) transparent;
            }
            #log::-webkit-scrollbar {
                width: 5px;
            }
            #log::-webkit-scrollbar-track {
                background: transparent;
            }
            #log::-webkit-scrollbar-thumb {
                background: var(--border);
                border-radius: var(--radius);
            }

            /* ── Entry rows ──────────────────────────────────────────────────────── */
            .entry {
                display: flex;
                align-items: flex-start;
                gap: 6px;
                padding: 5px 12px;
                font-size: 12px;
                border-bottom: 1px solid var(--border-dim);
            }
            .entry:hover {
                background: var(--surface);
            }
            .entry.selected {
                background: var(--hover);
                outline: 1px solid var(--accent-glow);
            }
            .entry.selected:hover {
                background: var(--accent-glow-faint);
            }

            .ts {
                color: var(--text3);
                font:
                    10px "SF Mono",
                    Menlo,
                    monospace;
                flex-shrink: 0;
                padding-top: 1px;
                min-width: 52px;
            }

            /* ── Badges ──────────────────────────────────────────────────────────── */
            .badge {
                flex-shrink: 0;
                padding: 1px 5px;
                border-radius: var(--radius-s);
                font:
                    700 10px "SF Mono",
                    Menlo,
                    monospace;
                letter-spacing: 0.05em;
                text-transform: uppercase;
                border: 1px solid transparent;
            }

            .badge-print {
                background: var(--surface2);
                color: var(--text2);
                border-color: var(--border);
            }

            .badge-result {
                background: color-mix(in srgb, var(--success) 20%, transparent);
                color: var(--success);
                border-color: color-mix(
                    in srgb,
                    var(--success) 45%,
                    transparent
                );
            }

            .badge-error {
                background: color-mix(in srgb, var(--danger) 20%, transparent);
                color: var(--danger);
                border-color: color-mix(
                    in srgb,
                    var(--danger) 45%,
                    transparent
                );
            }

            .badge-macro {
                background: color-mix(in srgb, var(--accent) 20%, transparent);
                color: var(--accent);
                border-color: color-mix(
                    in srgb,
                    var(--accent) 45%,
                    transparent
                );
            }

            .badge-key {
                background: var(--surface2);
                color: var(--text2);
                border-color: var(--border);
            }

            .badge-mouse {
                background: color-mix(in srgb, var(--warning) 20%, transparent);
                color: var(--warning);
                border-color: color-mix(
                    in srgb,
                    var(--warning) 45%,
                    transparent
                );
            }

            .badge-input {
                background: transparent;
                color: var(--text2);
                font-style: italic;
                border-color: transparent;
            }

            .badge-sound {
                background: color-mix(in srgb, var(--accent) 15%, transparent);
                color: var(--accent);
                border-color: color-mix(
                    in srgb,
                    var(--accent) 40%,
                    transparent
                );
            }

            /* ── Message text ────────────────────────────────────────────────────── */
            .msg {
                flex: 1;
                word-break: break-word;
                white-space: pre-wrap;
            }

            .entry-result .msg,
            .entry-error .msg,
            .entry-input .msg {
                font:
                    12px "SF Mono",
                    Menlo,
                    monospace;
            }

            .entry-error .msg {
                color: var(--danger);
            }

            .entry-input .msg {
                color: var(--text2);
                font-style: italic;
            }

            /* ── Pill ────────────────────────────────────────────────────────────── */
            .pill {
                display: inline-flex;
                align-items: center;
                padding: 1px 7px;
                border-radius: 20px;
                font:
                    700 10px "SF Mono",
                    Menlo,
                    monospace;
                background: var(--surface2);
                border: 1px solid var(--border);
                color: var(--text2);
            }

            /* ── Input bar ───────────────────────────────────────────────────────── */
            #inputbar {
                display: flex;
                align-items: center;
                gap: 8px;
                padding: 8px 12px;
                background: var(--surface);
                border-top: 1px solid var(--border);
                flex-shrink: 0;
            }

            #code-input {
                flex: 1;
                background: var(--surface2);
                border: 1px solid var(--border);
                border-radius: var(--radius);
                padding: 5px 8px;
                color: var(--text);
                font:
                    12px "SF Mono",
                    Menlo,
                    monospace;
                outline: none;
                transition: border-color 0.15s;
                user-select: text;
                -webkit-user-select: text;
            }
            #code-input::placeholder {
                color: var(--text2);
                opacity: 0.55;
            }
            #code-input:focus {
                border-color: var(--accent);
            }

            #run-btn {
                padding: 5px 12px;
                border-radius: var(--radius);
                font-size: 11px;
                font-weight: 700;
                background: var(--accent);
                color: var(--bg);
                transition: opacity 0.15s;
                -webkit-app-region: no-drag;
            }
            #run-btn:hover {
                opacity: 0.85;
            }
        </style>
    </head>
    <body>
        <!-- Header -->
        <div id="header">
            <span id="panel-title">mudscript — console</span>
            <div class="header-btns">
                <button
                    class="btn-ghost"
                    onmouseenter="playSlot('hover')"
                    onclick="
                        playSlot('interact');
                        doClear();
                    "
                >
                    Clear
                </button>
                <button
                    class="btn-close"
                    onmouseenter="playSlot('hover')"
                    onclick="
                        playSlot('back');
                        closePanel();
                    "
                >
                    ✕
                </button>
            </div>
        </div>

        <!-- Log -->
        <div id="log"></div>

        <!-- Input bar -->
        <div id="inputbar">
            <input
                id="code-input"
                type="text"
                placeholder="> enter lua…"
                autocomplete="off"
                spellcheck="false"
            />
            <button
                id="run-btn"
                onmouseenter="playSlot('hover')"
                onclick="
                    playSlot('interact');
                    doRun();
                "
            >
                Run
            </button>
        </div>

        <script>
            "use strict";

            // ── Selection state ───────────────────────────────────────────────────
            const _selected = new Set();
            let _lastClicked = null;

            function _getEntries() {
                return Array.from(document.querySelectorAll("#log .entry, #log .step"));
            }

            function _updateSelectionVisuals() {
                for (const el of _getEntries()) {
                    el.classList.toggle("selected", _selected.has(el));
                }
            }

            function _handleEntryClick(e) {
                const row = e.currentTarget;
                const entries = _getEntries();
                const idx = entries.indexOf(row);
                if (idx === -1) return;
                playSlot("interact");

                if (e.shiftKey && _lastClicked !== null) {
                    const lo = Math.min(_lastClicked, idx);
                    const hi = Math.max(_lastClicked, idx);
                    for (let i = lo; i <= hi; i++) _selected.add(entries[i]);
                } else if (e.metaKey || e.ctrlKey) {
                    if (_selected.has(row)) _selected.delete(row);
                    else _selected.add(row);
                } else {
                    if (_selected.has(row) && _selected.size === 1) {
                        _selected.delete(row);
                    } else {
                        _selected.clear();
                        _selected.add(row);
                    }
                }
                _lastClicked = idx;
                _updateSelectionVisuals();
            }

            function _copySelected() {
                if (_selected.size === 0) return;
                const lines = [];
                for (const el of _getEntries()) {
                    if (_selected.has(el)) {
                        const ts = el.querySelector(".ts")?.textContent || "";
                        const msg = el.querySelector(".msg, .step-msg, .entry-app, .entry-title, .key-name, .mouse-name, .move-name, .scroll-name")?.textContent || "";
                        lines.push(`[${ts}] ${msg}`.trim());
                    }
                }
                const text = lines.join("\n");
                try { navigator.clipboard.writeText(text); } catch (_) {}
                playSlot("update");
            }


            // Right-click on entries: copy selected
            document.addEventListener("contextmenu", (e) => {
                const row = e.target.closest(".entry, .step");
                if (!row) return;
                e.preventDefault();
                if (!_selected.has(row)) {
                    _selected.clear();
                    _selected.add(row);
                    _updateSelectionVisuals();
                }
                _copySelected();
            });

            // ── Constants ─────────────────────────────────────────────────────────
            const MAX_ENTRIES = 500;
            const SCROLL_THRESH = 60;

            // ── Host bridge ───────────────────────────────────────────────────────
            function sendToHost(msg) {
                const s = typeof msg === "string" ? msg : JSON.stringify(msg);
                try {
                    window.webkit.messageHandlers.msConsole.postMessage(s);
                } catch (e) {}
            }

            function playSlot(slot) {
                sendToHost({ action: "playSlot", slot });
            }

            // ── Time helpers ──────────────────────────────────────────────────────
            function pad2(n) {
                return String(n).padStart(2, "0");
            }

            function nowTs() {
                const d = new Date();
                return (
                    pad2(d.getHours()) +
                    ":" +
                    pad2(d.getMinutes()) +
                    ":" +
                    pad2(d.getSeconds())
                );
            }

            // ── Scroll helper ─────────────────────────────────────────────────────
            function isNearBottom() {
                const log = document.getElementById("log");
                return (
                    log.scrollHeight - log.scrollTop - log.clientHeight <
                    SCROLL_THRESH
                );
            }

            // ── Badge labels ──────────────────────────────────────────────────────
            const LABELS = {
                print: "print",
                result: "result",
                error: "error",
                macro: "macro",
                input: "input",
                key: "key",
                mouse: "mouse",
            };

            // ── appendEntry ───────────────────────────────────────────────────────
            // entry = { ts?, type, msg?, label?, parentLabel?, trigger? }
            // types: "print" | "result" | "error" | "macro" | "input" | "key" | "mouse"
            function appendEntry(entry) {
                const log = document.getElementById("log");
                const near = isNearBottom();

                const type = entry.type || "print";
                const ts = entry.ts || nowTs();

                // Build row
                const row = document.createElement("div");
                row.className = "entry entry-" + type;

                // Timestamp
                const tsEl = document.createElement("span");
                tsEl.className = "ts";
                tsEl.textContent = ts;
                row.appendChild(tsEl);

                // Badge
                const badge = document.createElement("span");
                badge.className = "badge badge-" + type;
                badge.textContent = LABELS[type] ?? type;
                row.appendChild(badge);

                // Message
                const msgEl = document.createElement("span");
                msgEl.className = "msg";

                if (type === "key" || type === "mouse") {
                    msgEl.textContent = "";
                } else if (type === "macro") {
                    msgEl.textContent = entry.parentLabel
                        ? entry.parentLabel + " \u203a " + (entry.label || "")
                        : entry.label || entry.id || "";
                } else if (type === "input") {
                    msgEl.textContent = "> " + String(entry.msg ?? "");
                } else {
                    msgEl.textContent = String(entry.msg ?? "");
                }

                row.appendChild(msgEl);

                // Trigger pill (macro type only)
                if (type === "macro" && entry.trigger) {
                    const pill = document.createElement("span");
                    pill.className = "pill";
                    pill.textContent = entry.trigger;
                    row.appendChild(pill);
                }

                row.onmouseenter = function() { playSlot("hover"); };
                row.onclick = _handleEntryClick;
                log.appendChild(row);

                // Trim oldest entries beyond the cap
                while (log.children.length > MAX_ENTRIES) {
                    log.removeChild(log.firstChild);
                }

                if (near) log.scrollTop = log.scrollHeight;
            }

            // ── loadHistory ───────────────────────────────────────────────────────
            // Clears log, appends last MAX_ENTRIES entries, scrolls to bottom
            function loadHistory(entries) {
                const log = document.getElementById("log");
                log.innerHTML = "";
                if (Array.isArray(entries)) {
                    for (const e of entries.slice(-MAX_ENTRIES)) {
                        appendEntry(e);
                    }
                }
                log.scrollTop = log.scrollHeight;
            }

            // ── Actions ───────────────────────────────────────────────────────────
            function doRun() {
                const input = document.getElementById("code-input");
                const code = input.value.trim();
                if (!code) return;
                appendEntry({ ts: nowTs(), type: "input", msg: code });
                sendToHost({ action: "execute", code });
                input.value = "";
            }

            function doClear() {
                document.getElementById("log").innerHTML = "";
                sendToHost({ action: "clear" });
            }

            function closePanel() {
                sendToHost({ action: "close" });
            }

            // ── Input bar: Enter to run ────────────────────────────────────────────
            document
                .getElementById("code-input")
                .addEventListener("keydown", (e) => {
                    if (e.key === "Enter") {
                        e.preventDefault();
                        doRun();
                    }
                });

            // ── Drag to move ──────────────────────────────────────────────────────
            (function () {
                let _drag = null;
                document
                    .getElementById("header")
                    .addEventListener("mousedown", (e) => {
                        if (e.button !== 0) return;
                        if (e.target.closest(".header-btns")) return;
                        _drag = { ox: e.screenX, oy: e.screenY };
                        const onMove = (ev) => {
                            if (!_drag) return;
                            sendToHost({
                                action: "move",
                                dx: ev.screenX - _drag.ox,
                                dy: ev.screenY - _drag.oy,
                            });
                            _drag.ox = ev.screenX;
                            _drag.oy = ev.screenY;
                        };
                        const onUp = () => {
                            _drag = null;
                            window.removeEventListener("mousemove", onMove);
                            window.removeEventListener("mouseup", onUp);
                        };
                        window.addEventListener("mousemove", onMove);
                        window.addEventListener("mouseup", onUp);
                    });
            })();

            // ── Theme injection ───────────────────────────────────────────────────
            // Parse #rrggbb or #rgb → { r, g, b }
            function hexToRgb(hex) {
                hex = hex.replace(/^#/, "");
                if (hex.length === 3) hex = hex[0]+hex[0]+hex[1]+hex[1]+hex[2]+hex[2];
                const n = parseInt(hex, 16);
                return { r: (n >> 16) & 255, g: (n >> 8) & 255, b: n & 255 };
            }

            function applyTheme(t) {
                if (!t) return;
                const r = document.documentElement.style;
                if (t.bg) r.setProperty("--bg", t.bg);
                if (t.surface) r.setProperty("--surface", t.surface);
                if (t.surface2) r.setProperty("--surface2", t.surface2);
                if (t.hover) r.setProperty("--hover", t.hover);
                if (t.accent) r.setProperty("--accent", t.accent);
                if (t.accentHi) r.setProperty("--accent-hi", t.accentHi);
                if (t.success) r.setProperty("--success", t.success);
                if (t.dangerBg) r.setProperty("--danger-bg", t.dangerBg);
                if (t.danger) r.setProperty("--danger", t.danger);
                if (t.warning) r.setProperty("--warning", t.warning);
                if (t.text) r.setProperty("--text", t.text);
                // Derived: text2/text3 from text
                if (t.text && !t.text2) {
                    const c = hexToRgb(t.text);
                    if (c) r.setProperty("--text2", `rgba(${c.r},${c.g},${c.b},0.85)`);
                }
                if (t.text && !t.text3) {
                    const c = hexToRgb(t.text);
                    if (c) r.setProperty("--text3", `rgba(${c.r},${c.g},${c.b},0.55)`);
                }
                // Derived: border from accent + hover mix
                if (t.accent && t.hover && !t.border) {
                    const a = hexToRgb(t.accent);
                    const h = hexToRgb(t.hover);
                    if (a && h) {
                        const mr = Math.round(a.r * 0.5 + h.r * 0.5);
                        const mg = Math.round(a.g * 0.5 + h.g * 0.5);
                        const mb = Math.round(a.b * 0.5 + h.b * 0.5);
                        r.setProperty("--border", `rgba(${mr},${mg},${mb},0.55)`);
                        r.setProperty("--border-dim", `rgba(${mr},${mg},${mb},0.18)`);
                    }
                }
                // Derived: accent glow
                if (t.accent && !t.accentGlow) {
                    const a = hexToRgb(t.accent);
                    if (a) r.setProperty("--accent-glow", `rgba(${a.r},${a.g},${a.b},0.4)`);
                }
                if (t.accent && !t.accentGlowFaint) {
                    const a = hexToRgb(t.accent);
                    if (a) r.setProperty("--accent-glow-faint", `rgba(${a.r},${a.g},${a.b},0.12)`);
                }
                // Derived: danger glow/border
                if (t.danger && !t.dangerGlow) {
                    const d = hexToRgb(t.danger);
                    if (d) r.setProperty("--danger-glow", `rgba(${d.r},${d.g},${d.b},0.6)`);
                }
                if (t.danger && !t.dangerBorder) {
                    const d = hexToRgb(t.danger);
                    if (d) r.setProperty("--danger-border", `rgba(${d.r},${d.g},${d.b},0.3)`);
                }
                // Explicit overrides
                if (t.text2) r.setProperty("--text2", t.text2);
                if (t.text3) r.setProperty("--text3", t.text3);
                if (t.border) r.setProperty("--border", t.border);
                if (t.borderDim) r.setProperty("--border-dim", t.borderDim);
                if (t.accentGlow) r.setProperty("--accent-glow", t.accentGlow);
                if (t.accentGlowFaint) r.setProperty("--accent-glow-faint", t.accentGlowFaint);
                if (t.dangerGlow) r.setProperty("--danger-glow", t.dangerGlow);
                if (t.dangerBorder) r.setProperty("--danger-border", t.dangerBorder);
                if (t.radius !== undefined) {
                    r.setProperty("--radius", t.radius + "px");
                    r.setProperty("--radius-s", Math.max(0, t.radius - 1) + "px");
                }
                if (t.font) {
                    if (t.fontURL) {
                        let el = document.getElementById("_ms-custom-font");
                        if (!el) {
                            el = document.createElement("style");
                            el.id = "_ms-custom-font";
                            document.head.appendChild(el);
                        }
                        el.textContent = `@font-face { font-family: "${t.font}"; src: url("${t.fontURL}"); }`;
                    }
                    document.body.style.fontFamily = `"${t.font}", Almendra, Palatino, Georgia, serif`;
                }
            }

            // ── Init ──────────────────────────────────────────────────────────────
            document.addEventListener("DOMContentLoaded", () => {
                sendToHost({ action: "ready" });
                document.getElementById("code-input").focus();
            });
        </script>
    </body>
</html>
