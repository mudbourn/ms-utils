<!doctype html>
<html lang="en">
    <head>
        <meta charset="UTF-8" />
        <style>
            /* ── Fonts ─────────────────────────────────────────────────────────── */
            @font-face {
                font-family: "Almendra";
                src: url("./fonts/Almendra-Regular.ttf") format("truetype");
                font-weight: 400;
                font-style: normal;
            }
            @font-face {
                font-family: "Almendra";
                src: url("./fonts/Almendra-Bold.ttf") format("truetype");
                font-weight: 700;
                font-style: normal;
            }
            @font-face {
                font-family: "Almendra";
                src: url("./fonts/Almendra-Italic.ttf") format("truetype");
                font-weight: 400;
                font-style: italic;
            }
            @font-face {
                font-family: "Almendra";
                src: url("./fonts/Almendra-BoldItalic.ttf") format("truetype");
                font-weight: 700;
                font-style: italic;
            }

            /* ── Tokens ─────────────────────────────────────────────────────────── */
            :root {
                --bg: #0e0e0e;
                --surface: #1a1a1a;
                --surface2: #252525;
                --hover: #333333;
                --accent: #cccccc;
                --accent-hi: #e8e8e8;
                --success: #888888;
                --danger-bg: #1a1616;
                --danger: #d8d8d8;
                --warning: #aaaaaa;
                --text: #d8d8d8;
                --text2: rgba(200, 200, 200, 0.85);
                --text3: rgba(160, 160, 160, 0.55);
                --border: rgba(100, 100, 100, 0.55);
                --border-dim: rgba(100, 100, 100, 0.18);
                --radius: 2px;
                --radius-s: 1px;
            }

            /* ── Reset ──────────────────────────────────────────────────────────── */
            *,
            *::before,
            *::after {
                box-sizing: border-box;
                margin: 0;
                padding: 0;
                user-select: none;
                -webkit-user-select: none;
            }

            html,
            body {
                width: 100%;
                height: 100%;
                overflow: hidden;
                background: transparent;
                color: var(--text);
                font-family: var(--font), "Almendra", Palatino, Georgia, serif;
                font-size: 13px;
                line-height: 1.5;
                -webkit-font-smoothing: antialiased;
            }

            body {
                display: flex;
                flex-direction: column;
                background: var(--bg);
                border-radius: var(--ms-window-radius, 3px);
                overflow: hidden;
            }

            button {
                cursor: pointer;
                border: none;
                background: none;
                color: inherit;
                font: inherit;
            }

            input {
                font: inherit;
                color: inherit;
                background: none;
                border: none;
                outline: none;
            }

            /* ── Header ─────────────────────────────────────────────────────────── */
            #header {
                display: flex;
                align-items: center;
                gap: 8px;
                height: 40px; padding: 0 12px;
                background: var(--surface);
                border-bottom: 1px solid var(--border);
                box-shadow: 0 1px 12px
                    color-mix(in srgb, var(--accent) 12%, transparent);
                flex-shrink: 0;
            }

            #panel-title {
                flex: 1;
                font-weight: 600;
                font-size: 13px;
            }

            .header-btns {
                display: flex;
                gap: 4px;
                -webkit-app-region: no-drag;
            }

            /* ── Ghost button ────────────────────────────────────────────────────── */
            .btn-ghost {
                flex: 1;
                padding: 5px 8px;
                border-radius: var(--radius-s);
                background: var(--surface2);
                color: var(--text2);
                font-size: 11px;
                font-weight: 500;
                transition: opacity 0.15s;
            }
            .btn-ghost:hover {
                opacity: 0.8;
            }

            /* In the header bar, ghost buttons should not stretch */
            .header-btns .btn-ghost {
                flex: 0 0 auto;
            }

            /* ── Close button ────────────────────────────────────────────────────── */
            .btn-close {
                width: 28px; height: 28px; border-radius: 50%;
                background: var(--surface2); color: var(--text2);
                display: flex; align-items: center; justify-content: center;
                flex-shrink: 0;
                transition: background 0.15s;
            }
            
            .btn-close .icon { width: 14px; height: 14px; display: block; }
            .btn-close:hover {
                background: var(--hover);
                color: var(--text);
            }

            /* ── Log area ────────────────────────────────────────────────────────── */
            #log {
                flex: 1;
                overflow-y: auto;
                overflow-x: hidden;
                padding: 4px 0;
                min-height: 0;
                scrollbar-width: thin;
                scrollbar-color: var(--border) transparent;
            }
            #log::-webkit-scrollbar {
                width: 5px;
            }
            #log::-webkit-scrollbar-track {
                background: transparent;
            }
            #log::-webkit-scrollbar-thumb {
                background: var(--border);
                border-radius: var(--radius);
            }

            /* ── Entry rows ──────────────────────────────────────────────────────── */
            .entry {
                display: flex;
                align-items: flex-start;
                gap: 6px;
                padding: 5px 12px;
                font-size: 12px;
                border-bottom: 1px solid var(--border-dim);
            }
            .entry:hover {
                background: var(--surface);
            }
            .entry.selected {
                background: var(--hover);
                outline: 1px solid var(--accent-glow);
            }
            .entry.selected:hover {
                background: var(--accent-glow-faint);
            }

            .ts {
                color: var(--text3);
                font:
                    10px "SF Mono",
                    Menlo,
                    monospace;
                flex-shrink: 0;
                padding-top: 1px;
                min-width: 52px;
            }

            /* ── Badges ──────────────────────────────────────────────────────────── */
            .badge {
                flex-shrink: 0;
                padding: 1px 5px;
                border-radius: var(--radius-s);
                font:
                    700 10px "SF Mono",
                    Menlo,
                    monospace;
                letter-spacing: 0.05em;
                text-transform: uppercase;
                border: 1px solid transparent;
            }

            .badge-print {
                background: var(--surface2);
                color: var(--text2);
                border-color: var(--border);
            }

            .badge-result {
                background: color-mix(in srgb, var(--success) 20%, transparent);
                color: var(--success);
                border-color: color-mix(
                    in srgb,
                    var(--success) 45%,
                    transparent
                );
            }

            .badge-error {
                background: color-mix(in srgb, var(--danger) 20%, transparent);
                color: var(--danger);
                border-color: color-mix(
                    in srgb,
                    var(--danger) 45%,
                    transparent
                );
            }

            .badge-macro {
                background: color-mix(in srgb, var(--success) 20%, transparent);
                color: var(--success);
                border-color: color-mix(
                    in srgb,
                    var(--success) 45%,
                    transparent
                );
            }

            .badge-key {
                background: var(--surface2);
                color: var(--text);
                border-color: var(--text3);
            }

            .badge-mouse {
                background: color-mix(in srgb, var(--warning) 20%, transparent);
                color: var(--warning);
                border-color: color-mix(
                    in srgb,
                    var(--warning) 45%,
                    transparent
                );
            }

            .badge-input {
                background: transparent;
                color: var(--text2);
                font-style: italic;
                border-color: transparent;
            }

            .badge-sound {
                background: color-mix(in srgb, var(--accent) 15%, transparent);
                color: var(--accent);
                border-color: color-mix(
                    in srgb,
                    var(--accent) 40%,
                    transparent
                );
            }

            /* ── Message text ────────────────────────────────────────────────────── */
            .msg {
                flex: 1;
                word-break: break-word;
                white-space: pre-wrap;
            }

            .entry-result .msg,
            .entry-error .msg,
            .entry-input .msg {
                font:
                    12px "SF Mono",
                    Menlo,
                    monospace;
            }

            .entry-error .msg {
                color: var(--danger);
            }

            .entry-input .msg {
                color: var(--text2);
                font-style: italic;
            }

            /* ── Pill ────────────────────────────────────────────────────────────── */
            .pill {
                display: inline-flex;
                align-items: center;
                padding: 1px 7px;
                border-radius: 20px;
                font:
                    700 10px "SF Mono",
                    Menlo,
                    monospace;
                background: var(--surface2);
                border: 1px solid var(--border);
                color: var(--text2);
            }

            /* ── Input bar ───────────────────────────────────────────────────────── */
            #inputbar {
                display: flex;
                align-items: center;
                gap: 8px;
                padding: 8px 12px;
                background: var(--surface);
                border-top: 1px solid var(--border);
                flex-shrink: 0;
            }

            #code-input {
                flex: 1;
                background: var(--surface2);
                border: 1px solid var(--border);
                border-radius: var(--radius);
                padding: 5px 8px;
                color: var(--text);
                font:
                    12px "SF Mono",
                    Menlo,
                    monospace;
                outline: none;
                transition: border-color 0.15s;
                user-select: text;
                -webkit-user-select: text;
            }
            #code-input::placeholder {
                color: var(--text2);
                opacity: 0.55;
            }
            #code-input:focus {
                border-color: var(--accent);
            }

            #run-btn {
                padding: 5px 12px;
                border-radius: var(--radius);
                font-size: 11px;
                font-weight: 700;
                background: var(--accent);
                color: var(--bg);
                transition: opacity 0.15s;
                -webkit-app-region: no-drag;
            }
            #run-btn:hover {
                opacity: 0.85;
            }

            /* ── Context menu ─────────────────────────────────────────────── */
            #ctx-menu {
                position: fixed;
                min-width: 140px;
                background: var(--surface2);
                border: 1px solid var(--border);
                border-radius: var(--radius-s);
                box-shadow: 0 8px 24px rgba(0, 0, 0, 0.55);
                z-index: 150;
                overflow: hidden;
                display: none;
            }
            #ctx-menu.open { display: block; }
            .ctx-item {
                display: flex;
                align-items: center;
                gap: 8px;
                padding: 7px 10px;
                font-size: 12px;
                color: var(--text2);
                cursor: pointer;
                transition: background 0.1s, color 0.1s;
                user-select: none;
            }
            .ctx-item:hover {
                background: var(--hover);
                color: var(--text);
            }
            .ctx-divider {
                height: 1px;
                background: var(--border);
                margin: 2px 0;
            }
        </style>
    </head>
    <body>
        <!-- Header -->
        <div id="header">
            <span id="panel-title">mudscript — console</span>
            <div class="header-btns">
                <button
                    id="pause-btn"
                    class="btn-ghost"
                    onmouseenter="playSlot('hover')"
                    onclick="
                        playSlot('interact');
                        togglePause();
                    "
                >
                    Pause
                </button>
                <button
                    class="btn-ghost"
                    onmouseenter="playSlot('hover')"
                    onclick="
                        playSlot('interact');
                        doClear();
                    "
                >
                    Clear
                </button>
                <button
                    class="btn-close"
                    onmouseenter="playSlot('hover')"
                    onclick="
                        playSlot('back');
                        closePanel();
                    "
                >
                    <svg class="icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect width="18" height="18" x="3" y="3" rx="2"/><path d="M8 12h8"/></svg>
                </button>
            </div>
        </div>

        <!-- Log -->
        <div id="log"></div>

        <!-- Input bar -->
        <div id="inputbar">
            <input
                id="code-input"
                type="text"
                placeholder="> enter lua…"
                autocomplete="off"
                spellcheck="false"
            />
            <button
                id="run-btn"
                onmouseenter="playSlot('hover')"
                onclick="
                    playSlot('interact');
                    doRun();
                "
            >
                Run
            </button>
        </div>

        <div id="ctx-menu"></div>

        <script src="./modules/log-panel.js"></script>
        <script>
            "use strict";

            // ── Badge labels ────────────────────────────────────────────────
            const LABELS = {
                print: "print",
                result: "result",
                error: "error",
                macro: "macro",
                input: "input",
                key: "key",
                mouse: "mouse",
                sound: "sound",
            };

            // ── Console buildRow ────────────────────────────────────────────
            function buildRow(entry) {
                const type = entry.type || "print";
                const ts = entry.ts || lp.nowTs();

                const row = document.createElement("div");
                row.className = "entry entry-" + type;

                const tsEl = document.createElement("span");
                tsEl.className = "ts";
                tsEl.textContent = ts;
                row.appendChild(tsEl);

                const badge = document.createElement("span");
                badge.className = "badge badge-" + type;
                badge.textContent = LABELS[type] ?? type;
                row.appendChild(badge);

                const msgEl = document.createElement("span");
                msgEl.className = "msg";

                if (type === "key" || type === "mouse" || type === "sound" || type === "macro") {
                    msgEl.textContent = "";
                } else if (type === "input") {
                    msgEl.textContent = "> " + String(entry.msg ?? "");
                } else {
                    msgEl.textContent = String(entry.msg ?? "");
                }

                row.appendChild(msgEl);
                row.onmouseenter = function() { lp.playSlot("hover"); };
                row.onclick = lp._handleEntryClick;
                return row;
            }

            // ── Create LogPanel ─────────────────────────────────────────────
            const lp = createLogPanel({
                channel: "console",
                buildRow,
                maxEntries: 500,
                scrollThresh: 60,
            });

            // ── Expose globals for inline handlers ──────────────────────────
            window.togglePause = lp.togglePause;
            window.playSlot    = lp.playSlot;
            window.appendEntry = lp.appendEntry;
            window.loadHistory = lp.loadHistory;
            window.closePanel  = lp.closePanel;
            window.applyTheme  = lp.applyTheme;

            // ── Console-specific actions ────────────────────────────────────
            function doRun() {
                const input = document.getElementById("code-input");
                const code = input.value.trim();
                if (!code) return;
                lp.appendEntry({ ts: lp.nowTs(), type: "input", msg: code });
                lp.sendToHost({ action: "execute", code });
                input.value = "";
            }

            function doClear() {
                document.getElementById("log").innerHTML = "";
                lp.sendToHost({ action: "clear" });
            }

            window.doRun   = doRun;
            window.doClear = doClear;

            // ── Input bar: Enter to run ─────────────────────────────────────
            document
                .getElementById("code-input")
                .addEventListener("keydown", (e) => {
                    if (e.key === "Enter") {
                        e.preventDefault();
                        doRun();
                    }
                });

            // ── Init ────────────────────────────────────────────────────────
            document.addEventListener("DOMContentLoaded", () => {
                // Shell integration: register for incoming Lua pushes
                if (typeof registerPanel === "function") {
                    registerPanel("console", function(action, body) {
                        if (action === "appendEntry" && body) window.appendEntry(body);
                        else if (action === "loadHistory" && body) window.loadHistory(body);
                    });
                }
                // Strip window-chrome when embedded in shell
                if (window.shellPost) {
                    var p = document.getElementById("panel");
                    if (p) { p.style.borderRadius = "0"; p.style.clipPath = "none"; }
                }
                lp.sendToHost({ action: "ready" });
                document.getElementById("code-input").focus();
            });
        </script>
    </body>
</html>
