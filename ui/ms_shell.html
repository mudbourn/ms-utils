    function icon(name, cls) {
        return '<svg class="' + (cls || 'icon') + '" viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">' + (ICONS[name] || '') + '</svg>';
    }
    window.icon = icon;

    window.shellDispatch = function(panel, action, body) {
        try {
            window.webkit.messageHandlers.msShell.postMessage(
                JSON.stringify({ panel: panel, action: action, body: body })
            );
        } catch(e) {}
    };

    window.shellPost = function(panel, action, body) {
        shellDispatch(panel, action, body);
    };

    var _panelHandlers = {};
    window.registerPanel = function(name, handler) {
        _panelHandlers[name] = handler;
    };

    window.shellReceive = function(panel, action, body) {
        var handler = _panelHandlers[panel];
        if (handler) {
            try { handler(action, body); } catch(e) {
                console.error("[shell] panel handler error:", panel, action, e);
            }
        }
    };

    window.currentPanel = 'console';

    // Per-panel pause registry — each panel registers its togglePause
    window._panelPauseFns = {};
    window.togglePause = function() {
        var fn = window._panelPauseFns[window.currentPanel];
        if (fn) fn();
    };

    // Per-panel clear registry — each panel registers its clearLog
    window._panelClearFns = {};
    window.clearLog = function() {
        var fn = window._panelClearFns[window.currentPanel];
        if (fn) fn();
    };

    window.showPanel = function(id) {
        document.querySelectorAll('[class^="panel-"]').forEach(function(el) {
            el.style.display = 'none';
        });
        var target = document.querySelector('.panel-' + id);
        if (target) target.style.display = 'flex';
        document.querySelectorAll('.rail-item').forEach(function(btn) {
            btn.classList.toggle('active', btn.dataset.panel === id);
        });
        currentPanel = id;
        shellDispatch('_shell', 'navigate', { panel: id });
    };

    window.popOutPanel = function(id) {
        shellDispatch('_shell', 'popOut', { panel: id });
    };

    window._shellApplyTheme = function(theme) {
        if (!theme || typeof theme !== 'object') return;
        var r = document.documentElement.style;
        if (theme.bg) r.setProperty('--bg', theme.bg);
        if (theme.surface) r.setProperty('--surface', theme.surface);
        if (theme.surface2) r.setProperty('--surface2', theme.surface2);
        if (theme.hover) r.setProperty('--hover', theme.hover);
        if (theme.accent) r.setProperty('--accent', theme.accent);
        if (theme.accentHi) r.setProperty('--accent-hi', theme.accentHi);
        if (theme.success) r.setProperty('--success', theme.success);
        if (theme.dangerBg) r.setProperty('--danger-bg', theme.dangerBg);
        if (theme.danger) r.setProperty('--danger', theme.danger);
        if (theme.warning) r.setProperty('--warning', theme.warning);
        if (theme.text) r.setProperty('--text', theme.text);
        if (theme.text2) r.setProperty('--text2', theme.text2);
        if (theme.text3) r.setProperty('--text3', theme.text3);
        if (theme.border) r.setProperty('--border', theme.border);
        if (theme.borderDim) r.setProperty('--border-dim', theme.borderDim);
        if (theme.accentGlow) r.setProperty('--accent-glow', theme.accentGlow);
        if (theme.accentGlowFaint) r.setProperty('--accent-glow-faint', theme.accentGlowFaint);
        if (theme.dangerGlow) r.setProperty('--danger-glow', theme.dangerGlow);
        if (theme.dangerBorder) r.setProperty('--danger-border', theme.dangerBorder);
        if (theme.mouse) r.setProperty('--mouse', theme.mouse);
        if (theme.scroll) r.setProperty('--scroll', theme.scroll);
        if (theme.radius !== undefined) {
            r.setProperty('--radius', theme.radius + 'px');
            r.setProperty('--radius-s', Math.max(0, theme.radius - 1) + 'px');
        }
        if (theme.font) {
            if (theme.fontURL) {
                var el = document.getElementById('_ms-custom-font');
                if (!el) { el = document.createElement('style'); el.id = '_ms-custom-font'; document.head.appendChild(el); }
                el.textContent = '@font-face { font-family: "' + theme.font + '"; src: url("' + theme.fontURL + '"); }';
            }
            document.body.style.fontFamily = '"' + theme.font + '", Almendra, Palatino, Georgia, serif';
        }
        if (window.consoleApplyTheme) window.consoleApplyTheme(theme);
        if (window.watcherApplyTheme) window.watcherApplyTheme(theme);
        if (window.keysApplyTheme) window.keysApplyTheme(theme);
        if (window.windowApplyTheme) window.windowApplyTheme(theme);
        if (window.settingsApplyTheme) window.settingsApplyTheme(theme);
    };

    window.applyTheme = window._shellApplyTheme;

    document.querySelectorAll('.rail-item').forEach(function(btn) {
        btn.addEventListener('mouseenter', function() {
            shellDispatch('_shell', 'playSlot', { slot: 'hover' });
        });
        btn.addEventListener('click', function() {
            shellDispatch('_shell', 'playSlot', { slot: 'interact' });
            var panel = btn.getAttribute('data-panel');
            if (panel) showPanel(panel);
        });
    });

    document.addEventListener('DOMContentLoaded', function() {
        shellDispatch('_shell', 'ready', { version: '0.2.0' });
        showPanel('console');
    });

    })();
    </script>


    <!-- ═══ Panel: console ═══════════════════════════════════════════════════════ -->
    <script>
    /* panel: console */
    (function() {
    "use strict";
// ── Badge labels ────────────────────────────────────────────────
            const LABELS = {
                print: "print",
                result: "result",
                error: "error",
                macro: "macro",
                input: "input",
                key: "key",
                mouse: "mouse",
            };

            // ── Console buildRow ────────────────────────────────────────────
            function buildRow(entry) {
                const type = entry.type || "print";
                const ts = entry.ts || lp.nowTs();

                const row = document.createElement("div");
                row.className = "entry entry-" + type;

                const tsEl = document.createElement("span");
                tsEl.className = "ts";
                tsEl.textContent = ts;
                row.appendChild(tsEl);

                const badge = document.createElement("span");
                badge.className = "badge badge-" + type;
                badge.textContent = LABELS[type] ?? type;
                row.appendChild(badge);

                const msgEl = document.createElement("span");
                msgEl.className = "msg";

                if (type === "key" || type === "mouse" || type === "sound" || type === "macro") {
                    msgEl.textContent = "";
                } else if (type === "input") {
                    msgEl.textContent = "> " + String(entry.msg ?? "");
                } else {
                    msgEl.textContent = String(entry.msg ?? "");
                }

                row.appendChild(msgEl);
                row.onmouseenter = function() { lp.playSlot("hover"); };
                row.onclick = lp._handleEntryClick;
                return row;
            }

            // ── Create LogPanel ─────────────────────────────────────────────
            const _panel = document.querySelector('.panel-console');
            const lp = createLogPanel({
                channel: "console",
                buildRow,
                container: _panel,
                maxEntries: 500,
                scrollThresh: 60,
            });

            // ── Expose globals for inline handlers ──────────────────────────
            window._panelPauseFns['console'] = lp.togglePause;
            window.playSlot    = lp.playSlot;
            window.closePanel  = lp.closePanel;
            window.consoleApplyTheme = lp.applyTheme;

            // ── Console-specific actions ────────────────────────────────────
            function doRun() {
                const input = document.getElementById("code-input");
                const code = input.value.trim();
                if (!code) return;
                lp.appendEntry({ ts: lp.nowTs(), type: "input", msg: code });
                lp.sendToHost({ action: "execute", code });
                input.value = "";
            }

            function doClear() {
                const log = _panel ? _panel.querySelector("#log") : document.getElementById("log");
                if (log) log.innerHTML = "";
                lp.sendToHost({ action: "clear" });
            }

            window.doRun   = doRun;
            window.doClear = doClear;
            window._panelClearFns['console'] = doClear;

            // ── Input bar: Enter to run ─────────────────────────────────────
            document
                .getElementById("code-input")
                .addEventListener("keydown", (e) => {
                    if (e.key === "Enter") {
                        e.preventDefault();
                        doRun();
                    }
                });

            // ── Init ────────────────────────────────────────────────────────
            document.addEventListener("DOMContentLoaded", () => {
                // Shell integration: register for incoming Lua pushes
                if (typeof registerPanel === "function") {
                    registerPanel("console", function(action, body) {
                        if (action === "appendEntry" && body) lp.appendEntry(body);
                        else if (action === "loadHistory" && body) lp.loadHistory(body);
                    });
                }
                // Strip window-chrome when embedded in shell
                if (window.shellPost) {
                    var p = document.getElementById("panel");
                    if (p) { p.style.borderRadius = "0"; p.style.clipPath = "none"; }
                }
                lp.sendToHost({ action: "ready" });
                document.getElementById("code-input").focus();
            });
    })();
    </script>


    <!-- ═══ Panel: watcher ═══════════════════════════════════════════════════════ -->
    <script>
    /* panel: watcher */
    (function() {
    "use strict";
// ── Step categories ─────────────────────────────────────────────
            const CATS = [
                { id: "wait", label: "Waits", regex: /\] wait / },
                { id: "sound", label: "Sound calls", regex: /\] sound / },
                { id: "cam", label: "Camera moves", regex: /\] cam\.move/ },
                {
                    id: "keys",
                    label: "Key presses",
                    regex: /\] [↓↑] |\] type /,
                },
                { id: "mouse", label: "Mouse actions", regex: /\] Mouse / },
                { id: "scroll", label: "Scrolls", regex: /\] scroll / },
                { id: "copy", label: "Clipboard", regex: /\] copy/ },
            ];

            function stepCat(msg) {
                for (const c of CATS) {
                    if (c.regex.test(msg)) return c.id;
                }
                return "other";
            }

            // ── Panel container (for scoped DOM queries) ──────────────────
            const _panel = document.querySelector('.panel-watcher');

            // ── Mute state ──────────────────────────────────────────────────
            const _muted = new Set();

            function isMuted(cat) { return _muted.has(cat); }

            function setMute(cat, on) {
                const log = _panel ? _panel.querySelector("#log") : document.getElementById("log");
                if (!log) return;
                if (on) {
                    _muted.add(cat);
                    log.classList.add("mute-" + cat);
                } else {
                    _muted.delete(cat);
                    log.classList.remove("mute-" + cat);
                }
                _updateFilterUI();
            }

            function _updateFilterUI() {
                const btn = document.getElementById("filter-btn");
                btn.classList.toggle("has-mutes", _muted.size > 0);
                btn.textContent =
                    _muted.size > 0 ? "filter (" + _muted.size + ")" : "filter";
                CATS.forEach((c) => {
                    const row = document.getElementById("frow-" + c.id);
                    if (row) row.classList.toggle("muted", _muted.has(c.id));
                });
                const action = document.getElementById("filter-action");
                if (action) {
                    action.textContent =
                        _muted.size === CATS.length ? "show all" : "hide all";
                }
            }

            // ── Build filter panel ──────────────────────────────────────────
            (function buildFilterPanel() {
                const CAT_DOT_COLORS = {
                    wait: "var(--text3)",
                    sound: "var(--warning)",
                    cam: "var(--success)",
                    keys: "var(--text2)",
                    mouse: "var(--mouse)",
                    scroll: "var(--scroll)",
                    copy: "var(--accent)",
                };

                const panel = document.getElementById("filter-panel");

                CATS.forEach((c) => {
                    const row = document.createElement("div");
                    row.className = "filter-row";
                    row.id = "frow-" + c.id;
                    row.style.setProperty(
                        "--dot-clr",
                        CAT_DOT_COLORS[c.id] || "var(--text3)",
                    );

                    const dot = document.createElement("span");
                    dot.className = "filter-dot";

                    const lbl = document.createElement("span");
                    lbl.className = "filter-label";
                    lbl.textContent = c.label;

                    row.append(dot, lbl);
                    row.addEventListener("click", () =>
                        setMute(c.id, !isMuted(c.id)),
                    );
                    panel.appendChild(row);
                });

                const sep = document.createElement("div");
                sep.className = "filter-sep";
                panel.appendChild(sep);

                const clear = document.createElement("div");
                clear.className = "filter-clear";
                clear.id = "filter-action";
                clear.textContent = "hide all";
                clear.addEventListener("click", () => {
                    if (_muted.size === CATS.length) {
                        [..._muted].forEach((id) => setMute(id, false));
                    } else {
                        CATS.forEach((c) => setMute(c.id, true));
                    }
                });
                panel.appendChild(clear);
            })();

            function toggleFilterPanel() {
                document
                    .getElementById("filter-panel")
                    .classList.toggle("open");
            }
            function closeFilterPanel() {
                document
                    .getElementById("filter-panel")
                    .classList.remove("open");
            }

            // Close filter panel when clicking outside it
            document.addEventListener("mousedown", (e) => {
                const panel = document.getElementById("filter-panel");
                const btn = document.getElementById("filter-btn");
                if (!panel.contains(e.target) && !btn.contains(e.target)) {
                    closeFilterPanel();
                }
            });

            // ── Watcher buildRow ────────────────────────────────────────────
            function buildRow(entry) {
                if (entry.type === "step") {
                    const row = document.createElement("div");
                    row.className = "step";
                    row.dataset.cat = stepCat(entry.msg || "");

                    const ts = document.createElement("span");
                    ts.className = "ts";
                    ts.textContent = "[" + (entry.ts || "") + "]";

                    const msg = document.createElement("span");
                    msg.className = "step-msg";
                    msg.textContent = entry.msg || "";

                    row.append(ts, msg);
                    row.onmouseenter = function() { lp.playSlot("hover"); };
                    row.onclick = lp._handleEntryClick;
                    return row;
                }

                const row = document.createElement("div");
                row.className = "entry";

                const ts = document.createElement("span");
                ts.className = "ts";
                ts.textContent = "[" + (entry.ts || "") + "]";
                row.appendChild(ts);

                if (entry.type === "macro") {
                    row.classList.add("entry-macro");

                    const dot = document.createElement("span");
                    dot.className = "dot";
                    dot.innerHTML = ICONS.dot;
                    row.appendChild(dot);

                    const msg = document.createElement("span");
                    msg.className = "msg";
                    if (entry.parentLabel) {
                        msg.appendChild(
                            document.createTextNode(entry.parentLabel),
                        );
                        const sep = document.createElement("span");
                        sep.className = "sub-sep";
                        sep.innerHTML = ICONS["chevron-right"];
                        const sub = document.createElement("span");
                        sub.className = "sub-name";
                        sub.textContent = entry.label || entry.id || "";
                        msg.append(sep, sub);
                    } else {
                        msg.textContent = entry.label || entry.id || "";
                    }
                    row.appendChild(msg);

                    if (entry.trigger) {
                        const trig = document.createElement("span");
                        trig.className = "pill";
                        trig.textContent = entry.trigger;
                        row.appendChild(trig);
                    }
                } else {
                    const badge = document.createElement("span");
                    badge.className = "badge badge-" + entry.type;
                    badge.textContent = entry.type;
                    row.appendChild(badge);

                    const msg = document.createElement("span");
                    msg.className = "msg";
                    msg.textContent = entry.msg || "";
                    row.appendChild(msg);
                }

                row.onmouseenter = function() { lp.playSlot("hover"); };
                row.onclick = lp._handleEntryClick;
                return row;
            }

            // ── Create LogPanel ─────────────────────────────────────────────
            const lp = createLogPanel({
                channel: "watcher",
                buildRow,
                container: _panel,
                maxEntries: 500,
                scrollThresh: 48,
                clearAction: "clearLog",
            });

            // ── Expose globals for inline handlers ──────────────────────────
            window._panelPauseFns['watcher'] = lp.togglePause;
            window.playSlot          = lp.playSlot;
            window.toggleFilterPanel = toggleFilterPanel;
            window.closePanel        = lp.closePanel;
            window.watcherApplyTheme = lp.applyTheme;

            // ── Watcher clearLog ────────────────────────────────────────────
            function clearLog() {
                const log = _panel ? _panel.querySelector("#log") : document.getElementById("log");
                if (log) log.innerHTML = "";
                lp.sendToHost({ action: "clear" });
            }
            window._panelClearFns['watcher'] = clearLog;

            // ── Init ────────────────────────────────────────────────────────
            document.addEventListener("DOMContentLoaded", () => {
                if (typeof registerPanel === "function") {
                    registerPanel("watcher", function(action, body) {
                        if (action === "appendEntry" && body) lp.appendEntry(body);
                        else if (action === "loadHistory" && body) lp.loadHistory(body);
                    });
                }
                if (window.shellPost) {
                    var p = document.getElementById("panel");
                    if (p) { p.style.borderRadius = "0"; p.style.clipPath = "none"; }
                }
                lp.sendToHost({ action: "ready" });
            });
    })();
    </script>


    <!-- ═══ Panel: keys ═══════════════════════════════════════════════════════ -->
    <script>
    /* panel: keys */
    (function() {
    "use strict";
// ── Panel container ──────────────────────────────────────────────
            const _panel = document.querySelector('.panel-keys');

// ── Create LogPanel (selection, context menu, keyboard, drag, theme) ──
            const lp = createLogPanel({
                channel: "keys",
                buildRow, // defined below
                container: _panel,
                entrySelector: ".log .entry, .log .step",
                maxEntries: 500,
                scrollThresh: 48,
                extractCopyText(el) {
                    const ts = el.querySelector(".ts")?.textContent || "";
                    const badge = (el.querySelector(".badge")?.textContent || "").toUpperCase();
                    const arrow = el.querySelector(".arrow")?.textContent || "";
                    const name = el.querySelector(".key-name, .mouse-name, .scroll-name, .move-name")?.textContent || "";
                    const dim = el.querySelector(".dim")?.textContent || "";
                    const parts = [ts, `[${badge}]`];
                    if (arrow) parts.push(arrow);
                    if (name) parts.push(name);
                    if (dim) parts.push(dim.trim());
                    return parts.join(" ");
                },
            });

            // ── Expose globals for inline handlers ──────────────────────────
            window._panelPauseFns['keys'] = lp.togglePause;
            window.playSlot    = lp.playSlot;
            window._panelClearFns['keys'] = clearLog;
            window.closePanel  = lp.closePanel;
            window.switchTab   = switchTab;
            window.onCoordModeChange = onCoordModeChange;
            window.keysApplyTheme = lp.applyTheme;

            // ── Constants ───────────────────────────────────────────────────
            const BTN_NAMES = {
                0: "Left",
                1: "Right",
                2: "Middle",
                3: "Btn4",
                4: "Btn5",
            };

            function btnName(n) { return BTN_NAMES[n] ?? "M" + n; }

            // ── Entry builder ───────────────────────────────────────────────
            function mkSpan(cls, text) {
                const s = document.createElement("span");
                s.className = cls;
                s.textContent = text;
                return s;
            }

            function buildRow(entry) {
                const row = document.createElement("div");
                const t = entry.type;

                if (t === "mousemove") {
                    row.className = "entry move-entry";
                    row.append(
                        mkSpan("ts", "[" + (entry.ts || "") + "]"),
                        mkSpan("arrow arrow-move", "→"),
                        mkSpan("move-name", entry.x + ", " + entry.y),
                    );
                    row.onmouseenter = function() { lp.playSlot("hover"); };
                    row.onclick = lp._handleEntryClick;
                    return row;
                }

                row.className = "entry";
                row.appendChild(mkSpan("ts", "[" + (entry.ts || "") + "]"));

                if (t === "key") {
                    row.append(
                        mkSpan("badge badge-key", "key"),
                        mkSpan(
                            "arrow " + (entry.down ? "arrow-down" : "arrow-up"),
                            entry.down ? "↓" : "↑",
                        ),
                        mkSpan("key-name", entry.key || ""),
                        mkSpan("dim", " (" + (entry.keyCode ?? "?") + ")"),
                    );
                } else if (t === "mouse") {
                    row.append(
                        mkSpan("badge badge-mouse", "mouse"),
                        mkSpan(
                            "arrow " +
                                (entry.down ? "arrow-mouse" : "arrow-up"),
                            entry.down ? "↓" : "↑",
                        ),
                        mkSpan("mouse-name", btnName(entry.button)),
                        mkSpan("dim", " (" + entry.button + ")"),
                        mkSpan("dim", "  " + entry.x + ", " + entry.y),
                    );
                } else if (t === "scroll") {
                    row.append(
                        mkSpan("badge badge-scroll", "scroll"),
                        mkSpan(
                            "arrow arrow-scroll",
                            entry.direction === "up" ? "↑" : "↓",
                        ),
                        mkSpan(
                            "scroll-name",
                            entry.direction +
                                (entry.amount > 1 ? " ×" + entry.amount : ""),
                        ),
                    );
                }

                row.onmouseenter = function() { lp.playSlot("hover"); };
                row.onclick = lp._handleEntryClick;
                return row;
            }

            // ── Route entries to the correct log ────────────────────────────
            function appendEntry(entry) {
                if (lp.isPaused()) return;
                if (entry.type === "key" && entry.down)
                    flagKey(entry.key || "?");
                if (entry.type === "mouse" && entry.down)
                    flagMouse(btnName(entry.button) + " (" + entry.button + ")");

                const t = entry.type;
                const isMouseSide =
                    t === "mouse" || t === "scroll" || t === "mousemove";
                const log = _panel ? _panel.querySelector(
                    isMouseSide ? "#mouse-log" : "#keys-log"
                ) : document.getElementById(
                    isMouseSide ? "mouse-log" : "keys-log"
                );
                if (!log) return;
                const atBottom = lp.isNearBottom(log);
                log.appendChild(buildRow(entry));
                lp.trimLog(log);
                if (atBottom) log.scrollTop = log.scrollHeight;
            }

            function loadHistory(entries) {
                const kl = _panel ? _panel.querySelector("#keys-log") : document.getElementById("keys-log");
                const ml = _panel ? _panel.querySelector("#mouse-log") : document.getElementById("mouse-log");
                if (!kl || !ml) return;
                kl.innerHTML = ml.innerHTML = "";
                const capped =
                    entries && entries.length > lp.maxEntries
                        ? entries.slice(-lp.maxEntries)
                        : entries || [];
                const kf = document.createDocumentFragment();
                const mf = document.createDocumentFragment();
                capped.forEach((e) => {
                    const isMouseSide =
                        e.type === "mouse" ||
                        e.type === "scroll" ||
                        e.type === "mousemove";
                    (isMouseSide ? mf : kf).appendChild(buildRow(e));
                });
                kl.appendChild(kf);
                ml.appendChild(mf);
                kl.scrollTop = kl.scrollHeight;
                ml.scrollTop = ml.scrollHeight;
            }

            // ── Active keys pills ───────────────────────────────────────────
            function updateActiveKeys(keys) {
                const row = document.getElementById("keys-pills");
                row.innerHTML = "";
                if (!keys || keys.length === 0) {
                    const p = document.createElement("span");
                    p.className = "pill pill-empty";
                    p.textContent = "—";
                    row.appendChild(p);
                    return;
                }
                keys.forEach((entry) => {
                    const p = document.createElement("span");
                    p.className = "pill pill-key";
                    if (typeof entry === "object" && entry !== null) {
                        p.textContent = entry.name + " (" + entry.code + ")";
                    } else {
                        p.textContent = entry;
                    }
                    row.appendChild(p);
                });
            }

            // ── Mouse state (position + active buttons) ─────────────────────
            function updateMouseState(state) {
                const mx = _panel ? _panel.querySelector("#mx-display") : document.getElementById("mx-display");
                const my = _panel ? _panel.querySelector("#my-display") : document.getElementById("my-display");
                if (state.x != null && mx) mx.textContent = state.x;
                if (state.y != null && my) my.textContent = state.y;
                const row = _panel ? _panel.querySelector("#mouse-pills") : document.getElementById("mouse-pills");
                if (!row) return;
                row.innerHTML = "";
                const btns = Array.isArray(state.buttons)
                    ? state.buttons
                    : Object.values(state.buttons || {});
                if (
                    !btns ||
                    (Array.isArray(btns)
                        ? btns.length === 0
                        : Object.keys(btns).length === 0)
                ) {
                    const emp = document.createElement("span");
                    emp.className = "pill pill-key pill-empty";
                    emp.textContent = "\u2014";
                    row.appendChild(emp);
                    return;
                }
                btns.forEach((b) => {
                    const p = document.createElement("span");
                    p.className = "pill pill-mouse";
                    p.textContent = btnName(b) + " (" + b + ")";
                    row.appendChild(p);
                });
            }

            function updateMousePos(pos) {
                const mx = _panel ? _panel.querySelector("#mx-display") : document.getElementById("mx-display");
                const my = _panel ? _panel.querySelector("#my-display") : document.getElementById("my-display");
                if (pos.x != null && mx) mx.textContent = pos.x;
                if (pos.y != null && my) my.textContent = pos.y;
            }

            // ── Flag row ────────────────────────────────────────────────────
            let _lastKeyTime = 0,
                _lastMouseTime = 0;

            function flagKey(name) {
                _lastKeyTime = Date.now();
                document.getElementById("flag-key-name").textContent =
                    name || "—";
                _updateFlagStyles();
            }

            function flagMouse(name) {
                _lastMouseTime = Date.now();
                document.getElementById("flag-mouse-name").textContent =
                    name || "—";
                _updateFlagStyles();
            }

            function _updateFlagStyles() {
                const kRecent = _lastKeyTime >= _lastMouseTime;
                document
                    .getElementById("flag-key-pill")
                    .classList.toggle(
                        "flag-recent",
                        kRecent && _lastKeyTime > 0,
                    );
                document
                    .getElementById("flag-mouse-pill")
                    .classList.toggle(
                        "flag-recent",
                        !kRecent && _lastMouseTime > 0,
                    );
            }

            // ── Tab switching ───────────────────────────────────────────────
            function switchTab(tab) {
                document
                    .querySelectorAll(".tab")
                    .forEach((t) =>
                        t.classList.toggle("active", t.id === "tab-" + tab),
                    );
                document
                    .querySelectorAll(".tab-section")
                    .forEach((s) =>
                        s.classList.toggle("active", s.id === tab + "-section"),
                    );
                // Scroll the newly-visible log to the bottom
                const log = document.getElementById(tab + "-log");
                if (log) log.scrollTop = log.scrollHeight;
            }

            // ── Button actions ──────────────────────────────────────────────
            function clearLog() {
                document.getElementById("keys-log").innerHTML = "";
                document.getElementById("mouse-log").innerHTML = "";
                lp.sendToHost({ action: "clear" });
            }

            function onCoordModeChange(mode) {
                lp.sendToHost({ action: "setCoordMode", mode: mode });
            }

            // ── Expose for Lua evaluateJavaScript ───────────────────────────
            window.updateActiveKeys = updateActiveKeys;
            window.updateMouseState = updateMouseState;
            window.updateMousePos   = updateMousePos;

            // ── Init ────────────────────────────────────────────────────────
            document.addEventListener("DOMContentLoaded", () => {
                if (typeof registerPanel === "function") {
                    registerPanel("keys", function(action, body) {
                        if (action === "appendEntry" && body) appendEntry(body);
                        else if (action === "loadHistory" && body) loadHistory(body);
                        else if (action === "updateActiveKeys" && body) updateActiveKeys(body);
                        else if (action === "updateMouseState" && body) updateMouseState(body);
                    });
                }
                if (window.shellPost) {
                    var p = document.getElementById("panel");
                    if (p) { p.style.borderRadius = "0"; p.style.clipPath = "none"; }
                }
                lp.sendToHost({ action: "ready" });
            });
    })();
    </script>


    <!-- ═══ Panel: window ═══════════════════════════════════════════════════════ -->
    <script>
    /* panel: window */
    (function() {
    "use strict";
// ── Window buildRow ─────────────────────────────────────────────
            function buildRow(entry) {
                const row = document.createElement("div");
                row.className = "entry";

                const ts = document.createElement("span");
                ts.className = "ts";
                ts.textContent = entry.ts || "";
                row.appendChild(ts);

                const dot = document.createElement("span");
                dot.className = "entry-dot";
                dot.innerHTML = ICONS.dot;
                row.appendChild(dot);

                const app = document.createElement("span");
                app.className = "entry-app";
                app.textContent = entry.app || "";
                row.appendChild(app);

                const sep = document.createElement("span");
                sep.className = "entry-sep";
                sep.innerHTML = ICONS["chevron-right"];
                row.appendChild(sep);

                const title = document.createElement("span");
                title.className = "entry-title";
                title.textContent = entry.title || "";
                row.appendChild(title);

                if (entry.w != null && entry.h != null) {
                    const pill = document.createElement("span");
                    pill.className = "dim-pill";
                    pill.textContent = entry.w + "\u00d7" + entry.h;
                    row.appendChild(pill);
                }

                row.onmouseenter = function() { lp.playSlot("hover"); };
                row.onclick = lp._handleEntryClick;
                return row;
            }

            // ── Create LogPanel ─────────────────────────────────────────────
            const _panel = document.querySelector('.panel-window');
            const lp = createLogPanel({
                channel: "window",
                buildRow,
                container: _panel,
                maxEntries: 500,
                scrollThresh: 48,
                extractCopyText(el) {
                    const ts = el.querySelector(".ts")?.textContent || "";
                    const app = el.querySelector(".entry-app")?.textContent || "";
                    const title = el.querySelector(".entry-title")?.textContent || "";
                    const dim = el.querySelector(".dim-pill")?.textContent || "";
                    const parts = [ts, app];
                    if (title) parts.push(title);
                    if (dim) parts.push(dim);
                    return parts.join(" ");
                },
            });

            // ── Expose globals for inline handlers ──────────────────────────
            window._panelPauseFns['window'] = lp.togglePause;
            window.playSlot    = lp.playSlot;
            window._panelClearFns['window'] = lp.clearLog;
            window.closePanel  = lp.closePanel;
            window.windowApplyTheme = lp.applyTheme;

            // ── Current window display ──────────────────────────────────────
            function updateCurrentWindow(entry) {
                const empty = _panel ? _panel.querySelector("#current-empty") : document.getElementById("current-empty");
                const appEl = _panel ? _panel.querySelector("#current-app") : document.getElementById("current-app");
                const titleEl = _panel ? _panel.querySelector("#current-title") : document.getElementById("current-title");
                const dimEl = _panel ? _panel.querySelector("#current-dim") : document.getElementById("current-dim");

                if (!empty || !appEl || !titleEl || !dimEl) return;

                if (!entry || (!entry.app && !entry.title)) {
                    empty.style.display = "";
                    appEl.style.display = "none";
                    titleEl.style.display = "none";
                    dimEl.style.display = "none";
                    return;
                }

                empty.style.display = "none";
                appEl.style.display = "";
                titleEl.style.display = "";
                dimEl.style.display = "";

                appEl.textContent = entry.app || "";
                titleEl.textContent = entry.title || "";
                dimEl.textContent =
                    entry.w != null && entry.h != null
                        ? entry.w + "\u00d7" + entry.h + " px"
                        : "";
            }

            // ── Override loadHistory to also update current ─────────────────
            const _baseLoad = lp.loadHistory;

            function loadHistory(entries) {
                _baseLoad(entries);
                if (entries && entries.length > 0) {
                    updateCurrentWindow(entries[entries.length - 1]);
                }
            }

            window.updateCurrentWindow = updateCurrentWindow;

            // ── Init ────────────────────────────────────────────────────────
            document.addEventListener("DOMContentLoaded", () => {
                if (typeof registerPanel === "function") {
                    registerPanel("window", function(action, body) {
                        if (action === "updateCurrentWindow" && body) updateCurrentWindow(body);
                        else if (action === "loadHistory" && body) loadHistory(body);
                    });
                }
                if (window.shellPost) {
                    var p = document.getElementById("panel");
                    if (p) { p.style.borderRadius = "0"; p.style.clipPath = "none"; }
                }
                lp.sendToHost({ action: "ready" });
            });
    })();
    </script>


    <!-- ═══ Panel: settings ═══════════════════════════════════════════════════════ -->
    <script>
    /* panel: settings */
    (function() {
    "use strict";
// ── State ──────────────────────────────────────────────────────────
            let S = {};
            let _openSections = new Set();
            let _openSoundPicker = null;
            let _modalResolve = null;
            let _toastTimer = null;
            let _ctxTarget = null; // { macro: m } — what was right-clicked

            // ── Context menu ───────────────────────────────────────────────────
            function closeCtxMenu() {
                const el = document.getElementById("ctx-menu");
                el.classList.remove("open");
                _ctxTarget = null;
            }

            function showCtxMenu(x, y, items, title) {
                const el = document.getElementById("ctx-menu");
                el.innerHTML = "";
                if (title) {
                    const hdr = document.createElement("div");
                    hdr.className = "ctx-header";
                    hdr.textContent = title;
                    el.appendChild(hdr);
                }
                for (const item of items) {
                    if (item === "divider") {
                        const d = document.createElement("div");
                        d.className = "ctx-divider";
                        el.appendChild(d);
                        continue;
                    }
                    const row = document.createElement("div");
                    row.className = "ctx-item" + (item.danger ? " danger" : "");
                    if (item.icon) {
                        const ico = document.createElement("span");
                        ico.className = "ctx-icon";
                        ico.textContent = item.icon;
                        row.appendChild(ico);
                    }
                    const lbl = document.createElement("span");
                    lbl.textContent = item.label;
                    row.appendChild(lbl);
                    row.addEventListener("mouseenter", () => playSlot("hover"));
                    row.addEventListener("click", (e) => {
                        e.stopPropagation();
                        playSlot("interact");
                        closeCtxMenu();
                        item.action();
                    });
                    el.appendChild(row);
                }

                // Position: try to stay within viewport
                el.classList.add("open");
                const mw = el.offsetWidth || 160;
                const mh = el.offsetHeight || 80;
                const vw = window.innerWidth;
                const vh = window.innerHeight;
                el.style.left = Math.min(x, vw - mw - 4) + "px";
                el.style.top = Math.min(y, vh - mh - 4) + "px";
            }

            // Close ctx menu and reload dropdown on any left-click or Escape.
            // preventDefault on contextmenu suppresses the native WebKit menu everywhere.
            function closeReloadDropdown() {
                const el = document.getElementById("reloadDropdown");
                if (el) el.classList.remove("open");
            }
            document.addEventListener("click", (e) => {
                closeCtxMenu();
                if (!e.target.closest(".reload-dropdown")) closeReloadDropdown();
            });
            const _macrosPanel = document.querySelector('.panel-macros');
            document.addEventListener("contextmenu", (e) => {
                if (_macrosPanel && getComputedStyle(_macrosPanel).display === "none") return;
                e.preventDefault();
                closeCtxMenu();
                closeReloadDropdown();
            });
            document.addEventListener("keydown", (e) => {
                if (_macrosPanel && getComputedStyle(_macrosPanel).display === "none") return;
                if (e.key === "Escape") { closeCtxMenu(); closeReloadDropdown(); }
            });

            // ── Quick-Reload option checkboxes ──────────────────────────────
            function toggleQR(el) {
                const key = el.dataset.qr;
                if (!key) return;
                const now = !el.classList.contains("checked");
                el.classList.toggle("checked", now);
                playSlot("interact");
                sendToHost({ action: "setQROption", key: key, value: now });
            }
            // Sync checkbox states from the Lua state object.
            function syncQRChecks(qr) {
                if (!qr) return;
                document.querySelectorAll(".qr-check[data-qr]").forEach(el => {
                    const key = el.dataset.qr;
                    const on = qr[key] !== false;
                    el.classList.toggle("checked", on);
                });
            }

            // ── Bridge ─────────────────────────────────────────────────────────
            function sendToHost(msg) {
                const s = typeof msg === "string" ? msg : JSON.stringify(msg);
                if (window.shellPost) {
                    // Running inside the Macro Lab shell — route through msShell channel
                    const data = typeof msg === "string" ? JSON.parse(msg) : msg;
                    window.shellPost("settings", data.action || "unknown", data);
                } else if (window.chrome?.webview) {
                    window.chrome.webview.postMessage(s);
                } else {
                    window.webkit.messageHandlers.ms.postMessage(s);
                }
            }

            // ── Shell integration ─────────────────────────────────────────────
            // When loaded inside the shell, register as a panel so shellDispatch
            // can route incoming Lua pushes (state, theme) to receiveState().
            if (window.registerPanel) {
                window.registerPanel("settings", function(action, body) {
                    if (action === "state" && body) {
                        receiveState(body);
                    } else if (action === "theme" && body) {
                        applyTheme(body);
                    }
                });
            }

            // ── Window drag ────────────────────────────────────────────────────
            // borderless windows ignore -webkit-app-region (isMovable=false by default)
            // so we implement drag manually via the Lua moveWindow action.
            let _dragging = false; // script-level so playSlot can read it
            (function () {
                let _drag = null;
                document
                    .getElementById("header")
                    .addEventListener("mousedown", (e) => {
                        if (
                            e.target.closest(
                                ".header-btns, button, input, select",
                            )
                        )
                            return;
                        _drag = { ox: e.screenX, oy: e.screenY };
                        _dragging = true;
                        const onMove = (ev) => {
                            if (!_drag) return;
                            sendToHost({
                                action: "moveWindow",
                                dx: ev.screenX - _drag.ox,
                                dy: ev.screenY - _drag.oy,
                            });
                            _drag.ox = ev.screenX;
                            _drag.oy = ev.screenY;
                        };
                        const onUp = () => {
                            _drag = null;
                            _dragging = false;
                            window.removeEventListener("mousemove", onMove);
                            window.removeEventListener("mouseup", onUp);
                        };
                        window.addEventListener("mousemove", onMove);
                        window.addEventListener("mouseup", onUp);
                    });
            })();

            // ── Sound ──────────────────────────────────────────────────────────
            const _lastSlot = {};
            function playSlot(slot) {
                if (_dragging) return; // window is being dragged; skip hover sounds
                if (slot === "hover" && !document.hasFocus()) return;
                const now = Date.now();
                if (now - (_lastSlot[slot] || 0) < 50) return;
                _lastSlot[slot] = now;
                sendToHost({ action: "playSlot", slot });
            }

            // ── Toast ──────────────────────────────────────────────────────────
            function showAlert(msg, duration) {
                const el = document.getElementById("toast");
                el.textContent = msg;
                el.classList.add("visible");
                clearTimeout(_toastTimer);
                _toastTimer = setTimeout(
                    () => el.classList.remove("visible"),
                    duration || 3000,
                );
            }

            function hideToast() {
                const el = document.getElementById("toast");
                el.classList.remove("visible");
                clearTimeout(_toastTimer);
                _toastTimer = null;
            }

            // ── Modal ──────────────────────────────────────────────────────────
            function openModal(
                title,
                msg,
                confirmLabel = "OK",
                cancelLabel = "Cancel",
                withInput = false,
                defaultVal = "",
            ) {
                return new Promise((resolve) => {
                    _modalResolve = resolve;
                    document.getElementById("modal-title").textContent = title;
                    document.getElementById("modal-msg").textContent = msg;
                    const inp = document.getElementById("modal-input");
                    if (withInput) {
                        inp.classList.add("show");
                        inp.value = defaultVal;
                        setTimeout(() => inp.focus(), 100);
                    } else {
                        inp.classList.remove("show");
                    }
                    document.getElementById("modal-confirm").textContent =
                        confirmLabel;
                    document.getElementById("modal-cancel").textContent =
                        cancelLabel;
                    document
                        .getElementById("modal-overlay")
                        .classList.add("open");
                });
            }
            function closeModal(confirmed) {
                const val = document.getElementById("modal-input").value;
                document
                    .getElementById("modal-overlay")
                    .classList.remove("open");
                if (_modalResolve) {
                    _modalResolve({ confirmed, value: val });
                    _modalResolve = null;
                }
            }
            window.openModal = openModal;
            window.closeModal = closeModal;

            // Called by Lua via evaluateJavaScript to show a modal and report the
            // result back through the 'modalResult' action. Always displayed above
            // all panel content via the existing z-index: 400 modal overlay.
            function openLuaModal(d) {
                openModal(
                    d.title || "",
                    d.msg || "",
                    d.confirm || "OK",
                    d.cancel || "Cancel",
                    !!d.hasInput,
                    d.inputDefault || "",
                ).then((r) => {
                    sendToHost({
                        action: "modalResult",
                        confirmed: r.confirmed,
                        value: r.value || "",
                    });
                });
            }

            document
                .getElementById("modal-overlay")
                .addEventListener("click", (e) => {
                    if (e.target === e.currentTarget) closeModal(false);
                });
            // Global Enter/Escape for all modals (including confirm-only where
            // the input field is hidden and its own keydown handler won't fire).
            document.addEventListener("keydown", (e) => {
                const overlay = document.getElementById("modal-overlay");
                if (!overlay || !overlay.classList.contains("open")) return;
                if (e.key === "Enter") {
                    // Don't double-fire if focus is on the input (its own handler runs).
                    if (document.activeElement === document.getElementById("modal-input")) return;
                    e.preventDefault();
                    playSlot("interact");
                    closeModal(true);
                }
                if (e.key === "Escape") {
                    e.preventDefault();
                    playSlot("back");
                    closeModal(false);
                }
            });
            document
                .getElementById("modal-input")
                .addEventListener("keydown", (e) => {
                    if (e.key === "Enter") {
                        playSlot("interact");
                        closeModal(true);
                    }
                    if (e.key === "Escape") {
                        playSlot("back");
                        closeModal(false);
                    }
                });

            // ── Helpers ────────────────────────────────────────────────────────
            function h(tag, attrs = {}, ...children) {
                const el = document.createElement(tag);
                for (const [k, v] of Object.entries(attrs)) {
                    if (k === "cls") el.className = v;
                    else if (k.startsWith("on"))
                        el.addEventListener(k.slice(2), v);
                    else el.setAttribute(k, v);
                }
                for (const c of children) {
                    if (c == null) continue;
                    el.appendChild(
                        typeof c === "string" ? document.createTextNode(c) : c,
                    );
                }
                return el;
            }

            function toggle(checked, onchange) {
                const label = h(
                    "label",
                    { cls: "toggle" },
                    h("input", { type: "checkbox", onchange }),
                    h("div", { cls: "toggle-track" }),
                    h("div", { cls: "toggle-thumb" }),
                );
                label.querySelector("input").checked = checked;
                return label;
            }

            function seg(options, active, onselect) {
                const wrap = h("div", { cls: "seg" });
                for (const o of options) {
                    const btn = h(
                        "button",
                        {
                            cls:
                                "seg-btn" +
                                (o.value === active ? " active" : ""),
                            onmouseenter: () => playSlot("hover"),
                            onclick: () => {
                                playSlot("interact");
                                onselect(o.value);
                            },
                        },
                        o.label,
                    );
                    wrap.appendChild(btn);
                }
                return wrap;
            }

            function section(id, title, buildFn, defaultOpen = false) {
                const isOpen = _openSections.has(id);
                const head = h(
                    "div",
                    { cls: "section-head" + (isOpen ? " open" : "") },
                    h("span", { cls: "section-chevron" }, "▶"),
                    h("span", { cls: "section-title" }, title),
                );
                const body = h("div", {
                    cls: "section-body" + (isOpen ? " open" : ""),
                });
                buildFn(body);
                head.addEventListener("mouseenter", () => playSlot("hover"));
                head.addEventListener("click", () => {
                    playSlot("interact");
                    const open = !_openSections.has(id);
                    if (open) _openSections.add(id);
                    else _openSections.delete(id);
                    head.classList.toggle("open", open);
                    body.classList.toggle("open", open);
                    if (open) {
                        // Wait for the CSS max-height transition (250ms) then scroll
                        // the bottom of the newly-expanded section into view.
                        setTimeout(() => {
                            const wrap = head.parentElement;
                            wrap.scrollIntoView({
                                block: "nearest",
                                behavior: "smooth",
                            });
                        }, 260);
                    }
                });
                const wrap = h("div", { cls: "section" });
                wrap.appendChild(head);
                wrap.appendChild(body);
                return wrap;
            }

            function row(
                label,
                sublabel,
                control,
                extra = "",
                ctxItems = null,
            ) {
                const r = h("div", {
                    cls: "row " + extra,
                    onmouseenter: () => playSlot("hover"),
                });
                const lbl = h("div", { cls: "row-label" }, label);
                if (sublabel) lbl.appendChild(h("small", {}, sublabel));
                r.appendChild(lbl);
                if (control) r.appendChild(control);
                r.addEventListener("contextmenu", (e) => {
                    e.preventDefault();
                    e.stopPropagation();
                    if (ctxItems && ctxItems.length > 0) {
                        playSlot("interact");
                        showCtxMenu(e.clientX, e.clientY, ctxItems, label);
                    }
                });
                return r;
            }

            function btnRow(...buttons) {
                const wrap = h("div", { cls: "btn-row" });
                for (const b of buttons) wrap.appendChild(b);
                return wrap;
            }

            function actionBtn(label, cls, action) {
                return h(
                    "button",
                    {

                        onmouseenter: () => playSlot("hover"),
                        onclick: () => {

                        },
