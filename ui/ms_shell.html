<!doctype html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Macro Lab Shell</title>
    <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Almendra:ital,wght@0,400;0,700;1,400;1,700&display=swap">
    <style>
        /* ═══ UNIFIED DESIGN SYSTEM ═══════════════════════════════════════════ */
        /* Layer 1: Tokens ─────────────────────────────────────────────────────── */
        :root {
            --bg: #0e0e0e; --surface: #1a1a1a; --surface2: #252525; --hover: #333333;
            --accent: #cccccc; --accent-hi: #e8e8e8; --success: #888888;
            --danger-bg: #1a1616; --danger: #d8d8d8; --warning: #aaaaaa;
            --text: #d8d8d8; --text2: rgba(200,200,200,0.85); --text3: rgba(160,160,160,0.55);
            --border: rgba(100,100,100,0.55); --border-dim: rgba(100,100,100,0.18);
            --border-faint: rgba(100,100,100,0.08);
            --accent-glow: rgba(196,26,26,0.4); --accent-glow-faint: rgba(196,26,26,0.12);
            --danger-glow: rgba(212,32,32,0.6); --danger-border: rgba(212,32,32,0.3);
            --mouse: #aaaaaa; --scroll: #888888;
            --recording: #dc3232; --recording-text: #ff6b6b; --recording-bg: rgba(220,50,50,0.2);
            --running: #64a0ff; --running-text: #88bbff; --running-bg: rgba(100,160,255,0.15);
            --success-state: #3cb44b; --success-text: #6bdc7b; --success-bg: rgba(60,180,75,0.15);
            --error-state: #dc3232; --error-text: #ff6b6b; --error-bg: rgba(220,50,50,0.15);
            --radius: 2px; --radius-s: 1px;
            --font: "Almendra", Arial, sans-serif;
            --font-mono: "SF Mono", "Menlo", monospace;
            --transition: 120ms ease;
            --rail-w: 140px;
        }

        /* Layer 2: Reset ──────────────────────────────────────────────────────── */
        *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; user-select: none; -webkit-user-select: none; }
        html, body { width: 100%; height: 100%; overflow: hidden; background: var(--bg); color: var(--text); font-family: var(--font); font-size: 13px; line-height: 1.5; -webkit-font-smoothing: antialiased; }
        body { display: flex; flex-direction: row; }
        button { cursor: pointer; border: none; background: none; color: inherit; font: inherit; }
        input, select { font: inherit; color: inherit; background: none; border: none; outline: none; }
        input[type="range"] { -webkit-appearance: none; appearance: none; }

        /* Layer 3: Shared Components ───────────────────────────────────────────── */

        /* ── SVG Icon ── */
        .icon { width: 16px; height: 16px; flex-shrink: 0; }

        /* ── Icon Button ── */
        .icon-btn {
            display: flex; align-items: center; justify-content: center;
            width: 28px; height: 28px; border: none; border-radius: var(--radius);
            background: transparent; color: var(--text3); cursor: pointer;
            transition: color var(--transition), background var(--transition);
        }
        .icon-btn:hover { color: var(--accent-hi); background: var(--hover); }
        .icon-btn .icon { width: 16px; height: 16px; }

        /* ── Left Rail ── */
        #rail {
            width: var(--rail-w); min-width: var(--rail-w); height: 100%;
            background: var(--surface); border-right: 1px solid var(--border-dim);
            display: flex; flex-direction: column; padding: 8px 0; gap: 2px; overflow-y: auto;
        }
        .rail-item {
            display: flex; align-items: center; gap: 8px; padding: 7px 14px;
            border-radius: var(--radius); color: var(--text2); font-size: 12px;
            cursor: pointer; transition: background 0.1s, color 0.1s; position: relative;
        }
        .rail-item:hover { background: var(--hover); color: var(--text); }
        .rail-item.active { background: var(--surface2); color: var(--accent-hi); }
        .rail-item.active::before {
            content: ""; position: absolute; left: 0; top: 4px; bottom: 4px;
            width: 2px; background: var(--accent); border-radius: 1px;
        }
        .rail-item .icon { opacity: 0.7; }
        .rail-item.active .icon { opacity: 1; }
        .rail-spacer { flex: 1; }
        .rail-item.popped-out { opacity: 0.5; }

        /* ── Content Area ── */
        #content { flex: 1; height: 100%; overflow: hidden; position: relative; display: flex; align-items: center; justify-content: center; }

        /* ── Panel Base ── */
        [class^="panel-"] { width: 100%; height: 100%; display: none; flex-direction: column; overflow: hidden; }
        #panel { display: flex; flex-direction: column; flex: 1; min-height: 0; overflow: hidden; }

        /* ── Panel Header ── */
        #header {
            display: flex; align-items: center; gap: 8px;
            padding: 10px 12px 8px;
            background: var(--surface);
            border-bottom: 1px solid var(--border);
            box-shadow: 0 1px 12px color-mix(in srgb, var(--accent) 12%, transparent);
            flex-shrink: 0;
            -webkit-app-region: drag;
        }
        #panel-title, #status-text { flex: 1; font-weight: 600; font-size: 13px; }
        .header-btns { display: flex; gap: 4px; -webkit-app-region: no-drag; }

        /* ── Ghost Button ── */
        .btn-ghost {
            padding: 5px 8px; border-radius: var(--radius-s);
            background: var(--surface2); color: var(--text2);
            font-size: 11px; font-weight: 500; text-align: center;
            transition: background 0.15s, color 0.15s;
        }
        .btn-ghost:hover { background: var(--hover); color: var(--text); }

        /* ── Close Button ── */
        .btn-close {
            width: 22px; height: 22px; border-radius: 50%;
            background: var(--surface2); color: var(--text2);
            font-size: 12px; display: flex; align-items: center; justify-content: center;
            -webkit-app-region: no-drag; transition: background 0.15s;
        }
        .btn-close:hover { background: var(--hover); color: var(--text); }

        /* ── Pop-out Button ── */
        .btn-popout {
            width: 22px; height: 22px; border-radius: 50%;
            background: var(--surface2); color: var(--text2);
            font-size: 12px; display: flex; align-items: center; justify-content: center;
            -webkit-app-region: no-drag; transition: background 0.15s;
        }
        .btn-popout:hover { background: var(--hover); color: var(--text); }
        .btn-popout .icon { width: 14px; height: 14px; }

        /* ── Macro Button ── */
        .btn-macro {
            padding: 3px 10px; border-radius: 20px; font-size: 11px;
            font-weight: 600; transition: opacity 0.15s;
        }
        .btn-macro:hover { opacity: 0.8; }
        .btn-enable { background: var(--success); color: #1e2214; }
        .btn-disable { background: var(--danger-bg); color: var(--danger); border: 1px solid var(--danger-border); }

        /* ── Input ── */
        .input, #code-input {
            flex: 1; background: var(--surface2); border: 1px solid var(--border);
            border-radius: var(--radius); padding: 5px 8px; color: var(--text);
            font: 12px var(--font-mono); outline: none; transition: border-color 0.15s;
            user-select: text; -webkit-user-select: text;
        }
        .input::placeholder, #code-input::placeholder { color: var(--text2); opacity: 0.55; }
        .input:focus, #code-input:focus { border-color: var(--accent); }

        /* ── Badge ── */
        .badge {
            flex-shrink: 0; padding: 1px 5px; border-radius: var(--radius-s);
            font: 700 10px var(--font-mono); letter-spacing: 0.05em;
            text-transform: uppercase; border: 1px solid transparent;
        }
        .badge-print { background: var(--surface2); color: var(--text2); border-color: var(--border); }
        .badge-result { background: color-mix(in srgb, var(--success) 20%, transparent); color: var(--success); border-color: color-mix(in srgb, var(--success) 45%, transparent); }
        .badge-error { background: color-mix(in srgb, var(--danger) 20%, transparent); color: var(--danger); border-color: color-mix(in srgb, var(--danger) 45%, transparent); }
        .badge-macro { background: color-mix(in srgb, var(--success) 20%, transparent); color: var(--success); border-color: color-mix(in srgb, var(--success) 45%, transparent); }
        .badge-key { background: var(--surface2); color: var(--text); border-color: var(--text3); }
        .badge-mouse { background: color-mix(in srgb, var(--warning) 20%, transparent); color: var(--warning); border-color: color-mix(in srgb, var(--warning) 45%, transparent); }
        .badge-input { background: transparent; color: var(--text2); font-style: italic; border-color: transparent; }
        .badge-sound { background: color-mix(in srgb, var(--accent) 15%, transparent); color: var(--accent); border-color: color-mix(in srgb, var(--accent) 40%, transparent); }
        .badge-scroll { background: color-mix(in srgb, var(--scroll) 20%, transparent); color: var(--scroll); }

        /* ── Log Container ── */
        #log, .log {
            flex: 1; overflow-y: auto; overflow-x: hidden; padding: 4px 0; min-height: 0;
            scrollbar-width: thin; scrollbar-color: var(--border) transparent;
        }
        #log::-webkit-scrollbar, .log::-webkit-scrollbar { width: 5px; }
        #log::-webkit-scrollbar-track, .log::-webkit-scrollbar-track { background: transparent; }
        #log::-webkit-scrollbar-thumb, .log::-webkit-scrollbar-thumb { background: var(--border); border-radius: var(--radius); }

        /* ── Entry ── */
        .entry {
            display: flex; align-items: flex-start; gap: 6px;
            padding: 5px 12px; font-size: 12px; border-bottom: 1px solid var(--border-dim);
        }
        .entry:hover { background: var(--surface); }
        .entry.selected { background: var(--hover); outline: 1px solid var(--accent-glow); }
        .entry.selected:hover { background: var(--accent-glow-faint); }
        .entry .ts { color: var(--text3); font: 10px var(--font-mono); flex-shrink: 0; padding-top: 1px; min-width: 52px; }
        .entry .msg { flex: 1; word-break: break-word; white-space: pre-wrap; }
        .entry-result .msg, .entry-error .msg, .entry-input .msg { font: 12px var(--font-mono); }
        .entry-error .msg { color: var(--danger); }
        .entry-input .msg { color: var(--text2); font-style: italic; }

        /* ── Step (watcher) ── */
        .step {
            display: flex; align-items: flex-start; gap: 6px;
            padding: 3px 12px 3px 36px; font-size: 11px; opacity: 0.45;
            border-bottom: 1px solid var(--border-faint);
        }
        .step:hover { opacity: 0.7; }
        .step.selected { background: var(--hover); outline: 1px solid var(--accent-glow); }
        .step.selected:hover { background: var(--accent-glow-faint); }
        .step-msg { color: var(--text2); word-break: break-word; flex: 1; }

        /* ── Pill ── */
        .pill {
            display: inline-flex; align-items: center; padding: 1px 7px;
            border-radius: 20px; font: 700 10px var(--font-mono);
            background: var(--surface2); border: 1px solid var(--border); color: var(--text2);
            flex-shrink: 0;
        }
        .pill.accent { background: var(--accent); color: #fff; }
        .pill.success { background: var(--success); color: #1e2214; }
        .pill.danger { background: var(--danger); color: #fff; }
        .pill.warning { background: var(--warning); color: #1a1208; }

        /* ── Input Bar ── */
        #inputbar {
            display: flex; align-items: center; gap: 8px;
            padding: 8px 12px; background: var(--surface);
            border-top: 1px solid var(--border); flex-shrink: 0;
        }
        #run-btn {
            padding: 5px 12px; border-radius: var(--radius); font-size: 11px;
            font-weight: 700; background: var(--accent); color: var(--bg);
            transition: opacity 0.15s; -webkit-app-region: no-drag;
        }
        #run-btn:hover { opacity: 0.85; }

        /* ── Context Menu ── */
        #ctx-menu {
            position: fixed; min-width: 140px; background: var(--surface2);
            border: 1px solid var(--border); border-radius: var(--radius-s);
            box-shadow: 0 8px 24px rgba(0,0,0,0.55); z-index: 150;
            overflow: hidden; display: none;
        }
        #ctx-menu.open { display: block; }
        .ctx-header {
            padding: 5px 10px 4px; font-size: 10px; font-weight: 600;
            color: var(--text3); text-transform: uppercase; letter-spacing: 0.5px;
            border-bottom: 1px solid var(--border);
        }
        .ctx-item {
            display: flex; align-items: center; gap: 8px; padding: 7px 10px;
            font-size: 12px; color: var(--text2); cursor: pointer;
            transition: background 0.1s, color 0.1s;
        }
        .ctx-item:hover { background: var(--hover); color: var(--text); }
        .ctx-item.danger { color: var(--danger); }
        .ctx-item.danger:hover { background: var(--danger-bg); }
        .ctx-item .ctx-icon { font-size: 11px; width: 14px; text-align: center; flex-shrink: 0; opacity: 0.7; }
        .ctx-divider { height: 1px; background: var(--border); margin: 2px 0; }

        /* ═══ WATCHER-SPECIFIC ════════════════════════════════════════════════ */
        .panel-watcher .dot { font-size: 7px; color: var(--accent); flex-shrink: 0; padding-top: 2px; }
        .panel-watcher .msg .sub-sep { color: var(--text3); margin: 0 3px; }
        .panel-watcher .msg .sub-name { color: var(--text); }

        /* Mute classes */
        #log.mute-wait .step[data-cat="wait"],
        #log.mute-sound .step[data-cat="sound"],
        #log.mute-cam .step[data-cat="cam"],
        #log.mute-keys .step[data-cat="keys"],
        #log.mute-mouse .step[data-cat="mouse"],
        #log.mute-scroll .step[data-cat="scroll"],
        #log.mute-copy .step[data-cat="copy"] { display: none; }

        /* Filter panel */
        #filter-panel {
            position: absolute; bottom: 0; right: 0; width: 200px;
            background: var(--surface); border-top: 1px solid var(--border);
            border-left: 1px solid var(--border); border-radius: var(--radius) 0 0 0;
            padding: 8px 0; display: none; box-shadow: -2px -2px 12px rgba(0,0,0,0.4); z-index: 10;
        }
        #filter-panel.open { display: block; }
        .filter-row { display: flex; align-items: center; gap: 8px; padding: 5px 12px; cursor: pointer; }
        .filter-row:hover { background: var(--hover); }
        .filter-row.muted .filter-label { opacity: 0.4; text-decoration: line-through; }
        .filter-dot { width: 8px; height: 8px; border-radius: 50%; flex-shrink: 0; background: var(--dot-clr, var(--text3)); transition: background 0.1s, opacity 0.1s; }
        .filter-row.muted .filter-dot { background: var(--border); opacity: 0.6; }
        .filter-label { font-size: 12px; flex: 1; color: var(--text); }
        .filter-sep { height: 1px; background: var(--border); margin: 4px 12px; }
        .filter-clear { padding: 5px 12px; font-size: 11px; color: var(--text2); cursor: pointer; text-align: center; }
        .filter-clear:hover { color: var(--text); }

        /* ═══ KEYS-SPECIFIC ═══════════════════════════════════════════════════ */
        #flag-row { display: flex; align-items: center; padding: 7px 12px; gap: 8px; background: var(--surface); border-bottom: 1px solid var(--border); flex-shrink: 0; }
        .flag-pill { display: flex; align-items: center; gap: 5px; padding: 3px 8px; border-radius: 20px; background: var(--surface2); border: 1px solid var(--border); font-size: 11px; color: var(--text2); transition: border-color 0.2s, color 0.2s; flex: 1; }
        .flag-pill.flag-recent { border-color: var(--accent); color: var(--text); }
        .flag-label { font-size: 10px; font-weight: 700; color: var(--text3); text-transform: uppercase; letter-spacing: 0.05em; }
        #flag-key-name, #flag-mouse-name { font: 12px var(--font-mono); }
        .flag-sep { color: var(--border); font-size: 16px; flex-shrink: 0; }

        #tabs { display: flex; background: var(--surface); border-bottom: 1px solid var(--border); flex-shrink: 0; }
        .tab { flex: 1; padding: 7px 12px; font-size: 12px; font-weight: 600; color: var(--text2); text-align: center; cursor: pointer; border-bottom: 2px solid transparent; border-top: none; border-left: none; border-right: none; background: none; transition: color 0.15s, border-color 0.15s; -webkit-app-region: no-drag; }
        .tab:hover { color: var(--text); }
        .tab.active { color: var(--accent); border-bottom-color: var(--accent); }

        .tab-section { display: none; flex-direction: column; flex: 1; overflow: hidden; }
        .tab-section.active { display: flex; }

        .state-section { padding: 8px 12px; background: var(--surface); border-bottom: 1px solid var(--border); flex-shrink: 0; }
        .section-label { font: 700 9px var(--font-mono); letter-spacing: 0.1em; color: var(--text3); text-transform: uppercase; margin-bottom: 5px; }
        #keys-pills, #mouse-pills { display: flex; flex-wrap: wrap; gap: 4px; min-height: 22px; }
        .panel-keys .pill { display: inline-flex; align-items: center; padding: 2px 8px; border-radius: 3px; font-size: 12px; font-family: inherit; white-space: nowrap; }
        .pill-key { background: var(--surface2); border: 1px solid var(--border); color: var(--text2); }
        .pill-mouse { background: color-mix(in srgb, var(--warning) 15%, transparent); border: 1px solid var(--warning); color: var(--warning); }
        .pill-empty { opacity: 0.4; }

        #coord-row { display: flex; align-items: center; gap: 8px; margin-bottom: 6px; }
        #pos-display { font: 12px var(--font-mono); color: var(--text2); flex: 1; }
        #coord-select { background: var(--surface2); border: 1px solid var(--border); color: var(--text2); border-radius: var(--radius-s); padding: 2px 6px; font-size: 11px; outline: none; cursor: pointer; -webkit-appearance: none; flex-shrink: 0; }
        #coord-select:hover { border-color: var(--accent); color: var(--text); }
        #coord-select option { background: var(--surface2); color: var(--text); }

        .section-divider { height: 1px; background: var(--border); flex-shrink: 0; }

        .arrow { flex-shrink: 0; }
        .arrow-down { color: var(--accent); }
        .arrow-up { color: var(--text2); }
        .arrow-mouse { color: var(--mouse); }
        .arrow-scroll { color: var(--scroll); }
        .arrow-move { color: var(--text3); }

        .key-name { color: var(--text); word-break: break-word; }
        .mouse-name { color: var(--mouse); word-break: break-word; }
        .scroll-name { color: var(--scroll); word-break: break-word; }
        .move-name { color: var(--text3); font-variant-numeric: tabular-nums; font-family: var(--font-mono); }
        .dim { color: var(--text3); font: 10px var(--font-mono); }

        /* ═══ WINDOW-SPECIFIC ═════════════════════════════════════════════════ */
        #current { padding: 10px 12px; background: var(--surface); border-bottom: 1px solid var(--border); flex-shrink: 0; display: flex; flex-direction: column; justify-content: center; gap: 3px; }
        #current-empty { color: var(--text3); font-style: italic; font-size: 12px; }
        #current-app { color: var(--accent); font-weight: 700; font-size: 14px; display: none; }
        #current-title { color: var(--text); font-size: 12px; display: none; word-break: break-word; white-space: pre-wrap; }
        #current-dim { color: var(--text2); font: 11px var(--font-mono); display: none; }
        .entry-dot { color: var(--accent); flex-shrink: 0; }
        .entry-app { color: var(--accent); font-weight: 600; flex-shrink: 0; }
        .entry-sep { color: var(--text3); flex-shrink: 0; padding: 0 2px; }
        .entry-title { flex: 1; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; min-width: 0; }
        .dim-pill { font: 10px var(--font-mono); padding: 1px 5px; border-radius: var(--radius-s); background: var(--surface2); border: 1px solid var(--border); color: var(--text2); flex-shrink: 0; }
        .move-entry { opacity: 0.5; }

        /* ═══ SETTINGS-SPECIFIC ════════════════════════════════════════════════ */
        #status-dot { width: 8px; height: 8px; border-radius: 50%; background: var(--success); flex-shrink: 0; transition: background 0.2s; }
        #status-dot.off { background: var(--danger); box-shadow: 0 0 4px var(--danger-glow); }

        #quick-row { display: flex; gap: 6px; padding: 7px 12px; background: var(--surface); border-bottom: 1px solid var(--border); flex-shrink: 0; }
        .reload-dropdown { position: relative; flex: 1; }
        .reload-dd-btn { width: 100%; }
        .reload-dd-menu { display: none; position: absolute; top: calc(100% + 3px); left: 0; right: 0; background: var(--surface2); border: 1px solid var(--border); border-radius: var(--radius); z-index: 100; overflow: hidden; box-shadow: 0 4px 16px rgba(0,0,0,0.5); }
        .reload-dropdown.open .reload-dd-menu { display: block; }
        .reload-dd-item { display: block; width: 100%; padding: 6px 12px; font-size: 11px; font-weight: 500; color: var(--text2); text-align: left; transition: background 0.12s, color 0.12s; }
        .reload-dd-item:hover { background: var(--hover); color: var(--text); }
        .reload-dd-full { color: var(--accent); }
        .reload-dd-full:hover { color: var(--accent-hi); }
        .reload-dd-sep { height: 1px; background: var(--border); margin: 2px 0; }
        .reload-dd-row { display: flex; align-items: center; gap: 6px; padding: 0 8px; }
        .reload-dd-row:hover { background: var(--hover); }
        .reload-dd-row .reload-dd-item { flex: 1; padding: 6px 4px; }
        .reload-dd-row .reload-dd-item:hover { background: transparent; }
        .qr-check { display: inline-flex; align-items: center; justify-content: center; width: 14px; height: 14px; border-radius: 3px; border: 1.5px solid var(--text2); font-size: 10px; line-height: 1; color: transparent; cursor: pointer; flex-shrink: 0; transition: border-color 0.12s, background 0.12s, color 0.12s; }
        .qr-check.checked { background: var(--accent); border-color: var(--accent); color: var(--bg); }

        #scroll { flex: 1; overflow-y: auto; overflow-x: hidden; padding: 8px 0 20px; }
        #scroll::-webkit-scrollbar { width: 4px; }
        #scroll::-webkit-scrollbar-track { background: transparent; }
        #scroll::-webkit-scrollbar-thumb { background: var(--surface2); border-radius: 2px; }

        .section { margin: 0 8px 4px; border-radius: var(--radius); overflow: hidden; }
        .section-head { display: flex; align-items: center; gap: 6px; padding: 9px 12px; background: var(--surface); cursor: pointer; box-shadow: inset 2px 0 0 transparent; transition: background 0.15s, box-shadow 0.15s; }
        .section-head:hover { background: var(--surface2); box-shadow: inset 2px 0 0 var(--accent-glow); }
        .section-chevron { font-size: 9px; color: var(--text3); transition: transform 0.2s; flex-shrink: 0; }
        .section-head.open .section-chevron { transform: rotate(90deg); color: var(--accent); }
        .section-title { font-weight: 700; font-size: 11px; color: var(--text2); text-transform: uppercase; letter-spacing: 1.5px; flex: 1; }
        .section-body { background: var(--surface); border-top: 1px solid var(--border); max-height: 0; overflow: hidden; transition: max-height 0.25s ease; }

        .step-block:hover .step-actions { opacity: 1; }
        .step-action-btn { width: 18px; height: 18px; display: flex; align-items: center; justify-content: center; border-radius: var(--radius-s); cursor: pointer; opacity: 0.5; transition: opacity 0.1s, background 0.1s; }
        .step-action-btn:hover { opacity: 1; background: var(--hover); }
        .step-action-btn svg { width: 12px; height: 12px; }
        .step-action-btn svg path, .step-action-btn svg g { stroke: var(--text); fill: none; }
        .step-action-btn.del:hover { background: var(--danger-bg); }
        .step-action-btn.del:hover svg path, .step-action-btn.del:hover svg g { stroke: var(--danger); }
        .step-block-container { display: flex; flex-direction: column; }
        .step-nest-body { margin-left: 20px; border-left: 2px solid var(--border-dim); padding-left: 8px; padding-top: 2px; padding-bottom: 2px; display: flex; flex-direction: column; gap: 2px; min-height: 28px; position: relative; }
        .step-nest-body.drag-target { border-left-color: var(--accent); background: var(--accent-glow-faint); border-radius: var(--radius); }
        .step-nest-label { font-size: 9px; font-weight: 700; text-transform: uppercase; letter-spacing: 0.6px; color: var(--text3); padding: 2px 0 0; }
        .step-nest-body-empty { font-size: 10px; color: var(--text3); font-style: italic; padding: 4px 0; opacity: 0.6; }
        .step-nest-toggle { width: 14px; height: 14px; flex-shrink: 0; display: flex; align-items: center; justify-content: center; cursor: pointer; opacity: 0.5; transition: opacity 0.15s, transform 0.15s; font-size: 10px; color: var(--text); }
        .step-nest-toggle:hover { opacity: 1; }
        .step-nest-toggle.collapsed { transform: rotate(-90deg); }
        .step-nest-toggle svg { width: 12px; height: 12px; }
        .step-nest-toggle svg path { stroke: var(--text); fill: none; }
        .step-nest-body.collapsed { display: none; }

        .fn-picker-overlay { position: absolute; top: 0; right: 0; bottom: 0; width: 440px; max-width: 70%; background: var(--surface); border-left: 1px solid var(--border-dim); box-shadow: -4px 0 16px rgba(0,0,0,0.3); display: flex; flex-direction: column; z-index: 30; transform: translateX(100%); transition: transform 0.2s ease; }
        .fn-picker-overlay.open { transform: translateX(0); }
        .fn-picker-overlay .fn-picker { width: 100%; height: 100%; }
        .fn-picker-overlay .fn-picker-list { width: 180px; min-width: 180px; }
        .fn-picker-overlay-header { display: flex; align-items: center; justify-content: space-between; padding: 6px 10px; border-bottom: 1px solid var(--border-dim); flex-shrink: 0; }
        .fn-picker-overlay-title { font-size: 11px; font-weight: 700; text-transform: uppercase; letter-spacing: 0.8px; color: var(--text3); }
        .fn-picker-overlay-close { width: 22px; height: 22px; display: flex; align-items: center; justify-content: center; border-radius: var(--radius); cursor: pointer; opacity: 0.5; transition: opacity 0.1s, background 0.1s; }
        .fn-picker-overlay-close:hover { opacity: 1; background: var(--hover); }
        .fn-picker-overlay-close svg { width: 14px; height: 14px; }
        .fn-picker-overlay-close svg path { stroke: var(--text); fill: none; }

    </style>

    <!-- ═══ Shared: log-panel.js (inlined) ════════════════════════════════════ -->
    <script>
    (function() {
    "use strict";

    /* ── log-panel.js ──────────────────────────────────────────────────── */
/**
 * LogPanel — shared factory for ms-utils dev-tool log panels.
 *
 * Encapsulates the near-identical boilerplate copied across Console, Watcher,
 * Keys, and Window panels: pause toggle, entry selection, copy, context menu,
 * keyboard shortcuts, header drag, scroll management, and theme injection.
 *
 * Each panel supplies its own buildRow(), channel name, and optional overrides.
 *
 * Usage (in an HTML <script type="module">):
 *
 *   import { createLogPanel } from "./modules/log-panel.js";
 *
 *   const lp = createLogPanel({
 *     channel: "msConsole",
 *     buildRow(entry) { ... return HTMLElement; },
 *     container: document.querySelector('.panel-console'), // scopes #log lookups
 *     // optional overrides:
 *     entrySelector: "#log .entry, #log .step",
 *     extractCopyText(el) { return "..."; },
 *     clearAction: "clearLog",
 *   });
 *
 *   // Expose for inline handlers
 *   window.togglePause = lp.togglePause;
 *   window.appendEntry = lp.appendEntry;
 *   window.loadHistory = lp.loadHistory;
 *   window.closePanel  = lp.closePanel;
 *   window.clearLog    = lp.clearLog;
 *   window.playSlot    = lp.playSlot;
 */

// ── Theme ────────────────────────────────────────────────────────────────
function hexToRgb(hex) {
    hex = hex.replace(/^#/, "");
    if (hex.length === 3) hex = hex[0]+hex[0]+hex[1]+hex[1]+hex[2]+hex[2];
    const n = parseInt(hex, 16);
    return { r: (n >> 16) & 255, g: (n >> 8) & 255, b: n & 255 };
}

function applyTheme(t) {
    if (!t) return;
    const r = document.documentElement.style;
    if (t.bg) r.setProperty("--bg", t.bg);
    if (t.surface) r.setProperty("--surface", t.surface);
    if (t.surface2) r.setProperty("--surface2", t.surface2);
    if (t.hover) r.setProperty("--hover", t.hover);
    if (t.accent) r.setProperty("--accent", t.accent);
    if (t.accentHi) r.setProperty("--accent-hi", t.accentHi);
    if (t.success) r.setProperty("--success", t.success);
    if (t.dangerBg) r.setProperty("--danger-bg", t.dangerBg);
    if (t.danger) r.setProperty("--danger", t.danger);
    if (t.warning) r.setProperty("--warning", t.warning);
    if (t.text) r.setProperty("--text", t.text);
    if (t.text && !t.text2) {
        const c = hexToRgb(t.text);
        if (c) r.setProperty("--text2", `rgba(${c.r},${c.g},${c.b},0.85)`);
    }
    if (t.text && !t.text3) {
        const c = hexToRgb(t.text);
        if (c) r.setProperty("--text3", `rgba(${c.r},${c.g},${c.b},0.55)`);
    }
    if (t.accent && t.hover && !t.border) {
        const a = hexToRgb(t.accent);
        const h = hexToRgb(t.hover);
        if (a && h) {
            const mr = Math.round(a.r * 0.5 + h.r * 0.5);
            const mg = Math.round(a.g * 0.5 + h.g * 0.5);
            const mb = Math.round(a.b * 0.5 + h.b * 0.5);
            r.setProperty("--border", `rgba(${mr},${mg},${mb},0.55)`);
            r.setProperty("--border-dim", `rgba(${mr},${mg},${mb},0.18)`);
        }
    }
    if (t.accent && !t.accentGlow) {
        const a = hexToRgb(t.accent);
        if (a) r.setProperty("--accent-glow", `rgba(${a.r},${a.g},${a.b},0.4)`);
    }
    if (t.accent && !t.accentGlowFaint) {
        const a = hexToRgb(t.accent);
        if (a) r.setProperty("--accent-glow-faint", `rgba(${a.r},${a.g},${a.b},0.12)`);
    }
    if (t.danger && !t.dangerGlow) {
        const d = hexToRgb(t.danger);
        if (d) r.setProperty("--danger-glow", `rgba(${d.r},${d.g},${d.b},0.6)`);
    }
    if (t.danger && !t.dangerBorder) {
        const d = hexToRgb(t.danger);
        if (d) r.setProperty("--danger-border", `rgba(${d.r},${d.g},${d.b},0.3)`);
    }
    if (t.text2) r.setProperty("--text2", t.text2);
    if (t.text3) r.setProperty("--text3", t.text3);
    if (t.border) r.setProperty("--border", t.border);
    if (t.borderDim) r.setProperty("--border-dim", t.borderDim);
    if (t.accentGlow) r.setProperty("--accent-glow", t.accentGlow);
    if (t.accentGlowFaint) r.setProperty("--accent-glow-faint", t.accentGlowFaint);
    if (t.dangerGlow) r.setProperty("--danger-glow", t.dangerGlow);
    if (t.dangerBorder) r.setProperty("--danger-border", t.dangerBorder);
    if (t.mouse) r.setProperty("--mouse", t.mouse);
    if (t.scroll) r.setProperty("--scroll", t.scroll);
    if (t.radius !== undefined) {
        r.setProperty("--radius", t.radius + "px");
        r.setProperty("--radius-s", Math.max(0, t.radius - 1) + "px");
    }
    if (t.font) {
        if (t.fontURL) {
            let el = document.getElementById("_ms-custom-font");
            if (!el) {
                el = document.createElement("style");
                el.id = "_ms-custom-font";
                document.head.appendChild(el);
            }
            el.textContent = `@font-face { font-family: "${t.font}"; src: url("${t.fontURL}"); }`;
        }
        document.body.style.fontFamily = `"${t.font}", Almendra, Palatino, Georgia, serif`;
    }
}

// ── Default copy text extractor ──────────────────────────────────────────
function defaultExtractCopyText(el) {
    const ts = el.querySelector(".ts")?.textContent || "";
    const badge = (el.querySelector(".badge")?.textContent || "").toUpperCase();
    // Try .msg first, then .step-msg, then gather all text content as fallback
    let msg = el.querySelector(".msg")?.textContent || "";
    if (!msg) msg = el.querySelector(".step-msg")?.textContent || "";
    if (!msg) {
        // Fallback: gather non-ts, non-badge text from child spans
        const parts = [];
        el.querySelectorAll(".key-name, .mouse-name, .scroll-name, .arrow, .dim, .input").forEach(s => {
            const t = s.textContent?.trim();
            if (t) parts.push(t);
        });
        msg = parts.join(" ");
    }
    const repeat = el.querySelector(".repeat-badge")?.textContent || "";
    const prefix = badge ? `${ts} [${badge}]` : ts;
    const suffix = repeat ? ` ${repeat}` : '';
    return msg ? `${prefix} ${msg}${suffix}` : `${prefix}${suffix}`;
}

// ── Time helpers ─────────────────────────────────────────────────────────
function pad2(n) { return String(n).padStart(2, "0"); }

function nowTs() {
    const d = new Date();
    return (
        pad2(d.getHours()) + ":" +
        pad2(d.getMinutes()) + ":" +
        pad2(d.getSeconds())
    );
}

// ── Scroll primitives ────────────────────────────────────────────────────
function _isNearBottom(logEl, thresh) {
    if (!logEl) return false;
    return (
        logEl.scrollHeight - logEl.scrollTop - logEl.clientHeight <=
        thresh
    );
}

function _trimLog(logEl, max) {
    while (logEl.childElementCount > max) {
        logEl.removeChild(logEl.firstElementChild);
    }
}

// ── Factory ──────────────────────────────────────────────────────────────
/**
 * @param {Object} config
 * @param {string} config.channel        - WebKit message handler name
 * @param {function} config.buildRow     - (entry) => HTMLElement
 * @param {string} [config.entrySelector="#log .entry, #log .step"]
 * @param {function} [config.extractCopyText] - (el) => string
 * @param {string} [config.clearAction="clearLog"] - global fn name for Clear
 * @param {number} [config.maxEntries=300]
 * @param {number} [config.scrollThresh=48]
 * @returns {Object} controller with methods to expose as globals
 */
function createLogPanel(config) {
    const {
        channel,
        buildRow,
        container = null,
        entrySelector = "#log .entry, #log .step",
        extractCopyText = defaultExtractCopyText,
        clearAction = "clearLog",
        maxEntries = 300,
        scrollThresh = 48,
    } = config;

    // Scoped DOM queries — container.querySelector finds the right #log
    // even when multiple panels share the same id="log"
    const _root = container || document;
    function _byId(id) { return _root.querySelector('#' + id); }
    function _queryAll(sel) { return _root.querySelectorAll(sel); }

    // ── Host bridge ────────────────────────────────────────────────────
    function sendToHost(msg) {
        const s = typeof msg === "string" ? msg : JSON.stringify(msg);
        if (window.shellPost) {
            // Running inside the Macro Lab shell — route through msShell channel
            const data = typeof msg === "string" ? JSON.parse(msg) : msg;
            window.shellPost(channel, data.action || "unknown", data);
        } else {
            try {
                window.webkit.messageHandlers[channel].postMessage(s);
            } catch (e) {}
        }
    }

    function playSlot(slot) {
        if (slot === "hover" && !document.hasFocus()) return;
        sendToHost({ action: "playSlot", slot });
    }

    // ── Pause state ────────────────────────────────────────────────────
    let _paused = false;
    function togglePause() {
        _paused = !_paused;
        const btn = _byId("pause-btn");
        if (btn) btn.textContent = _paused ? "Resume" : "Pause";
    }

    // ── Selection state ────────────────────────────────────────────────
    const _selected = new Set();
    let _lastClicked = null;

    function _getEntries() {
        return Array.from(_queryAll(entrySelector));
    }

    function _updateSelectionVisuals() {
        for (const el of _getEntries()) {
            el.classList.toggle("selected", _selected.has(el));
        }
    }

    function _handleEntryClick(e) {
        const row = e.currentTarget;
        const entries = _getEntries();
        const idx = entries.indexOf(row);
        if (idx === -1) return;
        playSlot("interact");

        if (e.shiftKey && _lastClicked !== null) {
            const lo = Math.min(_lastClicked, idx);
            const hi = Math.max(_lastClicked, idx);
            for (let i = lo; i <= hi; i++) _selected.add(entries[i]);
        } else if (e.metaKey || e.ctrlKey) {
            if (_selected.has(row)) _selected.delete(row);
            else _selected.add(row);
        } else {
            if (_selected.has(row) && _selected.size === 1) {
                _selected.delete(row);
            } else {
                _selected.clear();
                _selected.add(row);
            }
        }
        _lastClicked = idx;
        _updateSelectionVisuals();
    }

    function _copySelected() {
        if (_selected.size === 0) return;
        const lines = [];
        for (const el of _getEntries()) {
            if (_selected.has(el)) {
                lines.push(extractCopyText(el));
            }
        }
        const text = lines.join("\n");
        // Try native clipboard first, fall back to host
        try {
            navigator.clipboard.writeText(text).catch(() => {
                if (typeof shellDispatch === "function") {
                    shellDispatch("_shell", "clipboard", { text });
                }
            });
        } catch (_) {
            if (typeof shellDispatch === "function") {
                shellDispatch("_shell", "clipboard", { text });
            }
        }
        playSlot("update");
    }

    function _selectAll() {
        _selected.clear();
        for (const el of _getEntries()) _selected.add(el);
        _updateSelectionVisuals();
    }

    // ── Context menu ───────────────────────────────────────────────────
    function closeCtxMenu() {
        const el = _byId("ctx-menu");
        if (el) el.classList.remove("open");
    }

    function showCtxMenu(x, y, items) {
        const el = _byId("ctx-menu");
        if (!el) return;
        el.innerHTML = "";
        for (const item of items) {
            if (item === "divider") {
                const d = document.createElement("div");
                d.className = "ctx-divider";
                el.appendChild(d);
                continue;
            }
            const row = document.createElement("div");
            row.className = "ctx-item";
            row.textContent = item.label;
            row.addEventListener("mouseenter", () => playSlot("hover"));
            row.addEventListener("click", (e) => {
                e.stopPropagation();
                playSlot("interact");
                closeCtxMenu();
                item.action();
            });
            el.appendChild(row);
        }
        el.classList.add("open");
        const mw = el.offsetWidth || 140;
        const mh = el.offsetHeight || 80;
        const vw = window.innerWidth;
        const vh = window.innerHeight;
        el.style.left = Math.min(x, vw - mw - 4) + "px";
        el.style.top = Math.min(y, vh - mh - 4) + "px";
    }

    // Suppress native context menu, show custom menu
    document.addEventListener("contextmenu", (e) => {
        // Only handle when this panel is visible
        if (container && container.style.display === "none") return;
        if (container && getComputedStyle(container).display === "none") return;
        e.preventDefault();
        const row = e.target.closest(".entry, .step");
        const items = [];
        if (row && !_selected.has(row)) {
            _selected.clear();
            _selected.add(row);
            _updateSelectionVisuals();
        }
        if (_selected.size > 0) {
            items.push({ label: "Copy", action: _copySelected });
            items.push("divider");
        }
        items.push({ label: "Select All", action: _selectAll });
        items.push({
            label: "Clear",
            action: () => {
                if (typeof window[clearAction] === "function") window[clearAction]();
            },
        });
        showCtxMenu(e.clientX, e.clientY, items);
    });

    document.addEventListener("click", () => closeCtxMenu());

    // ── Keyboard shortcuts ─────────────────────────────────────────────
    document.addEventListener("keydown", (e) => {
        if (e.key === "Escape") closeCtxMenu();
        // Only handle shortcuts when this panel is visible
        if (container && container.style.display === "none") return;
        if (container && getComputedStyle(container).display === "none") return;
        const inInput = e.target.tagName === "INPUT" || e.target.tagName === "TEXTAREA";
        if ((e.metaKey || e.ctrlKey) && e.key === "a" && !inInput) {
            e.preventDefault();
            _selectAll();
        }
        if ((e.metaKey || e.ctrlKey) && e.key === "c" && !inInput && _selected.size > 0) {
            e.preventDefault();
            _copySelected();
        }
    });

    // ── Header drag ────────────────────────────────────────────────────
    (function () {
        let _drag = null;
        const header = _byId("header");
        if (!header) return;
        header.addEventListener("mousedown", (e) => {
            if (e.button !== 0) return;
            if (e.target.closest(".header-btns")) return;
            _drag = { ox: e.screenX, oy: e.screenY };
            const onMove = (ev) => {
                if (!_drag) return;
                sendToHost({
                    action: "move",
                    dx: ev.screenX - _drag.ox,
                    dy: ev.screenY - _drag.oy,
                });
                _drag.ox = ev.screenX;
                _drag.oy = ev.screenY;
            };
            const onUp = () => {
                _drag = null;
                window.removeEventListener("mousemove", onMove);
                window.removeEventListener("mouseup", onUp);
            };
            window.addEventListener("mousemove", onMove);
            window.addEventListener("mouseup", onUp);
        });
    })();

    // ── Default appendEntry / loadHistory (single #log) ────────────────
    const _lastByLabel = {};
    const _pendingHolds = {}; // label+key → { row, ts }

    function _entryKey(entry) {
        let msg = entry.msg || '';
        // Strip leading [label] prefix (already tracked by _entryLabel)
        msg = msg.replace(/^\[[^\]]+\]\s+/, '');
        // Strip key direction indicators for collapsing: "↓ W" / "↑ W" → "key W"
        msg = msg.replace(/^[↓↑]\s+/, 'key ');
        return (entry.type || '') + '|' + msg + '|' + (entry.event || '');
    }

    function _entryLabel(entry) {
        const m = (entry.msg || '').match(/^\[([^\]]+)\]\s/);
        return m ? m[1] : (entry.label || entry.type || '_default');
    }

    function _isKeyDown(entry) {
        return (entry.msg || '').includes('] ↓ ');
    }

    function _isKeyUp(entry) {
        return (entry.msg || '').includes('] ↑ ');
    }

    function _holdKey(entry) {
        // Extract key name from "[label] ↓ W" → "W"
        const m = (entry.msg || '').match(/\] [↓↑]\s+(.+)$/);
        return m ? m[1] : null;
    }

    function appendEntry(entry) {
        if (_paused) return;
        const log = _byId("log");
        if (!log) return;
        const atBottom = _isNearBottom(log, scrollThresh);
        const label = _entryLabel(entry);

        // Key hold tracking: ↓ stores pending, ↑ replaces with hold entry
        if (_isKeyDown(entry)) {
            const keyName = _holdKey(entry);
            if (keyName) {
                const holdId = label + ':' + keyName;
                const row = buildRow(entry);
                row.dataset.holdId = holdId;
                _pendingHolds[holdId] = { row, ts: entry.ts };
                log.appendChild(row);
                // Update _lastByLabel so this doesn't also get consecutive-collapsed
                const key = _entryKey(entry);
                _lastByLabel[label] = { key, row, count: 1 };
                _trimLog(log, maxEntries);
                if (atBottom) log.scrollTop = log.scrollHeight;
                return;
            }
        }

        if (_isKeyUp(entry)) {
            const keyName = _holdKey(entry);
            if (keyName) {
                const holdId = label + ':' + keyName;
                const pending = _pendingHolds[holdId];
                if (pending && pending.row && pending.row.parentNode) {
                    // Replace the ↓ row with a hold row
                    const holdRow = document.createElement('div');
                    holdRow.className = 'step';
                    holdRow.dataset.cat = 'keys';
                    const ts = document.createElement('span');
                    ts.className = 'ts';
                    ts.textContent = '[' + (entry.ts || '') + ']';
                    const msg = document.createElement('span');
                    msg.className = 'step-msg';
                    msg.textContent = '[' + label + '] hold ' + keyName;
                    holdRow.append(ts, msg);
                    holdRow.onmouseenter = function() { lp.playSlot('hover'); };
                    holdRow.onclick = lp._handleEntryClick;
                    pending.row.replaceWith(holdRow);
                    delete _pendingHolds[holdId];
                    // Clear lastByLabel so next entry for this label starts fresh
                    delete _lastByLabel[label];
                    _trimLog(log, maxEntries);
                    if (atBottom) log.scrollTop = log.scrollHeight;
                    return;
                }
            }
        }

        // Default: consecutive suppression per label
        const key = _entryKey(entry);
        const prev = _lastByLabel[label];

        if (prev && prev.key === key && prev.row && prev.row.parentNode) {
            prev.count++;
            let badge = prev.row.querySelector('.repeat-badge');
            if (!badge) {
                badge = document.createElement('span');
                badge.className = 'repeat-badge';
                badge.style.cssText = 'font-size:10px;color:var(--text3);margin-left:4px;flex-shrink:0;';
                prev.row.appendChild(badge);
            }
            badge.textContent = '×' + prev.count;
        } else {
            const row = buildRow(entry);
            _lastByLabel[label] = { key, row, count: 1 };
            log.appendChild(row);
        }

        _trimLog(log, maxEntries);
        if (atBottom) log.scrollTop = log.scrollHeight;
    }

    function loadHistory(entries) {
        const log = _byId("log");
        if (!log) return;
        log.innerHTML = "";
        for (const k in _lastByLabel) delete _lastByLabel[k];
        for (const k in _pendingHolds) delete _pendingHolds[k];
        const capped =
            entries && entries.length > maxEntries
                ? entries.slice(-maxEntries)
                : entries || [];
        const frag = document.createDocumentFragment();
        capped.forEach((e) => frag.appendChild(buildRow(e)));
        log.appendChild(frag);
        log.scrollTop = log.scrollHeight;
    }

    // ── Actions ────────────────────────────────────────────────────────
    function clearLog() {
        const log = _byId("log");
        if (log) log.innerHTML = "";
        sendToHost({ action: "clear" });
    }

    function closePanel() {
        sendToHost({ action: "close" });
    }

    // ── Controller ─────────────────────────────────────────────────────
    return {
        sendToHost,
        playSlot,
        togglePause,
        appendEntry,
        loadHistory,
        clearLog,
        closePanel,
        getSelected: () => _selected,
        isPaused: () => _paused,
        applyTheme,
        hexToRgb,
        pad2,
        nowTs,
        // Primitives for panels that override appendEntry/loadHistory
        isNearBottom: (logEl) => _isNearBottom(logEl, scrollThresh),
        trimLog: (logEl) => _trimLog(logEl, maxEntries),
        buildRow,
        maxEntries,
        _handleEntryClick,
        _updateSelectionVisuals,
    };
}


    window.createLogPanel = createLogPanel;

    })();
