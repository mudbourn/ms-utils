<!doctype html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Macro Lab Shell</title>
    <style>
        /* ── Fonts ─────────────────────────────────────────────────────────── */
        @font-face {
            font-family: "Almendra";
            src: url("./fonts/Almendra-Regular.ttf") format("truetype");
            font-weight: 400;
            font-style: normal;
        }
        @font-face {
            font-family: "Almendra";
            src: url("./fonts/Almendra-Bold.ttf") format("truetype");
            font-weight: 700;
            font-style: normal;
        }

        /* ── Tokens (overridden by applyTheme) ────────────────────────────── */
        :root {
            --bg: #0e0e0e;
            --surface: #1a1a1a;
            --surface2: #252525;
            --hover: #333333;
            --accent: #cccccc;
            --accent-hi: #e8e8e8;
            --success: #888888;
            --danger-bg: #1a1616;
            --danger: #d8d8d8;
            --warning: #aaaaaa;
            --text: #d8d8d8;
            --text2: rgba(200, 200, 200, 0.85);
            --text3: rgba(160, 160, 160, 0.55);
            --border: rgba(100, 100, 100, 0.55);
            --border-dim: rgba(100, 100, 100, 0.18);
            --radius: 2px;
            --radius-s: 1px;
            --rail-w: 140px;
        }

        /* ── Reset ────────────────────────────────────────────────────────── */
        *,
        *::before,
        *::after {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            user-select: none;
            -webkit-user-select: none;
        }

        html,
        body {
            width: 100%;
            height: 100%;
            overflow: hidden;
            background: var(--bg);
            color: var(--text);
            font-family: Arial, "Almendra", Palatino, Georgia, serif;
            font-size: 13px;
            line-height: 1.5;
            -webkit-font-smoothing: antialiased;
        }

        body {
            display: flex;
            flex-direction: row;
        }

        button {
            cursor: pointer;
            border: none;
            background: none;
            color: inherit;
            font: inherit;
        }

        /* ── Left Rail ────────────────────────────────────────────────────── */
        #rail {
            width: var(--rail-w);
            min-width: var(--rail-w);
            height: 100%;
            background: var(--surface);
            border-right: 1px solid var(--border-dim);
            display: flex;
            flex-direction: column;
            padding: 8px 0;
            gap: 2px;
            overflow-y: auto;
        }

        #rail-title {
            padding: 8px 14px 12px;
            font-size: 11px;
            font-weight: 700;
            color: var(--text3);
            text-transform: uppercase;
            letter-spacing: 1.2px;
        }

        .rail-item {
            display: flex;
            align-items: center;
            gap: 8px;
            padding: 7px 14px;
            border-radius: var(--radius);
            color: var(--text2);
            font-size: 12px;
            cursor: pointer;
            transition: background 0.1s, color 0.1s;
            position: relative;
        }

        .rail-item:hover {
            background: var(--hover);
            color: var(--text);
        }

        .rail-item.active {
            background: var(--surface2);
            color: var(--accent-hi);
        }

        .rail-item.active::before {
            content: "";
            position: absolute;
            left: 0;
            top: 4px;
            bottom: 4px;
            width: 2px;
            background: var(--accent);
            border-radius: 1px;
        }

        .rail-icon {
            width: 16px;
            height: 16px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 13px;
            opacity: 0.7;
        }

        .rail-item.active .rail-icon {
            opacity: 1;
        }

        /* Pop-out button (appears on hover) */
        .rail-popout {
            position: absolute;
            right: 6px;
            top: 50%;
            transform: translateY(-50%);
            width: 18px;
            height: 18px;
            border-radius: 3px;
            background: transparent;
            color: var(--text3);
            font-size: 10px;
            display: flex;
            align-items: center;
            justify-content: center;
            opacity: 0;
            transition: opacity 0.15s, background 0.1s, color 0.1s;
            pointer-events: none;
        }

        .rail-item:hover .rail-popout {
            opacity: 1;
            pointer-events: auto;
        }

        .rail-popout:hover {
            background: var(--hover);
            color: var(--accent-hi);
        }

        .rail-item.popped-out .rail-popout {
            opacity: 0.6;
            pointer-events: auto;
            color: var(--accent);
        }

        .rail-item.popped-out {
            opacity: 0.5;
        }

        .rail-spacer {
            flex: 1;
        }

        #rail-version {
            padding: 8px 14px;
            font-size: 10px;
            color: var(--text3);
        }

        /* ── Content Area ─────────────────────────────────────────────────── */
        #content {
            flex: 1;
            height: 100%;
            overflow: hidden;
            position: relative;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        #content-empty {
            color: var(--text3);
            font-size: 12px;
            text-align: center;
            line-height: 1.8;
        }

        #content-empty span {
            display: block;
            font-size: 24px;
            margin-bottom: 8px;
            opacity: 0.3;
        }

        /* Panel slots (hidden by default, shown when active) */
        .panel-slot {
            display: none;
            width: 100%;
            height: 100%;
        }

        .panel-slot.visible {
            display: block;
        }

        /* ── Macros Panel: Function Picker ──────────────────────────── */
        .fn-picker {
            display: flex;
            flex-direction: row;
            width: 100%;
            height: 100%;
            overflow: hidden;
        }

        /* Left: function list */
        .fn-picker-list {
            width: 240px;
            min-width: 240px;
            border-right: 1px solid var(--border-dim);
            display: flex;
            flex-direction: column;
            background: var(--surface);
        }

        .fn-picker-search {
            padding: 8px 10px;
            border-bottom: 1px solid var(--border-dim);
        }

        .fn-picker-search input {
            width: 100%;
            background: var(--surface2);
            border: 1px solid var(--border-dim);
            border-radius: var(--radius);
            color: var(--text);
            font-size: 11px;
            padding: 5px 8px;
            outline: none;
            font-family: inherit;
            user-select: text;
            -webkit-user-select: text;
        }

        .fn-picker-search input::placeholder {
            color: var(--text3);
        }

        .fn-picker-search input:focus {
            border-color: var(--accent);
        }

        .fn-picker-entries {
            flex: 1;
            overflow-y: auto;
            padding: 4px 0;
        }

        .fn-entry {
            display: flex;
            align-items: center;
            gap: 6px;
            padding: 5px 12px;
            cursor: pointer;
            font-size: 11px;
            color: var(--text2);
            transition: background 0.1s, color 0.1s;
            border-left: 2px solid transparent;
        }

        .fn-entry:hover {
            background: var(--hover);
            color: var(--text);
        }

        .fn-entry.active {
            background: var(--surface2);
            color: var(--accent-hi);
            border-left-color: var(--accent);
        }

        .fn-entry-sig {
            font-family: "SF Mono", "Menlo", "Consolas", monospace;
            font-size: 11px;
        }

        .fn-entry-label {
            color: var(--text3);
            font-size: 10px;
            margin-left: auto;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
            max-width: 80px;
        }

        /* Right: detail panel */
        .fn-picker-detail {
            flex: 1;
            display: flex;
            flex-direction: column;
            overflow: hidden;
        }

        .fn-detail-header {
            padding: 14px 16px 10px;
            border-bottom: 1px solid var(--border-dim);
        }

        .fn-detail-name {
            font-family: "SF Mono", "Menlo", "Consolas", monospace;
            font-size: 14px;
            color: var(--accent-hi);
            font-weight: 700;
        }

        .fn-detail-desc {
            font-size: 11px;
            color: var(--text3);
            margin-top: 4px;
            line-height: 1.4;
        }

        .fn-detail-body {
            flex: 1;
            overflow-y: auto;
            padding: 12px 16px;
        }

        /* Parameter form */
        .fn-params {
            display: flex;
            flex-direction: column;
            gap: 12px;
        }

        .fn-param-group {
            display: flex;
            flex-direction: column;
            gap: 4px;
        }

        .fn-param-label {
            font-size: 10px;
            font-weight: 700;
            text-transform: uppercase;
            letter-spacing: 0.8px;
            color: var(--text3);
            display: flex;
            align-items: center;
            gap: 6px;
        }

        .fn-param-type {
            font-size: 9px;
            font-weight: 400;
            color: var(--accent);
            background: rgba(196, 26, 26, 0.12);
            padding: 1px 5px;
            border-radius: var(--radius-s);
            text-transform: none;
            letter-spacing: 0;
        }

        .fn-param input[type="text"],
        .fn-param input[type="number"] {
            width: 100%;
            background: var(--surface2);
            border: 1px solid var(--border-dim);
            border-radius: var(--radius);
            color: var(--text);
            font-size: 12px;
            padding: 5px 8px;
            outline: none;
            font-family: "SF Mono", "Menlo", "Consolas", monospace;
            user-select: text;
            -webkit-user-select: text;
        }

        .fn-param input:focus {
            border-color: var(--accent);
        }

        /* Key capture button */
        .fn-key-capture {
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .fn-key-btn {
            background: var(--surface2);
            border: 1px solid var(--border-dim);
            border-radius: var(--radius);
            color: var(--text);
            font-family: "SF Mono", "Menlo", "Consolas", monospace;
            font-size: 12px;
            padding: 5px 12px;
            cursor: pointer;
            transition: border-color 0.15s, background 0.15s;
            min-width: 60px;
            text-align: center;
            user-select: text;
            -webkit-user-select: text;
        }

        .fn-key-btn:hover {
            border-color: var(--accent);
        }

        .fn-key-btn.capturing {
            border-color: var(--accent);
            background: rgba(196, 26, 26, 0.15);
            color: var(--accent-hi);
            animation: fn-pulse 1s ease-in-out infinite;
        }

        @keyframes fn-pulse {
            0%, 100% { opacity: 1; }
            50% { opacity: 0.6; }
        }

        .fn-key-hint {
            font-size: 10px;
            color: var(--text3);
        }

        /* Modifiers checkboxes */
        .fn-mods-row {
            display: flex;
            gap: 2px;
        }

        .fn-mod-chip {
            display: flex;
            align-items: center;
            justify-content: center;
            background: var(--surface2);
            border: 1px solid var(--border-dim);
            border-radius: var(--radius);
            color: var(--text3);
            font-family: "SF Mono", "Menlo", "Consolas", monospace;
            font-size: 10px;
            padding: 4px 8px;
            cursor: pointer;
            transition: all 0.1s;
            user-select: none;
            -webkit-user-select: none;
        }

        .fn-mod-chip:hover {
            border-color: var(--accent);
            color: var(--text);
        }

        .fn-mod-chip.on {
            background: rgba(196, 26, 26, 0.15);
            border-color: var(--accent);
            color: var(--accent-hi);
        }

        /* No-params message */
        .fn-no-params {
            color: var(--text3);
            font-size: 11px;
            font-style: italic;
            padding: 8px 0;
        }

        /* Add-to-macro footer */
        .fn-detail-footer {
            padding: 10px 16px;
            border-top: 1px solid var(--border-dim);
            display: flex;
            gap: 8px;
            align-items: center;
        }

        .fn-add-btn {
            background: var(--accent);
            color: var(--bg);
            border: none;
            border-radius: var(--radius);
            font-size: 11px;
            font-weight: 700;
            padding: 6px 16px;
            cursor: pointer;
            transition: opacity 0.15s;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }

        .fn-add-btn:hover {
            opacity: 0.85;
        }

        .fn-add-btn:disabled {
            opacity: 0.3;
            cursor: default;
        }

        .fn-step-preview {
            flex: 1;
            font-family: "SF Mono", "Menlo", "Consolas", monospace;
            font-size: 10px;
            color: var(--text3);
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }

        /* Detail empty state */
        .fn-detail-empty {
            flex: 1;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            color: var(--text3);
            font-size: 11px;
            gap: 6px;
        }

        .fn-detail-empty span {
            font-size: 28px;
            opacity: 0.25;
        }

        /* Scrollbar styling */
        .fn-picker-entries::-webkit-scrollbar,
        .fn-detail-body::-webkit-scrollbar {
            width: 4px;
        }
        .fn-picker-entries::-webkit-scrollbar-track,
        .fn-detail-body::-webkit-scrollbar-track {
            background: transparent;
        }
        .fn-picker-entries::-webkit-scrollbar-thumb,
        .fn-detail-body::-webkit-scrollbar-thumb {
            background: var(--border-dim);
            border-radius: 2px;
        }
        .fn-picker-entries::-webkit-scrollbar-thumb:hover,
        .fn-detail-body::-webkit-scrollbar-thumb:hover {
            background: var(--border);
        }

        /* Toast feedback */
        .fn-toast {
            position: fixed;
            bottom: 16px;
            right: 16px;
            background: var(--surface2);
            border: 1px solid var(--success);
            border-radius: var(--radius);
            color: var(--text);
            font-size: 11px;
            padding: 8px 14px;
            opacity: 0;
            transform: translateY(8px);
            transition: opacity 0.2s, transform 0.2s;
            pointer-events: none;
            z-index: 1000;
        }

        .fn-toast.show {
            opacity: 1;
            transform: translateY(0);
        }

        /* ── Macro Toolbar ─────────────────────────────────────────────── */
        .macro-toolbar {
            display: flex;
            align-items: center;
            gap: 6px;
            padding: 6px 10px;
            border-bottom: 1px solid var(--border-dim);
            background: var(--surface);
            flex-shrink: 0;
        }

        .macro-select {
            background: var(--surface2);
            border: 1px solid var(--border-dim);
            border-radius: var(--radius);
            color: var(--text);
            font-size: 11px;
            padding: 4px 8px;
            outline: none;
            font-family: inherit;
            cursor: pointer;
            min-width: 120px;
            user-select: text;
            -webkit-user-select: text;
        }

        .macro-select:focus {
            border-color: var(--accent);
        }

        .macro-toolbar-btn {
            display: flex;
            align-items: center;
            justify-content: center;
            background: var(--surface2);
            border: 1px solid var(--border-dim);
            border-radius: var(--radius);
            color: var(--text2);
            font-size: 10px;
            font-weight: 700;
            padding: 4px 10px;
            cursor: pointer;
            transition: background 0.1s, border-color 0.1s, color 0.1s;
            white-space: nowrap;
            text-transform: uppercase;
            letter-spacing: 0.4px;
        }

        .macro-toolbar-btn:hover {
            background: var(--hover);
            border-color: var(--border);
            color: var(--text);
        }

        .macro-toolbar-btn.primary {
            background: var(--accent);
            border-color: var(--accent);
            color: var(--bg);
        }

        .macro-toolbar-btn.primary:hover {
            opacity: 0.85;
        }

        .macro-toolbar-btn.danger:hover {
            background: var(--danger-bg);
            border-color: var(--danger);
            color: var(--danger);
        }

        /* Test Run & Record Mode states */
        .macro-toolbar-btn.recording {
            background: rgba(220, 50, 50, 0.2);
            border-color: #dc3232;
            color: #ff6b6b;
            animation: macro-rec-pulse 1.2s ease-in-out infinite;
        }
        .macro-toolbar-btn.recording:hover {
            background: rgba(220, 50, 50, 0.35);
            border-color: #ff4444;
            color: #ff8888;
        }
        @keyframes macro-rec-pulse {
            0%, 100% { opacity: 1; }
            50% { opacity: 0.55; }
        }

        .macro-toolbar-btn.running {
            background: rgba(100, 160, 255, 0.15);
            border-color: #64a0ff;
            color: #88bbff;
            animation: macro-run-pulse 1s ease-in-out infinite;
            pointer-events: none;
        }
        @keyframes macro-run-pulse {
            0%, 100% { opacity: 1; }
            50% { opacity: 0.5; }
        }

        .macro-toolbar-btn.success {
            background: rgba(60, 180, 75, 0.15);
            border-color: #3cb44b;
            color: #6bdc7b;
        }

        .macro-toolbar-btn.error {
            background: rgba(220, 50, 50, 0.15);
            border-color: #dc3232;
            color: #ff6b6b;
        }

        /* Recording indicator dot */
        .macro-rec-dot {
            display: inline-block;
            width: 8px;
            height: 8px;
            border-radius: 50%;
            background: #dc3232;
            margin-right: 4px;
            vertical-align: middle;
            animation: macro-rec-dot-pulse 1s ease-in-out infinite;
        }
        @keyframes macro-rec-dot-pulse {
            0%, 100% { opacity: 1; transform: scale(1); }
            50% { opacity: 0.4; transform: scale(0.75); }
        }

        /* Test run toast */
        .macro-test-toast {
            position: absolute;
            bottom: 12px;
            left: 50%;
            transform: translateX(-50%) translateY(8px);
            background: var(--surface2);
            border: 1px solid var(--border);
            border-radius: var(--radius);
            color: var(--text);
            font-size: 11px;
            font-family: "SF Mono", "Menlo", "Consolas", monospace;
            padding: 6px 14px;
            opacity: 0;
            transition: opacity 0.2s, transform 0.2s;
            pointer-events: none;
            z-index: 100;
            max-width: 420px;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
            box-shadow: 0 2px 12px rgba(0,0,0,0.4);
        }
        .macro-test-toast.show {
            opacity: 1;
            transform: translateX(-50%) translateY(0);
        }
        .macro-test-toast.error-toast {
            border-color: #dc3232;
            color: #ff8888;
            white-space: normal;
            max-width: 500px;
        }
        .macro-test-toast.success-toast {
            border-color: #3cb44b;
            color: #6bdc7b;
        }

        .macro-toolbar-spacer {
            flex: 1;
        }

        .macro-name-input {
            background: transparent;
            border: 1px solid transparent;
            border-radius: var(--radius);
            color: var(--accent-hi);
            font-size: 12px;
            font-weight: 700;
            padding: 3px 6px;
            outline: none;
            width: 140px;
            font-family: inherit;
            user-select: text;
            -webkit-user-select: text;
        }

        .macro-name-input:hover {
            border-color: var(--border-dim);
        }

        .macro-name-input:focus {
            border-color: var(--accent);
            background: var(--surface2);
        }

        /* ── Macros Layout: step canvas + fn-picker overlay ───────────── */
        .macros-layout {
            display: flex;
            flex-direction: column;
            width: 100%;
            height: 100%;
            overflow: hidden;
            position: relative;
        }

        .macros-main {
            flex: 1;
            display: flex;
            flex-direction: row;
            overflow: hidden;
            position: relative;
        }

        .macros-step-area {
            flex: 1;
            overflow: hidden;
            display: flex;
            flex-direction: column;
            position: relative;
        }

        .macros-step-area .step-canvas {
            flex: 1;
        }

        /* Floating add-step button */
        .macros-add-step-btn {
            position: absolute;
            bottom: 14px;
            right: 14px;
            display: flex;
            align-items: center;
            gap: 5px;
            background: var(--accent);
            color: var(--bg);
            border: none;
            border-radius: var(--radius);
            font-size: 11px;
            font-weight: 700;
            padding: 7px 14px;
            cursor: pointer;
            transition: opacity 0.15s;
            text-transform: uppercase;
            letter-spacing: 0.5px;
            z-index: 20;
            box-shadow: 0 2px 8px rgba(0,0,0,0.4);
        }

        .macros-add-step-btn:hover {
            opacity: 0.85;
        }

        .macros-add-step-btn svg {
            width: 12px;
            height: 12px;
        }
        .macros-add-step-btn svg path {
            stroke: var(--bg);
            fill: none;
        }

        /* Fn-picker overlay (slides in from right) */
        .fn-picker-overlay {
            position: absolute;
            top: 0;
            right: 0;
            bottom: 0;
            width: 440px;
            max-width: 70%;
            background: var(--surface);
            border-left: 1px solid var(--border-dim);
            box-shadow: -4px 0 16px rgba(0,0,0,0.3);
            display: flex;
            flex-direction: column;
            z-index: 30;
            transform: translateX(100%);
            transition: transform 0.2s ease;
        }

        .fn-picker-overlay.open {
            transform: translateX(0);
        }

        .fn-picker-overlay .fn-picker {
            width: 100%;
            height: 100%;
        }

        .fn-picker-overlay .fn-picker-list {
            width: 180px;
            min-width: 180px;
        }

        .fn-picker-overlay-header {
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 6px 10px;
            border-bottom: 1px solid var(--border-dim);
            flex-shrink: 0;
        }

        .fn-picker-overlay-title {
            font-size: 11px;
            font-weight: 700;
            text-transform: uppercase;
            letter-spacing: 0.8px;
            color: var(--text3);
        }

        .fn-picker-overlay-close {
            width: 22px;
            height: 22px;
            display: flex;
            align-items: center;
            justify-content: center;
            border-radius: var(--radius);
            cursor: pointer;
            opacity: 0.5;
            transition: opacity 0.1s, background 0.1s;
        }

        .fn-picker-overlay-close:hover {
            opacity: 1;
            background: var(--hover);
        }

        .fn-picker-overlay-close svg {
            width: 14px;
            height: 14px;
        }
        .fn-picker-overlay-close svg path {
            stroke: var(--text);
            fill: none;
        }

    </style>
    <!-- Step Editor module (loaded before panel scripts) -->
    <script src="./modules/step-editor.js"></script>
</head>
<body>
    <!-- ── Left Rail ─────────────────────────────────────────────────────── -->
    <nav id="rail">
        <div id="rail-title">Macro Lab</div>

    <!--
        IIFE Module Pattern (safe default for file:// WKWebView)
        ─────────────────────────────────────────────────────────
        ES modules (<script type="module">) do NOT work on file://
        URLs in WKWebView. All panel code uses IIFEs with namespace
        wrapping. If ES modules become available (see _es_module_test.html),
        this can be upgraded to import/export.

        UserContent channel: "msShell"
        Outbound message shape: { panel: string, action: string, body: any }
        Inbound JS calls: eval'd via ms.shell.eval(js)
    -->
    <script>
    (function() {
        "use strict";

        /* ── State ──────────────────────────────────────────────────── */
        var _activePanel = null;

        /* ── Theme Injection ────────────────────────────────────────── */
        window.applyTheme = function(theme) {
            if (!theme || typeof theme !== "object") return;
            var root = document.documentElement;
            var map = {
                bg: "--bg", surface: "--surface", surface2: "--surface2",
                hover: "--hover", accent: "--accent", accentHi: "--accent-hi",
                success: "--success", dangerBg: "--danger-bg", danger: "--danger",
                warning: "--warning", text: "--text"
            };
            for (var k in map) {
                if (theme[k]) root.style.setProperty(map[k], theme[k]);
            }
            if (theme.radius !== undefined) {
                root.style.setProperty("--radius", theme.radius + "px");
            }
            /* Forward theme to all mounted iframe panels */
            if (window.PanelManager) PanelManager.forwardTheme(theme);
        };

        /* ── Message Dispatch (Lua → JS) ───────────────────────────── */
        window.shellDispatch = function(panel, action, body) {
            /* Route inbound Lua pushes to the correct panel slot. */
            var slot = document.getElementById("slot-" + panel);
            if (!slot) return;

            // Try iframe-internal handler first (panels mounted via PanelManager.mount)
            var iframe = slot.querySelector("iframe");
            if (iframe && iframe.contentWindow && iframe.contentWindow._panelHandler) {
                try { iframe.contentWindow._panelHandler(action, body); } catch (e) {
                    console.error("[shell] iframe panel handler error:", panel, action, e);
                }
                return;
            }

            // Fall back to slot-level handler (inline panels)
            if (slot._handler) {
                try { slot._handler(action, body); } catch (e) {
                    console.error("[shell] panel handler error:", panel, action, e);
                }
            }
        };

        /* ── Panel Registration (future panels call this) ──────────── */
        window.registerPanel = function(name, handler) {
            var slot = document.getElementById("slot-" + name);
            if (slot) {
                slot._handler = handler;
            }
        };

        /* ── Rail Navigation ────────────────────────────────────────── */
        function setActive(panel) {
            /* Deactivate previous */
            var items = document.querySelectorAll(".rail-item");
            for (var i = 0; i < items.length; i++) {
                items[i].classList.remove("active");
            }
            var slots = document.querySelectorAll(".panel-slot");
            for (var j = 0; j < slots.length; j++) {
                slots[j].classList.remove("visible");
            }

            /* Activate new */
            _activePanel = panel;
            var btn = document.querySelector('.rail-item[data-panel="' + panel + '"]');
            if (btn) btn.classList.add("active");
            var slot = document.getElementById("slot-" + panel);
            if (slot) {
                slot.classList.add("visible");
                document.getElementById("content-empty").style.display = "none";
                /* If this is a registered panel with HTML that hasn't been loaded yet, mount it */
                if (window.PanelManager && PanelManager.isRegistered(panel) && !PanelManager.isMounted(panel)) {
                    PanelManager.requestMount(panel);
                }
            } else {
                document.getElementById("content-empty").style.display = "";
            }

            /* Notify Lua side */
            _post({ panel: panel, action: "navigate", body: { panel: panel } });
        }

        /* ── Outbound Messages (JS → Lua) ──────────────────────────── */
        function _post(msg) {
            try {
                if (window.webkit && window.webkit.messageHandlers && window.webkit.messageHandlers.msShell) {
                    window.webkit.messageHandlers.msShell.postMessage(JSON.stringify(msg));
                }
            } catch (e) {
                console.error("[shell] postMessage error:", e);
            }
        }

        window.shellPost = function(panel, action, body) {
            _post({ panel: panel, action: action, body: body || null });
        };

        /* ── Rail Click Handlers ────────────────────────────────────── */
        var railItems = document.querySelectorAll(".rail-item");
        for (var i = 0; i < railItems.length; i++) {
            (function(btn) {
                btn.addEventListener("click", function() {
                    var panel = btn.getAttribute("data-panel");
                    if (panel) setActive(panel);
                });
            })(railItems[i]);
        }

        /* ── Ready Signal ───────────────────────────────────────────── */
        _post({ panel: "_shell", action: "ready", body: { version: "0.2.0" } });

    })();
    </script>

    <!-- ════════════════════════════════════════════════════════════════════
         PanelManager — mount/unmount/pop-out infrastructure
         ════════════════════════════════════════════════════════════════════ -->
    <script>
    (function() {
        "use strict";

        /* ── Panel Registry (JS-side mirror of Lua registry) ─────── */
        var _registered = {};  // [id] = { title, icon }
        var _mounted    = {};  // [id] = true (currently loaded in slot)
        var _poppedOut  = {};  // [id] = true (currently in standalone webview)
        var _pendingMount = {}; // [id] = true (Lua told us to mount, waiting for HTML)

        var PM = {};

        /* ── isRegistered / isMounted ───────────────────────────── */
        PM.isRegistered = function(id) { return !!_registered[id]; };
        PM.isMounted    = function(id) { return !!_mounted[id]; };

        /* ── addRailItem(cfg) — called from Lua registerPanel ──── */
        PM.addRailItem = function(cfg) {
            if (!cfg || !cfg.id) return;
            _registered[cfg.id] = cfg;

            // Create rail item if it doesn't exist yet
            var existing = document.querySelector('.rail-item[data-panel="' + cfg.id + '"]');
            if (existing) return; // Already exists (e.g., static items)

            var rail = document.getElementById("rail");
            var spacer = rail.querySelector(".rail-spacer");
            var btn = document.createElement("button");
            btn.className = "rail-item";
            btn.setAttribute("data-panel", cfg.id);

            var icon = document.createElement("span");
            icon.className = "rail-icon";
            icon.textContent = cfg.icon || "▪";
            btn.appendChild(icon);
            btn.appendChild(document.createTextNode(" " + (cfg.title || cfg.id)));

            // Pop-out button
            var popBtn = document.createElement("button");
            popBtn.className = "rail-popout";
            popBtn.textContent = "↗";
            popBtn.setAttribute("data-popout", cfg.id);
            popBtn.addEventListener("click", function(e) {
                e.stopPropagation();
                PM.requestPopOut(cfg.id);
            });
            btn.appendChild(popBtn);

            btn.addEventListener("click", function() {
                if (window.setActive) setActive(cfg.id);
            });

            rail.insertBefore(btn, spacer);

            // Create slot in content area
            var content = document.getElementById("content");
            var slot = document.createElement("div");
            slot.className = "panel-slot";
            slot.id = "slot-" + cfg.id;
            content.appendChild(slot);

            // Wire pop-out for existing static rail items too
            _wireStaticPopouts();

            // If Lua already requested a mount before this rail item existed
            if (_pendingMount[cfg.id]) {
                delete _pendingMount[cfg.id];
                PM.requestMount(cfg.id);
            }
        };

        /* ── Wire pop-out buttons on static rail items ──────────── */
        function _wireStaticPopouts() {
            var items = document.querySelectorAll(".rail-item");
            for (var i = 0; i < items.length; i++) {
                var item = items[i];
                var pid = item.getAttribute("data-panel");
                if (!pid) continue;
                // Skip if already has a pop-out button
                if (item.querySelector(".rail-popout")) continue;
                // Skip shell-internal panels (settings uses bespoke logic)
                if (pid === "settings") continue;

                var popBtn = document.createElement("button");
                popBtn.className = "rail-popout";
                popBtn.textContent = "↗";
                popBtn.setAttribute("data-popout", pid);
                popBtn.addEventListener("click", function(e) {
                    e.stopPropagation();
                    var panelId = this.getAttribute("data-popout");
                    PM.requestPopOut(panelId);
                });
                item.appendChild(popBtn);
                // Mark as registered (static panels are implicitly registered)
                if (!_registered[pid]) {
                    _registered[pid] = { id: pid, title: pid, icon: "▪" };
                }
            }
        }

        /* ── requestMount(id) — Lua calls this to load HTML ────── */
        PM.requestMount = function(id) {
            // Called when Lua pushes HTML via mount() or when rail tab is clicked
            if (_mounted[id] || _poppedOut[id]) return;
            // If we don't have the HTML yet, mark as pending
            _pendingMount[id] = true;
        };

        /* ── mount(id, html, baseURL) — called from Lua via eval ─ */
        PM.mount = function(id, html, baseURL) {
            var slot = document.getElementById("slot-" + id);
            if (!slot) {
                // Slot doesn't exist yet — queue it
                _pendingMount[id] = true;
                return;
            }
            if (_mounted[id]) return; // Already mounted
            if (_poppedOut[id]) return; // Popped out, don't remount

            // Clear any existing content
            slot.innerHTML = "";

            // Inject base URL into HTML so relative paths resolve
            var baseInjected = html;
            if (baseInjected.indexOf("<head>") !== -1 && baseURL) {
                baseInjected = baseInjected.replace(
                    "<head>",
                    '<head><base href="' + baseURL + '">'
                );
            }

            // Create iframe with srcdoc
            var iframe = document.createElement("iframe");
            iframe.className = "panel-iframe";
            iframe.setAttribute("frameborder", "0");
            iframe.style.cssText = "width:100%;height:100%;border:none;background:var(--bg);";
            iframe.setAttribute("sandbox", "allow-scripts allow-same-origin allow-forms");

            // Inject communication bridge into the HTML
            var panelId = id;
            var bridgeScript = '<script>\n' +
                '/* Shell iframe bridge */\n' +
                '(function() {\n' +
                '  /* shellPost — route messages to parent shell */\n' +
                '  window.shellPost = function(panel, action, body) {\n' +
                '    var msg = { panel: panel, action: action, body: body || null };\n' +
                '    if (window.parent && window.parent._panelBridge) {\n' +
                '      window.parent._panelBridge(msg);\n' +
                '    }\n' +
                '  };\n' +
                '  /* registerPanel — wire handler for incoming Lua pushes */\n' +
                '  window.registerPanel = function(name, handler) {\n' +
                '    window._panelHandler = handler;\n' +
                '    window._panelName = name;\n' +
                '  };\n' +
                '  /* webkit.messageHandlers shim for standalone HTML panels */\n' +
                '  if (!window.webkit) window.webkit = {};\n' +
                '  if (!window.webkit.messageHandlers) window.webkit.messageHandlers = {};\n' +
                '  window.webkit.messageHandlers.ms = {\n' +
                '    postMessage: function(data) {\n' +
                '      var msg = (typeof data === "string") ? JSON.parse(data) : data;\n' +
                '      msg.panel = ' + JSON.stringify(panelId) + ';\n' +
                '      if (window.parent && window.parent._panelBridge) {\n' +
                '        window.parent._panelBridge(msg);\n' +
                '      }\n' +
                '    }\n' +
                '  };\n' +
                '  window.webkit.messageHandlers.msShell = window.webkit.messageHandlers.ms;\n' +
                '})();\n' +
                '<\/script>\n';

            // Insert bridge right after <head> or at start of body
            var srcdoc = baseInjected;
            if (srcdoc.indexOf("<body>") !== -1) {
                srcdoc = srcdoc.replace("<body>", "<body>" + bridgeScript);
            } else if (srcdoc.indexOf("<head>") !== -1) {
                srcdoc = srcdoc.replace("</head>", bridgeScript + "</head>");
            } else {
                srcdoc = bridgeScript + srcdoc;
            }

            iframe.srcdoc = srcdoc;
            slot.appendChild(iframe);
            _mounted[id] = true;
            delete _pendingMount[id];
        };

        /* ── unmount(id) — called from Lua ──────────────────────── */
        PM.unmount = function(id) {
            var slot = document.getElementById("slot-" + id);
            if (!slot) return;
            slot.innerHTML = "";
            _mounted[id] = false;
        };

        /* ── requestPopOut(id) — JS-initiated pop-out ───────────── */
        PM.requestPopOut = function(id) {
            // Tell Lua to handle the pop-out
            if (window.shellPost) {
                shellPost("_shell", "popOut", { panel: id });
            }
        };

        /* ── requestPopIn(id) — JS-initiated pop-in ─────────────── */
        PM.requestPopIn = function(id) {
            if (window.shellPost) {
                shellPost("_shell", "popIn", { panel: id });
            }
        };

        /* ── markPoppedOut(id, isPopped) — called from Lua ──────── */
        PM.markPoppedOut = function(id, isPopped) {
            _poppedOut[id] = isPopped;
            _mounted[id] = false;
            // Update rail item styling
            var btn = document.querySelector('.rail-item[data-panel="' + id + '"]');
            if (btn) {
                btn.classList.toggle("popped-out", isPopped);
                // Update pop-out button icon
                var popBtn = btn.querySelector(".rail-popout");
                if (popBtn) {
                    popBtn.textContent = isPopped ? "↙" : "↗";
                    popBtn.title = isPopped ? "Pop back into shell" : "Pop out to standalone window";
                }
            }
            // Clear slot content when popped out
            if (isPopped) {
                var slot = document.getElementById("slot-" + id);
                if (slot) slot.innerHTML = '<div style="display:flex;align-items:center;justify-content:center;height:100%;color:var(--text3);font-size:12px;">Panel popped out — <a href="#" onclick="PanelManager.requestPopIn(\'' + id + '\');return false;" style="color:var(--accent);margin-left:4px;">bring back</a></div>';
            }
        };

        /* ── forwardTheme(theme) — push theme to iframe panels ──── */
        PM.forwardTheme = function(theme) {
            var iframes = document.querySelectorAll(".panel-iframe");
            for (var i = 0; i < iframes.length; i++) {
                try {
                    var cw = iframes[i].contentWindow;
                    if (cw && cw.applyTheme) {
                        cw.applyTheme(theme);
                    }
                } catch (e) { /* cross-origin, ignore */ }
            }
        };

        /* ── iframe bridge receiver ─────────────────────────────── */
        window._panelBridge = function(msg) {
            // Route iframe messages through the shell's msShell channel to Lua
            if (window.webkit && window.webkit.messageHandlers && window.webkit.messageHandlers.msShell) {
                window.webkit.messageHandlers.msShell.postMessage(JSON.stringify(msg));
            }
        };

        /* ── Wire pop-out button clicks on rail items ───────────── */
        function _wirePopoutClicks() {
            var popBtns = document.querySelectorAll(".rail-popout[data-popout]");
            for (var i = 0; i < popBtns.length; i++) {
                (function(btn) {
                    if (btn._wired) return;
                    btn._wired = true;
                    btn.addEventListener("click", function(e) {
                        e.stopPropagation();
                        var panelId = btn.getAttribute("data-popout");
                        // Toggle: if already popped out, pop in; otherwise pop out
                        if (_poppedOut[panelId]) {
                            PM.requestPopIn(panelId);
                        } else {
                            PM.requestPopOut(panelId);
                        }
                    });
                })(popBtns[i]);
            }
        }

        /* ── Initialize: wire static rail items ─────────────────── */
        _wireStaticPopouts();
        _wirePopoutClicks();

        /* ── Expose globally ─────────────────────────────────────── */
        window.PanelManager = PM;

    })();
    </script>

    <!-- ════════════════════════════════════════════════════════════════════
         Macros Panel — Function Picker
         ════════════════════════════════════════════════════════════════════ -->
    <script>
    (function() {
        "use strict";

        /* ── Function Registry ─────────────────────────────────────── */
        var REGISTRY = [
            {
                id: "ms.type",
                name: "ms.type",
                sig: "ms.type(key, mods)",
                desc: "Type a key with optional modifiers. Simulates a full key-press cycle (down + up).",
                category: "input",
                params: [
                    { name: "key",  type: "key",   label: "Key",        required: true },
                    { name: "mods", type: "mods",   label: "Modifiers",  required: false }
                ]
            },
            {
                id: "ms.wait",
                name: "ms.wait",
                sig: "ms.wait(ms)",
                desc: "Pause macro execution for the specified number of milliseconds.",
                category: "flow",
                params: [
                    { name: "ms", type: "number", label: "Milliseconds", required: true }
                ]
            },
            {
                id: "ms.copy",
                name: "ms.copy",
                sig: "ms.copy(text)",
                desc: "Copy the given text string to the system clipboard.",
                category: "clipboard",
                params: [
                    { name: "text", type: "string", label: "Text", required: true }
                ]
            },
            {
                id: "ms.paste",
                name: "ms.paste",
                sig: "ms.paste()",
                desc: "Paste the current clipboard contents at the cursor position.",
                category: "clipboard",
                params: []
            },
            {
                id: "ms.press",
                name: "ms.press",
                sig: "ms.press(key, mods)",
                desc: "Press and release a key with optional modifiers.",
                category: "input",
                params: [
                    { name: "key",  type: "key",   label: "Key",        required: true },
                    { name: "mods", type: "mods",   label: "Modifiers",  required: false }
                ]
            },
            {
                id: "ms.hold",
                name: "ms.hold",
                sig: "ms.hold(key)",
                desc: "Hold a key down without releasing it. Pair with ms.release() later.",
                category: "input",
                params: [
                    { name: "key", type: "key", label: "Key", required: true }
                ]
            },
            {
                id: "ms.release",
                name: "ms.release",
                sig: "ms.release(key)",
                desc: "Release a previously held key.",
                category: "input",
                params: [
                    { name: "key", type: "key", label: "Key", required: true }
                ]
            },
            {
                id: "ms.cam",
                name: "ms.cam",
                sig: "ms.cam(dx, dy)",
                desc: "Move the camera by delta values in each axis.",
                category: "camera",
                params: [
                    { name: "dx", type: "number", label: "Delta X", required: true },
                    { name: "dy", type: "number", label: "Delta Y", required: true }
                ]
            },
            {
                id: "ms.cam.rebalance",
                name: "ms.cam.rebalance",
                sig: "ms.cam.rebalance()",
                desc: "Rebalance the camera to its neutral position.",
                category: "camera",
                params: []
            },
            {
                id: "ms.cam.reset",
                name: "ms.cam.reset",
                sig: "ms.cam.reset()",
                desc: "Reset the camera to its default position and zoom.",
                category: "camera",
                params: []
            }
        ];

        var MOD_LIST = ["ctrl", "alt", "shift", "cmd"];

        /* ── State ─────────────────────────────────────────────────── */
        var _selectedId  = null;
        var _paramValues = {};   // { paramName: value }
        var _modState    = {};   // { ctrl: false, alt: false, ... }
        var _keyCapture  = null; // param name currently capturing
        var _toastTimer  = null;

        /* ── Build DOM ─────────────────────────────────────────────── */
        var slot = document.getElementById("slot-macros");
        if (!slot) return;

        var root = document.createElement("div");
        root.className = "fn-picker";

        // Left: list
        var listPane = document.createElement("div");
        listPane.className = "fn-picker-list";

        var searchBox = document.createElement("div");
        searchBox.className = "fn-picker-search";
        var searchInput = document.createElement("input");
        searchInput.type = "text";
        searchInput.placeholder = "Search ms.* functions\u2026";
        searchInput.setAttribute("spellcheck", "false");
        searchBox.appendChild(searchInput);
        listPane.appendChild(searchBox);

        var entriesDiv = document.createElement("div");
        entriesDiv.className = "fn-picker-entries";
        listPane.appendChild(entriesDiv);

        // Right: detail
        var detailPane = document.createElement("div");
        detailPane.className = "fn-picker-detail";
        detailPane.innerHTML = '<div class="fn-detail-empty"><span>▶</span>Select a function from the list</div>';

        root.appendChild(listPane);
        root.appendChild(detailPane);
        slot.appendChild(root);

        // Toast
        var toast = document.createElement("div");
        toast.className = "fn-toast";
        document.body.appendChild(toast);

        /* ── Render Function List ──────────────────────────────────── */
        function renderList(filter) {
            entriesDiv.innerHTML = "";
            var q = (filter || "").toLowerCase();
            var visible = [];
            for (var i = 0; i < REGISTRY.length; i++) {
                var fn = REGISTRY[i];
                if (q && fn.name.toLowerCase().indexOf(q) === -1
                       && fn.desc.toLowerCase().indexOf(q) === -1
                       && fn.category.toLowerCase().indexOf(q) === -1) {
                    continue;
                }
                visible.push(fn);
            }
            for (var j = 0; j < visible.length; j++) {
                (function(fn) {
                    var row = document.createElement("div");
                    row.className = "fn-entry" + (_selectedId === fn.id ? " active" : "");
                    row.setAttribute("data-fn-id", fn.id);

                    var sigSpan = document.createElement("span");
                    sigSpan.className = "fn-entry-sig";
                    sigSpan.textContent = fn.name;
                    row.appendChild(sigSpan);

                    var catSpan = document.createElement("span");
                    catSpan.className = "fn-entry-label";
                    catSpan.textContent = fn.category;
                    row.appendChild(catSpan);

                    row.addEventListener("click", function() {
                        selectFunction(fn.id);
                    });

                    entriesDiv.appendChild(row);
                })(visible[j]);
            }
        }

        /* ── Select Function ───────────────────────────────────────── */
        function selectFunction(id) {
            _selectedId = id;
            _paramValues = {};
            _modState = {};
            _keyCapture = null;

            // Update list highlight
            var items = entriesDiv.querySelectorAll(".fn-entry");
            for (var i = 0; i < items.length; i++) {
                items[i].classList.toggle("active", items[i].getAttribute("data-fn-id") === id);
            }

            // Find function definition
            var fn = null;
            for (var j = 0; j < REGISTRY.length; j++) {
                if (REGISTRY[j].id === id) { fn = REGISTRY[j]; break; }
            }
            if (!fn) return;

            // Initialize defaults
            for (var k = 0; k < fn.params.length; k++) {
                var p = fn.params[k];
                if (p.type === "mods") {
                    _paramValues[p.name] = [];
                    _modState = { ctrl: false, alt: false, shift: false, cmd: false };
                } else if (p.type === "number") {
                    _paramValues[p.name] = 0;
                } else {
                    _paramValues[p.name] = "";
                }
            }

            renderDetail(fn);
        }

        /* ── Render Detail Panel ───────────────────────────────────── */
        function renderDetail(fn) {
            var html = '';

            // Header
            html += '<div class="fn-detail-header">';
            html += '<div class="fn-detail-name">' + esc(fn.name) + '</div>';
            html += '<div class="fn-detail-desc">' + esc(fn.desc) + '</div>';
            html += '</div>';

            // Body (params)
            html += '<div class="fn-detail-body">';
            if (fn.params.length === 0) {
                html += '<div class="fn-no-params">This function takes no parameters.</div>';
            } else {
                html += '<div class="fn-params">';
                for (var i = 0; i < fn.params.length; i++) {
                    var p = fn.params[i];
                    html += renderParamField(p);
                }
                html += '</div>';
            }
            html += '</div>';

            // Footer
            html += '<div class="fn-detail-footer">';
            html += '<button class="fn-add-btn" id="fn-add-btn">Add Step</button>';
            html += '<span class="fn-step-preview" id="fn-step-preview"></span>';
            html += '</div>';

            detailPane.innerHTML = html;

            // Wire up param inputs
            wireParamInputs(fn);

            // Wire add button
            var addBtn = document.getElementById("fn-add-btn");
            if (addBtn) {
                addBtn.addEventListener("click", function() {
                    addToMacro(fn);
                });
            }

            updatePreview(fn);
        }

        /* ── Render a single parameter field ───────────────────────── */
        function renderParamField(p) {
            var html = '<div class="fn-param-group fn-param">';
            html += '<div class="fn-param-label">' + esc(p.label);
            html += ' <span class="fn-param-type">' + esc(p.type) + '</span>';
            if (p.required) html += ' <span style="color:var(--danger)">*</span>';
            html += '</div>';

            switch (p.type) {
                case "string":
                    html += '<input type="text" data-param="' + esc(p.name) + '" placeholder="Enter text\u2026">';
                    break;

                case "number":
                    html += '<input type="number" data-param="' + esc(p.name) + '" value="0" step="1">';
                    break;

                case "key":
                    html += '<div class="fn-key-capture">';
                    html += '<button class="fn-key-btn" data-param="' + esc(p.name) + '" data-key-capture>Click to set</button>';
                    html += '<span class="fn-key-hint">press a key\u2026</span>';
                    html += '</div>';
                    break;

                case "mods":
                    html += '<div class="fn-mods-row">';
                    for (var i = 0; i < MOD_LIST.length; i++) {
                        html += '<button class="fn-mod-chip" data-mod="' + MOD_LIST[i] + '">' + MOD_LIST[i] + '</button>';
                    }
                    html += '</div>';
                    break;
            }

            html += '</div>';
            return html;
        }

        /* ── Wire up input events ──────────────────────────────────── */
        function wireParamInputs(fn) {
            // Text and number inputs
            var inputs = detailPane.querySelectorAll("input[data-param]");
            for (var i = 0; i < inputs.length; i++) {
                (function(inp) {
                    var name = inp.getAttribute("data-param");
                    inp.addEventListener("input", function() {
                        if (inp.type === "number") {
                            _paramValues[name] = parseFloat(inp.value) || 0;
                        } else {
                            _paramValues[name] = inp.value;
                        }
                        updatePreview(fn);
                    });
                })(inputs[i]);
            }

            // Key capture buttons
            var keyBtns = detailPane.querySelectorAll("[data-key-capture]");
            for (var j = 0; j < keyBtns.length; j++) {
                (function(btn) {
                    var name = btn.getAttribute("data-param");
                    btn.addEventListener("click", function(e) {
                        e.stopPropagation();
                        startKeyCapture(name, btn, fn);
                    });
                })(keyBtns[j]);
            }

            // Modifier chips
            var modChips = detailPane.querySelectorAll("[data-mod]");
            for (var k = 0; k < modChips.length; k++) {
                (function(chip) {
                    var mod = chip.getAttribute("data-mod");
                    chip.addEventListener("click", function() {
                        _modState[mod] = !_modState[mod];
                        chip.classList.toggle("on", _modState[mod]);
                        // Update mods param value
                        var mods = [];
                        for (var m = 0; m < MOD_LIST.length; m++) {
                            if (_modState[MOD_LIST[m]]) mods.push(MOD_LIST[m]);
                        }
                        // Find the mods param name
                        for (var n = 0; n < fn.params.length; n++) {
                            if (fn.params[n].type === "mods") {
                                _paramValues[fn.params[n].name] = mods;
                                break;
                            }
                        }
                        updatePreview(fn);
                    });
                })(modChips[k]);
            }
        }

        /* ── Key Capture ───────────────────────────────────────────── */
        function startKeyCapture(paramName, btn, fn) {
            // Cancel any existing capture
            if (_keyCapture) {
                var prevBtn = detailPane.querySelector(".fn-key-btn.capturing");
                if (prevBtn) prevBtn.classList.remove("capturing");
                document.removeEventListener("keydown", _keyCaptureHandler, true);
            }

            _keyCapture = paramName;
            btn.classList.add("capturing");
            btn.textContent = "\u2026";

            function handler(e) {
                e.preventDefault();
                e.stopPropagation();

                // Build key name
                var key = normalizeKey(e);
                _paramValues[paramName] = key;

                btn.classList.remove("capturing");
                btn.textContent = key || "???";
                btn.classList.remove("fn-key-btn");
                btn.classList.add("fn-key-btn");

                document.removeEventListener("keydown", handler, true);
                _keyCapture = null;
                _keyCaptureHandler = null;
                updatePreview(fn);
            }

            _keyCaptureHandler = handler;
            document.addEventListener("keydown", handler, true);
        }

        var _keyCaptureHandler = null;

        function normalizeKey(e) {
            // Map common keys to ms naming
            var map = {
                " ": "space",
                "ArrowUp": "up",
                "ArrowDown": "down",
                "ArrowLeft": "left",
                "ArrowRight": "right",
                "Backspace": "delete",
                "Escape": "escape",
                "Enter": "return",
                "Tab": "tab"
            };
            if (map[e.key]) return map[e.key];
            if (e.key.length === 1) return e.key.toLowerCase();
            return e.key.toLowerCase();
        }

        /* ── Step Preview ──────────────────────────────────────────── */
        function updatePreview(fn) {
            var el = document.getElementById("fn-step-preview");
            if (!el) return;

            var parts = [];
            for (var i = 0; i < fn.params.length; i++) {
                var p = fn.params[i];
                var val = _paramValues[p.name];
                if (p.type === "mods") {
                    parts.push(p.name + ":[" + (val || []).join(",") + "]");
                } else if (p.type === "string") {
                    parts.push(p.name + ':"' + (val || "") + '"');
                } else {
                    parts.push(p.name + ":" + (val !== undefined ? val : ""));
                }
            }
            el.textContent = fn.name + "(" + parts.join(", ") + ")";
        }

        /* ── Add to Macro ──────────────────────────────────────────── */
        function addToMacro(fn) {
            var params = {};
            for (var i = 0; i < fn.params.length; i++) {
                var p = fn.params[i];
                var val = _paramValues[p.name];
                if (p.required && p.type === "string" && (!val || val === "")) {
                    showToast("Missing required field: " + p.label);
                    return;
                }
                if (p.required && p.type === "key" && (!val || val === "")) {
                    showToast("Missing required field: " + p.label);
                    return;
                }
                if (p.type === "mods") {
                    params[p.name] = val || [];
                } else {
                    params[p.name] = val;
                }
            }

            // Send step via msShell usercontent channel → Lua bus
            window.shellPost("macros", "addStep", {
                action: fn.name,
                params: params
            });

            showToast("Added: " + fn.name);
        }

        /* ── Toast ─────────────────────────────────────────────────── */
        function showToast(msg) {
            toast.textContent = msg;
            toast.classList.add("show");
            if (_toastTimer) clearTimeout(_toastTimer);
            _toastTimer = setTimeout(function() {
                toast.classList.remove("show");
                _toastTimer = null;
            }, 1800);
        }

        /* ── Escape HTML ───────────────────────────────────────────── */
        function esc(s) {
            var d = document.createElement("div");
            d.appendChild(document.createTextNode(s));
            return d.innerHTML;
        }

        /* ── Search Input Handler ──────────────────────────────────── */
        searchInput.addEventListener("input", function() {
            renderList(searchInput.value);
        });

        // Prevent key capture from swallowing search input keystrokes
        searchInput.addEventListener("keydown", function(e) {
            e.stopPropagation();
        });

        /* ── Panel Registration (Lua → JS dispatch) ────────────────── */
        window.registerPanel("macros", function(action, body) {
            // Handle inbound Lua pushes (e.g., function list from ms.docs)
            if (action === "functions" && Array.isArray(body)) {
                // Future: merge dynamically-loaded functions from Lua
                // For now, ignore — we use the hardcoded REGISTRY
            }
            if (action === "selectFunction" && body && body.name) {
                selectFunction(body.name);
            }
        });

        /* ── External API: allow ms.shell.eval to call in ──────────── */
        window.fnPicker = {
            select: selectFunction,
            registry: REGISTRY,
            showToast: showToast
        };

        /* ── Initial Render ────────────────────────────────────────── */
        renderList("");

    })();
    </script>
    <!-- ════════════════════════════════════════════════════════════════════
     Step Canvas + Macro Management
     ════════════════════════════════════════════════════════════════════ -->
    <script>
    (function() {
    "use strict";

    var _svgCache = {};
    var SVG_BASE = "./svg/";

    /* ── SVG loader (inline, no module needed) ───────────────────── */
    function _fetchSVG(name) {
        if (_svgCache[name]) return Promise.resolve(_svgCache[name]);
        return new Promise(function(resolve) {
            var xhr = new XMLHttpRequest();
            xhr.open("GET", SVG_BASE + name + ".svg", true);
            xhr.onload = function() {
                var raw = xhr.responseText || "";
                var inner = raw.replace(/<\?xml[^>]*\?>/g, "").replace(/<!--[\s\S]*?-->/g, "").trim();
                _svgCache[name] = inner;
                resolve(inner);
            };
            xhr.onerror = function() { resolve(""); };
            xhr.send();
        });
    }

    /* ── Action → icon mapping ───────────────────────────────────── */
    var ACTION_ICON = {
        "ms.type":"keyboard","ms.press":"keyboard","ms.hold":"keyboard","ms.release":"keyboard",
        "ms.wait":"timer","ms.copy":"clipboard","ms.paste":"clipboard",
        "ms.cam":"camera","ms.cam.rebalance":"camera","ms.cam.reset":"camera",
        "ms.Mouse":"click","ms.click":"click","ms.scroll":"scroll","ms.move":"move","ms.select":"select",
        "ms.search":"search","ms.record":"record","ms.stop":"stop","ms.pause":"pause",
        "ms.play":"play","ms.save":"save","ms.load":"upload","ms.alert":"alert",
        "ms.refresh":"refresh","ms.pixelScan":"pixelscan","ms.window":"window",
        "ms.input":"inputs","ms.variable":"variable","ms.watch":"watcher",
        "ms.sound":"sound","ms.gamepad":"controller","ms.gamepadStart":"controller","ms.gamepadBind":"controller",
        "ms.setMacros":"power","ms.enable":"power","ms.disable":"power",
        "ms.screenshot":"camera","ms.clipChanged":"clipboard",
        "ms.randWait":"timer","ms.jitter":"timer","ms.waitPixel":"pixelscan","ms.waitNotPixel":"pixelscan",
        "ms.waitApp":"search","ms.waitNotApp":"search",
        "ms.focus":"window","ms.appRunning":"window","ms.appIsFront":"window",
        "ms.toggle":"keyboard","ms.multiPress":"keyboard",
        "ms.saveCursor":"select","ms.restoreCursor":"select",
        "ms.setVolume":"sound","ms.mute":"sound","ms.unmute":"sound",
        "ms.drag":"drag",
        "if":"branch","for":"loop","while":"repeat","else":"branch"
    };

    function iconFor(action) { return ACTION_ICON[action] || "macros"; }

    /* ── Param summary ───────────────────────────────────────────── */
    function paramSummary(action, params) {
        if (!params) return "";
        var keys = Object.keys(params);
        if (keys.length === 0) return "";
        if (action === "if" || action === "while") return params.condition || "";
        if (action === "for") return (params.var||"i") + " = " + (params.from||1) + " → " + (params.to||1);
        var parts = [];
        for (var i = 0; i < Math.min(keys.length, 2); i++) {
            var k = keys[i], v = params[k];
            if (Array.isArray(v)) { if (v.length === 0) continue; v = v.join("+"); }
            if (typeof v === "string" && v.length > 16) v = v.slice(0,14) + "…";
            parts.push(k + ": " + v);
        }
        return parts.join(", ");
    }

    /* ── Step ID generator ───────────────────────────────────────── */
    var _idCounter = 0;
    function nextId() { return "_s" + (++_idCounter) + "_" + Date.now().toString(36); }

    function deepClone(o) { return JSON.parse(JSON.stringify(o)); }

    /* ── CSS for step blocks (injected once) ─────────────────────── */
    var _blockCSS = false;
    function injectBlockCSS() {
        if (_blockCSS) return;
        _blockCSS = true;
        var s = document.createElement("style");
        s.textContent = [
            ".step-canvas{display:flex;flex-direction:column;gap:2px;padding:8px;min-height:100%;overflow-y:auto;position:relative}",
            ".step-canvas::-webkit-scrollbar{width:4px}",
            ".step-canvas::-webkit-scrollbar-track{background:transparent}",
            ".step-canvas::-webkit-scrollbar-thumb{background:var(--border-dim);border-radius:2px}",
            ".step-canvas::-webkit-scrollbar-thumb:hover{background:var(--border)}",
            ".step-canvas-empty{display:flex;flex-direction:column;align-items:center;justify-content:center;color:var(--text3);font-size:11px;padding:40px 20px;text-align:center;gap:6px;user-select:none}",
            ".step-canvas-empty-icon{font-size:28px;opacity:0.25}",
            ".step-block{display:flex;align-items:center;gap:6px;padding:5px 8px;background:var(--surface);border:1px solid var(--border-dim);border-radius:var(--radius);cursor:default;transition:background .1s,border-color .15s,box-shadow .15s;position:relative;user-select:none;min-height:32px}",
            ".step-block:hover{background:var(--surface2);border-color:var(--border)}",
            ".step-block.selected{border-color:var(--accent);box-shadow:0 0 0 1px var(--accent-glow-faint,rgba(196,26,26,.12))}",
            ".step-block.drag-over-above::before{content:'';position:absolute;top:-3px;left:4px;right:4px;height:2px;background:var(--accent);border-radius:1px;z-index:10}",
            ".step-block.drag-over-below::after{content:'';position:absolute;bottom:-3px;left:4px;right:4px;height:2px;background:var(--accent);border-radius:1px;z-index:10}",
            ".step-block.drag-over-nest{border-color:var(--accent);background:var(--accent-glow-faint,rgba(196,26,26,.12))}",
            ".step-block.dragging{opacity:.4}",
            ".step-drag-handle{width:14px;height:14px;flex-shrink:0;display:flex;align-items:center;justify-content:center;cursor:grab;opacity:.35;transition:opacity .15s}",
            ".step-drag-handle:hover{opacity:.8}.step-drag-handle:active{cursor:grabbing}",
            ".step-drag-handle svg{width:14px;height:14px}",
            ".step-drag-handle svg path,.step-drag-handle svg g{stroke:var(--text);fill:none}",
            ".step-icon{width:16px;height:16px;flex-shrink:0;display:flex;align-items:center;justify-content:center}",
            ".step-icon svg{width:14px;height:14px}",
            ".step-icon svg path,.step-icon svg g,.step-icon svg circle,.step-icon svg rect{stroke:var(--accent);fill:none}",
            ".step-action-name{font-family:\"SF Mono\",\"Menlo\",\"Consolas\",monospace;font-size:11px;color:var(--text);font-weight:600;white-space:nowrap;flex-shrink:0}",
            ".step-params{font-family:\"SF Mono\",\"Menlo\",\"Consolas\",monospace;font-size:10px;color:var(--text3);white-space:nowrap;overflow:hidden;text-overflow:ellipsis;flex:1;min-width:0}",
            ".step-actions{display:flex;align-items:center;gap:2px;flex-shrink:0;opacity:0;transition:opacity .15s}",
            ".step-block:hover .step-actions{opacity:1}",
            ".step-action-btn{width:18px;height:18px;display:flex;align-items:center;justify-content:center;border-radius:var(--radius-s);cursor:pointer;opacity:.5;transition:opacity .1s,background .1s}",
            ".step-action-btn:hover{opacity:1;background:var(--hover)}",
            ".step-action-btn svg{width:12px;height:12px}",
            ".step-action-btn svg path,.step-action-btn svg g{stroke:var(--text);fill:none}",
            ".step-action-btn.del:hover{background:var(--danger-bg)}",
            ".step-action-btn.del:hover svg path,.step-action-btn.del:hover svg g{stroke:var(--danger)}",
            ".step-block-container{display:flex;flex-direction:column}",
            ".step-nest-body{margin-left:20px;border-left:2px solid var(--border-dim);padding-left:8px;padding-top:2px;padding-bottom:2px;display:flex;flex-direction:column;gap:2px;min-height:28px;position:relative}",
            ".step-nest-body.drag-target{border-left-color:var(--accent);background:var(--accent-glow-faint,rgba(196,26,26,.06));border-radius:var(--radius)}",
            ".step-nest-label{font-size:9px;font-weight:700;text-transform:uppercase;letter-spacing:.6px;color:var(--text3);padding:2px 0 0}",
            ".step-nest-body-empty{font-size:10px;color:var(--text3);font-style:italic;padding:4px 0;opacity:.6}",
            ".step-nest-toggle{width:14px;height:14px;flex-shrink:0;display:flex;align-items:center;justify-content:center;cursor:pointer;opacity:.5;transition:opacity .15s,transform .15s;font-size:10px;color:var(--text)}",
            ".step-nest-toggle:hover{opacity:1}",
            ".step-nest-toggle.collapsed{transform:rotate(-90deg)}",
            ".step-nest-toggle svg{width:12px;height:12px}",
            ".step-nest-toggle svg path{stroke:var(--text);fill:none}",
            ".step-nest-body.collapsed{display:none}"
        ].join("\n");
        document.head.appendChild(s);
    }

    /* ── StepCanvas class (IIFE version) ─────────────────────────── */
    function StepCanvas(container, opts) {
        injectBlockCSS();
        this._el = container;
        this._onChange = (opts && opts.onChange) || function(){};
        this._onSelect = (opts && opts.onSelect) || function(){};
        this._steps = [];
        this._map = {};
        this._selId = null;
        this._dragId = null;
        this._root = document.createElement("div");
        this._root.className = "step-canvas";
        this._el.appendChild(this._root);
        this._renderEmpty();
        this._preloadIcons();
    }

    StepCanvas.prototype._preloadIcons = function() {
        var needed = ["drag","close","chevdown","macros"];
        for (var a in ACTION_ICON) { if (needed.indexOf(ACTION_ICON[a]) === -1) needed.push(ACTION_ICON[a]); }
        var self = this;
        var chain = Promise.resolve();
        needed.forEach(function(n) { chain = chain.then(function(){ return _fetchSVG(n); }); });
    };

    StepCanvas.prototype._assignIds = function(steps) {
        for (var i = 0; i < steps.length; i++) {
            var s = steps[i];
            if (!s._sid) s._sid = nextId();
            this._map[s._sid] = s;
            if (s.then) this._assignIds(s.then);
            if (s.else) this._assignIds(s.else);
            if (s.body) this._assignIds(s.body);
        }
    };

    StepCanvas.prototype.load = function(steps) {
        this._steps = steps || [];
        this._map = {};
        this._assignIds(this._steps);
        this._selId = null;
        this._render();
    };

    StepCanvas.prototype.addStep = function(def, afterId) {
        var step = deepClone(def);
        step._sid = nextId();
        this._map[step._sid] = step;
        if (afterId) {
            var idx = this._findIdx(this._steps, afterId);
            if (idx !== -1) this._steps.splice(idx+1, 0, step);
            else this._steps.push(step);
        } else {
            this._steps.push(step);
        }
        this._render();
        this._fireChange();
    };

    StepCanvas.prototype.removeStep = function(sid) {
        if (this._removeFrom(this._steps, sid)) {
            delete this._map[sid];
            if (this._selId === sid) this._selId = null;
            this._render();
            this._fireChange();
        }
    };

    StepCanvas.prototype._removeFrom = function(list, sid) {
        for (var i = 0; i < list.length; i++) {
            if (list[i]._sid === sid) { list.splice(i,1); return true; }
            var s = list[i];
            if (s.then && this._removeFrom(s.then, sid)) return true;
            if (s.else && this._removeFrom(s.else, sid)) return true;
            if (s.body && this._removeFrom(s.body, sid)) return true;
        }
        return false;
    };

    StepCanvas.prototype._findIdx = function(list, sid) {
        for (var i = 0; i < list.length; i++) { if (list[i]._sid === sid) return i; }
        return -1;
    };

    StepCanvas.prototype.moveStep = function(dragId, targetId, pos) {
        var step = this._map[dragId];
        if (!step) return;
        this._removeFrom(this._steps, dragId);
        if (pos === "nest") {
            var tgt = this._map[targetId];
            if (tgt) {
                if (tgt.action === "if") { if(!tgt.then) tgt.then=[]; tgt.then.push(step); }
                else { if(!tgt.body) tgt.body=[]; tgt.body.push(step); }
            }
        } else {
            var ti = this._findIdx(this._steps, targetId);
            if (ti !== -1) this._steps.splice(pos==="above"?ti:ti+1, 0, step);
            else this._steps.push(step);
        }
        this._render();
        this._fireChange();
    };

    StepCanvas.prototype.serialize = function() {
        return this._strip(deepClone(this._steps));
    };

    StepCanvas.prototype._strip = function(steps) {
        for (var i=0;i<steps.length;i++) {
            delete steps[i]._sid;
            if (steps[i].then) this._strip(steps[i].then);
            if (steps[i].else) this._strip(steps[i].else);
            if (steps[i].body) this._strip(steps[i].body);
        }
        return steps;
    };

    StepCanvas.prototype._fireChange = function() { this._onChange(this.serialize()); };

    StepCanvas.prototype._render = function() {
        this._root.innerHTML = "";
        if (this._steps.length === 0) { this._renderEmpty(); return; }
        for (var i=0;i<this._steps.length;i++) {
            this._root.appendChild(this._renderStep(this._steps[i]));
        }
    };

    StepCanvas.prototype._renderEmpty = function() {
        this._root.innerHTML = "";
        var d = document.createElement("div");
        d.className = "step-canvas-empty";
        d.innerHTML = '<span class="step-canvas-empty-icon">▶</span>No steps yet<br><span style="font-size:10px">Click <b>+ Add Step</b> to begin</span>';
        this._root.appendChild(d);
    };

    StepCanvas.prototype._isContainer = function(s) {
        return s.action==="if" || s.action==="for" || s.action==="while";
    };

    StepCanvas.prototype._renderStep = function(step) {
        return this._isContainer(step) ? this._renderContainer(step) : this._renderLeaf(step);
    };

    StepCanvas.prototype._renderLeaf = function(step) {
        var self = this;
        var el = document.createElement("div");
        el.className = "step-block" + (step._sid===this._selId?" selected":"");
        el.setAttribute("data-sid", step._sid);
        el.setAttribute("draggable","true");

        var h = document.createElement("div");
        h.className = "step-drag-handle";
        h.innerHTML = _svgCache["drag"] || "⠿";
        el.appendChild(h);

        var ic = document.createElement("div");
        ic.className = "step-icon";
        ic.innerHTML = _svgCache[iconFor(step.action)] || "";
        el.appendChild(ic);

        var nm = document.createElement("span");
        nm.className = "step-action-name";
        nm.textContent = step.action;
        el.appendChild(nm);

        var pm = document.createElement("span");
        pm.className = "step-params";
        pm.textContent = paramSummary(step.action, step.params);
        el.appendChild(pm);

        var acts = document.createElement("div");
        acts.className = "step-actions";
        var db = document.createElement("div");
        db.className = "step-action-btn del";
        db.innerHTML = _svgCache["close"] || "×";
