<!doctype html>
<html lang="en">
    <head>
        <meta charset="UTF-8" />
        <style>
            :root {
                --bg: #060402;
                --surface: #100806;
                --surface2: #1c100c;
                --border: rgba(130, 50, 22, 0.55);
                --accent: #c41a1a;
                --text: #f0ddb0;
                --text2: rgba(210, 165, 100, 0.75);
                --radius: 3px;
            }

            *,
            *::before,
            *::after {
                box-sizing: border-box;
                margin: 0;
                padding: 0;
                user-select: none;
                -webkit-user-select: none;
            }

            html,
            body {
                width: 100%;
                height: 100%;
                background: var(--bg);
                color: var(--text);
                font-family: "Almendra", Palatino, Georgia, serif;
                font-size: 13px;
                line-height: 1.5;
                overflow: hidden;
            }

            body {
                display: flex;
                flex-direction: column;
            }

            /* ── Titlebar ─────────────────────────────────────────────── */
            #titlebar {
                height: 32px;
                -webkit-app-region: drag;
                display: flex;
                align-items: center;
                padding: 0 10px 0 14px;
                border-bottom: 1px solid var(--border);
                flex-shrink: 0;
                gap: 6px;
            }

            #titlebar-text {
                flex: 1;
                font-size: 11px;
                font-weight: 700;
                letter-spacing: 1.5px;
                text-transform: uppercase;
                color: var(--text2);
            }

            .tb-btn {
                -webkit-app-region: no-drag;
                height: 20px;
                padding: 0 8px;
                background: transparent;
                border: 1px solid var(--border);
                border-radius: var(--radius);
                color: var(--text2);
                font-family: inherit;
                font-size: 11px;
                cursor: pointer;
                transition:
                    background 0.12s,
                    border-color 0.12s,
                    color 0.12s;
            }

            .tb-btn:hover {
                background: var(--surface2);
                border-color: var(--accent);
                color: var(--text);
            }

            /* ── Log area ───────────────────────────────────────────────── */
            #log {
                flex: 1;
                overflow-y: auto;
                padding: 4px 0 36px;
                min-height: 0;
            }

            #log::-webkit-scrollbar {
                width: 5px;
            }
            #log::-webkit-scrollbar-track {
                background: transparent;
            }
            #log::-webkit-scrollbar-thumb {
                background: var(--border);
                border-radius: 3px;
            }

            /* ── Entry rows ─────────────────────────────────────────────── */
            .entry {
                display: flex;
                align-items: center;
                gap: 6px;
                padding: 3px 16px;
                font-size: 13px;
                line-height: 1.55;
            }

            .entry:hover {
                background: var(--surface);
            }

            .ts {
                color: var(--text2);
                font-size: 11px;
                white-space: nowrap;
                flex-shrink: 0;
            }

            .badge {
                font-size: 10px;
                font-weight: 700;
                letter-spacing: 0.8px;
                text-transform: uppercase;
                flex-shrink: 0;
            }

            .badge-print {
                color: var(--text2);
            }
            .badge-error {
                color: #d42020;
            }

            .dot {
                font-size: 7px;
                color: var(--accent);
                flex-shrink: 0;
            }

            .msg {
                color: var(--text);
                word-break: break-word;
                flex: 1;
                min-width: 0;
            }

            .msg .sub-sep {
                color: var(--text2);
                margin: 0 3px;
            }
            .msg .sub-name {
                color: var(--text);
            }

            .trigger {
                font-size: 10px;
                color: var(--text2);
                border: 1px solid var(--border);
                border-radius: var(--radius);
                padding: 1px 5px;
                white-space: nowrap;
                flex-shrink: 0;
                font-family: "SF Mono", Menlo, monospace;
            }

            .step {
                opacity: 0.45;
                font-size: 11px;
                padding: 1px 16px 1px 36px;
                display: flex;
                align-items: baseline;
                gap: 6px;
                line-height: 1.4;
            }
            .step:hover {
                opacity: 0.75;
            }
            .step-msg {
                color: var(--text2);
                word-break: break-word;
            }

            /* ── Mute rules: toggled by classes on #log ─────────────────── */
            #log.mute-wait .step[data-cat="wait"] {
                display: none;
            }
            #log.mute-sound .step[data-cat="sound"] {
                display: none;
            }
            #log.mute-cam .step[data-cat="cam"] {
                display: none;
            }
            #log.mute-keys .step[data-cat="keys"] {
                display: none;
            }
            #log.mute-mouse .step[data-cat="mouse"] {
                display: none;
            }
            #log.mute-scroll .step[data-cat="scroll"] {
                display: none;
            }
            #log.mute-copy .step[data-cat="copy"] {
                display: none;
            }

            /* ── Filter button + popup ───────────────────────────────────── */
            #filter-wrap {
                position: fixed;
                bottom: 8px;
                right: 8px;
                z-index: 100;
                display: flex;
                flex-direction: column;
                align-items: flex-end;
                gap: 5px;
            }

            #filter-btn {
                height: 22px;
                padding: 0 9px;
                background: var(--surface);
                border: 1px solid var(--border);
                border-radius: var(--radius);
                color: var(--text2);
                font-family: inherit;
                font-size: 11px;
                cursor: pointer;
                transition:
                    border-color 0.12s,
                    color 0.12s,
                    background 0.12s;
                letter-spacing: 0.3px;
            }
            #filter-btn:hover {
                border-color: var(--accent);
                color: var(--text);
            }
            #filter-btn.has-mutes {
                border-color: var(--accent);
                color: var(--accent);
                background: rgba(196, 26, 26, 0.08);
            }

            #filter-panel {
                background: var(--surface);
                border: 1px solid var(--border);
                border-radius: var(--radius);
                padding: 7px 10px;
                display: none;
                flex-direction: column;
                gap: 2px;
                min-width: 148px;
                box-shadow: 0 4px 14px rgba(0, 0, 0, 0.55);
            }
            #filter-panel.open {
                display: flex;
            }

            .filter-row {
                display: flex;
                align-items: center;
                justify-content: space-between;
                gap: 8px;
                padding: 3px 0;
                cursor: pointer;
                border-radius: 2px;
            }
            .filter-row:hover {
                background: var(--surface2);
                padding-left: 4px;
                padding-right: 4px;
            }

            .filter-label {
                font-size: 11px;
                color: var(--text);
                flex: 1;
            }
            .filter-row.muted .filter-label {
                color: var(--text2);
                text-decoration: line-through;
                text-decoration-color: rgba(210, 165, 100, 0.35);
            }

            .filter-dot {
                width: 8px;
                height: 8px;
                border-radius: 50%;
                background: var(--accent);
                flex-shrink: 0;
                transition:
                    background 0.1s,
                    opacity 0.1s;
            }
            .filter-row.muted .filter-dot {
                background: var(--border);
                opacity: 0.6;
            }

            .filter-sep {
                height: 1px;
                background: var(--border);
                margin: 3px 0;
                opacity: 0.5;
            }

            .filter-clear {
                font-size: 10px;
                color: var(--text2);
                text-align: center;
                cursor: pointer;
                padding: 2px 0;
                letter-spacing: 0.3px;
                text-transform: uppercase;
            }
            .filter-clear:hover {
                color: var(--text);
            }
        </style>
    </head>
    <body>
        <div id="titlebar">
            <span id="titlebar-text">mudscript — macro monitor</span>
            <button class="tb-btn" onclick="clearLog()">[clear]</button>
            <button class="tb-btn" onclick="closePanel()">[×]</button>
        </div>
        <div id="log"></div>

        <!-- Filter button + popup, fixed bottom-right -->
        <div id="filter-wrap">
            <div id="filter-panel">
                <!-- rows injected by JS -->
            </div>
            <button id="filter-btn" onclick="toggleFilterPanel()">
                filter
            </button>
        </div>

        <script>
            "use strict";

            document.addEventListener("contextmenu", (e) => e.preventDefault());

            function sendToHost(msg) {
                const s = typeof msg === "string" ? msg : JSON.stringify(msg);
                if (window.chrome?.webview) {
                    window.chrome.webview.postMessage(s);
                } else {
                    window.webkit.messageHandlers.msWatcher.postMessage(s);
                }
            }

            // ── Drag ──────────────────────────────────────────────────────────
            let _dragging = false;
            (function () {
                let _drag = null;
                document
                    .getElementById("titlebar")
                    .addEventListener("mousedown", (e) => {
                        if (e.target.closest(".tb-btn")) return;
                        _drag = { ox: e.screenX, oy: e.screenY };
                        _dragging = true;
                        const onMove = (ev) => {
                            if (!_drag) return;
                            sendToHost({
                                action: "move",
                                dx: ev.screenX - _drag.ox,
                                dy: ev.screenY - _drag.oy,
                            });
                            _drag.ox = ev.screenX;
                            _drag.oy = ev.screenY;
                        };
                        const onUp = () => {
                            _drag = null;
                            _dragging = false;
                            window.removeEventListener("mousemove", onMove);
                            window.removeEventListener("mouseup", onUp);
                        };
                        window.addEventListener("mousemove", onMove);
                        window.addEventListener("mouseup", onUp);
                    });
            })();

            // Close filter panel when clicking outside it
            document.addEventListener("mousedown", (e) => {
                const wrap = document.getElementById("filter-wrap");
                if (!wrap.contains(e.target)) closeFilterPanel();
            });

            // ── Scroll helpers ─────────────────────────────────────────────────
            const MAX_ENTRIES = 300;
            const NEAR_BOTTOM = 48;

            function isNearBottom(el) {
                return (
                    el.scrollHeight - el.scrollTop - el.clientHeight <=
                    NEAR_BOTTOM
                );
            }

            // ── Step categories ────────────────────────────────────────────────
            // Each category maps to a CSS class on #log (mute-X) and a data-cat
            // attribute on step rows.  Order matters: first match wins.
            const CATS = [
                { id: "wait", label: "Waits", re: /\] wait / },
                { id: "sound", label: "Sound calls", re: /\] sound / },
                { id: "cam", label: "Camera moves", re: /\] cam\.move/ },
                { id: "keys", label: "Key presses", re: /\] [↓↑] |\] type / },
                { id: "mouse", label: "Mouse actions", re: /\] Mouse / },
                { id: "scroll", label: "Scrolls", re: /\] scroll / },
                { id: "copy", label: "Clipboard", re: /\] copy/ },
            ];

            function stepCat(msg) {
                for (const c of CATS) {
                    if (c.re.test(msg)) return c.id;
                }
                return "other";
            }

            // ── Mute state ─────────────────────────────────────────────────────
            const _muted = new Set(); // set of muted category ids

            function isMuted(cat) {
                return _muted.has(cat);
            }

            function setMute(cat, on) {
                const log = document.getElementById("log");
                if (on) {
                    _muted.add(cat);
                    log.classList.add("mute-" + cat);
                } else {
                    _muted.delete(cat);
                    log.classList.remove("mute-" + cat);
                }
                _updateFilterUI();
            }

            function _updateFilterUI() {
                const btn = document.getElementById("filter-btn");
                btn.classList.toggle("has-mutes", _muted.size > 0);
                if (_muted.size > 0) {
                    btn.textContent = "filter (" + _muted.size + ")";
                } else {
                    btn.textContent = "filter";
                }
                CATS.forEach((c) => {
                    const row = document.getElementById("frow-" + c.id);
                    if (row) row.classList.toggle("muted", _muted.has(c.id));
                });
            }

            // ── Filter panel ───────────────────────────────────────────────────
            (function buildFilterPanel() {
                const panel = document.getElementById("filter-panel");
                CATS.forEach((c) => {
                    const row = document.createElement("div");
                    row.className = "filter-row";
                    row.id = "frow-" + c.id;
                    row.title = "Click to toggle";

                    const dot = document.createElement("span");
                    dot.className = "filter-dot";

                    const lbl = document.createElement("span");
                    lbl.className = "filter-label";
                    lbl.textContent = c.label;

                    row.append(lbl, dot);
                    row.addEventListener("click", () =>
                        setMute(c.id, !isMuted(c.id)),
                    );
                    panel.appendChild(row);
                });

                const sep = document.createElement("div");
                sep.className = "filter-sep";
                panel.appendChild(sep);

                const clear = document.createElement("div");
                clear.className = "filter-clear";
                clear.textContent = "show all";
                clear.addEventListener("click", () => {
                    _muted.forEach((id) => setMute(id, false));
                });
                panel.appendChild(clear);
            })();

            function toggleFilterPanel() {
                document
                    .getElementById("filter-panel")
                    .classList.toggle("open");
            }
            function closeFilterPanel() {
                document
                    .getElementById("filter-panel")
                    .classList.remove("open");
            }

            // ── Entry builder ──────────────────────────────────────────────────
            function buildRow(entry) {
                if (entry.type === "step") {
                    const row = document.createElement("div");
                    const cat = stepCat(entry.msg || "");
                    row.className = "step";
                    row.dataset.cat = cat;

                    const ts = document.createElement("span");
                    ts.className = "ts";
                    ts.textContent = "[" + (entry.ts || "") + "]";

                    const msg = document.createElement("span");
                    msg.className = "step-msg";
                    msg.textContent = entry.msg || "";

                    row.append(ts, msg);
                    return row;
                }

                const row = document.createElement("div");
                row.className = "entry";

                const ts = document.createElement("span");
                ts.className = "ts";
                ts.textContent = "[" + entry.ts + "]";
                row.appendChild(ts);

                if (entry.type === "macro") {
                    const dot = document.createElement("span");
                    dot.className = "dot";
                    dot.textContent = "●";
                    row.appendChild(dot);

                    const msg = document.createElement("span");
                    msg.className = "msg";
                    if (entry.parentLabel) {
                        msg.appendChild(
                            document.createTextNode(entry.parentLabel),
                        );
                        const sep = document.createElement("span");
                        sep.className = "sub-sep";
                        sep.textContent = "›";
                        msg.appendChild(sep);
                        const sub = document.createElement("span");
                        sub.className = "sub-name";
                        sub.textContent = entry.label || entry.id || "";
                        msg.appendChild(sub);
                    } else {
                        msg.textContent = entry.label || entry.id || "";
                    }
                    row.appendChild(msg);

                    if (entry.trigger) {
                        const trig = document.createElement("span");
                        trig.className = "trigger";
                        trig.textContent = entry.trigger;
                        row.appendChild(trig);
                    }
                } else {
                    const badge = document.createElement("span");
                    badge.className = "badge badge-" + entry.type;
                    badge.textContent = entry.type;
                    row.appendChild(badge);

                    const msg = document.createElement("span");
                    msg.className = "msg";
                    msg.textContent = entry.msg || "";
                    row.appendChild(msg);
                }

                return row;
            }

            // ── Public API ─────────────────────────────────────────────────────
            function appendEntry(entry) {
                const log = document.getElementById("log");
                const atBottom = isNearBottom(log);
                log.appendChild(buildRow(entry));
                while (log.childElementCount > MAX_ENTRIES) {
                    log.removeChild(log.firstElementChild);
                }
                if (atBottom) log.scrollTop = log.scrollHeight;
            }

            function loadHistory(entries) {
                const log = document.getElementById("log");
                log.innerHTML = "";
                const frag = document.createDocumentFragment();
                (entries || []).forEach((e) => frag.appendChild(buildRow(e)));
                log.appendChild(frag);
                log.scrollTop = log.scrollHeight;
            }

            // ── Button actions ─────────────────────────────────────────────────
            function clearLog() {
                document.getElementById("log").innerHTML = "";
                sendToHost({ action: "clear" });
            }

            function closePanel() {
                sendToHost({ action: "close" });
            }
        </script>
    </body>
</html>
