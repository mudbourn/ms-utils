394|        <script>
395|            "use strict";

399|            // ── Host communication ─────────────────────────────────────────────
400|            function sendToHost(msg) {
401|                const s = typeof msg === "string" ? msg : JSON.stringify(msg);
402|                try {
403|                    window.webkit.messageHandlers.msWatcher.postMessage(s);
404|                } catch (e) {}
405|            }
406|            function playSlot(slot) {
407|                sendToHost({ action: "playSlot", slot });
408|            }
409|
410|            // ── Header drag ────────────────────────────────────────────────────
411|            (function () {
412|                let _drag = null;
413|                document
414|                    .getElementById("header")
415|                    .addEventListener("mousedown", (e) => {
416|                        if (e.target.closest(".header-btns")) return;
417|                        _drag = { ox: e.screenX, oy: e.screenY };
418|                        const onMove = (ev) => {
419|                            if (!_drag) return;
420|                            sendToHost({
421|                                action: "move",
422|                                dx: ev.screenX - _drag.ox,
423|                                dy: ev.screenY - _drag.oy,
424|                            });
425|                            _drag.ox = ev.screenX;
426|                            _drag.oy = ev.screenY;
427|                        };
428|                        const onUp = () => {
429|                            _drag = null;
430|                            window.removeEventListener("mousemove", onMove);
431|                            window.removeEventListener("mouseup", onUp);
432|                        };
433|                        window.addEventListener("mousemove", onMove);
434|                        window.addEventListener("mouseup", onUp);
435|                    });
436|            })();

438|            // Close filter panel when clicking outside it
439|            document.addEventListener("mousedown", (e) => {
440|                const panel = document.getElementById("filter-panel");
441|                const btn = document.getElementById("filter-btn");
442|                if (!panel.contains(e.target) && !btn.contains(e.target)) {
443|                    closeFilterPanel();
444|                }
445|            });

447|            // ── Scroll helpers ─────────────────────────────────────────────────
448|            const MAX_ENTRIES = 300;
449|            const SCROLL_THRESH = 48;
450|
451|            function isNearBottom(el) {
452|                return (
453|                    el.scrollHeight - el.scrollTop - el.clientHeight <=
454|                    SCROLL_THRESH
455|                );
456|            }

458|            // ── Step categories ────────────────────────────────────────────────
459|            const CATS = [
460|                { id: "wait", label: "Waits", regex: /\] wait / },
461|                { id: "sound", label: "Sound calls", regex: /\] sound / },
462|                { id: "cam", label: "Camera moves", regex: /\] cam\.move/ },
463|                {
464|                    id: "keys",
465|                    label: "Key presses",
466|                    regex: /\] [↓↑] |\] type /,
467|                },
468|                { id: "mouse", label: "Mouse actions", regex: /\] Mouse / },
469|                { id: "scroll", label: "Scrolls", regex: /\] scroll / },
470|                { id: "copy", label: "Clipboard", regex: /\] copy/ },
471|            ];
472|
473|            function stepCat(msg) {
474|                for (const c of CATS) {
475|                    if (c.regex.test(msg)) return c.id;
476|                }
477|                return "other";
478|            }
479|
480|            // ── Mute state ─────────────────────────────────────────────────────
481|            const _muted = new Set();
482|
483|            function isMuted(cat) {
484|                return _muted.has(cat);
485|            }
486|
487|            function setMute(cat, on) {
488|                const log = document.getElementById("log");
489|                if (on) {
490|                    _muted.add(cat);
491|                    log.classList.add("mute-" + cat);
492|                } else {
493|                    _muted.delete(cat);
494|                    log.classList.remove("mute-" + cat);
495|                }
496|                _updateFilterUI();
497|            }

499|            function _updateFilterUI() {
500|                const btn = document.getElementById("filter-btn");
501|                btn.classList.toggle("has-mutes", _muted.size > 0);
502|                btn.textContent =
503|                    _muted.size > 0 ? "filter (" + _muted.size + ")" : "filter";
504|                CATS.forEach((c) => {
505|                    const row = document.getElementById("frow-" + c.id);
506|                    if (row) row.classList.toggle("muted", _muted.has(c.id));
507|                });
508|                const action = document.getElementById("filter-action");
509|                if (action) {
510|                    action.textContent =
511|                        _muted.size === CATS.length ? "show all" : "hide all";
512|                }
513|            }

515|            // ── Build filter panel ─────────────────────────────────────────────
516|            (function buildFilterPanel() {
517|                const CAT_DOT_COLORS = {
518|                    wait: "var(--text3)",
519|                    sound: "var(--warning)",
520|                    cam: "var(--success)",
521|                    keys: "var(--text2)",
522|                    mouse: "var(--mouse)",
523|                    scroll: "var(--scroll)",
524|                    copy: "var(--accent)",
525|                };
526|
527|                const panel = document.getElementById("filter-panel");
528|
529|                CATS.forEach((c) => {
530|                    const row = document.createElement("div");
531|                    row.className = "filter-row";
532|                    row.id = "frow-" + c.id;
533|                    // --dot-clr is inherited by the .filter-dot child
534|                    row.style.setProperty(
535|                        "--dot-clr",
536|                        CAT_DOT_COLORS[c.id] || "var(--text3)",
537|                    );
538|
539|                    const dot = document.createElement("span");
540|                    dot.className = "filter-dot";
541|
542|                    const lbl = document.createElement("span");
543|                    lbl.className = "filter-label";
544|                    lbl.textContent = c.label;
545|
546|                    row.append(dot, lbl);
547|                    row.addEventListener("click", () =>
548|                        setMute(c.id, !isMuted(c.id)),
549|                    );
550|                    panel.appendChild(row);
551|                });
552|
553|                const sep = document.createElement("div");
554|                sep.className = "filter-sep";
555|                panel.appendChild(sep);
556|
557|                const clear = document.createElement("div");
558|                clear.className = "filter-clear";
559|                clear.id = "filter-action";
560|                clear.textContent = "hide all";
561|                clear.addEventListener("click", () => {
562|                    if (_muted.size === CATS.length) {
563|                        [..._muted].forEach((id) => setMute(id, false));
564|                    } else {
565|                        CATS.forEach((c) => setMute(c.id, true));
566|                    }
567|                });
568|                panel.appendChild(clear);
569|            })();

571|            function toggleFilterPanel() {
572|                document
573|                    .getElementById("filter-panel")
574|                    .classList.toggle("open");
575|            }
576|            function closeFilterPanel() {
577|                document
578|                    .getElementById("filter-panel")
579|                    .classList.remove("open");

582|            // ── Entry builder ──────────────────────────────────────────────────
583|            function buildRow(entry) {
584|                if (entry.type === "step") {
585|                    const row = document.createElement("div");
586|                    row.className = "step";
587|                    row.dataset.cat = stepCat(entry.msg || "");
588|
589|                    const ts = document.createElement("span");
590|                    ts.className = "ts";
591|                    ts.textContent = "[" + (entry.ts || "") + "]";
592|
593|                    const msg = document.createElement("span");
594|                    msg.className = "step-msg";
595|                    msg.textContent = entry.msg || "";
596|
597|                    row.append(ts, msg);
598|                    return row;
599|                }
600|
601|                const row = document.createElement("div");
602|                row.className = "entry";
603|
604|                const ts = document.createElement("span");
605|                ts.className = "ts";
606|                ts.textContent = "[" + (entry.ts || "") + "]";
607|                row.appendChild(ts);
608|
609|                if (entry.type === "macro") {
610|                    row.classList.add("entry-macro");
611|
612|                    const dot = document.createElement("span");
613|                    dot.className = "dot";
614|                    dot.textContent = "●";
615|                    row.appendChild(dot);
616|
617|                    const msg = document.createElement("span");
618|                    msg.className = "msg";
619|                    if (entry.parentLabel) {
620|                        msg.appendChild(
621|                            document.createTextNode(entry.parentLabel),
622|                        );
623|                        const sep = document.createElement("span");
624|                        sep.className = "sub-sep";
625|                        sep.textContent = "›";
626|                        const sub = document.createElement("span");
627|                        sub.className = "sub-name";
628|                        sub.textContent = entry.label || entry.id || "";
629|                        msg.append(sep, sub);
630|                    } else {
631|                        msg.textContent = entry.label || entry.id || "";
632|                    }
633|                    row.appendChild(msg);
634|
635|                    if (entry.trigger) {
636|                        const trig = document.createElement("span");
637|                        trig.className = "pill";
638|                        trig.textContent = entry.trigger;
639|                        row.appendChild(trig);
640|                    }
641|                } else {
642|                    const badge = document.createElement("span");
643|                    badge.className = "badge badge-" + entry.type;
644|                    badge.textContent = entry.type;
645|                    row.appendChild(badge);
646|
647|                    const msg = document.createElement("span");
648|                    msg.className = "msg";
649|                    msg.textContent = entry.msg || "";
650|                    row.appendChild(msg);
651|                }
652|
653|                return row;
654|            }

656|            // ── Public API ─────────────────────────────────────────────────────
657|            function appendEntry(entry) {
658|                const log = document.getElementById("log");
659|                const atBottom = isNearBottom(log);
660|                log.appendChild(buildRow(entry));
661|                while (log.childElementCount > MAX_ENTRIES) {
662|                    log.removeChild(log.firstElementChild);
663|                }
664|                if (atBottom) log.scrollTop = log.scrollHeight;
665|            }

667|            function loadHistory(entries) {
668|                const log = document.getElementById("log");
669|                log.innerHTML = "";
670|                const capped =
671|                    entries && entries.length > MAX_ENTRIES
672|                        ? entries.slice(-MAX_ENTRIES)
673|                        : entries || [];
674|                const frag = document.createDocumentFragment();
675|                capped.forEach((e) => frag.appendChild(buildRow(e)));
676|                log.appendChild(frag);
677|                log.scrollTop = log.scrollHeight;
678|            }

            // Parse #rrggbb or #rgb -> { r, g, b }
            function hexToRgb(hex) {
