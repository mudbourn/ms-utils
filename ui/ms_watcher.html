<!doctype html>
<html lang="en">
    <head>
        <meta charset="UTF-8" />
        <style>
            /* ── Fonts ──────────────────────────────────────────────────────── */
            @font-face {
                font-family: "Almendra";
                src: url("./fonts/Almendra-Regular.ttf") format("truetype");
                font-weight: 400;
                font-style: normal;
            }
            @font-face {
                font-family: "Almendra";
                src: url("./fonts/Almendra-Bold.ttf") format("truetype");
                font-weight: 700;
                font-style: normal;
            }
            @font-face {
                font-family: "Almendra";
                src: url("./fonts/Almendra-Italic.ttf") format("truetype");
                font-weight: 400;
                font-style: italic;
            }
            @font-face {
                font-family: "Almendra";
                src: url("./fonts/Almendra-BoldItalic.ttf") format("truetype");
                font-weight: 700;
                font-style: italic;
            }

            /* ── Tokens ─────────────────────────────────────────────────────── */
            :root {
                --bg: #0e0e0e;
                --surface: #1a1a1a;
                --surface2: #252525;
                --hover: #333333;
                --accent: #cccccc;
                --accent-hi: #e8e8e8;
                --success: #888888;
                --danger: #d8d8d8;
                --warning: #aaaaaa;
                --text: #d8d8d8;
                --text2: rgba(200, 200, 200, 0.85);
                --text3: rgba(160, 160, 160, 0.55);
                --border: rgba(100, 100, 100, 0.55);
                --radius: 2px;
                --radius-s: 1px;
                /* panel extras */
                --mouse: #aaaaaa;
                --scroll: #888888;
                --border-dim: rgba(100, 100, 100, 0.18);
                --border-faint: rgba(100, 100, 100, 0.08);
                --shadow-panel: rgba(0, 0, 0, 0.4);
            }

            /* ── Reset ──────────────────────────────────────────────────────── */
            *,
            *::before,
            *::after {
                box-sizing: border-box;
                margin: 0;
                padding: 0;
                user-select: none;
                -webkit-user-select: none;
            }
            html,
            body {
                height: 100%;
                overflow: hidden;
                background: var(--bg);
            }
            body {
                font-family: Arial, "Almendra", sans-serif;
                font-size: 13px;
                color: var(--text);
                -webkit-font-smoothing: antialiased;
                display: flex;
                flex-direction: column;
                position: relative;
            }
            button {
                cursor: pointer;
                border: none;
                background: none;
                color: inherit;
                font: inherit;
            }

            /* ── Header ─────────────────────────────────────────────────────── */
            #header {
                display: flex;
                align-items: center;
                gap: 8px;
                padding: 10px 12px 8px;
                background: var(--surface);
                border-bottom: 1px solid var(--border);
                box-shadow: 0 1px 12px
                    color-mix(in srgb, var(--accent) 12%, transparent);
                flex-shrink: 0;
                -webkit-app-region: drag;
            }
            #panel-title {
                flex: 1;
                font-weight: 600;
                font-size: 13px;
            }
            .header-btns {
                display: flex;
                gap: 4px;
                -webkit-app-region: no-drag;
            }
            .btn-ghost {
                padding: 3px 10px;
                border-radius: 20px;
                font-size: 11px;
                font-weight: 600;
                background: var(--surface2);
                color: var(--text2);
                transition: opacity 0.15s;
            }
            .btn-ghost:hover {
                opacity: 0.8;
            }
            .btn-close {
                width: 22px;
                height: 22px;
                border-radius: 50%;
                background: var(--surface2);
                color: var(--text2);
                font-size: 12px;
                display: flex;
                align-items: center;
                justify-content: center;
                transition: background 0.15s;
            }
            .btn-close:hover {
                background: var(--hover);
                color: var(--text);
            }
            #filter-btn.has-mutes {
                color: var(--accent);
            }

            /* ── Log area ───────────────────────────────────────────────────── */
            #log {
                flex: 1;
                overflow-y: auto;
                padding: 4px 0 8px;
                min-height: 0;
            }
            #log::-webkit-scrollbar {
                width: 5px;
            }
            #log::-webkit-scrollbar-track {
                background: transparent;
            }
            #log::-webkit-scrollbar-thumb {
                background: var(--border);
                border-radius: 3px;
            }

            /* ── Entry rows ─────────────────────────────────────────────────── */
            .entry {
                display: flex;
                align-items: flex-start;
                gap: 6px;
                padding: 5px 12px;
                font-size: 12px;
                border-bottom: 1px solid var(--border-dim);
            }
            .entry:hover {
                background: var(--surface);
            }
            .entry.selected {
                background: var(--hover);
                outline: 1px solid var(--accent-glow);
            }
            .entry.selected:hover {
                background: var(--accent-glow-faint);
            }
            .ts {
                color: var(--text3);
                font:
                    10px "SF Mono",
                    Menlo,
                    monospace;
                flex-shrink: 0;
                padding-top: 1px;
                min-width: 52px;
            }
            .badge {
                flex-shrink: 0;
                padding: 1px 5px;
                border-radius: var(--radius-s);
                font:
                    700 10px "SF Mono",
                    Menlo,
                    monospace;
                letter-spacing: 0.05em;
                text-transform: uppercase;
            }
            .badge-print {
                background: color-mix(in srgb, var(--text2) 8%, transparent);
                color: var(--text2);
            }
            .badge-error {
                background: color-mix(in srgb, var(--danger) 12%, transparent);
                color: var(--danger);
            }
            .dot {
                font-size: 7px;
                color: var(--accent);
                flex-shrink: 0;
                padding-top: 2px;
            }
            .msg {
                color: var(--text);
                word-break: break-word;
                white-space: pre-wrap;
                flex: 1;
                min-width: 0;
            }
            .msg .sub-sep {
                color: var(--text3);
                margin: 0 3px;
            }
            .msg .sub-name {
                color: var(--text);
            }
            .pill {
                display: inline-flex;
                align-items: center;
                padding: 1px 7px;
                border-radius: 20px;
                font:
                    700 10px "SF Mono",
                    Menlo,
                    monospace;
                background: var(--surface2);
                border: 1px solid var(--border);
                color: var(--text2);
                flex-shrink: 0;
            }

            /* ── Step rows ──────────────────────────────────────────────────── */
            .step {
                display: flex;
                align-items: flex-start;
                gap: 6px;
                padding: 3px 12px 3px 36px;
                font-size: 11px;
                opacity: 0.45;
                border-bottom: 1px solid var(--border-faint);
            }
            .step:hover {
                opacity: 0.7;
            }
            .step.selected {
                background: var(--hover);
                outline: 1px solid var(--accent-glow);
            }
            .step.selected:hover {
                background: var(--accent-glow-faint);
            }
            .step-msg {
                color: var(--text2);
                word-break: break-word;
                flex: 1;
            }

            /* ── Mute rules — toggled by classes on #log ────────────────────── */
            #log.mute-wait .step[data-cat="wait"] {
                display: none;
            }
            #log.mute-sound .step[data-cat="sound"] {
                display: none;
            }
            #log.mute-cam .step[data-cat="cam"] {
                display: none;
            }
            #log.mute-keys .step[data-cat="keys"] {
                display: none;
            }
            #log.mute-mouse .step[data-cat="mouse"] {
                display: none;
            }
            #log.mute-scroll .step[data-cat="scroll"] {
                display: none;
            }
            #log.mute-copy .step[data-cat="copy"] {
                display: none;
            }

            /* ── Filter panel ───────────────────────────────────────────────── */
            #filter-panel {
                position: absolute;
                bottom: 0;
                right: 0;
                width: 200px;
                background: var(--surface);
                border-top: 1px solid var(--border);
                border-left: 1px solid var(--border);
                border-radius: var(--radius) 0 0 0;
                padding: 8px 0;
                display: none;
                box-shadow: -2px -2px 12px var(--shadow-panel);
                z-index: 10;
            }
            #filter-panel.open {
                display: block;
            }
            .filter-row {
                display: flex;
                align-items: center;
                gap: 8px;
                padding: 5px 12px;
                cursor: pointer;
            }
            .filter-row:hover {
                background: var(--hover);
            }
            .filter-row.muted .filter-label {
                opacity: 0.4;
                text-decoration: line-through;
            }
            .filter-dot {
                width: 8px;
                height: 8px;
                border-radius: 50%;
                flex-shrink: 0;
                /* --dot-clr is set per-row via JS (inherits into this child) */
                background: var(--dot-clr, var(--text3));
                transition:
                    background 0.1s,
                    opacity 0.1s;
            }
            /* Higher specificity wins — grays out the dot when muted */
            .filter-row.muted .filter-dot {
                background: var(--border);
                opacity: 0.6;
            }
            .filter-label {
                font-size: 12px;
                flex: 1;
                color: var(--text);
            }
            .filter-sep {
                height: 1px;
                background: var(--border);
                margin: 4px 12px;
            }
            .filter-clear {
                padding: 5px 12px;
                font-size: 11px;
                color: var(--text2);
                cursor: pointer;
                text-align: center;
            }
            .filter-clear:hover {
                color: var(--text);
            }
        </style>
    </head>
    <body>
        <div id="header">
            <span id="panel-title">mudscript — macro monitor</span>
            <div class="header-btns">
                <button
                    class="btn-ghost"
                    id="filter-btn"
                    onmouseenter="playSlot('hover')"
                    onclick="
                        playSlot('interact');
                        toggleFilterPanel();
                    "
                >
                    filter
                </button>
                <button
                    class="btn-ghost"
                    onmouseenter="playSlot('hover')"
                    onclick="
                        playSlot('interact');
                        clearLog();
                    "
                >
                    Clear
                </button>
                <button
                    class="btn-close"
                    onmouseenter="playSlot('hover')"
                    onclick="
                        playSlot('interact');
                        closePanel();
                    "
                >
                    ✕
                </button>
            </div>
        </div>

        <div id="log"></div>

        <!-- Filter panel — absolute bottom-right, injected by JS -->
        <div id="filter-panel"></div>

        <script>
            "use strict";

            // ── Selection state ───────────────────────────────────────────────────
            const _selected = new Set();
            let _lastClicked = null;

            function _getEntries() {
                return Array.from(document.querySelectorAll("#log .entry, #log .step"));
            }

            function _updateSelectionVisuals() {
                for (const el of _getEntries()) {
                    el.classList.toggle("selected", _selected.has(el));
                }
            }

            function _handleEntryClick(e) {
                const row = e.currentTarget;
                const entries = _getEntries();
                const idx = entries.indexOf(row);
                if (idx === -1) return;
                playSlot("interact");

                if (e.shiftKey && _lastClicked !== null) {
                    const lo = Math.min(_lastClicked, idx);
                    const hi = Math.max(_lastClicked, idx);
                    for (let i = lo; i <= hi; i++) _selected.add(entries[i]);
                } else if (e.metaKey || e.ctrlKey) {
                    if (_selected.has(row)) _selected.delete(row);
                    else _selected.add(row);
                } else {
                    _selected.clear();
                    _selected.add(row);
                }
                _lastClicked = idx;
                _updateSelectionVisuals();
            }

            function _copySelected() {
                if (_selected.size === 0) return;
                const lines = [];
                for (const el of _getEntries()) {
                    if (_selected.has(el)) {
                        const ts = el.querySelector(".ts")?.textContent || "";
                        const msg = el.querySelector(".msg, .step-msg, .entry-app, .entry-title, .key-name, .mouse-name, .move-name, .scroll-name")?.textContent || "";
                        lines.push(`[${ts}] ${msg}`.trim());
                    }
                }
                const text = lines.join("\n");
                try { navigator.clipboard.writeText(text); } catch (_) {}
                playSlot("update");
            }

            // Right-click on entries: copy selected
            document.addEventListener("contextmenu", (e) => {
                const row = e.target.closest(".entry, .step");
                if (!row) return;
                e.preventDefault();
                if (!_selected.has(row)) {
                    _selected.clear();
                    _selected.add(row);
                    _updateSelectionVisuals();
                }
                _copySelected();
            });

            // ── Host communication ─────────────────────────────────────────────
            function sendToHost(msg) {
                const s = typeof msg === "string" ? msg : JSON.stringify(msg);
                try {
                    window.webkit.messageHandlers.msWatcher.postMessage(s);
                } catch (e) {}
            }
            function playSlot(slot) {
                sendToHost({ action: "playSlot", slot });
            }

            // ── Header drag ────────────────────────────────────────────────────
            (function () {
                let _drag = null;
                document
                    .getElementById("header")
                    .addEventListener("mousedown", (e) => {
                        if (e.target.closest(".header-btns")) return;
                        _drag = { ox: e.screenX, oy: e.screenY };
                        const onMove = (ev) => {
                            if (!_drag) return;
                            sendToHost({
                                action: "move",
                                dx: ev.screenX - _drag.ox,
                                dy: ev.screenY - _drag.oy,
                            });
                            _drag.ox = ev.screenX;
                            _drag.oy = ev.screenY;
                        };
                        const onUp = () => {
                            _drag = null;
                            window.removeEventListener("mousemove", onMove);
                            window.removeEventListener("mouseup", onUp);
                        };
                        window.addEventListener("mousemove", onMove);
                        window.addEventListener("mouseup", onUp);
                    });
            })();

            // Close filter panel when clicking outside it
            document.addEventListener("mousedown", (e) => {
                const panel = document.getElementById("filter-panel");
                const btn = document.getElementById("filter-btn");
                if (!panel.contains(e.target) && !btn.contains(e.target)) {
                    closeFilterPanel();
                }
            });

            // ── Scroll helpers ─────────────────────────────────────────────────
            const MAX_ENTRIES = 300;
            const SCROLL_THRESH = 48;

            function isNearBottom(el) {
                return (
                    el.scrollHeight - el.scrollTop - el.clientHeight <=
                    SCROLL_THRESH
                );
            }

            // ── Step categories ────────────────────────────────────────────────
            const CATS = [
                { id: "wait", label: "Waits", regex: /\] wait / },
                { id: "sound", label: "Sound calls", regex: /\] sound / },
                { id: "cam", label: "Camera moves", regex: /\] cam\.move/ },
                {
                    id: "keys",
                    label: "Key presses",
                    regex: /\] [↓↑] |\] type /,
                },
                { id: "mouse", label: "Mouse actions", regex: /\] Mouse / },
                { id: "scroll", label: "Scrolls", regex: /\] scroll / },
                { id: "copy", label: "Clipboard", regex: /\] copy/ },
            ];

            function stepCat(msg) {
                for (const c of CATS) {
                    if (c.regex.test(msg)) return c.id;
                }
                return "other";
            }

            // ── Mute state ─────────────────────────────────────────────────────
            const _muted = new Set();

            function isMuted(cat) {
                return _muted.has(cat);
            }

            function setMute(cat, on) {
                const log = document.getElementById("log");
                if (on) {
                    _muted.add(cat);
                    log.classList.add("mute-" + cat);
                } else {
                    _muted.delete(cat);
                    log.classList.remove("mute-" + cat);
                }
                _updateFilterUI();
            }

            function _updateFilterUI() {
                const btn = document.getElementById("filter-btn");
                btn.classList.toggle("has-mutes", _muted.size > 0);
                btn.textContent =
                    _muted.size > 0 ? "filter (" + _muted.size + ")" : "filter";
                CATS.forEach((c) => {
                    const row = document.getElementById("frow-" + c.id);
                    if (row) row.classList.toggle("muted", _muted.has(c.id));
                });
                const action = document.getElementById("filter-action");
                if (action) {
                    action.textContent =
                        _muted.size === CATS.length ? "show all" : "hide all";
                }
            }

            // ── Build filter panel ─────────────────────────────────────────────
            (function buildFilterPanel() {
                const CAT_DOT_COLORS = {
                    wait: "var(--text3)",
                    sound: "var(--warning)",
                    cam: "var(--success)",
                    keys: "var(--text2)",
                    mouse: "var(--mouse)",
                    scroll: "var(--scroll)",
                    copy: "var(--accent)",
                };

                const panel = document.getElementById("filter-panel");

                CATS.forEach((c) => {
                    const row = document.createElement("div");
                    row.className = "filter-row";
                    row.id = "frow-" + c.id;
                    // --dot-clr is inherited by the .filter-dot child
                    row.style.setProperty(
                        "--dot-clr",
                        CAT_DOT_COLORS[c.id] || "var(--text3)",
                    );

                    const dot = document.createElement("span");
                    dot.className = "filter-dot";

                    const lbl = document.createElement("span");
                    lbl.className = "filter-label";
                    lbl.textContent = c.label;

                    row.append(dot, lbl);
                    row.addEventListener("click", () =>
                        setMute(c.id, !isMuted(c.id)),
                    );
                    panel.appendChild(row);
                });

                const sep = document.createElement("div");
                sep.className = "filter-sep";
                panel.appendChild(sep);

                const clear = document.createElement("div");
                clear.className = "filter-clear";
                clear.id = "filter-action";
                clear.textContent = "hide all";
                clear.addEventListener("click", () => {
                    if (_muted.size === CATS.length) {
                        [..._muted].forEach((id) => setMute(id, false));
                    } else {
                        CATS.forEach((c) => setMute(c.id, true));
                    }
                });
                panel.appendChild(clear);
            })();

            function toggleFilterPanel() {
                document
                    .getElementById("filter-panel")
                    .classList.toggle("open");
            }
            function closeFilterPanel() {
                document
                    .getElementById("filter-panel")
                    .classList.remove("open");
            }

            // ── Entry builder ──────────────────────────────────────────────────
            function buildRow(entry) {
                if (entry.type === "step") {
                    const row = document.createElement("div");
                    row.className = "step";
                    row.dataset.cat = stepCat(entry.msg || "");

                    const ts = document.createElement("span");
                    ts.className = "ts";
                    ts.textContent = "[" + (entry.ts || "") + "]";

                    const msg = document.createElement("span");
                    msg.className = "step-msg";
                    msg.textContent = entry.msg || "";

                    row.append(ts, msg);
                    row.addEventListener("mouseenter", () => playSlot("hover"));
                    row.addEventListener("click", _handleEntryClick);
                    return row;
                }

                const row = document.createElement("div");
                row.className = "entry";

                const ts = document.createElement("span");
                ts.className = "ts";
                ts.textContent = "[" + (entry.ts || "") + "]";
                row.appendChild(ts);

                if (entry.type === "macro") {
                    row.classList.add("entry-macro");

                    const dot = document.createElement("span");
                    dot.className = "dot";
                    dot.textContent = "●";
                    row.appendChild(dot);

                    const msg = document.createElement("span");
                    msg.className = "msg";
                    if (entry.parentLabel) {
                        msg.appendChild(
                            document.createTextNode(entry.parentLabel),
                        );
                        const sep = document.createElement("span");
                        sep.className = "sub-sep";
                        sep.textContent = "›";
                        const sub = document.createElement("span");
                        sub.className = "sub-name";
                        sub.textContent = entry.label || entry.id || "";
                        msg.append(sep, sub);
                    } else {
                        msg.textContent = entry.label || entry.id || "";
                    }
                    row.appendChild(msg);

                    if (entry.trigger) {
                        const trig = document.createElement("span");
                        trig.className = "pill";
                        trig.textContent = entry.trigger;
                        row.appendChild(trig);
                    }
                } else {
                    const badge = document.createElement("span");
                    badge.className = "badge badge-" + entry.type;
                    badge.textContent = entry.type;
                    row.appendChild(badge);

                    const msg = document.createElement("span");
                    msg.className = "msg";
                    msg.textContent = entry.msg || "";
                    row.appendChild(msg);
                }

                row.addEventListener("mouseenter", () => playSlot("hover"));
                row.addEventListener("click", _handleEntryClick);
                return row;
            }

            // ── Public API ─────────────────────────────────────────────────────
            function appendEntry(entry) {
                const log = document.getElementById("log");
                const atBottom = isNearBottom(log);
                log.appendChild(buildRow(entry));
                while (log.childElementCount > MAX_ENTRIES) {
                    log.removeChild(log.firstElementChild);
                }
                if (atBottom) log.scrollTop = log.scrollHeight;
            }

            function loadHistory(entries) {
                const log = document.getElementById("log");
                log.innerHTML = "";
                const capped =
                    entries && entries.length > MAX_ENTRIES
                        ? entries.slice(-MAX_ENTRIES)
                        : entries || [];
                const frag = document.createDocumentFragment();
                capped.forEach((e) => frag.appendChild(buildRow(e)));
                log.appendChild(frag);
                log.scrollTop = log.scrollHeight;
            }

            function clearLog() {
                document.getElementById("log").innerHTML = "";
                sendToHost({ action: "clear" });
            }

            function closePanel() {
                sendToHost({ action: "close" });
            }

            // ── Theme ──────────────────────────────────────────────────────────
            // Parse #rrggbb or #rgb → { r, g, b }
            function hexToRgb(hex) {
                hex = hex.replace(/^#/, "");
                if (hex.length === 3) hex = hex[0]+hex[0]+hex[1]+hex[1]+hex[2]+hex[2];
                const n = parseInt(hex, 16);
                return { r: (n >> 16) & 255, g: (n >> 8) & 255, b: n & 255 };
            }

            function applyTheme(t) {
                if (!t) return;
                const r = document.documentElement.style;
                if (t.bg) r.setProperty("--bg", t.bg);
                if (t.surface) r.setProperty("--surface", t.surface);
                if (t.surface2) r.setProperty("--surface2", t.surface2);
                if (t.hover) r.setProperty("--hover", t.hover);
                if (t.accent) r.setProperty("--accent", t.accent);
                if (t.accentHi) r.setProperty("--accent-hi", t.accentHi);
                if (t.success) r.setProperty("--success", t.success);
                if (t.dangerBg) r.setProperty("--danger-bg", t.dangerBg);
                if (t.danger) r.setProperty("--danger", t.danger);
                if (t.warning) r.setProperty("--warning", t.warning);
                if (t.text) r.setProperty("--text", t.text);
                // Derived: text2/text3 from text
                if (t.text && !t.text2) {
                    const c = hexToRgb(t.text);
                    if (c) r.setProperty("--text2", `rgba(${c.r},${c.g},${c.b},0.85)`);
                }
                if (t.text && !t.text3) {
                    const c = hexToRgb(t.text);
                    if (c) r.setProperty("--text3", `rgba(${c.r},${c.g},${c.b},0.55)`);
                }
                // Derived: border from accent + hover mix
                if (t.accent && t.hover && !t.border) {
                    const a = hexToRgb(t.accent);
                    const h = hexToRgb(t.hover);
                    if (a && h) {
                        const mr = Math.round(a.r * 0.5 + h.r * 0.5);
                        const mg = Math.round(a.g * 0.5 + h.g * 0.5);
                        const mb = Math.round(a.b * 0.5 + h.b * 0.5);
                        r.setProperty("--border", `rgba(${mr},${mg},${mb},0.55)`);
                        r.setProperty("--border-dim", `rgba(${mr},${mg},${mb},0.18)`);
                    }
                }
                // Derived: accent glow
                if (t.accent && !t.accentGlow) {
                    const a = hexToRgb(t.accent);
                    if (a) r.setProperty("--accent-glow", `rgba(${a.r},${a.g},${a.b},0.4)`);
                }
                if (t.accent && !t.accentGlowFaint) {
                    const a = hexToRgb(t.accent);
                    if (a) r.setProperty("--accent-glow-faint", `rgba(${a.r},${a.g},${a.b},0.12)`);
                }
                // Derived: danger glow/border
                if (t.danger && !t.dangerGlow) {
                    const d = hexToRgb(t.danger);
                    if (d) r.setProperty("--danger-glow", `rgba(${d.r},${d.g},${d.b},0.6)`);
                }
                if (t.danger && !t.dangerBorder) {
                    const d = hexToRgb(t.danger);
                    if (d) r.setProperty("--danger-border", `rgba(${d.r},${d.g},${d.b},0.3)`);
                }
                // Explicit overrides
                if (t.text2) r.setProperty("--text2", t.text2);
                if (t.text3) r.setProperty("--text3", t.text3);
                if (t.border) r.setProperty("--border", t.border);
                if (t.borderDim) r.setProperty("--border-dim", t.borderDim);
                if (t.accentGlow) r.setProperty("--accent-glow", t.accentGlow);
                if (t.accentGlowFaint) r.setProperty("--accent-glow-faint", t.accentGlowFaint);
                if (t.dangerGlow) r.setProperty("--danger-glow", t.dangerGlow);
                if (t.dangerBorder) r.setProperty("--danger-border", t.dangerBorder);
                if (t.radius !== undefined) {
                    r.setProperty("--radius", t.radius + "px");
                    r.setProperty("--radius-s", Math.max(0, t.radius - 1) + "px");
                }
                if (t.font) {
                    if (t.fontURL) {
                        let el = document.getElementById("_ms-custom-font");
                        if (!el) {
                            el = document.createElement("style");
                            el.id = "_ms-custom-font";
                            document.head.appendChild(el);
                        }
                        el.textContent = `@font-face { font-family: "${t.font}"; src: url("${t.fontURL}"); }`;
                    }
                    document.body.style.fontFamily = `"${t.font}", Almendra, Palatino, Georgia, serif`;
                }
            }

            // ── Init ───────────────────────────────────────────────────────────
            document.addEventListener("DOMContentLoaded", () => {
                sendToHost({ action: "ready" });
            });
        </script>
    </body>
</html>
