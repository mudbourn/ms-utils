<!doctype html>
<html lang="en">
    <head>
        <meta charset="UTF-8" />
        <style>
            /* ── Fonts ──────────────────────────────────────────────────────── */
            @font-face {
                font-family: "Almendra";
                src: url("./fonts/Almendra-Regular.ttf") format("truetype");
                font-weight: 400;
                font-style: normal;
            }
            @font-face {
                font-family: "Almendra";
                src: url("./fonts/Almendra-Bold.ttf") format("truetype");
                font-weight: 700;
                font-style: normal;
            }
            @font-face {
                font-family: "Almendra";
                src: url("./fonts/Almendra-Italic.ttf") format("truetype");
                font-weight: 400;
                font-style: italic;
            }
            @font-face {
                font-family: "Almendra";
                src: url("./fonts/Almendra-BoldItalic.ttf") format("truetype");
                font-weight: 700;
                font-style: italic;
            }

            /* ── Tokens ─────────────────────────────────────────────────────── */
            :root {
                --bg: #0e0e0e;
                --surface: #1a1a1a;
                --surface2: #252525;
                --hover: #333333;
                --accent: #cccccc;
                --accent-hi: #e8e8e8;
                --success: #888888;
                --danger: #d8d8d8;
                --warning: #aaaaaa;
                --text: #d8d8d8;
                --text2: rgba(200, 200, 200, 0.85);
                --text3: rgba(160, 160, 160, 0.55);
                --border: rgba(100, 100, 100, 0.55);
                --radius: 2px;
                --radius-s: 1px;
                /* panel extras */
                --mouse: #aaaaaa;
                --scroll: #888888;
                --border-dim: rgba(100, 100, 100, 0.18);
                --border-faint: rgba(100, 100, 100, 0.08);
                --shadow-panel: rgba(0, 0, 0, 0.4);
            }

            /* ── Reset ──────────────────────────────────────────────────────── */
            *,
            *::before,
            *::after {
                box-sizing: border-box;
                margin: 0;
                padding: 0;
                user-select: none;
                -webkit-user-select: none;
            }
            html,
            body {
                height: 100%;
                overflow: hidden;
                background: transparent;
            }
            body {
                font-family: Arial, "Almendra", Palatino, Georgia, serif;
                font-size: 13px;
                color: var(--text);
                -webkit-font-smoothing: antialiased;
                display: flex;
                flex-direction: column;
                position: relative;
                background: var(--bg);
                border-radius: var(--ms-window-radius, 3px);
                overflow: hidden;
            }
            button {
                cursor: pointer;
                border: none;
                background: none;
                color: inherit;
                font: inherit;
            }

            /* ── Header ─────────────────────────────────────────────────────── */
            #header {
                display: flex;
                align-items: center;
                gap: 8px;
                padding: 10px 12px 8px;
                background: var(--surface);
                border-bottom: 1px solid var(--border);
                box-shadow: 0 1px 12px
                    color-mix(in srgb, var(--accent) 12%, transparent);
                flex-shrink: 0;
                -webkit-app-region: drag;
            }
            #panel-title {
                flex: 1;
                font-weight: 600;
                font-size: 13px;
            }
            .header-btns {
                display: flex;
                gap: 4px;
                -webkit-app-region: no-drag;
            }
            .btn-ghost {
                padding: 3px 10px;
                border-radius: 20px;
                font-size: 11px;
                font-weight: 600;
                background: var(--surface2);
                color: var(--text2);
                transition: opacity 0.15s;
            }
            .btn-ghost:hover {
                opacity: 0.8;
            }
            .btn-close {
                width: 22px;
                height: 22px;
                border-radius: 50%;
                background: var(--surface2);
                color: var(--text2);
                font-size: 12px;
                display: flex;
                align-items: center;
                justify-content: center;
                transition: background 0.15s;
            }
            .btn-close:hover {
                background: var(--hover);
                color: var(--text);
            }
            #filter-btn.has-mutes {
                color: var(--accent);
            }

            /* ── Log area ───────────────────────────────────────────────────── */
            #log {
                flex: 1;
                overflow-y: auto;
                padding: 4px 0 8px;
                min-height: 0;
            }
            #log::-webkit-scrollbar {
                width: 5px;
            }
            #log::-webkit-scrollbar-track {
                background: transparent;
            }
            #log::-webkit-scrollbar-thumb {
                background: var(--border);
                border-radius: 3px;
            }

            /* ── Entry rows ─────────────────────────────────────────────────── */
            .entry {
                display: flex;
                align-items: flex-start;
                gap: 6px;
                padding: 5px 12px;
                font-size: 12px;
                border-bottom: 1px solid var(--border-dim);
            }
            .entry:hover {
                background: var(--surface);
            }
            .entry.selected {
                background: var(--hover);
                outline: 1px solid var(--accent-glow);
            }
            .entry.selected:hover {
                background: var(--accent-glow-faint);
            }
            .ts {
                color: var(--text3);
                font:
                    10px "SF Mono",
                    Menlo,
                    monospace;
                flex-shrink: 0;
                padding-top: 1px;
                min-width: 52px;
            }
            .badge {
                flex-shrink: 0;
                padding: 1px 5px;
                border-radius: var(--radius-s);
                font:
                    700 10px "SF Mono",
                    Menlo,
                    monospace;
                letter-spacing: 0.05em;
                text-transform: uppercase;
            }
            .badge-print {
                background: color-mix(in srgb, var(--text2) 8%, transparent);
                color: var(--text2);
            }
            .badge-error {
                background: color-mix(in srgb, var(--danger) 12%, transparent);
                color: var(--danger);
            }
            .badge-sound {
                background: color-mix(in srgb, var(--accent) 10%, transparent);
                color: var(--accent);
            }
            .dot {
                font-size: 7px;
                color: var(--accent);
                flex-shrink: 0;
                padding-top: 2px;
            }
            .msg {
                color: var(--text);
                word-break: break-word;
                white-space: pre-wrap;
                flex: 1;
                min-width: 0;
            }
            .msg .sub-sep {
                color: var(--text3);
                margin: 0 3px;
            }
            .msg .sub-name {
                color: var(--text);
            }
            .pill {
                display: inline-flex;
                align-items: center;
                padding: 1px 7px;
                border-radius: 20px;
                font:
                    700 10px "SF Mono",
                    Menlo,
                    monospace;
                background: var(--surface2);
                border: 1px solid var(--border);
                color: var(--text2);
                flex-shrink: 0;
            }

            /* ── Step rows ──────────────────────────────────────────────────── */
            .step {
                display: flex;
                align-items: flex-start;
                gap: 6px;
                padding: 3px 12px 3px 36px;
                font-size: 11px;
                opacity: 0.45;
                border-bottom: 1px solid var(--border-faint);
            }
            .step:hover {
                opacity: 0.7;
            }
            .step.selected {
                background: var(--hover);
                outline: 1px solid var(--accent-glow);
            }
            .step.selected:hover {
                background: var(--accent-glow-faint);
            }
            .step-msg {
                color: var(--text2);
                word-break: break-word;
                flex: 1;
            }

            /* ── Mute rules — toggled by classes on #log ────────────────────── */
            #log.mute-wait .step[data-cat="wait"] {
                display: none;
            }
            #log.mute-sound .step[data-cat="sound"] {
                display: none;
            }
            #log.mute-cam .step[data-cat="cam"] {
                display: none;
            }
            #log.mute-keys .step[data-cat="keys"] {
                display: none;
            }
            #log.mute-mouse .step[data-cat="mouse"] {
                display: none;
            }
            #log.mute-scroll .step[data-cat="scroll"] {
                display: none;
            }
            #log.mute-copy .step[data-cat="copy"] {
                display: none;
            }

            /* ── Filter panel ───────────────────────────────────────────────── */
            #filter-panel {
                position: absolute;
                bottom: 0;
                right: 0;
                width: 200px;
                background: var(--surface);
                border-top: 1px solid var(--border);
                border-left: 1px solid var(--border);
                border-radius: var(--radius) 0 0 0;
                padding: 8px 0;
                display: none;
                box-shadow: -2px -2px 12px var(--shadow-panel);
                z-index: 10;
            }
            #filter-panel.open {
                display: block;
            }
            .filter-row {
                display: flex;
                align-items: center;
                gap: 8px;
                padding: 5px 12px;
                cursor: pointer;
            }
            .filter-row:hover {
                background: var(--hover);
            }
            .filter-row.muted .filter-label {
                opacity: 0.4;
                text-decoration: line-through;
            }
            .filter-dot {
                width: 8px;
                height: 8px;
                border-radius: 50%;
                flex-shrink: 0;
                /* --dot-clr is set per-row via JS (inherits into this child) */
                background: var(--dot-clr, var(--text3));
                transition:
                    background 0.1s,
                    opacity 0.1s;
            }
            /* Higher specificity wins — grays out the dot when muted */
            .filter-row.muted .filter-dot {
                background: var(--border);
                opacity: 0.6;
            }
            .filter-label {
                font-size: 12px;
                flex: 1;
                color: var(--text);
            }
            .filter-sep {
                height: 1px;
                background: var(--border);
                margin: 4px 12px;
            }
            .filter-clear {
                padding: 5px 12px;
                font-size: 11px;
                color: var(--text2);
                cursor: pointer;
                text-align: center;
            }
            .filter-clear:hover {
                color: var(--text);
            }

            /* ── Context menu ─────────────────────────────────────────────── */
            #ctx-menu {
                position: fixed;
                min-width: 140px;
                background: var(--surface2);
                border: 1px solid var(--border);
                border-radius: var(--radius-s);
                box-shadow: 0 8px 24px rgba(0, 0, 0, 0.55);
                z-index: 150;
                overflow: hidden;
                display: none;
            }
            #ctx-menu.open { display: block; }
            .ctx-item {
                display: flex;
                align-items: center;
                gap: 8px;
                padding: 7px 10px;
                font-size: 12px;
                color: var(--text2);
                cursor: pointer;
                transition: background 0.1s, color 0.1s;
                user-select: none;
            }
            .ctx-item:hover {
                background: var(--hover);
                color: var(--text);
            }
            .ctx-divider {
                height: 1px;
                background: var(--border);
                margin: 2px 0;
            }
        </style>
    </head>
    <body>
        <div id="header">
            <span id="panel-title">mudscript — macro monitor</span>
            <div class="header-btns">
                <button
                    id="pause-btn"
                    class="btn-ghost"
                    onmouseenter="playSlot('hover')"
                    onclick="
                        playSlot('interact');
                        togglePause();
                    "
                >
                    Pause
                </button>
                <button
                    class="btn-ghost"
                    id="filter-btn"
                    onmouseenter="playSlot('hover')"
                    onclick="
                        playSlot('interact');
                        toggleFilterPanel();
                    "
                >
                    filter
                </button>
                <button
                    class="btn-ghost"
                    onmouseenter="playSlot('hover')"
                    onclick="
                        playSlot('interact');
                        clearLog();
                    "
                >
                    Clear
                </button>
                <button
                    class="btn-close"
                    onmouseenter="playSlot('hover')"
                    onclick="
                        playSlot('interact');
                        closePanel();
                    "
                >
                    ✕
                </button>
            </div>
        </div>

        <div id="log"></div>

        <!-- Filter panel — absolute bottom-right, injected by JS -->
        <div id="filter-panel"></div>

        <div id="ctx-menu"></div>

        <script type="module">
            "use strict";
            import { createLogPanel } from "./modules/log-panel.js";

            // ── Step categories ─────────────────────────────────────────────
            const CATS = [
                { id: "wait", label: "Waits", regex: /\] wait / },
                { id: "sound", label: "Sound calls", regex: /\] sound / },
                { id: "cam", label: "Camera moves", regex: /\] cam\.move/ },
                {
                    id: "keys",
                    label: "Key presses",
                    regex: /\] [↓↑] |\] type /,
                },
                { id: "mouse", label: "Mouse actions", regex: /\] Mouse / },
                { id: "scroll", label: "Scrolls", regex: /\] scroll / },
                { id: "copy", label: "Clipboard", regex: /\] copy/ },
            ];

            function stepCat(msg) {
                for (const c of CATS) {
                    if (c.regex.test(msg)) return c.id;
                }
                return "other";
            }

            // ── Mute state ──────────────────────────────────────────────────
            const _muted = new Set();

            function isMuted(cat) { return _muted.has(cat); }

            function setMute(cat, on) {
                const log = document.getElementById("log");
                if (on) {
                    _muted.add(cat);
                    log.classList.add("mute-" + cat);
                } else {
                    _muted.delete(cat);
                    log.classList.remove("mute-" + cat);
                }
                _updateFilterUI();
            }

            function _updateFilterUI() {
                const btn = document.getElementById("filter-btn");
                btn.classList.toggle("has-mutes", _muted.size > 0);
                btn.textContent =
                    _muted.size > 0 ? "filter (" + _muted.size + ")" : "filter";
                CATS.forEach((c) => {
                    const row = document.getElementById("frow-" + c.id);
                    if (row) row.classList.toggle("muted", _muted.has(c.id));
                });
                const action = document.getElementById("filter-action");
                if (action) {
                    action.textContent =
                        _muted.size === CATS.length ? "show all" : "hide all";
                }
            }

            // ── Build filter panel ──────────────────────────────────────────
            (function buildFilterPanel() {
                const CAT_DOT_COLORS = {
                    wait: "var(--text3)",
                    sound: "var(--warning)",
                    cam: "var(--success)",
                    keys: "var(--text2)",
                    mouse: "var(--mouse)",
                    scroll: "var(--scroll)",
                    copy: "var(--accent)",
                };

                const panel = document.getElementById("filter-panel");

                CATS.forEach((c) => {
                    const row = document.createElement("div");
                    row.className = "filter-row";
                    row.id = "frow-" + c.id;
                    row.style.setProperty(
                        "--dot-clr",
                        CAT_DOT_COLORS[c.id] || "var(--text3)",
                    );

                    const dot = document.createElement("span");
                    dot.className = "filter-dot";

                    const lbl = document.createElement("span");
                    lbl.className = "filter-label";
                    lbl.textContent = c.label;

                    row.append(dot, lbl);
                    row.addEventListener("click", () =>
                        setMute(c.id, !isMuted(c.id)),
                    );
                    panel.appendChild(row);
                });

                const sep = document.createElement("div");
                sep.className = "filter-sep";
                panel.appendChild(sep);

                const clear = document.createElement("div");
                clear.className = "filter-clear";
                clear.id = "filter-action";
                clear.textContent = "hide all";
                clear.addEventListener("click", () => {
                    if (_muted.size === CATS.length) {
                        [..._muted].forEach((id) => setMute(id, false));
                    } else {
                        CATS.forEach((c) => setMute(c.id, true));
                    }
                });
                panel.appendChild(clear);
            })();

            function toggleFilterPanel() {
                document
                    .getElementById("filter-panel")
                    .classList.toggle("open");
            }
            function closeFilterPanel() {
                document
                    .getElementById("filter-panel")
                    .classList.remove("open");
            }

            // Close filter panel when clicking outside it
            document.addEventListener("mousedown", (e) => {
                const panel = document.getElementById("filter-panel");
                const btn = document.getElementById("filter-btn");
                if (!panel.contains(e.target) && !btn.contains(e.target)) {
                    closeFilterPanel();
                }
            });

            // ── Watcher buildRow ────────────────────────────────────────────
            function buildRow(entry) {
                if (entry.type === "step") {
                    const row = document.createElement("div");
                    row.className = "step";
                    row.dataset.cat = stepCat(entry.msg || "");

                    const ts = document.createElement("span");
                    ts.className = "ts";
                    ts.textContent = "[" + (entry.ts || "") + "]";

                    const msg = document.createElement("span");
                    msg.className = "step-msg";
                    msg.textContent = entry.msg || "";

                    row.append(ts, msg);
                    row.onmouseenter = function() { lp.playSlot("hover"); };
                    row.onclick = lp._handleEntryClick;
                    return row;
                }

                const row = document.createElement("div");
                row.className = "entry";

                const ts = document.createElement("span");
                ts.className = "ts";
                ts.textContent = "[" + (entry.ts || "") + "]";
                row.appendChild(ts);

                if (entry.type === "macro") {
                    row.classList.add("entry-macro");

                    const dot = document.createElement("span");
                    dot.className = "dot";
                    dot.textContent = "●";
                    row.appendChild(dot);

                    const msg = document.createElement("span");
                    msg.className = "msg";
                    if (entry.parentLabel) {
                        msg.appendChild(
                            document.createTextNode(entry.parentLabel),
                        );
                        const sep = document.createElement("span");
                        sep.className = "sub-sep";
                        sep.textContent = "›";
                        const sub = document.createElement("span");
                        sub.className = "sub-name";
                        sub.textContent = entry.label || entry.id || "";
                        msg.append(sep, sub);
                    } else {
                        msg.textContent = entry.label || entry.id || "";
                    }
                    row.appendChild(msg);

                    if (entry.trigger) {
                        const trig = document.createElement("span");
                        trig.className = "pill";
                        trig.textContent = entry.trigger;
                        row.appendChild(trig);
                    }
                } else {
                    const badge = document.createElement("span");
                    badge.className = "badge badge-" + entry.type;
                    badge.textContent = entry.type;
                    row.appendChild(badge);

                    const msg = document.createElement("span");
                    msg.className = "msg";
                    msg.textContent = entry.msg || "";
                    row.appendChild(msg);
                }

                row.onmouseenter = function() { lp.playSlot("hover"); };
                row.onclick = lp._handleEntryClick;
                return row;
            }

            // ── Create LogPanel ─────────────────────────────────────────────
            const lp = createLogPanel({
                channel: "watcher",
                buildRow,
                maxEntries: 300,
                scrollThresh: 48,
                clearAction: "clearLog",
            });

            // ── Expose globals for inline handlers ──────────────────────────
            window.togglePause       = lp.togglePause;
            window.playSlot          = lp.playSlot;
            window.toggleFilterPanel = toggleFilterPanel;
            window.closePanel        = lp.closePanel;
            window.applyTheme        = lp.applyTheme;

            // ── Watcher clearLog ────────────────────────────────────────────
            function clearLog() {
                document.getElementById("log").innerHTML = "";
                lp.sendToHost({ action: "clear" });
            }
            window.clearLog = clearLog;

            // ── Expose for Lua evaluateJavaScript ───────────────────────────
            window.appendEntry = lp.appendEntry;
            window.loadHistory = lp.loadHistory;

            // ── Init ────────────────────────────────────────────────────────
            document.addEventListener("DOMContentLoaded", () => {
                if (typeof registerPanel === "function") {
                    registerPanel("watcher", function(action, body) {
                        if (action === "appendEntry" && body) window.appendEntry(body);
                        else if (action === "loadHistory" && body) window.loadHistory(body);
                    });
                }
                if (window.shellPost) {
                    var p = document.getElementById("panel");
                    if (p) { p.style.borderRadius = "0"; p.style.clipPath = "none"; }
                }
                lp.sendToHost({ action: "ready" });
            });
        </script>
    </body>
</html>
