<!doctype html>
<html lang="en">
    <head>
        <meta charset="UTF-8" />
        <meta name="viewport" content="width=device-width, initial-scale=1.0" />
        <title>mudscript — Loading</title>
        <style>
            /* ── Font ───────────────────────────────────────────────────────── */
            @font-face {
                font-family: "Almendra";
                src: url("./fonts/Almendra-Regular.ttf") format("truetype");
                font-weight: 400;
                font-style: normal;
            }
            @font-face {
                font-family: "Almendra";
                src: url("./fonts/Almendra-Bold.ttf") format("truetype");
                font-weight: 700;
                font-style: normal;
            }
            @font-face {
                font-family: "Almendra";
                src: url("./fonts/Almendra-Italic.ttf") format("truetype");
                font-weight: 400;
                font-style: italic;
            }
            @font-face {
                font-family: "Almendra";
                src: url("./fonts/Almendra-BoldItalic.ttf") format("truetype");
                font-weight: 700;
                font-style: italic;
            }

            /* ── Tokens ─────────────────────────────────────────────────────── */
            :root {
                --bg: #0e0e0e;
                --surface: #1a1a1a;
                --surface2: #252525;
                --hover: #333333;
                --accent: #cccccc;
                --accent-hi: #e8e8e8;
                --warning: #aaaaaa;
                --text: #d8d8d8;
                --radius: 8px;
                --ms-window-radius: 8px;
                --font: Arial, "Almendra", sans-serif;
            }

            /* ── Reset ──────────────────────────────────────────────────────── */
            *,
            *::before,
            *::after {
                box-sizing: border-box;
                margin: 0;
                padding: 0;
            }
            html,
            body {
                height: 100%;
                overflow: hidden;
                background: transparent;
                font-family: var(--font);
                font-size: 13px;
                color: var(--text);
                -webkit-font-smoothing: antialiased;
            }

            /* ── Panel ──────────────────────────────────────────────────────── */
            #panel {
                width: 360px;
                height: 140px;
                position: relative;
                background: var(--surface2);
                border: 1px solid var(--hover);
                border-radius: var(--ms-window-radius);
                overflow: hidden;
            }

            /* Top accent strip */
            #panel::before {
                content: "";
                position: absolute;
                top: 0;
                left: 0;
                right: 0;
                height: 2px;
                background: var(--accent);
                z-index: 2;
            }

            /* ── Brand text — always transition-ready ───────────────────────── */
            #brand {
                position: absolute;
                /* Default: centered */
                top: 50%;
                left: 50%;
                transform: translate(-50%, -50%);
                font-size: 28px;
                font-weight: 700;
                color: var(--accent-hi);
                opacity: 0;
                white-space: nowrap;
                z-index: 10;
                /* Always define all transitions so there's never a jump */
                transition: opacity 0.4s ease,
                            top 0.6s cubic-bezier(0.4, 0, 0.2, 1),
                            left 0.6s cubic-bezier(0.4, 0, 0.2, 1),
                            transform 0.6s cubic-bezier(0.4, 0, 0.2, 1),
                            font-size 0.6s cubic-bezier(0.4, 0, 0.2, 1);
            }
            #brand.visible {
                opacity: 1;
            }
            #brand.shifted {
                top: 14px;
                left: 18px;
                transform: translate(0, 0);
                font-size: 18px;
            }

            /* ── Profile name (top-right, above version) ─────────────────────── */
            #profile-name {
                position: absolute;
                top: 14px;
                right: 18px;
                font-size: 12px;
                color: var(--accent-hi);
                font-weight: 700;
                text-align: right;
                max-width: 55%;
                overflow: hidden;
                text-overflow: ellipsis;
                white-space: nowrap;
                opacity: 0;
                transition: opacity 0.3s ease;
            }
            #profile-name.visible {
                opacity: 1;
            }

            /* ── Version ─────────────────────────────────────────────────────── */
            #version {
                position: absolute;
                top: 30px;
                right: 18px;
                font-size: 10px;
                color: var(--warning);
                font-style: italic;
                opacity: 0;
                transition: opacity 0.3s ease;
            }
            #version.visible {
                opacity: 1;
            }

            /* ── Divider ─────────────────────────────────────────────────────── */
            #divider {
                position: absolute;
                top: 48px;
                left: 18px;
                right: 18px;
                height: 1px;
                background: var(--hover);
                opacity: 0;
                transition: opacity 0.3s ease;
            }
            #divider.visible {
                opacity: 1;
            }

            /* ── Content ─────────────────────────────────────────────────────── */
            #content {
                position: absolute;
                top: 58px;
                left: 18px;
                right: 18px;
                bottom: 18px;
                opacity: 0;
                transition: opacity 0.3s ease;
            }
            #content.visible {
                opacity: 1;
            }

            /* ── Macro name ──────────────────────────────────────────────────── */
            #macro-name {
                position: absolute;
                top: 0;
                right: 0;
                font-size: 10px;
                color: var(--warning);
                text-align: right;
                max-width: 50%;
                overflow: hidden;
                text-overflow: ellipsis;
                white-space: nowrap;
            }

            /* ── Status (directly above progress bar) ─────────────────────────── */
            #status {
                position: absolute;
                left: 0;
                right: 0;
                bottom: 16px;
                font-size: 11px;
                font-style: italic;
                color: var(--warning);
                line-height: 1;
                overflow: hidden;
                text-overflow: ellipsis;
                white-space: nowrap;
            }

            /* ── Progress track ─────────────────────────────────────────────── */
            #track {
                position: absolute;
                left: 0;
                right: 0;
                bottom: 0;
                height: 3px;
                border-radius: 1.5px;
                background: var(--surface);
            }

            /* ── Progress fill ──────────────────────────────────────────────── */
            #fill {
                position: absolute;
                left: 0;
                bottom: 0;
                width: 0;
                max-width: 100%;
                height: 3px;
                border-radius: 1.5px;
                background: var(--accent);
                transition: width 0.15s ease;
            }
        </style>
    </head>
    <body>
        <div id="panel">
            <div id="brand">mudscript</div>
            <div id="profile-name"></div>
            <div id="version">v1.3.0-pre.16</div>
            <div id="divider"></div>
            <div id="content">
                <div id="macro-name"></div>
                <div id="status">Starting up…</div>
                <div id="track"></div>
                <div id="fill"></div>
            </div>
        </div>

        <script>
            /* ── Host communication ─────────────────────────────────────────── */
            function sendToHost(msg) {
                const s = JSON.stringify(msg);
                if (window.chrome && window.chrome.webview)
                    window.chrome.webview.postMessage(s);
                else if (window.webkit && window.webkit.messageHandlers && window.webkit.messageHandlers.loading)
                    window.webkit.messageHandlers.loading.postMessage(s);
            }

            /* ── Theme injection ─────────────────────────────────────────────── */
            function applyTheme(t) {
                if (!t) return;
                const r = document.documentElement.style;
                if (t.bg) r.setProperty("--bg", t.bg);
                if (t.surface) r.setProperty("--surface", t.surface);
                if (t.surface2) r.setProperty("--surface2", t.surface2);
                if (t.hover) r.setProperty("--hover", t.hover);
                if (t.accent) r.setProperty("--accent", t.accent);
                if (t.accentHi) r.setProperty("--accent-hi", t.accentHi);
                if (t.warning) r.setProperty("--warning", t.warning);
                if (t.text) r.setProperty("--text", t.text);
                if (t.radius !== undefined) r.setProperty("--radius", t.radius + "px");
                if (t.windowRadius !== undefined) r.setProperty("--ms-window-radius", t.windowRadius + "px");
                if (t.font) r.setProperty("--font", t.font + ', "Almendra", Arial, sans-serif');
            }

            /* ── Animation controls ──────────────────────────────────────────── */
            function showBrand() {
                document.getElementById("brand").classList.add("visible");
            }

            function shiftBrand() {
                document.getElementById("brand").classList.add("shifted");
            }

            function showProfile() {
                document.getElementById("profile-name").classList.add("visible");
            }

            function showVersion() {
                document.getElementById("version").classList.add("visible");
            }

            function showDivider() {
                document.getElementById("divider").classList.add("visible");
            }

            function showContent() {
                document.getElementById("content").classList.add("visible");
            }

            /* ── Progress ────────────────────────────────────────────────────── */
            function setProgress(pct, msg) {
                document.getElementById("fill").style.width =
                    Math.max(0, Math.min(100, pct)) + "%";
                if (msg) document.getElementById("status").textContent = msg;
            }

            /* ── Macro name ──────────────────────────────────────────────────── */
            function setMacroName(name) {
                var el = document.getElementById("macro-name");
                if (el && name) el.textContent = name;
            }

            /* ── Profile name ────────────────────────────────────────────────── */
            function setProfileName(name) {
                var el = document.getElementById("profile-name");
                if (el && name) el.textContent = name;
            }
        </script>
    </body>
</html>
