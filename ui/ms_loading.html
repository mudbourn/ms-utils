<!doctype html>
<html lang="en">
    <head>
        <meta charset="UTF-8" />
        <meta name="viewport" content="width=device-width, initial-scale=1.0" />
        <title>mudscript — Loading</title>
        <style>
            /* ── Font ───────────────────────────────────────────────────────── */
            @font-face {
                font-family: "Almendra";
                src: url("./fonts/Almendra-Regular.ttf") format("truetype");
                font-weight: 400;
                font-style: normal;
            }
            @font-face {
                font-family: "Almendra";
                src: url("./fonts/Almendra-Bold.ttf") format("truetype");
                font-weight: 700;
                font-style: normal;
            }
            @font-face {
                font-family: "Almendra";
                src: url("./fonts/Almendra-Italic.ttf") format("truetype");
                font-weight: 400;
                font-style: italic;
            }
            @font-face {
                font-family: "Almendra";
                src: url("./fonts/Almendra-BoldItalic.ttf") format("truetype");
                font-weight: 700;
                font-style: italic;
            }

            /* ── Tokens ─────────────────────────────────────────────────────── */
            :root {
                --bg: #0e0e0e;
                --surface: #1a1a1a;
                --surface2: #252525;
                --hover: #333333;
                --accent: #cccccc;
                --accent-hi: #e8e8e8;
                --warning: #aaaaaa;
                --text: #d8d8d8;
                --radius: 2px;
            }

            /* ── Reset ──────────────────────────────────────────────────────── */
            *,
            *::before,
            *::after {
                box-sizing: border-box;
                margin: 0;
                padding: 0;
            }
            html,
            body {
                height: 100%;
                overflow: hidden;
                background: var(--bg);
                font-family: Arial, "Almendra", sans-serif;
                font-size: 13px;
                color: var(--text);
                -webkit-font-smoothing: antialiased;
            }

            /* ── Panel ──────────────────────────────────────────────────────── */
            #panel {
                width: 300px;
                height: 104px;
                position: relative;
                background: var(--surface2);
                border: 1px solid var(--hover);
                border-radius: var(--radius);
                overflow: hidden;
            }

            /* Top accent strip */
            #panel::before {
                content: "";
                position: absolute;
                top: 0;
                left: 0;
                right: 0;
                height: 2px;
                background: var(--accent);
                z-index: 2;
            }

            /* ── Title ──────────────────────────────────────────────────────── */
            #title {
                position: absolute;
                top: 13px;
                left: 16px;
                font-size: 15px;
                font-weight: 700;
                color: var(--text);
            }

            /* ── Profile name (top-right) ───────────────────────────────────── */
            #profile-name {
                position: absolute;
                top: 15px;
                right: 16px;
                font-size: 10px;
                color: var(--warning);
                text-align: right;
                max-width: 50%;
                overflow: hidden;
                text-overflow: ellipsis;
                white-space: nowrap;
            }

            /* ── Status ─────────────────────────────────────────────────────── */
            #status {
                position: absolute;
                top: 37px;
                left: 16px;
                right: 16px;
                font-size: 11px;
                font-style: italic;
                color: var(--warning);
            }

            /* ── Progress track ─────────────────────────────────────────────── */
            #track {
                position: absolute;
                left: 16px;
                right: 16px;
                bottom: 24px;
                height: 3px;
                border-radius: 1.5px;
                background: var(--surface);
            }

            /* ── Progress fill ──────────────────────────────────────────────── */
            #fill {
                position: absolute;
                left: 16px;
                bottom: 24px;
                width: 0;
                height: 3px;
                border-radius: 1.5px;
                background: var(--accent);
                transition: width 0.15s ease;
            }

            /* ── Separator ──────────────────────────────────────────────────── */
            #separator {
                position: absolute;
                left: 16px;
                right: 16px;
                bottom: 40px;
                height: 1px;
                background: var(--hover);
            }

            /* ── Checkbox row ───────────────────────────────────────────────── */
            #checkbox-row {
                position: absolute;
                left: 16px;
                right: 16px;
                bottom: 16px;
                height: 18px;
                cursor: pointer;
                display: flex;
                align-items: center;
                gap: 4px;
                -webkit-user-select: none;
                user-select: none;
            }
            #check-glyph {
                font-size: 13px;
                color: var(--warning);
                line-height: 1;
            }
            #check-label {
                font-size: 11px;
                font-style: italic;
                color: var(--warning);
            }
        </style>
    </head>
    <body>
        <div id="panel">
            <div id="title">mudscript</div>
            <div id="profile-name"></div>
            <div id="status">Starting up…</div>
            <div id="track"></div>
            <div id="fill"></div>
            <div id="separator"></div>
            <div id="checkbox-row" onclick="toggleSkipPreload()">
                <span id="check-glyph">☐</span>
                <span id="check-label">Skip dev tool preloading</span>
            </div>
        </div>

        <script>
            /* ── Host communication ─────────────────────────────────────────── */
            function sendToHost(msg) {
                const s = JSON.stringify(msg);
                if (window.chrome && window.chrome.webview)
                    window.chrome.webview.postMessage(s);
                else if (window.webkit && window.webkit.messageHandlers && window.webkit.messageHandlers.loading)
                    window.webkit.messageHandlers.loading.postMessage(s);
            }

            /* ── Theme injection ─────────────────────────────────────────────── */
            function applyTheme(t) {
                if (!t) return;
                const r = document.documentElement.style;
                if (t.bg) r.setProperty("--bg", t.bg);
                if (t.surface) r.setProperty("--surface", t.surface);
                if (t.surface2) r.setProperty("--surface2", t.surface2);
                if (t.hover) r.setProperty("--hover", t.hover);
                if (t.accent) r.setProperty("--accent", t.accent);
                if (t.accentHi) r.setProperty("--accent-hi", t.accentHi);
                if (t.warning) r.setProperty("--warning", t.warning);
                if (t.text) r.setProperty("--text", t.text);
                if (t.radius) r.setProperty("--radius", t.radius + "px");
                if (t.font)
                    document.body.style.fontFamily =
                        t.font + ', "Almendra", Arial, sans-serif';
            }

            /* ── Progress ────────────────────────────────────────────────────── */
            function setProgress(pct, msg) {
                document.getElementById("fill").style.width =
                    Math.max(0, Math.min(100, pct)) + "%";
                if (msg) document.getElementById("status").textContent = msg;
            }

            /* ── Skip preloading checkbox ────────────────────────────────────── */
            var _skipPreload = false;

            function toggleSkipPreload() {
                _skipPreload = !_skipPreload;
                updateCheckbox();
                sendToHost({ action: "toggleSkipPreload" });
            }

            function setSkipPreloadState(checked) {
                _skipPreload = !!checked;
                updateCheckbox();
            }

            function updateCheckbox() {
                document.getElementById("check-glyph").textContent = _skipPreload ? "☑" : "☐";
                document.getElementById("check-label").style.color = _skipPreload
                    ? "var(--text)" : "var(--warning)";
            }

            /* ── Profile name ────────────────────────────────────────────────── */
            function setProfileName(name) {
                var el = document.getElementById("profile-name");
                if (el && name) el.textContent = name;
            }
        </script>
    </body>
</html>
