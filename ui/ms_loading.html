<!doctype html>
<html lang="en">
    <head>
        <meta charset="UTF-8" />
        <meta name="viewport" content="width=device-width, initial-scale=1.0" />
        <title>mudscript — Loading</title>
        <style>
            /* ── Font ───────────────────────────────────────────────────────── */
            @font-face {
                font-family: "Almendra";
                src: url("./fonts/Almendra-Regular.ttf") format("truetype");
                font-weight: 400;
                font-style: normal;
                font-display: swap;
            }
            @font-face {
                font-family: "Almendra";
                src: url("./fonts/Almendra-Bold.ttf") format("truetype");
                font-weight: 700;
                font-style: normal;
                font-display: swap;
            }
            @font-face {
                font-family: "Almendra";
                src: url("./fonts/Almendra-Italic.ttf") format("truetype");
                font-weight: 400;
                font-style: italic;
                font-display: swap;
            }
            @font-face {
                font-family: "Almendra";
                src: url("./fonts/Almendra-BoldItalic.ttf") format("truetype");
                font-weight: 700;
                font-style: italic;
                font-display: swap;
            }

            /* ── Tokens ─────────────────────────────────────────────────────── */
            :root {
                --bg: #0d0f09;
                --surface: #141810;
                --surface2: #1c2116;
                --hover: #2d3523;
                --accent: #6b8c3a;
                --accent-hi: #8db84e;
                --warning: #c4a030;
                --text: #d4cfb6;
                --radius: 8px;
                --ms-window-radius: 8px;
                --font: Arial, "Almendra", sans-serif;
            }

            /* ── Reset ──────────────────────────────────────────────────────── */
            *,
            *::before,
            *::after {
                box-sizing: border-box;
                margin: 0;
                padding: 0;
                user-select: none;
                -webkit-user-select: none;
            }
            html,
            body {
                height: 100%;
                overflow: hidden;
                background: transparent;
                font-family: var(--font);
                font-size: 13px;
                color: var(--text);
                -webkit-font-smoothing: antialiased;
            }

            /* ── Panel ──────────────────────────────────────────────────────── */
            #panel {
                width: 360px;
                height: 140px;
                position: relative;
                background: var(--surface2);
                border: 1px solid var(--accent);
                border-radius: var(--ms-window-radius);
                overflow: hidden;
            }

            

            /* ── Brand text — always transition-ready ───────────────────────── */
            #brand {
                position: absolute;
                top: 50%;
                left: 50%;
                transform-origin: center;
                transform: translate(-50%, -50%) scale(1);
                font-size: 28px;
                font-weight: 700;
                color: var(--text);
                opacity: 0;
                white-space: nowrap;
                z-index: 10;
                transition: transform 0.6s cubic-bezier(0.4, 0, 0.2, 1),
                            opacity 0.4s ease;
            }
            #brand.visible {
                opacity: 1;
            }
            #brand.shifted {
                /* Pure transform dock: hardcoded offset from panel-center to
                   top-left dock.  Panel 360×140, title ~140×34 at 28px.
                   dx = 18 − (180+70) = −187,  dy = 14 − (70+17) = −62. */
                transform: translate(-187px, -62px) scale(0.643);
            }

            /* ── Profile name (top-right, above creator) ──────────────────────── */
            #profile-name {
                position: absolute;
                top: 14px;
                right: 18px;
                font-size: 12px;
                color: var(--text);
                font-weight: 700;
                text-align: right;
                max-width: 55%;
                overflow: hidden;
                text-overflow: ellipsis;
                white-space: nowrap;
                opacity: 0;
                transition: opacity 0.3s ease;
            }
            #profile-name.visible {
                opacity: 1;
            }

            /* ── Creator (top-right, below profile name) ──────────────────────── */
            #macro-name {
                position: absolute;
                top: 30px;
                right: 18px;
                font-size: 10px;
                color: var(--warning);
                font-style: italic;
                text-align: right;
                max-width: 55%;
                overflow: hidden;
                text-overflow: ellipsis;
                white-space: nowrap;
                opacity: 0;
                transition: opacity 0.3s ease;
            }
            #macro-name.visible {
                opacity: 1;
            }

            /* ── Divider ─────────────────────────────────────────────────────── */
            #divider {
                position: absolute;
                top: 48px;
                left: 18px;
                right: 18px;
                height: 1px;
                background: var(--hover);
                opacity: 0;
                transition: opacity 0.3s ease;
            }
            #divider.visible {
                opacity: 1;
            }

            /* ── Content ─────────────────────────────────────────────────────── */
            #content {
                position: absolute;
                top: 58px;
                left: 18px;
                right: 18px;
                bottom: 18px;
                opacity: 0;
                transition: opacity 0.3s ease;
            }
            #content.visible {
                opacity: 1;
            }

            /* ── Version (inside content area) ──────────────────────────────── */
            #version {
                position: absolute;
                top: 0;
                right: 0;
                font-size: 10px;
                color: var(--warning);
                font-style: italic;
                text-align: right;
                max-width: 50%;
                overflow: hidden;
                text-overflow: ellipsis;
                white-space: nowrap;
            }

            /* ── Status (directly above progress bar) ─────────────────────────── */
            #status {
                position: absolute;
                left: 0;
                right: 0;
                bottom: 16px;
                font-size: 11px;
                font-style: italic;
                color: var(--warning);
                line-height: 1;
                overflow: hidden;
                text-overflow: ellipsis;
                white-space: nowrap;
            }

            /* ── Progress track ─────────────────────────────────────────────── */
            #track {
                position: absolute;
                left: 0;
                right: 0;
                bottom: 0;
                height: 3px;
                border-radius: 1.5px;
                background: var(--surface);
            }

            /* ── Progress fill ──────────────────────────────────────────────── */
            #fill {
                position: absolute;
                left: 0;
                bottom: 0;
                width: 0;
                max-width: 100%;
                height: 3px;
                border-radius: 1.5px;
                background: var(--accent);
                transition: width 0.15s ease;
            }
        </style>
    </head>
    <body>
        <div id="panel">
            <div id="brand">mudscript</div>
            <div id="profile-name"></div>
            <div id="macro-name"></div>
            <div id="divider"></div>
            <div id="content">
                <div id="version"></div>
                <div id="status">Starting up…</div>
                <div id="track"></div>
                <div id="fill"></div>
            </div>
        </div>

        <script>
            /* ── Host communication ─────────────────────────────────────────── */
            function sendToHost(msg) {
                const s = JSON.stringify(msg);
                if (window.chrome && window.chrome.webview)
                    window.chrome.webview.postMessage(s);
                else if (window.webkit && window.webkit.messageHandlers && window.webkit.messageHandlers.loading)
                    window.webkit.messageHandlers.loading.postMessage(s);
            }

            /* ── Theme injection ─────────────────────────────────────────────── */
            function applyTheme(t) {
                if (!t) return;
                const r = document.documentElement.style;
                if (t.bg) r.setProperty("--bg", t.bg);
                if (t.surface) r.setProperty("--surface", t.surface);
                if (t.surface2) r.setProperty("--surface2", t.surface2);
                if (t.hover) r.setProperty("--hover", t.hover);
                if (t.accent) r.setProperty("--accent", t.accent);
                if (t.accentHi) r.setProperty("--accent-hi", t.accentHi);
                if (t.warning) r.setProperty("--warning", t.warning);
                if (t.text) r.setProperty("--text", t.text);
                if (t.radius !== undefined) r.setProperty("--radius", t.radius + "px");
                if (t.windowRadius !== undefined) r.setProperty("--ms-window-radius", t.windowRadius + "px");
                if (t.font) r.setProperty("--font", t.font + ', "Almendra", Arial, sans-serif');
            }

            /* ── Animation controls ──────────────────────────────────────────── */
            function showBrand() {
                document.getElementById("brand").classList.add("visible");
            }

            function shiftBrand() {
                document.getElementById("brand").classList.add("shifted");
            }

            function showProfile() {
                document.getElementById("profile-name").classList.add("visible");
            }

            function showVersion() {
                document.getElementById("version").classList.add("visible");
            }

            function showDivider() {
                document.getElementById("divider").classList.add("visible");
            }

            function showContent() {
                document.getElementById("content").classList.add("visible");
            }

            /* ── Progress ────────────────────────────────────────────────────── */
            function setProgress(pct, msg) {
                document.getElementById("fill").style.width =
                    Math.max(0, Math.min(100, pct)) + "%";
                if (msg) document.getElementById("status").textContent = msg;
            }

            /* ── Creator ──────────────────────────────────────────────────────── */
            function setCreator(name) {
                var el = document.getElementById("macro-name");
                if (el && name) el.textContent = "by " + name;
            }

            function showCreator() {
                document.getElementById("macro-name").classList.add("visible");
            }

            /* ── Version ────────────────────────────────────────────────────── */
            function setVersion(v) {
                var el = document.getElementById("version");
                if (el && v) el.textContent = "v" + v;
            }

            /* ── Profile name ────────────────────────────────────────────────── */
            function setProfileName(name) {
                var el = document.getElementById("profile-name");
                if (el && name) el.textContent = name;
            }

            /* ── Suppress context menu ──────────────────────────────────────── */
            document.addEventListener("contextmenu", (e) => e.preventDefault());

            /* ── Page-ready handshake ─────────────────────────────────────── */
            /* Tell the host the page is alive so it can drive the boot
               choreography.  Without this, blind timers scheduled from the
               Lua side race WKWebView's async html() load and silently
               no-op (Bug 5 / Part C). */
            document.addEventListener("DOMContentLoaded", function () {
                sendToHost({ action: "ready" });
            });
        </script>
    </body>
</html>
