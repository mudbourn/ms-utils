<!doctype html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Module Import Debug</title>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body {
            width: 100%; height: 100vh; overflow: hidden;
            background: #0e0e0e; color: #d8d8d8;
            font-family: -apple-system, Arial, sans-serif; font-size: 13px;
            display: flex; align-items: center; justify-content: center;
            flex-direction: column; gap: 10px; padding: 20px;
        }
        .row { padding: 8px 16px; border-radius: 5px; font-size: 13px; max-width: 600px; text-align: center; }
        .pass { background: #1a2e1a; color: #6aba6a; border: 1px solid #2e5e2e; }
        .fail { background: #2e1a1a; color: #ba6a6a; border: 1px solid #5e2e2e; }
        .info { background: #1a1a2e; color: #6a6aba; border: 1px solid #2e2e5e; }
        #summary { font-size: 15px; font-weight: 600; padding: 12px 20px; border-radius: 6px; }
        #detail { color: #888; font-size: 11px; max-width: 600px; text-align: center; line-height: 1.8; }
    </style>
</head>
<body>
    <div id="summary" class="info">Testing…</div>
    <div id="results"></div>
    <div id="detail"></div>

    <script>
        window.__R = {};
        // Check if Lua injected an import map into the HTML
        window.__R.hasMap = !!document.querySelector('script[type="importmap"]');
        // Count all script tags for debugging
        window.__R.scriptCount = document.querySelectorAll('script').length;
        window.__R.importmapCount = document.querySelectorAll('script[type="importmap"]').length;
    </script>

    <!-- Test A: inline module (known to work) -->
    <script type="module">
        window.__R.inlineOk = true;
    </script>

    <!-- Test B: import from absolute file:// URL -->
    <script type="module">
        try {
            const mod = await import("file:///Users/eli3/.hammerspoon/ui/modules/log-panel.js");
            window.__R.absoluteImport = true;
            window.__R.absoluteHasFn = typeof mod.createLogPanel === "function";
        } catch (e) {
            window.__R.absoluteImport = false;
            window.__R.absoluteError = e.message;
        }
        window.dispatchEvent(new Event("tests-done"));
    </script>

    <script>
        function report() {
            var R = window.__R;
            var el = document.getElementById("summary");
            var res = document.getElementById("results");
            var det = document.getElementById("detail");

            var tests = [
                { name: "Inline module", pass: !!R.inlineOk },
                { name: "Import map in DOM", pass: !!R.hasMap },
                { name: "Absolute file:// import", pass: !!R.absoluteImport },
                { name: "createLogPanel from absolute", pass: !!R.absoluteHasFn },
            ];

            var allPass = tests.every(function(t) { return t.pass; });
            el.className = allPass ? "pass" : "fail";
            el.textContent = allPass ? "✓ ALL PASS" : "✗ RESULTS";

            var html = "";
            for (var i = 0; i < tests.length; i++) {
                html += '<div class="row ' + (tests[i].pass ? "pass" : "fail") + '">'
                    + (tests[i].pass ? "✓" : "✗") + " " + tests[i].name + "</div>";
            }
            res.innerHTML = html;

            det.textContent = "scripts: " + R.scriptCount
                + " | importmaps: " + R.importmapCount
                + " | inline: " + (R.inlineOk ? "ok" : "no")
                + " | map: " + (R.hasMap ? "found" : "missing")
                + " | absolute: " + (R.absoluteImport ? "ok" : "FAIL: " + (R.absoluteError || "?"));

            try {
                if (window.webkit && window.webkit.messageHandlers && window.webkit.messageHandlers.msShell) {
                    window.webkit.messageHandlers.msShell.postMessage(JSON.stringify({
                        panel: "_test", action: "moduleTest", body: {
                            allPass: allPass,
                            inlineOk: !!R.inlineOk,
                            hasMap: !!R.hasMap,
                            scriptCount: R.scriptCount,
                            importmapCount: R.importmapCount,
                            absoluteImport: !!R.absoluteImport,
                            absoluteHasFn: !!R.absoluteHasFn,
                            absoluteError: R.absoluteError || null
                        }
                    }));
                }
            } catch (_) {}
        }

        window.addEventListener("tests-done", report);
        setTimeout(report, 3000);
    </script>
</body>
</html>
