<!doctype html>
<html lang="en">
    <head>
        <meta charset="UTF-8" />
        <style>
            /* ── Fonts ─────────────────────────────────────────────────────────── */
            @font-face {
                font-family: "Almendra";
                src: url("./fonts/Almendra-Regular.ttf") format("truetype");
                font-weight: 400;
                font-style: normal;
            }
            @font-face {
                font-family: "Almendra";
                src: url("./fonts/Almendra-Bold.ttf") format("truetype");
                font-weight: 700;
                font-style: normal;
            }
            @font-face {
                font-family: "Almendra";
                src: url("./fonts/Almendra-Italic.ttf") format("truetype");
                font-weight: 400;
                font-style: italic;
            }
            @font-face {
                font-family: "Almendra";
                src: url("./fonts/Almendra-BoldItalic.ttf") format("truetype");
                font-weight: 700;
                font-style: italic;
            }

            /* ── Tokens ─────────────────────────────────────────────────────────── */
            :root {
                --bg: #0e0e0e;
                --surface: #1a1a1a;
                --surface2: #252525;
                --hover: #333333;
                --accent: #cccccc;
                --accent-hi: #e8e8e8;
                --success: #888888;
                --danger-bg: #1a1616;
                --danger: #d8d8d8;
                --warning: #aaaaaa;
                --text: #d8d8d8;
                --text2: rgba(200, 200, 200, 0.85);
                --text3: rgba(160, 160, 160, 0.55);
                --border: rgba(100, 100, 100, 0.55);
                --border-dim: rgba(100, 100, 100, 0.18);
                --radius: 2px;
                --radius-s: 1px;
            }

            /* ── Reset ──────────────────────────────────────────────────────────── */
            *,
            *::before,
            *::after {
                box-sizing: border-box;
                margin: 0;
                padding: 0;
                user-select: none;
                -webkit-user-select: none;
            }

            html,
            body {
                width: 100%;
                height: 100%;
                overflow: hidden;
                background: transparent;
                color: var(--text);
                font-family: Arial, "Almendra", Palatino, Georgia, serif;
                font-size: 13px;
                line-height: 1.5;
                -webkit-font-smoothing: antialiased;
            }

            body {
                display: flex;
                flex-direction: column;
                background: var(--bg);
                border-radius: var(--ms-window-radius, 3px);
                overflow: hidden;
            }

            button {
                cursor: pointer;
                border: none;
                background: none;
                color: inherit;
                font: inherit;
            }

            /* ── Header ─────────────────────────────────────────────────────────── */
            #header {
                display: flex;
                align-items: center;
                gap: 8px;
                height: 40px; padding: 0 12px;
                background: var(--surface);
                border-bottom: 1px solid var(--border);
                box-shadow: 0 1px 12px
                    color-mix(in srgb, var(--accent) 12%, transparent);
                flex-shrink: 0;
                -webkit-app-region: drag;
            }

            #panel-title {
                flex: 1;
                font-weight: 600;
                font-size: 13px;
            }

            .header-btns {
                display: flex;
                gap: 4px;
                -webkit-app-region: no-drag;
            }

            /* ── Ghost button ────────────────────────────────────────────────────── */
            .btn-ghost {
                flex: 1;
                padding: 5px 8px;
                border-radius: var(--radius-s);
                background: var(--surface2);
                color: var(--text2);
                font-size: 11px;
                font-weight: 500;
                transition: opacity 0.15s;
            }
            .btn-ghost:hover {
                opacity: 0.8;
            }

            /* In the header bar, ghost buttons should not stretch */
            .header-btns .btn-ghost {
                flex: 0 0 auto;
            }

            /* ── Close button ────────────────────────────────────────────────────── */
            .btn-close {
                width: 28px; height: 28px; border-radius: 50%;
                background: var(--surface2); color: var(--text2);
                display: flex; align-items: center; justify-content: center;
                flex-shrink: 0;
                transition: background 0.15s;
            }
            
            .btn-close .icon { width: 14px; height: 14px; display: block; }
            .btn-close:hover {
                background: var(--hover);
                color: var(--text);
            }

            /* ── Current window section ──────────────────────────────────────────── */
            #current {
                padding: 10px 12px;
                background: var(--surface);
                border-bottom: 1px solid var(--border);
                flex-shrink: 0;
                display: flex;
                flex-direction: column;
                justify-content: center;
                gap: 3px;
            }

            #current-empty {
                color: var(--text3);
                font-style: italic;
                font-size: 12px;
            }

            #current-app {
                color: var(--accent);
                font-weight: 700;
                font-size: 14px;
                display: none;
            }

            #current-title {
                color: var(--text);
                font-size: 12px;
                display: none;
                word-break: break-word;
                white-space: pre-wrap;
            }

            #current-dim {
                color: var(--text2);
                font:
                    11px "SF Mono",
                    Menlo,
                    monospace;
                display: none;
            }

            /* ── Log area ────────────────────────────────────────────────────────── */
            #log {
                flex: 1;
                overflow-y: auto;
                overflow-x: hidden;
                padding: 4px 0;
                min-height: 0;
                scrollbar-width: thin;
                scrollbar-color: var(--border) transparent;
            }
            #log::-webkit-scrollbar {
                width: 5px;
            }
            #log::-webkit-scrollbar-track {
                background: transparent;
            }
            #log::-webkit-scrollbar-thumb {
                background: var(--border);
                border-radius: var(--radius);
            }

            /* ── Entry rows ──────────────────────────────────────────────────────── */
            .entry {
                display: flex;
                align-items: center;
                gap: 6px;
                padding: 5px 12px;
                font-size: 12px;
                border-bottom: 1px solid var(--border-dim);
            }
            .entry:hover {
                background: var(--surface);
            }
            .entry.selected {
                background: var(--hover);
                outline: 1px solid var(--accent-glow);
            }
            .entry.selected:hover {
                background: var(--accent-glow-faint);
            }

            .ts {
                color: var(--text3);
                font:
                    10px "SF Mono",
                    Menlo,
                    monospace;
                flex-shrink: 0;
                min-width: 52px;
            }

            .entry-dot {
                color: var(--accent);
                flex-shrink: 0;
            }

            .entry-app {
                color: var(--accent);
                font-weight: 600;
                flex-shrink: 0;
            }

            .entry-sep {
                color: var(--text3);
                flex-shrink: 0;
                padding: 0 2px;
            }

            .entry-title {
                flex: 1;
                overflow: hidden;
                text-overflow: ellipsis;
                white-space: nowrap;
                min-width: 0;
            }

            .dim-pill {
                font:
                    10px "SF Mono",
                    Menlo,
                    monospace;
                padding: 1px 5px;
                border-radius: var(--radius-s);
                background: var(--surface2);
                border: 1px solid var(--border);
                color: var(--text2);
                flex-shrink: 0;
            }

            /* ── Context menu ─────────────────────────────────────────────── */
            #ctx-menu {
                position: fixed;
                min-width: 140px;
                background: var(--surface2);
                border: 1px solid var(--border);
                border-radius: var(--radius-s);
                box-shadow: 0 8px 24px rgba(0, 0, 0, 0.55);
                z-index: 150;
                overflow: hidden;
                display: none;
            }
            #ctx-menu.open { display: block; }
            .ctx-item {
                display: flex;
                align-items: center;
                gap: 8px;
                padding: 7px 10px;
                font-size: 12px;
                color: var(--text2);
                cursor: pointer;
                transition: background 0.1s, color 0.1s;
                user-select: none;
            }
            .ctx-item:hover {
                background: var(--hover);
                color: var(--text);
            }
            .ctx-divider {
                height: 1px;
                background: var(--border);
                margin: 2px 0;
            }
        </style>
    </head>
    <body>
        <!-- Header -->
        <div id="header">
            <span id="panel-title">mudscript — window monitor</span>
            <div class="header-btns">
                <button
                    id="pause-btn"
                    class="btn-ghost"
                    onmouseenter="playSlot('hover')"
                    onclick="
                        playSlot('interact');
                        togglePause();
                    "
                >
                    Pause
                </button>
                <button
                    class="btn-ghost"
                    onmouseenter="playSlot('hover')"
                    onclick="
                        playSlot('interact');
                        clearLog();
                    "
                >
                    Clear
                </button>
                <button
                    class="btn-close"
                    onmouseenter="playSlot('hover')"
                    onclick="
                        playSlot('back');
                        closePanel();
                    "
                >
                    ✕
                </button>
            </div>
        </div>

        <!-- Current window -->
        <div id="current">
            <span id="current-empty">No focused window</span>
            <span id="current-app"></span>
            <span id="current-title"></span>
            <span id="current-dim"></span>
        </div>

        <!-- Log -->
        <div id="log"></div>

        <div id="ctx-menu"></div>

        <script src="./modules/log-panel.js"></script>
        <script>
            "use strict";

            // ── Window buildRow ─────────────────────────────────────────────
            function buildRow(entry) {
                const row = document.createElement("div");
                row.className = "entry";

                const ts = document.createElement("span");
                ts.className = "ts";
                ts.textContent = entry.ts || "";
                row.appendChild(ts);

                const dot = document.createElement("span");
                dot.className = "entry-dot";
                dot.textContent = "●";
                row.appendChild(dot);

                const app = document.createElement("span");
                app.className = "entry-app";
                app.textContent = entry.app || "";
                row.appendChild(app);

                const sep = document.createElement("span");
                sep.className = "entry-sep";
                sep.textContent = "›";
                row.appendChild(sep);

                const title = document.createElement("span");
                title.className = "entry-title";
                title.textContent = entry.title || "";
                row.appendChild(title);

                if (entry.w != null && entry.h != null) {
                    const pill = document.createElement("span");
                    pill.className = "dim-pill";
                    pill.textContent = entry.w + "\u00d7" + entry.h;
                    row.appendChild(pill);
                }

                row.onmouseenter = function() { lp.playSlot("hover"); };
                row.onclick = lp._handleEntryClick;
                return row;
            }

            // ── Create LogPanel ─────────────────────────────────────────────
            const lp = createLogPanel({
                channel: "window",
                buildRow,
                maxEntries: 300,
                scrollThresh: 48,
                extractCopyText(el) {
                    const ts = el.querySelector(".ts")?.textContent || "";
                    const app = el.querySelector(".entry-app")?.textContent || "";
                    const title = el.querySelector(".entry-title")?.textContent || "";
                    const dim = el.querySelector(".dim-pill")?.textContent || "";
                    const parts = [ts, app];
                    if (title) parts.push(title);
                    if (dim) parts.push(dim);
                    return parts.join(" ");
                },
            });

            // ── Expose globals for inline handlers ──────────────────────────
            window.togglePause = lp.togglePause;
            window.playSlot    = lp.playSlot;
            window.clearLog    = lp.clearLog;
            window.closePanel  = lp.closePanel;
            window.applyTheme  = lp.applyTheme;

            // ── Current window display ──────────────────────────────────────
            function updateCurrentWindow(entry) {
                const empty = document.getElementById("current-empty");
                const appEl = document.getElementById("current-app");
                const titleEl = document.getElementById("current-title");
                const dimEl = document.getElementById("current-dim");

                if (!entry || (!entry.app && !entry.title)) {
                    empty.style.display = "";
                    appEl.style.display = "none";
                    titleEl.style.display = "none";
                    dimEl.style.display = "none";
                    return;
                }

                empty.style.display = "none";
                appEl.style.display = "";
                titleEl.style.display = "";
                dimEl.style.display = "";

                appEl.textContent = entry.app || "";
                titleEl.textContent = entry.title || "";
                dimEl.textContent =
                    entry.w != null && entry.h != null
                        ? entry.w + "\u00d7" + entry.h + " px"
                        : "";
            }

            // ── Override loadHistory to also update current ─────────────────
            const _baseLoad = lp.loadHistory;

            function loadHistory(entries) {
                _baseLoad(entries);
                if (entries && entries.length > 0) {
                    updateCurrentWindow(entries[entries.length - 1]);
                }
            }

            window.appendEntry      = lp.appendEntry;
            window.loadHistory      = loadHistory;
            window.updateCurrentWindow = updateCurrentWindow;

            // ── Init ────────────────────────────────────────────────────────
            document.addEventListener("DOMContentLoaded", () => {
                if (typeof registerPanel === "function") {
                    registerPanel("window", function(action, body) {
                        if (action === "updateCurrentWindow" && body) window.updateCurrentWindow(body);
                        else if (action === "loadHistory" && body) window.loadHistory(body);
                    });
                }
                if (window.shellPost) {
                    var p = document.getElementById("panel");
                    if (p) { p.style.borderRadius = "0"; p.style.clipPath = "none"; }
                }
                lp.sendToHost({ action: "ready" });
            });
        </script>
    </body>
</html>
