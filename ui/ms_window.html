<!doctype html>
<html lang="en">
    <head>
        <meta charset="UTF-8" />
        <style>
            :root {
                --bg: #060402;
                --surface: #100806;
                --surface2: #1c100c;
                --border: rgba(130, 50, 22, 0.55);
                --accent: #c41a1a;
                --text: #f0ddb0;
                --text2: rgba(210, 165, 100, 0.75);
                --radius: 3px;
            }

            *,
            *::before,
            *::after {
                box-sizing: border-box;
                margin: 0;
                padding: 0;
                user-select: none;
                -webkit-user-select: none;
            }

            html,
            body {
                width: 100%;
                height: 100%;
                background: var(--bg);
                color: var(--text);
                font-family: "Almendra", Palatino, Georgia, serif;
                font-size: 13px;
                line-height: 1.5;
                overflow: hidden;
            }

            body {
                display: flex;
                flex-direction: column;
            }

            /* ── Titlebar ─────────────────────────────────────────────────── */
            #titlebar {
                height: 32px;
                -webkit-app-region: drag;
                display: flex;
                align-items: center;
                padding: 0 10px 0 14px;
                border-bottom: 1px solid var(--border);
                flex-shrink: 0;
                gap: 6px;
            }

            #titlebar-text {
                flex: 1;
                font-size: 11px;
                font-weight: 700;
                letter-spacing: 1.5px;
                text-transform: uppercase;
                color: var(--text2);
            }

            .tb-btn {
                -webkit-app-region: no-drag;
                height: 20px;
                padding: 0 8px;
                background: transparent;
                border: 1px solid var(--border);
                border-radius: var(--radius);
                color: var(--text2);
                font-family: inherit;
                font-size: 11px;
                cursor: pointer;
                transition:
                    background 0.12s,
                    border-color 0.12s,
                    color 0.12s;
            }

            .tb-btn:hover {
                background: var(--surface2);
                border-color: var(--accent);
                color: var(--text);
            }

            /* ── Current window section ───────────────────────────────────── */
            #current-section {
                flex-shrink: 0;
                height: 80px;
                padding: 10px 14px;
                display: flex;
                flex-direction: column;
                justify-content: center;
                gap: 3px;
                background: var(--surface);
                border-bottom: 1px solid var(--border);
            }

            #current-empty {
                font-size: 12px;
                color: var(--text2);
                font-style: italic;
            }

            #current-app {
                font-size: 14px;
                font-weight: 700;
                color: var(--accent);
                white-space: nowrap;
                overflow: hidden;
                text-overflow: ellipsis;
            }

            #current-title {
                font-size: 12px;
                color: var(--text);
                white-space: nowrap;
                overflow: hidden;
                text-overflow: ellipsis;
            }

            #current-dim {
                font-size: 11px;
                color: var(--text2);
                font-variant-numeric: tabular-nums;
            }

            /* ── Log area ───────────────────────────────────────────────────── */
            #log {
                flex: 1;
                overflow-y: auto;
                padding: 4px 0;
                min-height: 0;
            }

            #log::-webkit-scrollbar {
                width: 5px;
            }

            #log::-webkit-scrollbar-track {
                background: transparent;
            }

            #log::-webkit-scrollbar-thumb {
                background: var(--border);
                border-radius: 3px;
            }

            /* ── Entry rows ─────────────────────────────────────────────────── */
            .entry {
                display: flex;
                align-items: center;
                gap: 6px;
                padding: 3px 16px;
                font-size: 13px;
                line-height: 1.55;
            }

            .entry:hover {
                background: var(--surface);
            }

            .ts {
                color: var(--text2);
                font-size: 11px;
                white-space: nowrap;
                flex-shrink: 0;
            }

            .dot {
                font-size: 7px;
                color: var(--accent);
                flex-shrink: 0;
            }

            .entry-app {
                color: var(--accent);
                font-weight: 600;
                white-space: nowrap;
                flex-shrink: 0;
            }

            .entry-sep {
                color: var(--text2);
                flex-shrink: 0;
            }

            .entry-title {
                color: var(--text);
                white-space: nowrap;
                overflow: hidden;
                text-overflow: ellipsis;
                flex: 1;
                min-width: 0;
            }

            .dim-pill {
                font-size: 10px;
                color: var(--text2);
                border: 1px solid var(--border);
                border-radius: var(--radius);
                padding: 1px 5px;
                white-space: nowrap;
                flex-shrink: 0;
                font-family: "SF Mono", Menlo, monospace;
            }
        </style>
    </head>
    <body>
        <div id="titlebar">
            <span id="titlebar-text">mudscript — window monitor</span>
            <button class="tb-btn" onclick="clearLog()">[clear]</button>
            <button class="tb-btn" onclick="closePanel()">[×]</button>
        </div>

        <div id="current-section">
            <span id="current-empty">No focused window</span>
            <span id="current-app" style="display:none"></span>
            <span id="current-title" style="display:none"></span>
            <span id="current-dim" style="display:none"></span>
        </div>

        <div id="log"></div>

        <script>
            "use strict";

            document.addEventListener("contextmenu", (e) => e.preventDefault());

            function sendToHost(msg) {
                const s = typeof msg === "string" ? msg : JSON.stringify(msg);
                if (window.chrome?.webview) {
                    window.chrome.webview.postMessage(s);
                } else {
                    window.webkit.messageHandlers.msWindow.postMessage(s);
                }
            }

            // ── Drag ──────────────────────────────────────────────────────────
            (function () {
                let _drag = null;
                document
                    .getElementById("titlebar")
                    .addEventListener("mousedown", (e) => {
                        if (e.target.closest(".tb-btn")) return;
                        _drag = { ox: e.screenX, oy: e.screenY };
                        const onMove = (ev) => {
                            if (!_drag) return;
                            sendToHost({
                                action: "move",
                                dx: ev.screenX - _drag.ox,
                                dy: ev.screenY - _drag.oy,
                            });
                            _drag.ox = ev.screenX;
                            _drag.oy = ev.screenY;
                        };
                        const onUp = () => {
                            _drag = null;
                            window.removeEventListener("mousemove", onMove);
                            window.removeEventListener("mouseup", onUp);
                        };
                        window.addEventListener("mousemove", onMove);
                        window.addEventListener("mouseup", onUp);
                    });
            })();

            // ── Scroll helpers ─────────────────────────────────────────────────
            const MAX_ENTRIES = 300;
            const NEAR_BOTTOM = 48;

            function isNearBottom(el) {
                return (
                    el.scrollHeight - el.scrollTop - el.clientHeight <=
                    NEAR_BOTTOM
                );
            }

            // ── Current window display ─────────────────────────────────────────
            function updateCurrentWindow(entry) {
                const empty = document.getElementById("current-empty");
                const appEl = document.getElementById("current-app");
                const titleEl = document.getElementById("current-title");
                const dimEl = document.getElementById("current-dim");

                if (!entry || (!entry.app && !entry.title)) {
                    empty.style.display = "";
                    appEl.style.display = "none";
                    titleEl.style.display = "none";
                    dimEl.style.display = "none";
                    return;
                }

                empty.style.display = "none";
                appEl.style.display = "";
                titleEl.style.display = "";
                dimEl.style.display = "";

                appEl.textContent = entry.app || "";
                titleEl.textContent = entry.title || "";
                dimEl.textContent =
                    entry.w != null && entry.h != null
                        ? entry.w + "×" + entry.h + " px"
                        : "";
            }

            // ── Entry builder ──────────────────────────────────────────────────
            function buildRow(entry) {
                const row = document.createElement("div");
                row.className = "entry";

                const ts = document.createElement("span");
                ts.className = "ts";
                ts.textContent = "[" + (entry.ts || "") + "]";
                row.appendChild(ts);

                const dot = document.createElement("span");
                dot.className = "dot";
                dot.textContent = "●";
                row.appendChild(dot);

                const app = document.createElement("span");
                app.className = "entry-app";
                app.textContent = entry.app || "";
                row.appendChild(app);

                const sep = document.createElement("span");
                sep.className = "entry-sep";
                sep.textContent = "›";
                row.appendChild(sep);

                const title = document.createElement("span");
                title.className = "entry-title";
                title.textContent = entry.title || "";
                row.appendChild(title);

                if (entry.w != null && entry.h != null) {
                    const pill = document.createElement("span");
                    pill.className = "dim-pill";
                    pill.textContent = entry.w + "×" + entry.h;
                    row.appendChild(pill);
                }

                return row;
            }

            // ── Public API ─────────────────────────────────────────────────────
            function appendEntry(entry) {
                const log = document.getElementById("log");
                const atBottom = isNearBottom(log);
                log.appendChild(buildRow(entry));
                while (log.childElementCount > MAX_ENTRIES) {
                    log.removeChild(log.firstElementChild);
                }
                if (atBottom) log.scrollTop = log.scrollHeight;
                updateCurrentWindow(entry);
            }

            function loadHistory(entries) {
                const log = document.getElementById("log");
                log.innerHTML = "";
                const frag = document.createDocumentFragment();
                (entries || []).forEach((e) => frag.appendChild(buildRow(e)));
                log.appendChild(frag);
                log.scrollTop = log.scrollHeight;
                if (entries && entries.length > 0) {
                    updateCurrentWindow(entries[entries.length - 1]);
                }
            }

            // ── Button actions ─────────────────────────────────────────────────
            function clearLog() {
                document.getElementById("log").innerHTML = "";
                sendToHost({ action: "clear" });
            }

            function closePanel() {
                sendToHost({ action: "close" });
            }
        </script>
    </body>
</html>
