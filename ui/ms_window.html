279|    <body>
280|        <!-- Header -->
281|        <div id="header">
282|            <span id="panel-title">mudscript — window monitor</span>
283|            <div class="header-btns">

285|                    class="btn-ghost"
286|                    onmouseenter="playSlot('hover')"
287|                    onclick="
288|                        playSlot('interact');
289|                        clearLog();
290|                    "
291|                >
292|                    Clear
293|                </button>
294|                <button
295|                    class="btn-close"
296|                    onmouseenter="playSlot('hover')"
297|                    onclick="

299|                        closePanel();
300|                    "
301|                >
302|                    ✕

318|        <script>
319|            "use strict";
320|
321|            document.addEventListener("contextmenu", (e) => e.preventDefault());
322|
323|            // ── Constants ─────────────────────────────────────────────────────────
324|            const MAX_ENTRIES = 300;
325|            const SCROLL_THRESH = 48;
326|
327|            // ── Host bridge ───────────────────────────────────────────────────────
328|            function sendToHost(msg) {
329|                const s = typeof msg === "string" ? msg : JSON.stringify(msg);
330|                try {
331|                    window.webkit.messageHandlers.msWindow.postMessage(s);
332|                } catch (e) {}
333|            }
334|
335|            function playSlot(slot) {
336|                sendToHost({ action: "playSlot", slot });
337|            }
338|
339|            // ── Scroll helper ─────────────────────────────────────────────────────
340|            function isNearBottom() {
341|                const log = document.getElementById("log");
342|                return (
343|                    log.scrollHeight - log.scrollTop - log.clientHeight <=
344|                    SCROLL_THRESH
345|                );
346|            }
347|
348|            // ── Current window display ────────────────────────────────────────────
349|            // entry: { app, title, w?, h? }
350|            function updateCurrentWindow(entry) {
351|                const empty = document.getElementById("current-empty");
352|                const appEl = document.getElementById("current-app");
353|                const titleEl = document.getElementById("current-title");
354|                const dimEl = document.getElementById("current-dim");
355|
356|                if (!entry || (!entry.app && !entry.title)) {
357|                    empty.style.display = "";
358|                    appEl.style.display = "none";
359|                    titleEl.style.display = "none";
360|                    dimEl.style.display = "none";
361|                    return;
362|                }
363|
364|                empty.style.display = "none";
365|                appEl.style.display = "";
366|                titleEl.style.display = "";
367|                dimEl.style.display = "";
368|
369|                appEl.textContent = entry.app || "";
370|                titleEl.textContent = entry.title || "";
371|                dimEl.textContent =
372|                    entry.w != null && entry.h != null
373|                        ? entry.w + "\u00d7" + entry.h + " px"
374|                        : "";
375|            }
376|
377|            // ── Entry builder ─────────────────────────────────────────────────────
378|            // Creates .entry with [ts] ● app-span › title-span dim-pill
379|            function buildRow(entry) {
380|                const row = document.createElement("div");
381|                row.className = "entry";
382|
383|                const ts = document.createElement("span");
384|                ts.className = "ts";
385|                ts.textContent = entry.ts || "";
386|                row.appendChild(ts);
387|
388|                const dot = document.createElement("span");
389|                dot.className = "entry-dot";
390|                dot.textContent = "●";
391|                row.appendChild(dot);
392|
393|                const app = document.createElement("span");
394|                app.className = "entry-app";
395|                app.textContent = entry.app || "";
396|                row.appendChild(app);
397|
398|                const sep = document.createElement("span");
399|                sep.className = "entry-sep";
400|                sep.textContent = "›";
401|                row.appendChild(sep);
402|
403|                const title = document.createElement("span");
404|                title.className = "entry-title";
405|                title.textContent = entry.title || "";
406|                row.appendChild(title);
407|
408|                if (entry.w != null && entry.h != null) {
409|                    const pill = document.createElement("span");
410|                    pill.className = "dim-pill";
411|                    pill.textContent = entry.w + "\u00d7" + entry.h;
412|                    row.appendChild(pill);
413|                }
414|
415|                return row;
416|            }
417|
418|            // ── Public API ────────────────────────────────────────────────────────
419|            // Appends a row, trims to MAX_ENTRIES, auto-scrolls, updates current
420|            function appendEntry(entry) {
421|                const log = document.getElementById("log");
422|                const atBottom = isNearBottom();
423|                log.appendChild(buildRow(entry));
424|                while (log.childElementCount > MAX_ENTRIES) {
425|                    log.removeChild(log.firstElementChild);
426|                }
427|                if (atBottom) log.scrollTop = log.scrollHeight;
428|                updateCurrentWindow(entry);
429|            }
430|
431|            // Clears log, bulk appends (up to MAX_ENTRIES), scrolls, updates current
432|            function loadHistory(entries) {
433|                const log = document.getElementById("log");
434|                log.innerHTML = "";
435|                const frag = document.createDocumentFragment();
436|                (entries || [])
437|                    .slice(-MAX_ENTRIES)
438|                    .forEach((e) => frag.appendChild(buildRow(e)));
439|                log.appendChild(frag);
440|                log.scrollTop = log.scrollHeight;
441|                if (entries && entries.length > 0) {
442|                    updateCurrentWindow(entries[entries.length - 1]);
443|                }
444|            }
445|
446|            function clearLog() {
447|                document.getElementById("log").innerHTML = "";
448|                sendToHost({ action: "clear" });
449|            }
450|
451|            function closePanel() {
452|                sendToHost({ action: "close" });
453|            }

455|            // ── Drag to move ──────────────────────────────────────────────────────
456|            (function () {
457|                let _drag = null;
458|                document
459|                    .getElementById("header")
460|                    .addEventListener("mousedown", (e) => {
461|                        if (e.target.closest(".header-btns")) return;
462|                        _drag = { ox: e.screenX, oy: e.screenY };
463|                        const onMove = (ev) => {
464|                            if (!_drag) return;
465|                            sendToHost({
466|                                action: "move",
467|                                dx: ev.screenX - _drag.ox,
468|                                dy: ev.screenY - _drag.oy,
469|                            });
470|                            _drag.ox = ev.screenX;
471|                            _drag.oy = ev.screenY;
472|                        };
473|                        const onUp = () => {
474|                            _drag = null;
475|                            window.removeEventListener("mousemove", onMove);
476|                            window.removeEventListener("mouseup", onUp);
477|                        };
478|                        window.addEventListener("mousemove", onMove);
479|                        window.addEventListener("mouseup", onUp);
480|                    });
481|            })();

483|            // ── Theme injection ───────────────────────────────────────────────────
            // Parse #rrggbb or #rgb -> { r, g, b }
            function hexToRgb(hex) {
                hex = hex.replace(/^#/, "");
                if (hex.length === 3) hex = hex[0]+hex[0]+hex[1]+hex[1]+hex[2]+hex[2];
                const n = parseInt(hex, 16);
                return { r: (n >> 16) & 255, g: (n >> 8) & 255, b: n & 255 };
            }

            function applyTheme(t) {
                if (!t) return;
                const r = document.documentElement.style;
                if (t.bg) r.setProperty("--bg", t.bg);
                if (t.surface) r.setProperty("--surface", t.surface);
                if (t.surface2) r.setProperty("--surface2", t.surface2);
                if (t.hover) r.setProperty("--hover", t.hover);
                if (t.accent) r.setProperty("--accent", t.accent);
                if (t.accentHi) r.setProperty("--accent-hi", t.accentHi);
                if (t.success) r.setProperty("--success", t.success);
                if (t.dangerBg) r.setProperty("--danger-bg", t.dangerBg);
                if (t.danger) r.setProperty("--danger", t.danger);
                if (t.warning) r.setProperty("--warning", t.warning);
                if (t.text) r.setProperty("--text", t.text);
                // Derived: text2/text3 from text
                if (t.text && !t.text2) {
                    const c = hexToRgb(t.text);
                    if (c) r.setProperty("--text2", `rgba(${c.r},${c.g},${c.b},0.85)`);
                }
                if (t.text && !t.text3) {
                    const c = hexToRgb(t.text);
                    if (c) r.setProperty("--text3", `rgba(${c.r},${c.g},${c.b},0.55)`);
                }
                // Derived: border from accent + hover mix
                if (t.accent && t.hover && !t.border) {
                    const a = hexToRgb(t.accent);
                    const h = hexToRgb(t.hover);
                    if (a && h) {
                        const mr = Math.round(a.r * 0.5 + h.r * 0.5);
                        const mg = Math.round(a.g * 0.5 + h.g * 0.5);
                        const mb = Math.round(a.b * 0.5 + h.b * 0.5);
                        r.setProperty("--border", `rgba(${mr},${mg},${mb},0.55)`);
                        r.setProperty("--border-dim", `rgba(${mr},${mg},${mb},0.18)`);
                    }
                }
                // Derived: accent glow
                if (t.accent && !t.accentGlow) {
                    const a = hexToRgb(t.accent);
                    if (a) r.setProperty("--accent-glow", `rgba(${a.r},${a.g},${a.b},0.4)`);
                }
                if (t.accent && !t.accentGlowFaint) {
                    const a = hexToRgb(t.accent);
                    if (a) r.setProperty("--accent-glow-faint", `rgba(${a.r},${a.g},${a.b},0.12)`);
                }
                // Derived: danger glow/border
                if (t.danger && !t.dangerGlow) {
                    const d = hexToRgb(t.danger);
                    if (d) r.setProperty("--danger-glow", `rgba(${d.r},${d.g},${d.b},0.6)`);
                }
                if (t.danger && !t.dangerBorder) {
                    const d = hexToRgb(t.danger);
                    if (d) r.setProperty("--danger-border", `rgba(${d.r},${d.g},${d.b},0.3)`);
                }
                // Explicit overrides
                if (t.text2) r.setProperty("--text2", t.text2);
                if (t.text3) r.setProperty("--text3", t.text3);
                if (t.border) r.setProperty("--border", t.border);
                if (t.borderDim) r.setProperty("--border-dim", t.borderDim);
                if (t.accentGlow) r.setProperty("--accent-glow", t.accentGlow);
                if (t.accentGlowFaint) r.setProperty("--accent-glow-faint", t.accentGlowFaint);
                if (t.dangerGlow) r.setProperty("--danger-glow", t.dangerGlow);
                if (t.dangerBorder) r.setProperty("--danger-border", t.dangerBorder);
                if (t.radius !== undefined) {
                    r.setProperty("--radius", t.radius + "px");
                    r.setProperty("--radius-s", Math.max(0, t.radius - 1) + "px");
                }

506|
